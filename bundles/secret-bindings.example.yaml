apiVersion: phantom.agentic/v1alpha1
kind: SecretBindingTemplate
metadata:
  agentId: phantom-soc-simulation-agent
  description: Example mapping from Phantom secret references to a target orchestration secret provider.
policy:
  rawValuesAllowed: false
  importBehavior: require-target-reference
bindings:
  MCP_TOKEN:
    provider: infisical
    targetPath: /agents/phantom-soc-simulation-agent/mcp/token
    env: MCP_TOKEN
    required: true
  UI_PASSWORD:
    provider: infisical
    targetPath: /agents/phantom-soc-simulation-agent/ui/password
    env: UI_PASSWORD
    required: true
  GOOGLE_APPLICATION_CREDENTIALS:
    provider: infisical
    targetPath: /agents/phantom-soc-simulation-agent/providers/google/application-credentials
    env: GOOGLE_APPLICATION_CREDENTIALS
    required: true
  CALDERA_MCP_TOKEN:
    provider: infisical
    targetPath: /agents/phantom-soc-simulation-agent/connectors/caldera-mcp/token
    env: CALDERA_MCP_TOKEN
    required: false
  XSIAM_MCP_TOKEN:
    provider: infisical
    targetPath: /agents/phantom-soc-simulation-agent/connectors/xsiam-mcp/token
    env: XSIAM_MCP_TOKEN
    required: false
  XLOG_MCP_TOKEN:
    provider: infisical
    targetPath: /agents/phantom-soc-simulation-agent/connectors/xlog-mcp/token
    env: XLOG_MCP_TOKEN
    required: false
  CALDERA_RED_PASSWORD:
    provider: infisical
    targetPath: /agents/phantom-soc-simulation-agent/caldera/red-password
    env: CALDERA_RED_PASSWORD
    required: false
  GEMINI_API_KEY:
    provider: infisical
    targetPath: /agents/phantom-soc-simulation-agent/providers/google/gemini-api-key
    env: GEMINI_API_KEY
    required: false
  SSL_CERT_PEM:
    provider: infisical
    targetPath: /agents/phantom-soc-simulation-agent/tls/cert-pem
    env: SSL_CERT_PEM
    required: false
  SSL_KEY_PEM:
    provider: infisical
    targetPath: /agents/phantom-soc-simulation-agent/tls/key-pem
    env: SSL_KEY_PEM
    required: false
