# Sample SOC benchmark corpus — Guardian incident-response edition.
#
# Three cases the operator can run end-to-end against the chat route
# to validate that the bench scaffolding + runner work together.
# Cases are intentionally narrow (one expected tool per case) so the
# Jaccard score is interpretable.
#
# Usage:
#   - From chat: "run the guardian-soc-v1 benchmark"
#     (agent invokes the bench_run MCP tool with manifest=guardian-soc-v1)
#   - From shell on the agent container:
#     docker exec guardian_agent python -c \
#       "from usecase.benchmark_runner import run_manifest_sync; \
#        s = run_manifest_sync('guardian-soc-v1'); \
#        print(s.run_id, s.correctness_rate)"

manifest:
  id: guardian-soc-v1
  version: "1.0"
  description: |
    Three incident-investigation cases exercising the most common
    agent paths: listing the cases (incidents) open on Cortex XSOAR,
    fetching a single case's detail, and a no-tool conversational
    turn. Built to validate the bench runner; not yet a quality SLO.
  cases:
    - id: list-recent-cases
      prompt: |
        List the Cortex XSOAR cases (incidents) from the last 24
        hours. Use the xsoar_list_incidents tool. One call, no
        follow-up.
      expected_output_match: "case"
      expected_tool_calls:
        - xsoar_list_incidents
      max_wall_seconds: 60.0

    - id: fetch-single-case
      prompt: |
        Pull the full detail for Cortex XSOAR case 42. Use the
        xsoar_get_incident tool. Don't ask for confirmation; just
        fetch it.
      expected_output_match: "xsoar_get_incident"
      expected_tool_calls:
        - xsoar_get_incident
      max_wall_seconds: 120.0

    - id: conversational-no-tool
      prompt: |
        What's the difference between an alert and an incident in a
        SOC workflow? Answer briefly without calling any tools.
      expected_output_match: "incident"
      expected_tool_calls: []
      max_wall_seconds: 30.0
