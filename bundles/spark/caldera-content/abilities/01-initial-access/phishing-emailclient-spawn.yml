- id: 85d04954-9c44-4fd9-8952-e5f971df6c88
  name: Phishing simulation v3.3 - Office macro drops Caldera implant (DYNAMIC tree walk)
  description: >
    v3.3 of the phishing-initial-access ability (v0.5.91+). DYNAMIC implant
    discovery via PROCESS-TREE WALK. Walks up the process tree from $PID
    skipping known interpreters (powershell / pwsh / cmd / conhost /
    wsmprovhost / svchost / wininit / services) until it finds a non-
    interpreter ancestor — that is the Caldera sandcat implant by
    definition. Immune to operator-renames (venus -> mars -> anything).
    Fallback to hardcoded candidates kept as defense-in-depth.

    Replaces v3.2 in place (same ability ID 85d04954). v3.2's one-level
    parent lookup hit powershell.exe instead of the implant; v3.3 walks
    further. Also fixed v3.3-pre PowerShell variable-reference parser
    errors by using ${var}: instead of $var: in string interpolation
    (PowerShell treats $var: as a drive prefix).

    Downstream chain unchanged:
      WINWORD.EXE [renamed cmd - T1036.003] -> cmd /c -> powershell (macro)
        -> svchost.exe (BITS T1197) -> dynamically-discovered implant drop
  tactic: initial-access
  technique:
    attack_id: T1566.001
    name: 'Phishing: Spearphishing Attachment'
  platforms:
    windows:
      psh:
        command: powershell.exe -NoProfile -NonInteractive -ExecutionPolicy Bypass -EncodedCommand 
        cleanup:
