- id: b81f4c93-2e8a-4f29-9b7d-e5a216d4f9c2
  name: "Phantom: Identify Firewalls (Get-NetFirewallProfile, T1518.001)"
  description: >
    Phantom modern replacement for stockpile T1518.001 "Identify Firewalls"
    (8c06ebf8 — uses deprecated Get-WmiObject + actually queries AV WMI not
    firewalls). Uses Get-NetFirewallProfile + Get-NetFirewallRule for real
    firewall enumeration. Returns per-profile enabled/disabled + inbound/
    outbound rule counts. Falls back to netsh if NetSecurity module missing.
    Tracked under issue #52.
  tactic: discovery
  technique:
    attack_id: T1518.001
    name: 'Software Discovery: Security Software Discovery'
  platforms:
    windows:
      psh:
        command: powershell.exe -NoProfile -NonInteractive -ExecutionPolicy Bypass -EncodedCommand 
        timeout: 30
