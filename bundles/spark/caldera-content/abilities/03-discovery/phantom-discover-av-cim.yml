- id: a52d1e10-c19c-4d51-8bf3-7e4c9a3f8e91
  name: "Phantom: Discover AV/EDR (4-path: SecurityCenter2 + Defender + Service + Process)"
  description: >
    Modern T1518.001 multi-path discovery covering both workstation and Server
    classes of Windows. Workstation hosts have the root\SecurityCenter2 WMI
    namespace and report registered AV products there; Windows Server 2022
    DOES NOT have that namespace by default (it's a Desktop Experience feature).
    Stockpile 2dece965 (wmic) + 8c06ebf8 (Get-WmiObject) both fail on Server
    for this reason. This ability tries 4 paths in sequence and reports
    whichever succeed:

      1. Get-CimInstance root\SecurityCenter2 AntiVirusProduct (workstation)
      2. Get-MpComputerStatus (Defender PSh module — works on Server)
      3. Get-Service filtered for known EDR service names (Cylance,
         CrowdStrike, Cortex XDR, Sentinel, Defender, Sophos, Kaspersky,
         Symantec, McAfee, TrendMicro, Carbon Black, Tanium, etc.)
      4. Get-Process filtered for known EDR process names

    Reports all detected; doesn't fail-fast on any single path. Tracked under
    issue #52.
  tactic: discovery
  technique:
    attack_id: T1518.001
    name: 'Software Discovery: Security Software Discovery'
  platforms:
    windows:
      psh:
        command: powershell.exe -NoProfile -NonInteractive -ExecutionPolicy Bypass -EncodedCommand 
        timeout: 30
