- id: 25a01a28-b2be-5844-8700-e279b9da4721
  name: "Lookalike: Comsvcs MiniDump command-line trace (lab-safe)"
  description: "Invokes rundll32 with the marquee comsvcs.dll MiniDump command-line pattern against PID=-1 (non-existent). Sysmon EID 1 captures the rundll32 + comsvcs.dll + MiniDump command — the canonical Cortex prevention rule trigger — but no lsass handle is opened because the PID is invalid. Detection event fires; no memory access. T1003.001 alternative detection-equivalent. See issue #43."
  tactic: credential-access
  technique:
    attack_id: T1003.001
    name: "OS Credential Dumping: LSASS Memory"
  platforms:
    windows:
      psh:
        command: powershell.exe -NoProfile -NonInteractive -ExecutionPolicy Bypass -EncodedCommand 
        timeout: 60
