- id: 4a1a71ef-928d-5e4e-8380-a5da501aefc8
  name: "Certutil Decode Payload (LOLBin)"
  description: "Drops a base64-encoded blob then uses certutil.exe -decode to deobfuscate it. Classic living-off-the-land binary abuse pattern. Payload is a harmless text string -- nothing actually runs. T1140 Deobfuscate/Decode Files via LOLBin (certutil is signed Microsoft)."
  tactic: defense-evasion
  technique:
    attack_id: T1140
    name: "Deobfuscate/Decode Files or Information"
  platforms:
    windows:
      psh:
        command: powershell.exe -NoProfile -NonInteractive -ExecutionPolicy Bypass -EncodedCommand 
        timeout: 120
