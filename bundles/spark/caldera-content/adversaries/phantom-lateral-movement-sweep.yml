- id: e5a9c1b2-7d40-4836-9c4a-8b1f3e6d5a7e
  name: "Phantom: Lateral Movement Sweep (curated)"
  description: >
    Phantom-curated lateral movement adversary that bypasses the workgroup
    DNS-PTR-records gap by using known-working abilities with hardcoded targets.
    All 7 stockpile lateral-movement adversaries we tested (Worm, Lateral Movement
    Certutil/Esentutl, Service Creation Lateral, Mount Share + 4 sandcat-copy
    abilities) failed to dispatch their lateral steps in our lab because they
    require `remote.host.fqdn` facts that the basic source can't provide and
    Find Hostname (`nbtstat -A` against ARP-discovered IPs) returns "Host not
    found" on workgroup hosts.

    This curated sweep uses three known-working approaches:

      1. **Phantom lateral target marker** — pre-condition that documents the
         hardcoded target (xdragent2 / 10.10.0.16) for telemetry visibility.
      2. **v0.5.57 Phantom lateral ability** (`55aee52f`) — multi-method
         SMB+WMI+WinRM real cross-host RCE, hardcoded target inside encoded
         PowerShell, no fact prereqs, proven working in v0.5.57 phishing chain.
      3. **Caldera discovery abilities** that ARE workgroup-compatible — Local
         FQDN (74d1b640) + Discover local hosts (13379ae1) for context, even
         though they don't satisfy the stockpile lateral movement abilities'
         FQDN requirements.

    Cortex coverage expectation: SMB share map + WMI remote exec + WinRM
    Invoke-Command — classic lateral movement signatures Cortex's behavioral
    rules should catch.

    Phantom-bundled — ships in the caldera image starting v0.5.84.
