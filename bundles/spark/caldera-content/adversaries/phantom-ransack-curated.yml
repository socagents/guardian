- id: 9c7f4d5a-3b21-4e88-a3f9-d4a9c2e7b1f3
  name: "Phantom: Ransack (curated)"
  description: >
    Phantom-curated variant of stockpile Ransack (de07f52d). The stock Ransack chain
    fails silently on a fresh lab because T1005 "Find files" searches C:\Users for
    sensitive-extension files (png, yml, wav per source facts) and finds nothing on
    clean Windows Server hosts. With zero host.file.path facts produced, the
    downstream "Stage sensitive files" never dispatches, "Compress staged directory"
    runs on an empty dir and fails, and "Exfil staged directory" never reaches the
    chain. Result: ~60% chain success, ransomware-relevant half untested, zero
    Cortex preventions captured (path never exercised at the EDR layer).

    This curated variant prepends a decoy-file-setup ability that drops 27 lab-safe
    decoy files in C:\Users\Public\Documents\Decoys before the chain runs. The rest
    of the atomic_ordering matches stockpile Ransack exactly (preserving the
    intended detection coverage). End-state: full chain completes through staging +
    compression + exfil, giving Cortex the opportunity to fire its full ransomware-
    behavior signature set.

    Phantom-bundled — ships in the caldera image starting v0.5.83.
  atomic_ordering:
    # Phantom pre-condition: drop decoy files so T1005 has something to find
