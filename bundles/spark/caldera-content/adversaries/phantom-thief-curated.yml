  name: "Phantom: Thief (curated)"
  description: >
    Phantom-curated variant of stockpile Thief (1a98b8e6). Stock Thief is the
    Ransack staging+exfil sub-chain (Create staging dir → Find files → Stage
    sensitive files → Compress → Exfil) — same 5 abilities as Ransack's tail end
    without the recon+discovery prefix. Same environmental gap: T1005 finds nothing
    on a clean lab → Stage skips → Compress fails → Exfil never dispatches. This
    curated variant prepends the Phantom decoy-files ability for end-to-end
    validation. Faster than curated Ransack (5 steps vs 18), useful as a focused
    ransomware-staging detection test.

    Phantom-bundled — ships in the caldera image starting v0.5.84.
