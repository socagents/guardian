  name: "Phantom: Super Spy (curated)"
  description: >
    Phantom-curated variant of stockpile Super Spy (564ae20d). Stock Super Spy has
    the same staging chain pattern as Ransack (Create staging dir → Find files →
    Stage sensitive files → Compress → Exfil) plus screen-capture, microphone,
    clipboard, Chrome bookmarks, WIFI discovery, packet sniff steps. Same
    environmental gap as Ransack: T1005 Find files returns zero results on a clean
    lab without decoys, so the staging chain skips. This curated variant prepends
    the Phantom decoy-files ability so the full chain runs end-to-end and Cortex
    sees the complete behavioral fingerprint (staging + compression + exfil +
    audio/video collection + clipboard scrape).

    Phantom-bundled — ships in the caldera image starting v0.5.84.
