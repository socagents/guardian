  description: >
    Phantom's flagship adversary — the single most comprehensive validated
    attack chain in the battery. Combines v0.5.57's proven 20-step phishing →
    ransomware kill chain with two NEW pre/in-chain steps based on findings
    from XDR cases 1794 + 1795 (autonomous battery run 2026-05-17):

      1. Phantom decoy-files pre-condition (T1607) at chain start — so the
         Ransack-style staging half of the chain works on a clean lab without
         operator manual setup (this is what v0.5.83-v0.5.85 introduced for
         the curated Ransack/Super Spy/Thief variants).

      2. PowerKatz (stockpile T1003 Run PowerKatz, ability baac2c6d) added
         mid-chain — Cortex's "PowerShell runs with known Mimikatz arguments"
         signature fires reliably on this; together with v0.5.57's existing
         LSASS minidump (T1003.001 comsvcs.dll rundll32) we get 2 distinct
         Cortex credential-access detection signals per run.

    Validation evidence: this chain (as variants in our test session) generated
    incidents 1794 + 1795 in Cortex XDR — both severity=high, 61 total alerts
    across 7 of 12 MITRE enterprise tactics:

      TA0002 Execution           (~15 alerts: Script Engine Activity, PSh Activity)
      TA0003 Persistence         (T1574.002 DLL Side-Loading, T1197 BITS Jobs)
      TA0004 Privilege Escalation (Akagi64 Fodhelper UAC bypass WildFire)
      TA0005 Defense Evasion     (T1140 Decode, T1132 Data Encoding)
      TA0006 Credential Access   (T1003, T1003.001, T1003.004, T1555 — Mimikatz
                                  args + Credential Gathering Protection x2)
      TA0008 Lateral Movement    (T1550 — real SMB+WMI+WinRM cross-host)
      TA0011 Command and Control (Sandcat HTTP beacon + T1197 BITS)

    Per-host distribution: incident 1794 on xdragent2 (31 alerts), incident 1795
    on xdragent (30 alerts). Both incidents triggered by the same chain pattern,
    proving the adversary is reproducible across our 2-host lab.

    Cortex-detected Caldera abilities in this chain (ranked by alert volume):
      - PSh-encoded ability execution: 39 alerts (Script Engine + PSh Activity)
      - Sandcat venus.exe beacon: 20 alerts (WildFire + Local Analysis + BITS)
      - Akagi64 Fodhelper UAC bypass: 2 WildFire Malware alerts on Akagi64.exe
      - PowerKatz Mimikatz args: 2 Credential Gathering Protection alerts

    Use this adversary when you want ONE operation that exercises a broad,
    Cortex-detected attack chain across multiple tactics. For focused testing
    (just ransomware-staging, just lateral movement, etc.), use the other
    curated adversaries in this directory.

    Phantom-bundled — ships in the caldera image starting v0.5.88.
    Requires the two bootstrap abilities (00-bootstrap/) to be run once first
    (bootstrap-xdragent2-victim on group=victim host, bootstrap-xdragent-attacker
    on group=red host) before this adversary executes — same as v0.5.57's
    phishing chain.

