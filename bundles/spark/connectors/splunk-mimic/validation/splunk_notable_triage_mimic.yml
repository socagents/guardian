id: SplunkNotableTriageMimic
version: -1
name: Splunk Notable Triage (mimic-safe)
description: >-
  Validation playbook for the Splunk (Emulated) service. Every automation task
  uses ONLY SplunkPy commands the mimic serves over the splunkd REST API
  (search/jobs, data/indexes), each SELF-CONTAINED (no cross-task context
  chaining) so it runs clean against the mimic. No HEC, no KV-store data ops,
  no ES notable mirroring. Assign it to an incident with xsoar_run_playbook,
  then confirm it ran clean with xsoar_get_playbook_state.
