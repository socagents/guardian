id: SplunkNotableTriageMimic
version: -1
name: Splunk Notable Triage (mimic-safe)
description: >-
  Validation playbook for the Splunk (Emulated) service. Every automation task
  uses ONLY SplunkPy commands the mimic serves over the splunkd REST API
  (search/jobs, data/indexes) — no HEC, no KV-store data ops, no ES notable
  mirroring. Assign it to a fetched "Splunk Notable" incident with
  xsoar_run_playbook, then confirm it ran clean with xsoar_get_playbook_state.
starttaskid: "0"
tasks:
  "0":
    id: "0"
    taskid: 11111111-1111-1111-1111-111111111111
    type: start
    task:
      id: 11111111-1111-1111-1111-111111111111
      version: -1
      name: ""
      iscommand: false
      brand: ""
      type: start
    nexttasks:
      '#none#':
        - "1"
    separatecontext: false
    view: |-
      {"position":{"x":50,"y":50}}
  "1":
    id: "1"
    taskid: 22222222-2222-2222-2222-222222222222
    type: regular
    task:
      id: 22222222-2222-2222-2222-222222222222
      version: -1
      name: Create Splunk search job
      description: Create a search job over the notable index (splunkd search/jobs REST).
      script: '|||splunk-job-create'
      type: regular
      iscommand: true
      brand: ""
    scriptarguments:
      query:
        simple: 'search index=notable | head 5'
    nexttasks:
      '#none#':
        - "2"
    separatecontext: false
    view: |-
      {"position":{"x":50,"y":200}}
  "2":
    id: "2"
    taskid: 33333333-3333-3333-3333-333333333333
    type: regular
    task:
      id: 33333333-3333-3333-3333-333333333333
      version: -1
      name: Fetch search results
      description: Read the created job's results by SID (search/jobs/{sid}/results).
      script: '|||splunk-results'
      type: regular
      iscommand: true
      brand: ""
    scriptarguments:
      sid:
        simple: ${Splunk.Job.SID}
    nexttasks:
      '#none#':
        - "3"
    separatecontext: false
    view: |-
      {"position":{"x":50,"y":350}}
  "3":
    id: "3"
    taskid: 44444444-4444-4444-4444-444444444444
    type: regular
    task:
      id: 44444444-4444-4444-4444-444444444444
      version: -1
      name: List Splunk indexes
      description: Environment context (splunkd data/indexes REST).
      script: '|||splunk-get-indexes'
      type: regular
      iscommand: true
      brand: ""
    nexttasks:
