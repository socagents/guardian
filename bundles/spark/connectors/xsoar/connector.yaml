# Cortex XSOAR tool connector for the Guardian incident-investigation agent.
#
# Tool names auto-namespace as `xsoar/<bare_name>` in the agent's tool
# catalog (the connector-runtime strips the "xsoar_" = "<id>_" prefix at
# registration; the agent aliases them as `xsoar_<bare>`).
#
# Wraps Cortex XSOAR's REST API for everyday incident investigation:
# list + drill into cases, read the war room, document findings, update
# + close cases, and pull supporting context (indicators, evidence,
# incident fields).
#
# Dual-generation auth (detection is config-driven via api_id):
#   XSOAR 6 (on-prem):     Authorization: <api_key>                base https://<server>
#   XSOAR 8 / Cortex cloud: Authorization: <api_key>
#                           x-xdr-auth-id: <api_id>                base https://api-<fqdn>
#                           + path prefix /xsoar/public/v1
# Logical paths + request bodies are identical across generations.

id: "xsoar"
version: "0.2.9"
description: "Cortex XSOAR REST API wrapper — investigate incidents (cases): list and drill into cases, read the war room, document findings as entries and notes, update and close cases, enrich with indicators and evidence, and import + run playbooks. Supports XSOAR 6 (on-prem) and XSOAR 8 / Cortex cloud."
displayName: "Cortex XSOAR"
tags: ["cortex", "xsoar", "soar", "incidents", "cases", "investigation", "incident-response", "war-room", "evidence", "indicators"]
# Blue-tinted shield glyph with a check-mark — the case-resolution motif.
logo: "data:image/svg+xml;base64,"

source:
  language: "python"
  entrypoint: "src.connector"

# Container-style connector. Wraps the Cortex XSOAR REST API (external);
# the wrapper itself is stateless. API credentials live in the
# SecretStore, resolved into the per-call config via get_config().
runtimeMapping:
  style: "container"
  functionPrefix: "xsoar_"

executionMode: "persistent"

# Cortex XSOAR auth model — dual-generation, detected from api_id:
#   XSOAR 6 (on-prem):      Authorization: <api_key>   (api_id left blank)
#   XSOAR 8 / Cortex cloud: Authorization: <api_key> + x-xdr-auth-id: <api_id>
#                           and the connector prepends /xsoar/public/v1.
configSchema:
  type: "object"
  required: ["api_url"]
  properties:
    api_url:
      type: "string"
      description: "XSOAR API base URL. XSOAR 6 (on-prem): https://your-xsoar-server (no path suffix). XSOAR 8 / Cortex cloud: https://api-yourtenant.xdr.region.paloaltonetworks.com — don't include /xsoar/public/v1, the connector appends it when api_id is set."
    api_id:
      type: "string"
      description: "XSOAR 8 / Cortex API key ID for the x-xdr-auth-id header; leave blank for XSOAR 6. Setting this switches the connector to v8 mode (adds the /xsoar/public/v1 path prefix + the x-xdr-auth-id header)."
    version:
      type: "string"
      enum: ["v6", "v8"]
      description: "XSOAR generation. v6 = on-prem (single API key in the Authorization header). v8 = Cortex cloud / XSOAR 8 (requires api_id for the x-xdr-auth-id header + the /xsoar/public/v1 path prefix). Leave unset to auto-detect from whether api_id is provided (legacy behavior)."
    verify_ssl:
      type: "boolean"
      description: "Verify the XSOAR server's TLS certificate. Default true. Set false only for on-prem XSOAR 6 servers with self-signed certs."
      default: true
    playground_id:
      type: "string"
      description: "Playground / War Room investigation ID, used to run XSOAR commands (REQUIRED for run_command, enrich_indicator, complete_task; the other tools work without it). Find it in XSOAR: open your Playground and copy the investigation ID from the URL. Leave blank if you don't use the command tools."

secretSlots:
  - name: "api_key"
    description: "XSOAR API key — the Authorization header value. XSOAR 6: Settings → Integrations → API Keys → Get Your Key. XSOAR 8 / Cortex: Settings → Configurations → API Keys → Generate Key (Standard security level; pair it with its key ID in api_id). Paste the raw key value, no 'Bearer' prefix."
    required: true

spec:
  tools:
    # ─── Case listing + drill-down ───────────────────────────────
    - name: "list_incidents"
      method: "POST /incidents/search"
      description: |
        List Cortex XSOAR incidents (cases) matching a filter. The primary
        triage entrypoint: "what cases are open?", "show me today's
        high-severity incidents", "find cases mentioning <host>". Returns a
        compact summary per case; drill into one with xsoar_get_incident.

        Use the `query` string OR the structured status/severity filters —
        not both (when `query` is set, XSOAR mostly ignores the structured
        fields). status codes: 0 pending, 1 active/open, 2 closed,
        3 archived. severity levels: 1 low, 2 medium, 3 high, 4 critical.
      args:
        - { name: "query",     type: "string",  description: "XSOAR search-query string (e.g. 'status:active and severity:High', or free text 'phishing'). When set, structured status/severity are mostly ignored.", required: false }
        - { name: "from_date", type: "string",  description: "ISO lower bound on created time (e.g. '2026-06-01T00:00:00Z').", required: false }
        - { name: "to_date",   type: "string",  description: "ISO upper bound on created time.", required: false }
        - { name: "status",    type: "array",   description: "Status codes (ints): 0 pending, 1 active/open, 2 closed, 3 archived. e.g. [1] for open cases.", required: false }
        - { name: "severity",  type: "array",   description: "Severity levels (ints 1-4): 1 low, 2 medium, 3 high, 4 critical. e.g. [3,4].", required: false }
        - { name: "source_brand",    type: "string", description: "Filter to incidents FETCHED by an integration brand, e.g. 'SplunkPy v2' (the sourceBrand field) — find the cases a specific integration created.", required: false }
        - { name: "source_instance", type: "string", description: "Filter to incidents fetched by a specific configured instance, e.g. 'splunk-mimic' (the sourceInstance field).", required: false }
        - { name: "page",      type: "integer", description: "Zero-based page index (default 0).", required: false }
        - { name: "page_size", type: "integer", description: "Page size (default 50, max 200).", required: false }
      returns: { type: "object", description: "{ ok, incidents: [{id, name, type, severity, status, owner, created, modified}], total }" }

    - name: "get_incident"
      method: "POST /incidents/search (filter.id)"
      description: |
        Fetch the full record for one XSOAR incident by id. XSOAR has NO
        GET /incident/{id} endpoint — this searches with filter.id and
        returns the first match. Use AFTER xsoar_list_incidents to drill
        into a case AND to read the `version` field needed for
        xsoar_update_incident.
      args:
        - { name: "incident_id", type: "string", description: "The XSOAR incident id.", required: true }
      returns: { type: "object", description: "{ ok, incident: { ... full record incl. version, CustomFields, labels, investigationId ... } }" }

    - name: "linked_incidents"
      method: "POST /incidents/search (linkedIncidents)"
      description: |
        List the incidents LINKED to a given XSOAR incident. XSOAR lets
        analysts and playbooks link related incidents (the incident carries a
        linkedIncidents list + linkedCount); this reads that link set and
        returns a compact summary of each linked case. The first hop when
        pivoting from one incident to the rest of an already-grouped campaign
        — feed the results into a Guardian Case to track it.
      args:
        - { name: "incident_id", type: "string", description: "The XSOAR incident id to read links from.", required: true }
      returns: { type: "object", description: "{ ok, incident_id, linked_count, linked: [{id, name, type, severity, status, owner, created, modified}] }" }

    - name: "related_incidents"
      method: "POST /incidents/search (type query)"
      description: |
        Find OTHER incidents SIMILAR to a given one — campaign discovery.
        Unlike linked_incidents (which reads links already made), this
        DISCOVERS related cases by searching the queue. Default relation is
        shared incident type ("show me the other cases of the same type").
        Use after triaging one incident to surface the rest of a potential
        campaign, then group the hits into a Guardian Case (case_create /
        case_add_issue) and roll them up (case_rollup).
      args:
        - { name: "incident_id",    type: "string",  description: "The reference XSOAR incident id.", required: true }
        - { name: "by",             type: "string",  description: "Relation to search on. 'type' (default) finds incidents of the same XSOAR incident type. Only 'type' is supported today.", required: false }
        - { name: "extra_query",    type: "string",  description: "Optional extra XSOAR query AND'd onto the relation — e.g. a host/user value to narrow 'same type AND mentioning <indicator>'.", required: false }
        - { name: "include_closed", type: "boolean", description: "Include closed/archived incidents (default false — only pending + active returned).", required: false }
        - { name: "limit",          type: "integer", description: "Max related incidents (default 25, max 200).", required: false }
      returns: { type: "object", description: "{ ok, incident_id, relation, incident_type, related: [summaries], total } — the reference incident is excluded from related." }

    - name: "get_war_room"
      method: "POST /investigation/{id}"
      description: |
        Read the war-room (investigation) entries for one incident — the
        case's running log of analyst notes, playbook task outputs, command
        results, and evidence markers. Read it to understand what's already
        been investigated before adding your own findings.
      args:
        - { name: "incident_id", type: "string",  description: "The XSOAR incident id (its investigation shares the id).", required: true }
        - { name: "page_size",   type: "integer", description: "Max entries (default 100, max 200).", required: false }
        - { name: "tags",        type: "array",   description: "Filter to entries carrying these tags (e.g. ['evidence','note']).", required: false }
        - { name: "from_time",   type: "string",  description: "ISO lower bound — only entries at/after this time.", required: false }
      returns: { type: "object", description: "{ ok, entries: [{id, type, contents, format, tags, created, user}], count }" }

    # ─── Documenting findings ────────────────────────────────────
    - name: "add_entry"
      method: "POST /entry"
      description: |
        Append a war-room entry to an incident's investigation. The primary
        "document a finding" tool: write your analysis, summary, or
        investigation step into the case's running log. To pin the entry as
        a persistent note instead, use xsoar_add_note.
      args:
        - { name: "incident_id", type: "string",  description: "The XSOAR incident id.", required: true }
        - { name: "content",     type: "string",  description: "The entry text (markdown-rendered when markdown=true).", required: true }
        - { name: "markdown",    type: "boolean", description: "Render content as markdown (default true). Set false for plain text.", required: false }
      returns: { type: "object", description: "{ ok, entry_id, incident_id }" }

    - name: "add_note"
      method: "POST /entry + POST /entry/note"
      description: |
        Add a pinned NOTE to an incident's war room. Two-step: create the
        entry, then pin it as a note (notes are highlighted in the XSOAR UI
        and survive war-room filtering). Use for durable investigation
        conclusions the operator wants flagged — vs. xsoar_add_entry for an
        ordinary log line.
      args:
        - { name: "incident_id", type: "string",  description: "The XSOAR incident id.", required: true }
        - { name: "content",     type: "string",  description: "The note text (markdown-rendered when markdown=true).", required: true }
        - { name: "markdown",    type: "boolean", description: "Render as markdown (default true).", required: false }
      returns: { type: "object", description: "{ ok, entry_id, incident_id, note: true }" }

    # ─── Case mutation ───────────────────────────────────────────
    - name: "update_incident"
      method: "POST /incident"
      description: |
        Update an XSOAR incident's metadata (upsert). Use to triage a case:
        reassign owner, bump severity, set labels, write custom fields. Only
        the fields you pass are changed.

        Optimistic concurrency is handled for you — leave `version` unset and
        the connector resolves the live version automatically (the version
        from xsoar_get_incident is unreliable on Cortex 8). custom_fields use
        the lowercase MACHINE name (cliName), not the display label —
        discover cliNames via xsoar_get_incident_fields.
      args:
        - { name: "incident_id",   type: "string",  description: "The XSOAR incident id.", required: true }
        - { name: "version",       type: "integer", description: "Optional optimistic-lock version. Leave unset to let the connector resolve it automatically.", required: false }
        - { name: "severity",      type: "integer", description: "New severity level 1-4 (1 low … 4 critical).", required: false }
        - { name: "owner",         type: "string",  description: "New owner username.", required: false }
        - { name: "labels",        type: "array",   description: "Label dicts [{type, value}] or simple strings.", required: false }
        - { name: "custom_fields", type: "object",  description: "Dict of {cliName: value} written under CustomFields (lowercase machine names from xsoar_get_incident_fields).", required: false }
      returns: { type: "object", description: "{ ok, incident_id, updated }" }

    - name: "close_incident"
      method: "POST /incident/close (per id)"
      description: |
        Close one or more XSOAR incidents in a single batch (sets each to
        status closed). Use at the end of an investigation once findings are
        documented.
      args:
        - { name: "incident_ids", type: "array",  description: "List of incident ids to close. A bare id is wrapped into a single-element list.", required: true }
        - { name: "close_reason", type: "string", description: "XSOAR close reason (e.g. 'Resolved', 'False Positive', 'Duplicate', 'Other').", required: true }
        - { name: "close_notes",  type: "string", description: "Optional free-text closing summary.", required: false }
      returns: { type: "object", description: "{ ok, closed_count, incident_ids }" }

    # ─── Schema discovery (derived — no native list endpoints) ───
    - name: "list_incident_types"
      method: "POST /incidents/search (derive distinct type)"
      description: |
        List the distinct incident TYPES in use on this XSOAR tenant. XSOAR
        has no public list-incident-types endpoint, so this DERIVES the set
        by searching recent incidents (size up to 200) and collecting their
        distinct `type` values. The result reflects types actually in use —
        which is what you want when picking a type for
        xsoar_get_incident_fields.
      args: []
      returns: { type: "object", description: "{ ok, incident_types: ['Phishing','Malware',...], sampled }" }

    - name: "get_incident_fields"
      method: "GET /incidentfields"
      description: |
        List incident fields — including each field's cliName (the lowercase
        machine name you must use as a CustomFields key in
        xsoar_update_incident). Use to discover what custom fields a case
        carries before writing to them. Pass incident_type to scope the
        result to fields associated with that type (filtered client-side,
        since Cortex 8 has no public per-type endpoint).
      args:
        - { name: "incident_type", type: "string", description: "Optional incident type name (e.g. 'Phishing') to scope the fields to. Omit to list every incident field. Discover types via xsoar_list_incident_types.", required: false }
      returns: { type: "object", description: "{ ok, fields: [{id, name, cliName, type, required, associatedTypes}], count }" }

    # ─── Enrichment ──────────────────────────────────────────────
    - name: "search_indicators"
      method: "POST /indicators/search"
      description: |
        Search the XSOAR threat-intel indicator store (IoCs — IPs, domains,
        hashes, URLs with reputation + relationship context). Use to enrich
        an investigation: "is this IP a known indicator?", "show malicious
        domains seen this week". Returns a COMPACT summary per indicator
        {id, type, value, score (0-3), reputation, source, …} — the score +
        reputation are surfaced directly, so answer "how many bad IPs?" /
        "top by reputation" from this result alone (no !findIndicators).
      args:
        - { name: "query", type: "string",  description: "XSOAR indicator-search query (e.g. 'type:IP and reputation:Bad', or a bare value '1.2.3.4'). Omit to list recent indicators.", required: false }
        - { name: "page",  type: "integer", description: "Zero-based page index (default 0).", required: false }
        - { name: "size",  type: "integer", description: "Page size (default 50, max 200).", required: false }
      returns: { type: "object", description: "{ ok, indicators: [...], total }" }

    - name: "create_indicator"
      method: "POST /indicator/create"
      description: |
        Create a threat-intel indicator (IoC) in the XSOAR store — optionally
        with the agent's verdict (score) and tags — so it's available
        tenant-wide for correlation. To set the verdict on an indicator that
        already EXISTS, use update_indicator instead. Served on the public REST
        API on both XSOAR 6 and 8 (no playground_id). Approval-gated (mutating).
      args:
        - { name: "value", type: "string", description: "The IoC value (e.g. 1.2.3.4, evil.com, a file hash, a CVE).", required: true }
        - { name: "indicator_type", type: "string", description: "XSOAR indicator type, capitalized: IP, Domain, URL, File, CVE, Email, Host, Account.", required: true }
        - { name: "score", type: "integer", description: "Optional manual verdict as a DBotScore 0-3 (0=Unknown,1=Good,2=Suspicious,3=Bad). Sets manualScore=true (analyst verdict).", required: false }
        - { name: "tags", type: "array", description: "Optional tags to apply (stored in CustomFields.tags).", required: false }
        - { name: "source", type: "string", description: "Optional source label for provenance.", required: false }
      returns: { type: "object", description: "{ ok, id, created: {id, type, value, score, reputation, source, ...} }" }

    - name: "update_indicator"
      method: "POST /indicator/edit"
      description: |
        Update an indicator — set its reputation/verdict (score) and/or tags.
        This is how the agent PERSISTS an IoC verdict back into XSOAR's
        Threat-Intel so it sticks tenant-wide, not just on one incident. Setting
        score records a manual analyst verdict (manualScore=true); editing does
        not require the prior version. Served on the public REST API on both
        generations (no playground_id). Approval-gated (mutating).
      args:
        - { name: "indicator_id", type: "string", description: "The XSOAR indicator id to edit (from search_indicators or create_indicator).", required: true }
        - { name: "score", type: "integer", description: "New verdict as a DBotScore 0-3 (0=Unknown,1=Good,2=Suspicious,3=Bad). Sets manualScore=true.", required: false }
        - { name: "tags", type: "array", description: "Replace the indicator's tags (CustomFields.tags).", required: false }
        - { name: "source", type: "string", description: "Optional source label.", required: false }
        - { name: "comment", type: "string", description: "Optional comment recorded on the indicator timeline (e.g. verdict rationale).", required: false }
      returns: { type: "object", description: "{ ok, updated: {id, type, value, score, reputation, ...} }" }

    - name: "save_evidence"
      method: "POST /evidence (v6) | POST /entry/tags (v8)"
      description: |
        Mark a war-room entry as evidence for an incident. Use after
        xsoar_add_entry / xsoar_get_war_room to promote a specific entry
        (command output, screenshot, analysis note) to the evidence board.
        Generation-aware: XSOAR 6 uses the formal POST /evidence (which
        round-trips into search_evidence); Cortex 8 tags the entry
        `evidence` (its /evidence POST isn't on the public API — that marks
        it in the UI but Cortex 8's /evidence/search won't return it).
      args:
        - { name: "incident_id", type: "string", description: "The XSOAR incident id (investigation id).", required: true }
        - { name: "entry_id",    type: "string", description: "The war-room entry id to mark as evidence (from xsoar_add_entry or xsoar_get_war_room).", required: true }
        - { name: "description", type: "string", description: "Optional note describing why this is evidence (recorded on v6; ignored on v8's tag path).", required: false }
      returns: { type: "object", description: "{ ok, incident_id, entry_id, saved|tagged, via }" }

    - name: "search_evidence"
      method: "POST /evidence/search"
      description: |
        List the evidence collected for one incident — the entries promoted
        to the case's evidence board. Use to review what's already been
        flagged before drawing a conclusion. Returns a COMPACT summary per
        item {id, entry_id, incident_id, description, occurred, marked_by,
        marked_date, tags}. Generation-aware: XSOAR 6 lists via
        /evidence/search; Cortex 8 (whose /evidence/search doesn't return
        tag-based evidence) reads the war room filtered to the `evidence`
        tag — so evidence saved via save_evidence is listed on BOTH.
      args:
        - { name: "incident_id", type: "string", description: "The XSOAR incident id whose evidence to list.", required: true }
      returns: { type: "object", description: "{ ok, evidence: [compact...], count, via }" }

    # ─── Server probe (connector-test path) ──────────────────────
    - name: "health_check"
      method: "POST /incidents/search (minimal size:1 probe)"
      description: |
        Probe XSOAR server availability (the connector instance-test path).
        A quick "is XSOAR up and are my credentials valid?" check — a
        401/403 surfaces as an auth-error envelope (server reachable but
        credentials bad).
      args: []
      returns: { type: "object", description: "{ ok, reachable, detail, generation: 'v6' | 'v8' }" }

    # ─── Integration + command discovery ─────────────────────────
    - name: "list_integrations"
      method: "POST /settings/integration/search"
      description: |
        List the integrations CONFIGURED on this XSOAR tenant and the commands
        each one exposes — the discovery tool that pairs with run_command so you
        know which `!commands` are actually runnable instead of guessing. Joins
        the configured instances to their integration definitions' command
        catalog in one call. Does NOT need playground_id. Use brand=... to focus
        one integration and get full command argument specs for building the
        exact run_command string.
      args:
        - { name: "brand",           type: "string",  description: "Optional — filter to one integration (case-insensitive substring on brand or instance name, e.g. 'virustotal'). Implies command_detail.", required: false }
        - { name: "enabled_only",    type: "boolean", description: "Default true — only enabled (runnable) instances. False also lists disabled ones.", required: false }
        - { name: "include_commands", type: "boolean", description: "Default true — attach each integration's command list. False = fast name-only inventory.", required: false }
        - { name: "command_detail",  type: "boolean", description: "Default false — when true (or brand set), each command also carries its arguments (name/required/description).", required: false }
        - { name: "size",            type: "integer", description: "Max integration definitions to scan for the command join (default 1000, max 2000).", required: false }
      returns: { type: "object", description: "{ ok, integrations: [{ brand, instance_name, enabled, category, command_count, commands: [{name, description, arguments?}] }], total }" }

    # ─── Integration troubleshooting (health + test) ─────────────
    - name: "get_integration_status"
      method: "POST /settings/integration/search (join health map)"
      description: |
        Report integration-instance HEALTH — enabled state + the last fetch /
        test error per configured instance. The diagnostic for "why isn't my
        integration working?" (e.g. a SplunkPy instance whose fetch fails).
        Joins each configured instance to the search response's `health` map:
        a non-empty `last_error` means that instance's fetch or test-module is
        failing, and the string is the EXACT error XSOAR recorded (e.g. "Could
        not fetch Splunk time"). Reads the LAST recorded error without
        re-running the test — to actively re-run it use
        xsoar_test_integration_instance. Does NOT need playground_id. Works on
        XSOAR 6 and XSOAR 8.
      args:
        - { name: "brand",          type: "string",  description: "Optional — filter to one integration brand (case-insensitive substring on brand or instance name, e.g. 'splunk').", required: false }
        - { name: "instance_name",  type: "string",  description: "Optional — filter to one configured instance by exact (case-insensitive) name.", required: false }
        - { name: "unhealthy_only", type: "boolean", description: "Default false — when true, return only instances currently carrying a non-empty last_error (the ones failing right now).", required: false }
      returns: { type: "object", description: "{ ok, integrations: [{ brand, instance_name, enabled, healthy, last_error, modified }], total, unhealthy_count }" }

    - name: "test_integration_instance"
      method: "POST /settings/integration/test (full instance object)"
      description: |
        Run an integration instance's Test — the XSOAR UI "Test" button.
        Actively validates ONE configured instance's connectivity / auth /
        config by executing its test-module. Resolves the instance's full
        config via /settings/integration/search, then POSTs it to
        /settings/integration/test. A logical test FAILURE returns HTTP 200
        with success=false, so this returns ok=true (the call completed) with
        `success` carrying the real verdict and `message` the exact error
        XSOAR shows under a red Test button. Distinct from
        xsoar_get_integration_status, which reads the LAST recorded error
        without re-running the test. Does NOT need playground_id.
      args:
        - { name: "instance_name", type: "string", description: "The configured integration INSTANCE name (not the brand), e.g. 'Splunk_prod'. Discover names via xsoar_get_integration_status or xsoar_list_integrations.", required: true }
      returns: { type: "object", description: "{ ok, instance_name, brand, success, message }" }

    - name: "get_integration_fetch_history"
      method: "POST /settings/integration/fetch-history (resolve brand via search)"
      description: |
        Read an integration instance's recent FETCH runs — including the last
        fetch error. The fetch-failure diagnostic for Cortex XSOAR 8 (and
        XSOAR 6.8+): each run carries its status, last error (empty on
        success), timing, and how many incidents/indicators/events were pulled.
        This is the REST surface behind the "Fetch History" UI modal — and the
        authoritative failed-fetch source on XSOAR 8, whose
        /settings/integration/search response (read by
        xsoar_get_integration_status) carries no per-instance lastError on that
        generation. Resolves the instance's brand via /settings/integration/
        search, then POSTs {brand, instance} to /settings/integration/
        fetch-history. Does NOT need playground_id.
      args:
        - { name: "instance_name", type: "string",  description: "The configured integration INSTANCE name (not the brand), e.g. 'Splunk_prod'. Brand is resolved internally. Discover names via xsoar_get_integration_status or xsoar_list_integrations.", required: true }
        - { name: "limit",         type: "integer", description: "Max history rows to return, newest first (default 5, clamped 1-50).", required: false }
      returns: { type: "object", description: "{ ok, instance_name, brand, total, runs: [{ status, last_error, last_pull_time, incidents_pulled, indicators_pulled, events_pulled, fetch_duration }] }" }

    # ─── Command engine (needs playground_id) ────────────────────
    - name: "run_command"
      method: "POST /entry/execute/sync"
      description: |
        Run an arbitrary Cortex XSOAR command in the playground war room — the
        escape hatch onto XSOAR's full command surface. Run any `!command`
        (e.g. '!Print value=hi', '!setIncident ...') and get the war-room output
        back. For indicator reputation, prefer xsoar_enrich_indicator. REQUIRES
        the instance's playground_id to be configured.
      args:
        - { name: "command",             type: "string", description: "Full XSOAR command including the leading '!' (e.g. '!ip ip=8.8.8.8'). Quote values containing spaces.", required: true }
        - { name: "return_context_keys", type: "string", description: "Optional comma-separated XSOAR context keys to return as structured data (e.g. 'IP,DBotScore'). Omit for war-room text only.", required: false }
      returns: { type: "object", description: "{ ok, output, context? }" }

    - name: "enrich_indicator"
      method: "POST /entry/execute/sync (!ip/!url/!domain/!file/!cve)"
      description: |
        Enrich an indicator (IoC) with reputation + threat context — runs the
        matching XSOAR enrichment command (!ip/!url/!domain/!file/!cve) in the
        playground and returns the structured DBotScore + reputation. The
        investigation workhorse: "is this IP/domain/hash malicious?". REQUIRES
        the instance's playground_id.
      args:
        - { name: "indicator_type", type: "string", description: "One of ip, url, domain, file, cve (case-insensitive).", required: true }
        - { name: "value",          type: "string", description: "The indicator value (e.g. '8.8.8.8', 'evil.com', a SHA256, 'CVE-2024-1234').", required: true }
      returns: { type: "object", description: "{ ok, indicator_type, value, output, context }" }

    - name: "complete_task"
      method: "POST /entry/execute/sync (!taskComplete)"
      description: |
        Complete a playbook / war-room task on an incident. Runs XSOAR's
        `!taskComplete` command in the playground, targeting the incident's task
        — use to advance a stuck playbook task. REQUIRES the instance's
        playground_id.
      args:
        - { name: "incident_id", type: "string", description: "The XSOAR incident id that owns the task.", required: true }
        - { name: "task_id",     type: "string", description: "The playbook task id (or tag) to complete.", required: true }
        - { name: "comment",     type: "string", description: "Optional completion note recorded on the task.", required: false }
      returns: { type: "object", description: "{ ok, incident_id, task_id, output }" }

    # ─── XSOAR Lists (command engine — needs playground_id) ──────
    - name: "get_list"
      method: "POST /entry/execute/sync (!getList)"
      description: |
        Read a Cortex XSOAR list by name — XSOAR Lists hold reusable data like
        allow/block lists, lookup tables, and config. Reads via the `!getList`
        war-room command (the v6 GET /lists/ REST endpoint 500s on Cortex 8), so
        it REQUIRES the instance's playground_id.
      args:
        - { name: "name", type: "string", description: "The list name.", required: true }
      returns: { type: "object", description: "{ ok, name, data }" }

    - name: "set_list"
      method: "POST /entry/execute/sync (!setList)"
      description: |
        Create or overwrite a Cortex XSOAR list — writes the full contents
        (creating the list if absent) via the `!setList` war-room command. To
        add a single value without clobbering the rest, use xsoar_append_to_list.
        REQUIRES the instance's playground_id.
      args:
        - { name: "name", type: "string", description: "The list name.", required: true }
        - { name: "data", type: "string", description: "Full list contents (often newline-separated lines).", required: true }
      returns: { type: "object", description: "{ ok, name, output }" }

    - name: "append_to_list"
      method: "POST /entry/execute/sync (!getList + !setList)"
      description: |
        Append a value as a new line to a Cortex XSOAR list (read-modify-write
        via `!getList` + `!setList`). Creates the list with the value if it
        doesn't exist. Use to add an IoC to a block/allow list during response
        without overwriting the rest. REQUIRES the instance's playground_id.
      args:
        - { name: "name",  type: "string", description: "The list name.", required: true }
        - { name: "value", type: "string", description: "The value to append (added on its own line).", required: true }
      returns: { type: "object", description: "{ ok, name, data }" }

    # ─── Incident lifecycle ──────────────────────────────────────
    - name: "create_incident"
      method: "POST /incident"
      description: |
        Create a new Cortex XSOAR incident (case). Use to open a case from
        Guardian — e.g. record a finding as a tracked incident. Only `name` is
        required; createInvestigation spins up the war room.
      args:
        - { name: "name",                 type: "string",  description: "The incident name/title.", required: true }
        - { name: "incident_type",        type: "string",  description: "The XSOAR incident type (e.g. 'Phishing'). Discover via xsoar_list_incident_types.", required: false }
        - { name: "severity",             type: "integer", description: "Severity 0-4 (0 unknown … 4 critical).", required: false }
        - { name: "details",              type: "string",  description: "Free-text description / details.", required: false }
        - { name: "owner",                type: "string",  description: "Owner username.", required: false }
        - { name: "labels",               type: "array",   description: "Label strings (or [{type, value}] dicts).", required: false }
        - { name: "custom_fields",        type: "object",  description: "Dict of {cliName: value} (lowercase machine names from xsoar_get_incident_fields).", required: false }
        - { name: "create_investigation", type: "boolean", description: "Create the war-room investigation (default true).", required: false }
      returns: { type: "object", description: "{ ok, incident_id, name, created }" }

    - name: "list_playbooks"
      method: "POST /playbook/search"
      description: |
        List the playbooks defined on this XSOAR tenant — the automation
        catalog. Discovery tool: shows which playbooks actually EXIST so you
        recommend / run one that is really there instead of guessing a name.
        Pair with get_playbook (read a playbook's inputs + tasks) and
        run_playbook (assign one to an incident). Served directly on BOTH XSOAR
        6 and 8 — no playground_id needed.
      args:
        - { name: "query", type: "string", description: "Optional XSOAR playbook-search query: name:\"Phishing\" (name), tag:phishing (by tag), system:T|F (built-in vs custom). Omit to list all.", required: false }
        - { name: "page", type: "integer", description: "Zero-based page index (default 0).", required: false }
        - { name: "size", type: "integer", description: "Page size (default 50, capped at 200).", required: false }
      returns: { type: "object", description: "{ ok, playbooks: [{id, name, description, tags, system, input_count, task_count}], total, result_count }" }

    - name: "get_playbook"
      method: "POST /playbook/search (id: then name:)"
      description: |
        Read one playbook's definition — its INPUTS and task list. Use before
        run_playbook to learn what a playbook needs: its inputs[] are the
        parameters that must be present (on the incident's fields / context) for
        the run to do useful work. Accepts a playbook id OR display name
        (resolves by id first, falls back to a name match). Served directly on
        BOTH XSOAR 6 and 8 — no playground_id needed.
      args:
        - { name: "playbook_id", type: "string", description: "The playbook id OR display name to fetch.", required: true }
      returns: { type: "object", description: "{ ok, id, name, description, tags, system, start_task_id, inputs: [{key, required, description, default}], input_count, task_count, tasks: [{id, name, type}], tasks_truncated }" }

    - name: "run_playbook"
      method: "POST /incident/investigate + POST /entry/execute/sync (!setPlaybook)"
      description: |
        Assign and run a playbook on an XSOAR incident — including a FETCHED /
        pending one. First OPENS the incident's war room (POST
        /incident/investigate) if it has none — a fetched incident is pending
        with no investigation, and `!setPlaybook` can't target an incident
        without one — then runs `!setPlaybook` in the incident's own war room to
        assign + start the playbook. Monitor the run with get_playbook_state.
        Opening the war room uses the direct REST call; on a gateway that
        redirects it, the Core REST API integration is used as a fallback
        (needs playground_id). The v6 /inv-playbook REST endpoint 303-redirects
        on Cortex 8; the war-room command works on both generations.
      args:
        - { name: "incident_id", type: "string", description: "The XSOAR incident id (its investigation id) to run on. May be a freshly fetched/pending incident — its war room is opened automatically.", required: true }
        - { name: "playbook_id", type: "string", description: "The playbook NAME to assign and run.", required: true }
      returns: { type: "object", description: "{ ok, incident_id, playbook_id, opened_investigation, output }" }

    - name: "get_playbook_state"
      method: "GET /investigation/{id}/workplan (v6 direct | v8 internal /xsoar)"
      description: |
        Report the state of the playbook running on an incident — task by task.
        The MONITORING companion to run_playbook: after assigning a playbook,
        poll this to confirm it ran to completion WITHOUT errored tasks. Reads
        the incident's work plan and buckets every task (including sub-playbook
        tasks) by state, flags the failed (Error/LoopError) tasks, and
        best-effort attaches each failed task's error message from the war room.
        ran_to_success is true only when overall_state == 'Completed' AND no
        task is in Error/LoopError. Reads the work plan via DIRECT REST on both
        generations — on XSOAR 6 a plain GET, on Cortex 8 the full internal API
        (/xsoar/investigation/{id}/workplan). No Core REST API integration or
        playground_id needed (the integration is kept only as a fallback).
      args:
        - { name: "incident_id", type: "string", description: "The XSOAR incident id (== its investigation id) whose running playbook to inspect.", required: true }
      returns: { type: "object", description: "{ ok, incident_id, has_playbook, playbook_id, playbook_name, overall_state, ran_to_success, counts: {completed, error, waiting, inprogress, skipped, blocked, new}, task_total, failed_tasks: [{id, name, scriptId, state, errorMessage?}] }" }

    - name: "import_playbook"
      method: "POST /playbook/save/yaml (v6 direct | v8 internal /xsoar; integration fallback)"
      description: |
        Import (deploy) a playbook DEFINITION into the tenant's library so it
        appears in XSOAR ready to assign + run. Distinct from run_playbook,
        which RUNS an already-existing playbook by name. To deploy + test-run a
        freshly authored playbook: import here → create_incident → run_playbook
        on that incident. Validate structure first with playbook_validate.
        WRITES to the tenant — approval-gated.
        XSOAR 6 uploads via POST /playbook/import. On Cortex 8 (where that 405s)
        Guardian imports via the Core REST API integration (core-api-post →
        /playbook/save) when it is installed AND the instance has a
        playground_id; otherwise it returns a guided-manual message.
      args:
        - { name: "playbook_yaml", type: "string", description: "The full playbook definition as a YAML string.", required: true }
        - { name: "filename",      type: "string", description: "Optional upload filename (default 'guardian-playbook.yml').", required: false }
      returns: { type: "object", description: "{ ok, playbook_id, playbook_name, imported, raw_response }" }

    - name: "list_jobs"
      method: "POST /jobs/search"
      description: |
        List the SCHEDULED JOBS on this XSOAR tenant — automation that runs a
        playbook on a schedule (cron) or one-off. Answers "what scheduled jobs
        run here?" and finds a job to inspect or remove. Direct REST, no
        playground_id, both generations.
      args:
        - { name: "query", type: "string", description: "Optional XSOAR job-search query (name:\"Daily\", type:Phishing). Omit to list all.", required: false }
        - { name: "page",  type: "integer", description: "Zero-based page index (default 0).", required: false }
        - { name: "size",  type: "integer", description: "Page size (default 50, capped 200).", required: false }
      returns: { type: "object", description: "{ ok, jobs: [{id, name, type, recurrent, cron, playbook_id, next_trigger, disabled, scheduled}], total, result_count }" }

    - name: "get_job"
      method: "POST /jobs/search (id:)"
      description: |
        Read one scheduled job by id — its schedule + which playbook it runs.
        Direct REST, no playground_id.
      args:
        - { name: "job_id", type: "string", description: "The XSOAR job id (from list_jobs).", required: true }
      returns: { type: "object", description: "{ ok, job: {id, name, type, recurrent, cron, playbook_id, next_trigger, disabled, scheduled} }" }

    - name: "create_job"
      method: "POST /jobs"
      description: |
        Create a SCHEDULED JOB — run a playbook on a schedule. The job creates an
        incident of `incident_type` on its schedule and runs the playbook. A
        RECURRING job needs `cron`; a ONE-TIME job (recurrent=false) needs
        `start_date`. WRITES to the tenant — approval-gated. No playground_id.
      args:
        - { name: "name", type: "string", description: "Display name for the job.", required: true }
        - { name: "incident_type", type: "string", description: "A valid incident type on the tenant (e.g. Phishing). See list_incident_types.", required: true }
        - { name: "recurrent", type: "boolean", description: "True = recurring (needs cron); False = one-time (needs start_date). Default true.", required: false }
        - { name: "cron", type: "string", description: "Cron expression for a recurring job (e.g. '0 0 * * *' = daily midnight). Required when recurrent=true.", required: false }
        - { name: "start_date", type: "string", description: "ISO 8601 start time for a one-time job. Required when recurrent=false.", required: false }
        - { name: "playbook_id", type: "string", description: "Optional playbook (name) to run when the job fires. See list_playbooks.", required: false }
      returns: { type: "object", description: "{ ok, id, created: {id, name, type, recurrent, cron, playbook_id, ...} }" }

    - name: "delete_job"
      method: "DELETE /jobs/{id}"
      description: |
        Delete a scheduled job by id. WRITES to the tenant — approval-gated.
        No playground_id.
      args:
        - { name: "job_id", type: "string", description: "The XSOAR job id to delete (from list_jobs).", required: true }
      returns: { type: "object", description: "{ ok, deleted: true, job_id }" }
