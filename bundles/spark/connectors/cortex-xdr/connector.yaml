# Cortex XDR tool connector for the Phantom SOC simulation agent.
#
# Per Spark agent bundle spec v1.2 §7.4. Tool names auto-namespace as
# `cortex-xdr/<bare_name>` in the agent's tool catalog. The bundle
# manifest's tools.allow includes `cortex-xdr/*`.
#
# v0.5.61 (issue #36): wraps Cortex XDR's Public API (the same
# /public_api/v1/... endpoint family as XSIAM, with identical
# Authorization + x-xdr-auth-id header auth). Auth field names match
# the unified naming established by v0.5.59 / issue #35 — api_url,
# api_id, api_key — same as XSIAM.
#
# v0.5.68 — Description + metadata rewritten to focus on the connector's
# general-purpose Cortex XDR API surface. Original v0.5.61 framing was
# narrow ("read-only counterpart for Caldera detection validation");
# the connector is just as useful for everyday incident response,
# threat hunting via XQL, and investigation reporting — Caldera-
# validation is ONE use case, not the only one.

id: "cortex-xdr"
version: "0.1.1"
description: "Cortex XDR API wrapper — list incidents and alerts, drill into specific cases, and run XQL queries against the XDR data lake. General-purpose surface for incident response, threat hunting, investigation reporting, and detection coverage validation."
displayName: "Cortex XDR"
tags: ["cortex", "xdr", "edr", "siem", "incidents", "alerts", "xql", "threat-hunting", "investigation", "incident-response"]
# Red-tinted Cortex glyph distinct from XSIAM's orange.
logo: "data:image/svg+xml;base64,"

source:
  language: "python"
  entrypoint: "src.connector"

# Container-style connector. Wraps the Cortex XDR Public API
# (external SaaS); the wrapper itself is stateless. API credentials
# live in the SecretStore, resolved into the per-call config via
# get_config(). See architecture page #marketplace-logic + the
# v0.5.0 universal-container migration note in CHANGELOG.
runtimeMapping:
  style: "container"
  functionPrefix: "xdr_"

executionMode: "persistent"

# Cortex XDR API auth model:
#   Authorization:   <api_key>          (advanced API key from XDR console)
#   x-xdr-auth-id:   <api_id>           (key identifier — the integer in front of the key)
#   Content-Type:    application/json
#
# Identical pattern to XSIAM (same Cortex platform). v0.5.59 / #35
# unified the field names across both connectors so operators don't
# translate between products.
configSchema:
  type: "object"
  required: ["api_url", "api_id"]
  properties:
    api_url:
      type: "string"
      description: "Cortex XDR API base URL. Format: https://api-yourtenant.xdr.us.paloaltonetworks.com (region varies — us/eu/apac). Don't include /public_api/v1 — the connector appends it."
    api_id:
      type: "string"
      description: "Cortex XDR Auth ID — the integer key identifier shown next to the API key in the XDR console (e.g. '42')."
    pollIntervalSeconds:
      type: "integer"
      description: "XQL result-polling interval. Default 3s. Lower for fast queries (1-2s); raise if you hit XDR's per-tenant rate limit."
      default: 3
    maxPollAttempts:
      type: "integer"
      description: "Max XQL polling attempts before returning execution_id for the caller to retrieve async. Default 40 (×3s = 2 minutes wall time). Long queries return the id; caller can poll via xdr_get_xql_results."
      default: 40

secretSlots:
  - name: "api_key"
    description: "Cortex XDR Authorization header value — the Advanced API Key from the XDR console (Settings → Configurations → API Keys → Generate Key → 'Advanced' security level). Do NOT include a 'Bearer' prefix — paste the raw key value."
    required: true

spec:
  tools:
    # ─── Incident / alert listing ────────────────────────────────
    - name: "get_cases_and_issues"
      method: "POST /public_api/v1/incidents/get_incidents"
      description: |
        List Cortex XDR incidents (cases) and the alerts (issues) within them.
        Supports filtering by time range, endpoint hostname, severity, and
        status. Returns incident summary plus alert counts. For full alert
        details on a specific incident, use xdr_get_incident_extra_data.

        The "cases and issues" terminology mirrors how Cortex XDR's
        navigation labels these objects in the UI — operator-facing
        wording, not API jargon.
      args:
        - { name: "from_time", type: "string",  description: "ISO timestamp lower bound (e.g. '2026-05-17T00:00:00Z'). Default: 24h ago.",                    required: false }
        - { name: "to_time",   type: "string",  description: "ISO timestamp upper bound. Default: now.",                                                       required: false }
        - { name: "endpoint",  type: "string",  description: "Filter by endpoint hostname (e.g. 'xdragent'). Matches the alert.endpoint_name field.",          required: false }
        - { name: "severity",  type: "array",   description: "Filter by severity list (subset of ['low','medium','high','critical']).",                       required: false }
        - { name: "status",    type: "array",   description: "Filter by status list (subset of ['new','under_investigation','resolved_threat_handled','resolved_known_issue','resolved_duplicate','resolved_false_positive','resolved_other']).", required: false }
        - { name: "limit",     type: "integer", description: "Max incidents to return (default 50, max 100 per XDR API spec).",                                required: false }
      returns: { type: "object", description: "{ ok, incidents: [{incident_id, incident_name, severity, status, alert_count, host_count, creation_time, modification_time}], total_count }" }

    - name: "get_incident_extra_data"
      method: "POST /public_api/v1/incidents/get_incident_extra_data"
      description: |
        Fetch full details for one incident — including all alerts (the
        "issues" UI term), forensic artifacts, network artifacts, and
        related users/hosts. Use this AFTER get_cases_and_issues to
        drill into a specific incident.
      args:
        - { name: "incident_id", type: "string", description: "Incident ID from a prior get_cases_and_issues hit.", required: true  }
        - { name: "alerts_limit", type: "integer", description: "Cap on alerts returned (default 50).", required: false }
      returns: { type: "object", description: "{ ok, incident: {...}, alerts: [...], network_artifacts: [...], file_artifacts: [...] }" }

    # ─── XQL query execution ─────────────────────────────────────
    - name: "run_xql_query"
      method: "POST /public_api/v1/xql/start_xql_query/ + poll /xql/get_query_results/"
      description: |
        Execute an XQL query against the Cortex XDR data lake. Returns
        result rows directly when the query completes within the poll
        window (default 2 minutes); returns the execution_id when the
        query is still running so the caller can poll via
        xdr_get_xql_results.

        Use this to validate detection coverage after a Caldera attack:
        e.g. query 'dataset=xdr_data | filter event_type=ENUM.PROCESS
        and agent_hostname="xdragent" and _time > to_timestamp(...)' to
        list process events on a specific host in a specific time
        window.
      args:
        - { name: "query",         type: "string",  description: "XQL query text.",                                                                       required: true  }
        - { name: "tenant_ids",    type: "array",   description: "Optional list of tenant IDs for multi-tenant deployments.",                              required: false }
        - { name: "timeframe_from", type: "string", description: "ISO timestamp lower bound for the query's implicit time window.",                        required: false }
        - { name: "timeframe_to",   type: "string", description: "ISO timestamp upper bound for the query's implicit time window. Defaults to now.",       required: false }
      returns: { type: "object", description: "Either { ok, status: 'SUCCESS', results: [...rows], total_rows } when complete, or { ok, status: 'PENDING', execution_id } when still running." }

    - name: "get_xql_results"
      method: "POST /public_api/v1/xql/get_query_results/"
      description: |
        Retrieve results from an in-flight XQL query by its execution_id.
        Use when xdr_run_xql_query returns status=PENDING (long query
        exceeded the synchronous poll window).
      args:
        - { name: "execution_id", type: "string",  description: "execution_id from a prior xdr_run_xql_query call.", required: true }
        - { name: "limit",        type: "integer", description: "Max rows to return (default 1000, max 10000).",     required: false }
      returns: { type: "object", description: "{ ok, status, results, total_rows, total_pages }" }

    - name: "list_datasets"
      method: "POST /public_api/v1/xql/start_xql_query/ × N (empirical probe)"
      description: |
        List XQL datasets that exist in this XDR tenant. Empirically probes
        a curated catalog of ~20 well-known Cortex XDR / XSIAM dataset names
        (xdr_data, endpoints, alerts, issues, incidents, va_endpoints,
        va_cves, host_inventory, asset_inventory, cloud_audit_logs, etc.)
        by running `dataset = X | limit 1` for each + reporting which exist.

        Use this when: (a) building an XQL query and want to confirm the
        target dataset before constructing the body, (b) the user asked a
        vague question ("what data do we have?") and you need to enumerate
        sources, (c) you hit an HTTP 500 and want to verify the dataset is
        present (vs. Pattern A tenant-config gap from build_xql_query skill).

        Why empirical, not a direct API endpoint: Cortex's public docs don't
        expose a dedicated `/datasets` REST endpoint. The XQL `datamodel`
        stage that would introspect this is XSIAM-license-gated (returns
        "Invalid License - XSIAM" on XDR-only tenants). The empirical probe
        works on every tier + only returns datasets that have data in THIS
        tenant, which is more useful than a generic-schema list.

        Cost: ~20 probes × ~1-3s each, sequential to avoid quota throttle.
      args:
        - { name: "include_empty",    type: "boolean", description: "When true (default), include datasets that returned SUCCESS but with 0 sample rows. Set false to filter to data-bearing datasets only.", required: false }
        - { name: "probe_timeout_s",  type: "integer", description: "Per-probe deadline in seconds (default 10). Probes run sequentially; total wall time = catalog_size × probe_timeout.", required: false }
      returns: { type: "object", description: "{ datasets: [{name, description, exists, sample_field_count, error}], probed: N, found: N }" }

    # ─── v0.14.1 R4.1 — xdr_<category>_<action> rename aliases ───
    # The 6 entries below mirror the legacy tools above with the new
    # naming convention. They route to the same Python functions via
    # connector-runtime's __all__ registration. Operators can disable
    # legacy names via the Tools tab once they migrate workflows to
    # the new names. Legacy aliases will be removed in v0.15.0.

    - name: "xdr_incidents_list"
      method: "POST /public_api/v1/incidents/get_incidents"
      description: |
        v0.14.1 — Renamed from get_cases_and_issues. List XDR incidents with
        filters. See xdr_incidents_get_extra_data to drill into one.
      args:
        - { name: "from_time", type: "string",  description: "ISO timestamp lower bound. Default: 24h ago.",        required: false }
        - { name: "to_time",   type: "string",  description: "ISO timestamp upper bound. Default: now.",            required: false }
        - { name: "endpoint",  type: "string",  description: "Filter by endpoint hostname.",                        required: false }
        - { name: "severity",  type: "array",   description: "Filter by severity list.",                            required: false }
        - { name: "status",    type: "array",   description: "Filter by status list.",                              required: false }
        - { name: "limit",     type: "integer", description: "Max incidents to return (default 50, max 100).",      required: false }
      returns: { type: "object", description: "{ ok, incidents: [...], total_count }" }

    - name: "xdr_incidents_get_extra_data"
      method: "POST /public_api/v1/incidents/get_incident_extra_data"
      description: |
        v0.14.1 — Renamed from get_incident_extra_data. Drill into one incident
        — alerts, forensic artifacts, network artifacts, users/hosts.
      args:
        - { name: "incident_id",  type: "string",  description: "Incident ID from xdr_incidents_list.", required: true  }
        - { name: "alerts_limit", type: "integer", description: "Cap on alerts returned (default 50).", required: false }
      returns: { type: "object", description: "{ ok, incident, alerts, network_artifacts, file_artifacts }" }

    - name: "xdr_alerts_list"
      method: "POST /public_api/v1/alerts/get_alerts_multi_events/"
      description: |
        v0.14.1 — Renamed from get_alerts. List XDR alerts with multiple
        per-alert events. See xdr_alerts_update to manage them.
      args:
        - { name: "from_time", type: "string",  description: "ISO timestamp lower bound.",         required: false }
        - { name: "to_time",   type: "string",  description: "ISO timestamp upper bound.",         required: false }
        - { name: "endpoint",  type: "string",  description: "Filter by endpoint hostname.",       required: false }
        - { name: "severity",  type: "array",   description: "Filter by severity list.",           required: false }
        - { name: "limit",     type: "integer", description: "Max alerts to return.",              required: false }
      returns: { type: "object", description: "{ ok, alerts: [...], total_count }" }

    - name: "xdr_xql_run_query"
      method: "POST /public_api/v1/xql/start_xql_query/ + poll /xql/get_query_results/"
      description: |
        v0.14.1 — Renamed from run_xql_query. Execute an XQL query against the
        Cortex XDR data lake; returns rows when fast, execution_id when slow.
      args:
        - { name: "query",          type: "string", description: "XQL query text.",                                                      required: true  }
        - { name: "tenant_ids",     type: "array",  description: "Optional list of tenant IDs for multi-tenant deployments.",            required: false }
        - { name: "timeframe_from", type: "string", description: "ISO timestamp lower bound for the query's implicit time window.",      required: false }
        - { name: "timeframe_to",   type: "string", description: "ISO timestamp upper bound for the query's implicit time window.",      required: false }
      returns: { type: "object", description: "Either { ok, status: 'SUCCESS', results: [...] } or { ok, status: 'PENDING', execution_id }." }

    - name: "xdr_xql_get_results"
      method: "POST /public_api/v1/xql/get_query_results/"
      description: |
        v0.14.1 — Renamed from get_xql_results. Retrieve results from an
        in-flight XQL query by execution_id.
      args:
        - { name: "execution_id", type: "string",  description: "execution_id from a prior xdr_xql_run_query call.", required: true }
        - { name: "limit",        type: "integer", description: "Max rows to return (default 1000, max 10000).",     required: false }
      returns: { type: "object", description: "{ ok, status, results, total_rows, total_pages }" }

    - name: "xdr_xql_list_datasets"
      method: "POST /public_api/v1/xql/start_xql_query/ × N (empirical probe)"
      description: |
        v0.14.1 — Renamed from list_datasets. Empirically enumerate XQL
        datasets in this XDR tenant.
      args:
        - { name: "include_empty",    type: "boolean", description: "Include 0-row datasets (default true).",       required: false }
        - { name: "probe_timeout_s",  type: "integer", description: "Per-probe deadline in seconds (default 10).", required: false }
      returns: { type: "object", description: "{ datasets: [...], probed, found }" }

    # ─── v0.14.1 R4.1 — NET-NEW tools ────────────────────────────

    - name: "xdr_incidents_update"
      method: "POST /public_api/v1/incidents/update_incident/"
      description: |
        Update one XDR incident's metadata — status, severity, assignee,
        manual description, resolve comment. Use after xdr_incidents_list
        + xdr_incidents_get_extra_data to triage and assign.

        Common operator workflows:
          - "Resolve incident <ID> as false positive with comment X"
          - "Assign incident <ID> to user@example.com and raise to critical"
          - "Mark <ID> as under_investigation"
      args:
        - { name: "incident_id", type: "string", description: "Incident ID (string).",                                            required: true }
        - { name: "update_data", type: "object", description: "Fields to update. See data/knowledge/external/.../incidents/update.md for the full enum list of status + severity values.", required: true }
      returns: { type: "object", description: "{ ok, incident_id, updated, raw_response }" }

    - name: "xdr_alerts_update"
      method: "POST /public_api/v1/alerts/update_alerts/"
      description: |
        Bulk-update one or more alerts. Common ops: change severity,
        set status to resolved, add a comment. Use AFTER xdr_alerts_list
        to triage alerts in batches.
      args:
        - { name: "alert_id_list", type: "array",  description: "List of alert IDs to apply the same update to.",       required: true }
        - { name: "update_data",   type: "object", description: "Update fields (severity / status / resolve_comment).", required: true }
      returns: { type: "object", description: "{ ok, updated_count, alert_id_list, raw_response }" }

    - name: "xdr_ioc_insert_json"
      method: "POST /public_api/v1/indicators/insert_jsons/"
      description: |
        Upload IoCs (indicators of compromise) as JSON. Each IoC is a dict with
        indicator + type + severity + reputation. Use when the operator pastes
        a threat-intel feed and wants the EDR layer to start alerting/blocking.
      args:
        - { name: "indicators", type: "array",   description: "List of IoC dicts. Required keys: indicator, type, severity, reputation. Optional: vendors, comment, expiration_date.", required: true }
        - { name: "validate",   type: "boolean", description: "If true (default), XDR validates each indicator's format before insertion.", required: false }
      returns: { type: "object", description: "{ ok, inserted_count, errors }" }

    - name: "xdr_ioc_disable"
      method: "POST /public_api/v1/indicators/disable_iocs/"
      description: |
        Disable one or more IoCs — XDR stops alerting/blocking on them.
        Use when an operator finds a false-positive entry from a feed.
      args:
        - { name: "indicators", type: "array", description: "List of IoC value strings (e.g. ['malicious.example.com', '1.2.3.4']).", required: true }
      returns: { type: "object", description: "{ ok, disabled_count, indicators, raw_response }" }

    - name: "xdr_ioc_enable"
      method: "POST /public_api/v1/indicators/enable_iocs/"
      description: |
        Re-enable previously disabled IoCs. Mirrors xdr_ioc_disable's
        argument shape.
      args:
        - { name: "indicators", type: "array", description: "List of IoC value strings to re-enable.", required: true }
      returns: { type: "object", description: "{ ok, enabled_count, indicators, raw_response }" }

    - name: "xdr_download_file"
      method: "POST /public_api/v1/download/download_file/"
      description: |
        Download a file XDR previously made available via a retrieval action.
        Chain after a file_retrieval workflow:
          1. xdr_endpoints_retrieve_file (v0.14.2) starts the retrieval
          2. xdr_response_get_file_retrieval_details (v0.14.2) returns a download URL
          3. xdr_download_file (this) streams the bytes back as base64

        Pre-condition: file_link must point at the configured XDR tenant FQDN
        — the connector refuses URLs from other hosts as a security measure.
      args:
        - { name: "file_link", type: "string", description: "Fully-qualified file URL from xdr_response_get_file_retrieval_details.", required: true }
      returns: { type: "object", description: "{ ok, file_link, size_bytes, content_b64 } or { ok: false, error }" }

    # ─── v0.14.2 R4.2 — endpoints + response + scripts (18 tools) ──

    - name: "xdr_endpoints_list_all"
      method: "POST /public_api/v1/endpoints/get_endpoints/"
      description: "List ALL XDR endpoints (no filters). Higher-volume than xdr_endpoints_get."
      args: []
      returns: { type: "object", description: "{ ok, endpoints: [...], total }" }

    - name: "xdr_endpoints_get"
      method: "POST /public_api/v1/endpoints/get_endpoint/"
      description: |
        Get filtered endpoints. Filters AND together. Common workflows:
          - "List isolated endpoints" → isolate=["isolated"]
          - "Show Windows endpoints" → platform=["windows"]
          - "Find machine with hostname X" → hostname=["X"]
      args:
        - { name: "endpoint_id_list", type: "array",  description: "Specific endpoint IDs.",            required: false }
        - { name: "dist_name",        type: "array",  description: "Distribution list names.",          required: false }
        - { name: "ip_list",          type: "array",  description: "IPv4/IPv6 addresses.",              required: false }
        - { name: "group_name",       type: "array",  description: "Endpoint group names.",             required: false }
        - { name: "platform",         type: "array",  description: "['windows'|'linux'|'macos'].",      required: false }
        - { name: "alias",            type: "array",  description: "Custom aliases.",                    required: false }
        - { name: "hostname",         type: "array",  description: "Endpoint hostnames.",                required: false }
        - { name: "isolate",          type: "array",  description: "['isolated'|'unisolated'].",         required: false }
      returns: { type: "object", description: "{ ok, endpoints: [...], total }" }

    - name: "xdr_endpoints_isolate"
      method: "POST /public_api/v1/endpoints/isolate/"
      description: |
        Isolate matching endpoints from the network. Up to 1000 per request.
        At least one filter is required (no accidental tenant-wide isolation).
        Pair with xdr_response_get_action_status to poll completion.
      args:
        - { name: "endpoint_id_list", type: "array", description: "Specific endpoint IDs.", required: false }
        - { name: "dist_name",        type: "array", description: "Distribution lists.",    required: false }
        - { name: "ip_list",          type: "array", description: "IPv4/IPv6 addresses.",   required: false }
        - { name: "platform",         type: "array", description: "Platforms.",             required: false }
        - { name: "hostname",         type: "array", description: "Hostnames.",             required: false }
      returns: { type: "object", description: "{ ok, action_id, endpoints_affected }" }

    - name: "xdr_endpoints_unisolate"
      method: "POST /public_api/v1/endpoints/unisolate/"
      description: "Restore network connectivity to isolated endpoints. Same filter args as xdr_endpoints_isolate."
      args:
        - { name: "endpoint_id_list", type: "array", description: "Specific endpoint IDs.", required: false }
        - { name: "dist_name",        type: "array", description: "Distribution lists.",    required: false }
        - { name: "ip_list",          type: "array", description: "IPv4/IPv6 addresses.",   required: false }
        - { name: "platform",         type: "array", description: "Platforms.",             required: false }
        - { name: "hostname",         type: "array", description: "Hostnames.",             required: false }
      returns: { type: "object", description: "{ ok, action_id, endpoints_affected }" }

    - name: "xdr_endpoints_scan"
      method: "POST /public_api/v1/endpoints/scan/"
      description: "Trigger a scan on matching endpoints. At least one filter required."
      args:
        - { name: "endpoint_id_list", type: "array", description: "Specific endpoint IDs.", required: false }
        - { name: "dist_name",        type: "array", description: "Distribution lists.",    required: false }
        - { name: "ip_list",          type: "array", description: "IPv4/IPv6 addresses.",   required: false }
        - { name: "platform",         type: "array", description: "Platforms.",             required: false }
        - { name: "hostname",         type: "array", description: "Hostnames.",             required: false }
      returns: { type: "object", description: "{ ok, action_id, endpoints_affected }" }

    - name: "xdr_endpoints_scan_all"
      method: "POST /public_api/v1/endpoints/scan/"
      description: "Trigger a scan on EVERY endpoint in the tenant. High-impact — confirm intent."
      args: []
      returns: { type: "object", description: "{ ok, action_id }" }

    - name: "xdr_endpoints_set_alias"
      method: "POST /public_api/v1/endpoints/update_agent_name/"
      description: "Set or change the alias (display name) for one or more endpoints."
      args:
        - { name: "endpoint_id_list", type: "array",  description: "Endpoints to update.", required: true }
        - { name: "alias_name",       type: "string", description: "New alias.",           required: true }
      returns: { type: "object", description: "{ ok, endpoint_id_list, alias_name }" }

    - name: "xdr_endpoints_retrieve_file"
      method: "POST /public_api/v1/endpoints/file_retrieval/"
      description: |
        Retrieve files from endpoints. Up to 20 files × 100 endpoints per request.
        Async — returns action_id; poll xdr_response_get_file_retrieval_details + chain xdr_download_file.
      args:
        - { name: "endpoint_id_list", type: "array",  description: "Targets.", required: true }
        - { name: "files",            type: "object", description: "Per-platform paths: {windows: [...], linux: [...], macos: [...]}.", required: true }
      returns: { type: "object", description: "{ ok, action_id, endpoints_count }" }

    - name: "xdr_endpoints_quarantine_file"
      method: "POST /public_api/v1/endpoints/quarantine/"
      description: "Quarantine a specific file (by path + SHA-256) across endpoints."
      args:
        - { name: "endpoint_id_list", type: "array",  description: "Targets.",                     required: true }
        - { name: "file_path",        type: "string", description: "Absolute path.",               required: true }
        - { name: "file_hash",        type: "string", description: "SHA-256 (XDR verifies match).", required: true }
      returns: { type: "object", description: "{ ok, action_id, file_path }" }

    - name: "xdr_response_get_action_status"
      method: "POST /public_api/v1/actions/get_action_status/"
      description: "Status of any response action (isolate/unisolate/scan/quarantine/etc.). Use the action_id from the originating tool."
      args:
        - { name: "action_id", type: "string", description: "From a prior response-action tool.", required: true }
      returns: { type: "object", description: "{ ok, action_id, status_per_endpoint }" }

    - name: "xdr_response_get_file_retrieval_details"
      method: "POST /public_api/v1/actions/file_retrieval_details/"
      description: "Download URLs for a completed file_retrieval action. Pipe each file_link to xdr_download_file."
      args:
        - { name: "action_id", type: "string", description: "From xdr_endpoints_retrieve_file.", required: true }
      returns: { type: "object", description: "{ ok, files: [{endpoint_id, file_link, file_path}] }" }

    - name: "xdr_scripts_list"
      method: "POST /public_api/v1/scripts/get_scripts/"
      description: "List scripts in the XDR script library with optional filters."
      args:
        - { name: "name",              type: "array",   description: "Script name filter.",        required: false }
        - { name: "description",       type: "array",   description: "Description filter.",        required: false }
        - { name: "created_by",        type: "array",   description: "Author filter.",             required: false }
        - { name: "windows_supported", type: "boolean", description: "Match Windows scripts.",     required: false }
        - { name: "linux_supported",   type: "boolean", description: "Match Linux scripts.",       required: false }
        - { name: "macos_supported",   type: "boolean", description: "Match macOS scripts.",       required: false }
      returns: { type: "object", description: "{ ok, scripts: [...] }" }

    - name: "xdr_scripts_get_metadata"
      method: "POST /public_api/v1/scripts/get_script_metadata/"
      description: "Get the full definition of one script (params, source, supported platforms)."
      args:
        - { name: "script_uid", type: "string", description: "From xdr_scripts_list.", required: true }
      returns: { type: "object", description: "{ ok, script: {...} }" }

    - name: "xdr_scripts_run_script"
      method: "POST /public_api/v1/scripts/run_script/"
      description: |
        Run a library script on endpoints. Async. Poll
        xdr_scripts_get_execution_status / xdr_scripts_get_execution_results.
      args:
        - { name: "script_uid",         type: "string",  description: "From xdr_scripts_list.",       required: true  }
        - { name: "endpoint_id_list",   type: "array",   description: "Targets.",                     required: true  }
        - { name: "parameters_values",  type: "object",  description: "Script-specific params.",      required: false }
        - { name: "timeout",            type: "integer", description: "Seconds (default 600).",       required: false }
      returns: { type: "object", description: "{ ok, action_id }" }

    - name: "xdr_scripts_run_snippet"
      method: "POST /public_api/v1/scripts/run_snippet_code_script/"
      description: "Run an ad-hoc PowerShell/bash/Python snippet (no library entry)."
      args:
        - { name: "snippet_code",     type: "string",  description: "Script text.",            required: true  }
        - { name: "endpoint_id_list", type: "array",   description: "Targets.",                required: true  }
        - { name: "timeout",          type: "integer", description: "Seconds (default 600).",  required: false }
      returns: { type: "object", description: "{ ok, action_id }" }

    - name: "xdr_scripts_get_execution_status"
      method: "POST /public_api/v1/scripts/get_script_execution_status/"
      description: "Poll script-execution status by action_id."
      args:
        - { name: "action_id", type: "string", description: "From xdr_scripts_run_script / _snippet.", required: true }
      returns: { type: "object", description: "{ ok, action_id, status_per_endpoint }" }

    - name: "xdr_scripts_get_execution_results"
      method: "POST /public_api/v1/scripts/get_script_execution_results/"
      description: "Retrieve stdout / structured results of a completed script execution."
      args:
        - { name: "action_id", type: "string", description: "Action from a prior script run.", required: true }
      returns: { type: "object", description: "{ ok, action_id, results }" }

    - name: "xdr_scripts_get_execution_result_files"
      method: "POST /public_api/v1/scripts/get_script_execution_result_files/"
      description: "Get files a script produced on one specific endpoint."
      args:
        - { name: "action_id",   type: "integer", description: "Action ID.",        required: true }
        - { name: "endpoint_id", type: "integer", description: "Specific endpoint.", required: true }
      returns: { type: "object", description: "{ ok, action_id, endpoint_id, file_link }" }

    # ─── v0.14.3 R4.3 — admin endpoints (15 tools) ───────────────
    # Hand-authored from public XDR API knowledge — NOT in ebarti.
    # Validated end-to-end by R4.4's E2E battery against real XDR.

    - name: "xdr_audit_list_management_logs"
      method: "POST /public_api/v1/audits/management_logs/"
      description: "List management-actions audit log entries (who did what in the XDR console)."
      args:
        - { name: "audit_owner_email", type: "array",   description: "Filter by owner email.",                                                                                  required: false }
        - { name: "audit_asset_type",  type: "array",   description: "Filter by asset type.",                                                                                   required: false }
        - { name: "audit_severity",    type: "array",   description: "Values: SEV_010_INFO, SEV_020_LOW, SEV_030_MEDIUM, SEV_040_HIGH.",                                          required: false }
        - { name: "audit_result",      type: "array",   description: "Values: SUCCESS, FAIL, PARTIAL.",                                                                          required: false }
        - { name: "timestamp_gte",     type: "integer", description: "Unix-millis lower bound.",                                                                                 required: false }
        - { name: "timestamp_lte",     type: "integer", description: "Unix-millis upper bound.",                                                                                 required: false }
        - { name: "search_from",       type: "integer", description: "Pagination offset (default 0).",                                                                            required: false }
        - { name: "search_to",         type: "integer", description: "Pagination upper (default 100).",                                                                           required: false }
      returns: { type: "object", description: "{ ok, audit_entries: [...] }" }

    - name: "xdr_audit_list_agent_logs"
      method: "POST /public_api/v1/audits/agents_reports/"
      description: "Per-agent audit log entries — what each XDR agent reported."
      args:
        - { name: "endpoint_ids",   type: "array",   description: "Filter by endpoint IDs.",                                                  required: false }
        - { name: "endpoint_names", type: "array",   description: "Filter by hostname.",                                                       required: false }
        - { name: "type_",          type: "array",   description: "Event type filter.",                                                        required: false }
        - { name: "sub_type",       type: "array",   description: "Event sub_type filter.",                                                    required: false }
        - { name: "result",         type: "array",   description: "SUCCESS / FAIL filter.",                                                    required: false }
        - { name: "timestamp_gte",  type: "integer", description: "Unix-millis lower bound.",                                                  required: false }
        - { name: "timestamp_lte",  type: "integer", description: "Unix-millis upper bound.",                                                  required: false }
        - { name: "search_from",    type: "integer", description: "Pagination offset (default 0).",                                            required: false }
        - { name: "search_to",      type: "integer", description: "Pagination upper (default 100).",                                           required: false }
      returns: { type: "object", description: "{ ok, audit_entries: [...] }" }

    - name: "xdr_assets_list"
      method: "POST /public_api/v1/assets/get_assets/"
      description: "List assets (endpoints + cloud + users) tracked by XDR's asset inventory."
      args:
        - { name: "asset_type",  type: "array",   description: "ENDPOINT / USER / CLOUD_INSTANCE / CONTAINER.", required: false }
        - { name: "risk_level",  type: "array",   description: "LOW / MEDIUM / HIGH / CRITICAL.",                required: false }
        - { name: "search_from", type: "integer", description: "Pagination offset (default 0).",                 required: false }
        - { name: "search_to",   type: "integer", description: "Pagination upper (default 100).",                required: false }
      returns: { type: "object", description: "{ ok, assets: [...] }" }

    - name: "xdr_assets_get"
      method: "POST /public_api/v1/assets/get_asset/"
      description: "Full details of one asset — risk score, attributes, related events."
      args:
        - { name: "asset_id", type: "string", description: "From xdr_assets_list.", required: true }
      returns: { type: "object", description: "{ ok, asset: {...} }" }

    - name: "xdr_distribution_list"
      method: "POST /public_api/v1/distributions/get_distributions/"
      description: "List XDR distribution lists (installer collections)."
      args: []
      returns: { type: "object", description: "{ ok, distributions: [...] }" }

    - name: "xdr_distribution_create"
      method: "POST /public_api/v1/distributions/create/"
      description: "Create a new XDR distribution list (agent installer bundle)."
      args:
        - { name: "name",          type: "string", description: "Display name.",                                          required: true  }
        - { name: "platform",      type: "string", description: "'windows' | 'linux' | 'macos' | 'android'.",             required: true  }
        - { name: "package_type",  type: "string", description: "'standalone' | 'upgrade' (default standalone).",         required: false }
        - { name: "agent_version", type: "string", description: "Specific agent version (default = latest GA).",         required: false }
        - { name: "description",   type: "string", description: "Operator notes.",                                        required: false }
      returns: { type: "object", description: "{ ok, distribution_id }" }

    - name: "xdr_distribution_get_url"
      method: "POST /public_api/v1/distributions/get_dist_url/"
      description: "Return the installer download URL for a distribution."
      args:
        - { name: "distribution_id", type: "string", description: "From xdr_distribution_list / _create.", required: true }
      returns: { type: "object", description: "{ ok, download_url }" }

    - name: "xdr_distribution_versions"
      method: "POST /public_api/v1/distributions/get_versions/"
      description: "List available XDR agent versions per platform (use in distribution_create)."
      args: []
      returns: { type: "object", description: "{ ok, versions: {...} }" }

    - name: "xdr_alert_exclusions_list"
      method: "POST /public_api/v1/alerts_exclusion/get_alert_exclusion/"
      description: "List alert exclusions (rules that suppress specific alerts)."
      args:
        - { name: "tenant_id",   type: "string",  description: "Optional tenant filter.",                  required: false }
        - { name: "search_from", type: "integer", description: "Pagination offset (default 0).",            required: false }
        - { name: "search_to",   type: "integer", description: "Pagination upper (default 100).",           required: false }
      returns: { type: "object", description: "{ ok, exclusions: [...] }" }

    - name: "xdr_alert_exclusions_create"
      method: "POST /public_api/v1/alerts_exclusion/create_alert_exclusion/"
      description: "Create a new alert-exclusion rule. See data/knowledge/.../alert_exclusions/create.md for filter expression format."
      args:
        - { name: "name",              type: "string", description: "Operator-readable name.",  required: true  }
        - { name: "filter_expression", type: "object", description: "XDR alert-filter dict.",   required: true  }
