        - { name: "search_from",      type: "integer", description: "Pagination (default 0).",     required: false }
        - { name: "search_to",        type: "integer", description: "Pagination (default 100).",   required: false }
      returns: { type: "object", description: "{ ok, exploits: [...] }" }

    - name: "xdr_exploits_get_details"
      method: "POST /public_api/v1/exploits/get_exploit_details/"
