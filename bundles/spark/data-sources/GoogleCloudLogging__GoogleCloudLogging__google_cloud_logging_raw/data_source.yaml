how_to_use: |
  ## Google Cloud Logging → Cortex XSIAM (dataset `google_cloud_logging_raw`)

  **Validated 2026-06-03 (#118)** — maps **52 xdm fields** end-to-end
  via CEF-over-syslog on a tenant with the **Google Cloud Logging** content pack installed
  (the pack binds the modeling rule + parsing rule to the dataset).

  Required CEF header — the broker derives the dataset from it (lowercased):
  - vendor: `Google`
  - product: `Cloud_Logging`
  Broker derives -> `google_cloud_logging_raw`.
  Modeling-rule gate: seed `logName (computed) — seed a realistic GCP log path, e.g. projects/P/logs/cloudaudit.googleapis.com%2Factivity` (the AZFWApplicationRule branch is verified).

  JSON-native MR: it reads nested JSON via `json_extract_scalar(...)`/`->`. The
  worker emits composite schema fields as JSON strings on the CEF wire, which the
  rule parses — so CEF-over-syslog populates these fields (no HTTP collector).

  Verify (wide >=7d window):
      config timeframe = 30d | datamodel dataset = google_cloud_logging_raw | sort desc _time | fields xdm.* | limit 20
