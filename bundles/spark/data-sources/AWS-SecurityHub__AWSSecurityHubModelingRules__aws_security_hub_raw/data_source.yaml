schema_version: 1
id: AWS-SecurityHub
pack_name: AWS-SecurityHub
rule_name: AWSSecurityHubModelingRules
dataset_name: aws_security_hub_raw
vendor: Amazon Web Services
product: AWS-SecurityHub
description: AWS Security Hub aggregates findings from GuardDuty, Inspector, Macie, IAM Access Analyzer,
  and third-party scanners into a single normalized format (ASFF — AWS Security Finding Format). Each
  finding carries a severity, a resource id, a generator id, and a remediation hint. Simulate Security
  Hub to validate cross-finding correlation, incident workflow integration, or alert-fatigue tuning for
  a fully-integrated AWS security telemetry pipeline.
how_to_use: '## Sending these logs to Cortex XSIAM


  Phantom emits this vendor''s wire format as CEF over UDP — point a data worker

  at your XSIAM broker''s syslog destination and these records flow straight in.

  The schema below describes the vendor''s fields independent of destination, so

  the same records also work for Splunk, Elastic, or any syslog receiver.


  The CEF header''s **vendor** + **product** drive XSIAM''s parsing-rule routing:

  the broker normalizes them to `<lowercased-vendor>_<lowercased-product>_raw`

  (non-alphanumerics -> `_`) and matches your installed parsing rule. The PR/MR

  rules read NAMED COLUMNS, so the transport is invisible to them — pack the

  vendor''s field names as CEF extension `key=value` pairs.


  **Required CEF header for XSIAM**:


  - **vendor**: `aws`

  - **product**: `security_hub`


  Broker derives → `aws_security_hub_raw`.


  Use `aws` / `security_hub` (NOT display names) to broker-derive `aws_security_hub_raw`. The display-name
  path `Amazon Web Services` / `AWS-SecurityHub` derives `amazon_web_services_aws_securityhub_raw` — a
  different dataset.


  **MR pattern**: Mixed. Reads `Severity.Label`, `Resources[0].Type`, `Compliance.Status` via nested extraction;
  also reads flat `ProductArn`, `AwsAccountId`, `Region`, `Id`.


  **Composite (nested-JSON) fields**: Pack `Resources` as a JSON-string ARRAY of objects; `Severity` as
  JSON-string object; `Compliance` as JSON-string object. Multiple `json_extract_scalar` calls per event.


  **Sentinel values**: None.


  **PR filter quirks**: `Id` must be present and shaped like an AWS ARN. `UpdatedAt` must be RFC-3339.


  **Saturation strategy**: Mixed-MR — single event reaches ~10 XDM. For > 10, split events by finding
  type.


  **Single-event XDM ceiling**: ~10 XDM single-event.


  **Verify**:


  ```xql

  datamodel dataset = aws_security_hub_raw

  | filter xdm.event.id contains "<your-marker>"

  | fields xdm.*

  | limit 1

  ```'
