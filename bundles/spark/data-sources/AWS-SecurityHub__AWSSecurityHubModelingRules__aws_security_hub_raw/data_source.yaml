fields:
- name: AwsAccountId
  type: string
  description: Vendor-emitted field 'AwsAccountId'. Free-form text; may contain whitespace and punctuation.
  example: tenant-acme-prod
- name: Compliance
  type: json
  description: 'Compliance status (PASSED/WARNING/FAILED/NOT_AVAILABLE). JSON object with keys: Status
    (each key defined as a dotted-path leaf below).'
  example: '{"key":"value"}'
- name: Description
  type: string_long
  description: Free-form human-readable description from Amazon Web Services. Free-form text; may span
    multiple lines or contain large payloads.
  example: Event recorded by Amazon Web Services.
- name: Id
  type: string_short
  description: Opaque identifier emitted by Amazon Web Services. Short opaque token, typically without
    whitespace; max ~64 chars.
  example: ama-b9dbd163
- name: ProductName
  type: string
  description: Vendor-emitted field 'ProductName'. Free-form text; may contain whitespace and punctuation.
  example: operator-visible value
- name: Region
  type: string_short
  description: Cloud region or geographic region label. Short opaque token, typically without whitespace;
    max ~64 chars.
  example: us-east-1
- name: Resources
  type: json
  is_array: true
  description: — see leaf entries for per-element fields. JSON object or array; structured payload — see
    dotted-path leaves below for full shape.
  example: '{"id":"res-abc123","type":"S3Object","displayName":"reports.csv"}'
- name: Severity
  type: json
  description: 'Finding severity (CRITICAL/HIGH/MEDIUM/LOW/INFORMATIONAL). JSON object with keys: Label
    (each key defined as a dotted-path leaf below).'
  example: '{"key":"value"}'
- name: Title
  type: string
  description: Title/headline of the event or item. Free-form text; may contain whitespace and punctuation.
  example: Sample subject line
- name: Types
  type: string
  description: Vendor-emitted field 'Types'. Free-form text; may contain whitespace and punctuation.
  example: AuditEvent
- name: Compliance.Status
  type: string_short
  description: Status code returned by Amazon Web Services. Short opaque token, typically without whitespace;
    max ~64 chars.
  example: success
- name: Severity.Label
  type: string
  description: Vendor-emitted field 'Severity › Label'. Leaf of the 'Severity' composite. Free-form text;
    may contain whitespace and punctuation.
  example: auto-tagged
