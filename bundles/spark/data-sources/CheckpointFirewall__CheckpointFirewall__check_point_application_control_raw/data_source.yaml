is_rawlog_only: false
fields:
- name: act
  type: string
  description: Action taken (allow/deny/block/...). Free-form text; may contain whitespace
    and punctuation.
  example: sample_act
- name: app
  type: string
  description: Application protocol or service name. Free-form text; may contain whitespace
    and punctuation.
  example: Salesforce
- name: cefDeviceEventClassId
  type: string_short
  description: CEF device-event class ID — vendor-specific event-type identifier.
    Short opaque token, typically without whitespace; max ~64 chars.
  example: token_value
- name: cefDeviceProduct
  type: string_short
  description: CEF device-product field — product name as registered by Check Point.
    Short opaque token, typically without whitespace; max ~64 chars.
  example: token_value
- name: cefDeviceVendor
  type: string_short
  description: CEF device-vendor field — vendor name. Short opaque token, typically
    without whitespace; max ~64 chars.
  example: token_value
- name: cefSeverity
  type: integer
  description: CEF severity score (0-10) as classified by Check Point. Signed decimal
    integer; bare digits, optional leading minus.
  example: '42'
- name: cs2
  type: string
  description: Device custom string 2 (see cs2Label). Free-form text; may contain
    whitespace and punctuation.
  example: custom_value
- name: cs2Label
  type: string
  description: Vendor-emitted field 'Cs2Label'. Free-form text; may contain whitespace
    and punctuation.
  example: CustomField
- name: dhost
  type: host
  description: CEF destination host — hostname or FQDN of the target endpoint. Hostname
    or fully-qualified domain name (RFC 1035 dotted labels); no protocol prefix.
  example: host.example.com
- name: dpt
  type: integer_port
  description: CEF destination port — TCP/UDP port on the target side. Unsigned integer
    0-65535 representing a TCP/UDP port; bare digits, no quotes.
  example: '42'
- name: dst
  type: string
  description: CEF destination IP — IPv4/IPv6 address of the target endpoint. Free-form
    text; may contain whitespace and punctuation.
  example: 198.51.100.7
- name: duration
  type: integer
  description: Vendor-emitted field 'Duration'. Signed decimal integer; bare digits,
    optional leading minus.
  example: '42'
- name: duser
  type: user
  description: CEF destination user — username of the target/recipient. Account name
    as the vendor reports it — login name, UPN, or sAMAccountName; no domain prefix
    unless vendor emits one.
  example: jsmith
- name: loguid
  type: string
  description: Vendor-emitted field 'Loguid'. Free-form text; may contain whitespace
    and punctuation.
  example: sample_loguid
- name: proto
  type: string
  description: Network protocol (e.g. tcp/udp/icmp). Free-form text; may contain whitespace
    and punctuation.
  example: tcp
- name: request
  type: url
  description: HTTP request line or full request payload as captured by Check Point.
    Full URL with scheme (http/https/ftp); percent-encoded if non-ASCII.
  example: https://example.com/path
- name: requestMethod
  type: string
  description: HTTP request method (GET/POST/...). Free-form text; may contain whitespace
    and punctuation.
  example: sample_requestmethod
- name: rt
  type: datetime
  description: Vendor-emitted field 'Rt'. ISO-8601 timestamp with timezone (e.g.,
    2026-05-26T14:23:01Z).
  example: '2026-05-26T12:34:56Z'
- name: service_id
  type: string_short
  description: Opaque identifier emitted by Check Point. Short opaque token, typically
    without whitespace; max ~64 chars.
  example: che-2d3aa3e1
- name: shost
  type: host
  description: CEF source host — hostname or FQDN of the source endpoint. Hostname
    or fully-qualified domain name (RFC 1035 dotted labels); no protocol prefix.
  example: host.example.com
- name: src
  type: string
  description: CEF source IP — IPv4/IPv6 address of the source endpoint. Free-form
    text; may contain whitespace and punctuation.
  example: 192.0.2.45
- name: suser
  type: user
  description: CEF source user — username of the actor initiating the event. Account
    name as the vendor reports it — login name, UPN, or sAMAccountName; no domain
    prefix unless vendor emits one.
  example: jsmith
use_cases:
- Firewall
- Network
how_to_use: |
  ## Check Point CheckpointFirewall → Cortex XSIAM (dataset `check_point_application_control_raw`)
  
    **Routing** — the broker lowercases the CEF/syslog header `vendor`/`product`, replaces
    non-alphanumerics with `_`, and appends `_raw` to choose the dataset (target: `check_point_application_control_raw`).
  
    **Required CEF header for XSIAM** — the header must normalize to `check_point_application_control`. The marketplace pack's display name `Check Point` / `CheckpointFirewall` normalizes to `check_point_checkpointfirewall_raw`, a **different dataset** (vendor rename / legacy CEF identity), so use the vendor's actual CEF `deviceVendor`/`deviceProduct` that yields `check_point_application_control` and confirm which dataset the events land in.
  
    **Ingestion shape**: **Flat / CEF-compatible.** The modeling rule reads flat top-level columns (no nested-JSON access). A CEF event routes in and the broker auto-extracts those columns, so this source maps from Phantom's existing CEF path once the dataset is XDM-bound.
  
    - **Modeling-rule gate**: none — the rule maps every routed row unconditionally.
  
    **XDM mapping**: ~86 fields mapped to the unified data model (`xdm.*`), including: `XDM.Auth.Client.ipv4`, `XDM.Auth.Client.ipv6`, `XDM.Auth.Client.user.user_type`, `XDM.Auth.Client.user.username`, `XDM.Auth.Observer.vendor`, `XDM.Auth.Target.ipv4`.
  
    **Operator setup**: This data source's modeling rule reads CEF-shaped columns (rt, src, dst, spt, dpt, cs1-6, act, etc.). Phantom emits CEF over syslog (`CEF:0|Check Point|CheckpointFirewall|...|<extensions>`) — the broker auto-extracts CEF k=v pairs into typed columns matching the CEF dictionary, and the broker routes to this dataset via the CEF header's vendor/product. Usually NO operator-side broker config is required beyond standard CEF ingestion.
  
    **Status**: Reverse-engineered 2026-06-04 from the parsing/modeling rules — routing, gate, and field
    inventory documented. **NOT yet XDM-validated on a live tenant** (no `validated` pill); validate by
    streaming a CEF batch and confirming a rich `xdm.*` count over a wide window.
  
    **Verify** (once the dataset is XDM-bound, wide ≥7d window):
  
        config timeframe = 30d | datamodel dataset = check_point_application_control_raw | sort desc _time | fields xdm.* | limit 20
