how_to_use: |
  ## Google Workspace Chrome → Cortex XSIAM (dataset `google_workspace_chrome_raw`)

  Routing — broker-derived from the CEF/syslog header (lowercased):
  - vendor: `Google`
  - product: `Workspace_Chrome`
  Broker derives -> `google_workspace_chrome_raw`.

  Ingestion shape: **JSON-native.** This modeling rule reads **nested JSON**
  (e.g. `parameters -> os_platform`) and maps to the unified XDM (`xdm.*`). Google's native path is
  its HTTP/API collector emitting JSON, not flat CEF. A synthetic flat-CEF
  event routes in and the broker extracts top-level columns, but the MR's
  nested-JSON reads resolve to null — so XDM does not populate from CEF.
  (Reverse-engineered 2026-06-03 #118; routing/landing verified Phantom-side.
  NOT XDM-validated on a stock tenant — see prerequisite(s) below.)

  Maps to ~20 fields including: xdm.event.description, xdm.event.outcome_reason, xdm.event.type, xdm.intermediate.user.username, xdm.network.http.browser, xdm.network.http.url.
  Modeling rule: unconditional (no gate field).

  To populate XDM, **two** tenant-side prerequisites (neither is a Phantom change
  — same class as the Netskope marketplace-MR finding):
  1. Onboard the Google content pack so `google_workspace_chrome_raw` is XDM-enabled — the
     marketplace modeling rule binds to the dataset. Broker-auto-created
     datasets stay raw-only and the rule never applies (datamodel returns 0).
  2. Ingest as JSON through an XSIAM HTTP Collector (dataset target + API key),
     not the syslog broker — the nested-JSON MR needs JSON payloads. Phantom's
     synthetic worker emits flat CEF/syslog today.

  Verify (once prerequisite(s) met, wide >=7d window):
      config timeframe = 30d | datamodel dataset = google_workspace_chrome_raw | sort desc _time | fields xdm.* | limit 20
