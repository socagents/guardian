how_to_use: |
  ## Ironscales IronscalesEventCollector → Cortex XSIAM (dataset `ironscales_ironscales_raw`)
  
    **Routing** — the broker lowercases the CEF/syslog header `vendor`/`product`, replaces
    non-alphanumerics with `_`, and appends `_raw` to choose the dataset (target: `ironscales_ironscales_raw`).
  
    **Required CEF header for XSIAM** — the header must normalize to `ironscales_ironscales`. The marketplace pack's display name `Ironscales` / `IronscalesEventCollector` normalizes to `ironscales_ironscaleseventcollector_raw`, a **different dataset** (vendor rename / legacy CEF identity), so use the vendor's actual CEF `deviceVendor`/`deviceProduct` that yields `ironscales_ironscales` and confirm which dataset the events land in.
  
    **Ingestion shape**: **JSON-native.** The modeling rule reads nested JSON (e.g. `$.ip`). CEF/syslog routes + lands and the broker extracts top-level columns; the nested reads need the composite present, so Phantom's worker JSON-stringifies `type: json` composites onto the wire (keep the dotted-leaf fields).
  
    - **Modeling-rule gate**: none — the rule maps every routed row unconditionally.
  
    **XDM mapping**: ~18 fields mapped to the unified data model (`xdm.*`), including: `xdm.alert.subcategory`, `xdm.email.attachment.filename`, `xdm.email.attachment.md5`, `xdm.email.attachment.size`, `xdm.email.data`, `xdm.email.recipients`.
  
    **Operator setup**: This data source has typed-column data that doesn't look like CEF (columns are camelCase API fields, JSON sub-objects, etc.). Most likely arrives via the XSIAM HTTP Collector with a source tag mapped to vendor=`Ironscales`, product=`IronscalesEventCollector`, or via a vendor-specific XDR connector pull. Phantom can POST JSON to the HTTP collector; the operator must configure the collector's source tag to land events in this dataset.
  
    **Status**: Reverse-engineered 2026-06-04 from the parsing/modeling rules — routing, gate, and field
    inventory documented. **NOT yet XDM-validated on a live tenant** (no `validated` pill); validate by
    streaming a CEF batch and confirming a rich `xdm.*` count over a wide window.
  
    **Verify** (once the dataset is XDM-bound, wide ≥7d window):
  
        config timeframe = 30d | datamodel dataset = ironscales_ironscales_raw | sort desc _time | fields xdm.* | limit 20
