schema_version: 1
id: AWS-CloudTrail
pack_name: AWS-CloudTrail
rule_name: AWSCloudTrail
dataset_name: amazon_aws_raw
vendor: Amazon Web Services
product: AWS-CloudTrail
description: AWS CloudTrail is the authoritative audit log of every API call made within an AWS account
  — management-plane writes, data-plane reads, console sessions, automated SDK calls, all of it. Each
  event records `eventName`, `eventSource`, the IAM principal, the source IP, the user-agent, request
  and response parameters, and any error codes. Simulate CloudTrail to validate detections for IAM privilege
  escalation, S3 data exposure, root account usage, or AWS-API-driven lateral movement.
how_to_use: '## Sending these logs to Cortex XSIAM


  Phantom emits this vendor''s wire format as CEF over UDP — point a data worker

  at your XSIAM broker''s syslog destination and these records flow straight in.

  The schema below describes the vendor''s fields independent of destination, so

  the same records also work for Splunk, Elastic, or any syslog receiver.


  The CEF header''s **vendor** + **product** drive XSIAM''s parsing-rule routing:

  the broker normalizes them to `<lowercased-vendor>_<lowercased-product>_raw`

  (non-alphanumerics -> `_`) and matches your installed parsing rule. The PR/MR

  rules read NAMED COLUMNS, so the transport is invisible to them — pack the

  vendor''s field names as CEF extension `key=value` pairs.


  **Required CEF header for XSIAM**:


  - **vendor**: `amazon`

  - **product**: `aws`


  Broker derives → `amazon_aws_raw`.


  **Important**: use `amazon` / `aws` — NOT the marketing names `Amazon Web Services` / `AWS-CloudTrail`.
  The display names would auto-derive to `amazon_web_services_aws_cloudtrail_raw` (a different dataset
  that may also exist in your tenant but doesn''t carry the upstream CloudTrail PR/MR rules).


  **MR pattern**: Mixed. Flat-field MR reads `eventName`, `eventSource`, `awsRegion`, `recipientAccountId`
  directly; nested `userIdentity.userName` extracted via `json_extract_scalar`.


  **Composite (nested-JSON) fields**: Pack `userIdentity` as JSON-string CEF extension; the MR walks `userIdentity.userName`
  and `userIdentity.principalId`. L15 + batch-4 validate this pattern.


  **Sentinel values**: None.


  **PR filter quirks**: Set `eventName` to a known CloudTrail event ID (e.g. `ConsoleLogin`, `AssumeRole`);
  `eventTime` must be ISO-8601 with `Z` suffix.


  **Saturation strategy**: Mixed-MR ceiling ~11 XDM per L19. Single event of ~800-1000 bytes covers most
  XDM.


  **Single-event XDM ceiling**: ~11 XDM single-event (mixed flat + 1 nested).


  **Verify**:


  ```xql

  datamodel dataset = amazon_aws_raw

  | filter xdm.event.id contains "<your-marker>"

  | fields xdm.*

  | limit 1

  ```


  ### Make it map to XDM


  `amazon_aws_raw`''s modeling rule gates on the META field `_log_type = "Cloud Audit Log"`.
  `_log_type` is stamped by the XSIAM ingestion layer (the Broker VM applet / HTTP Collector
  binds `vendor=amazon`,`product=aws` ingestion to this log type) — it is NOT carried in the
  event body, so no `observables_dict` field can set it. To get XDM here, the operator must
  onboard an AWS CloudTrail source in XSIAM (Broker applet or HTTP Collector) so ingested events
  are stamped `_log_type="Cloud Audit Log"`; then the simulated payload''s fields (`eventName`,
  `sourceIPAddress`, `userIdentity`, ...) map to XDM. Raw landing in `amazon_aws_raw` works without
  this; XDM does not. (For reference, once the gate is satisfied the rule populates core XDM such
  as `xdm.event.operation_sub_type`/`xdm.event.type` <- `eventName`, `xdm.source.ipv4` <- `sourceIPAddress`,
  `xdm.source.user.username` <- `userIdentity.userName`, `xdm.observer.name` <- `eventSource`,
  and `xdm.target.cloud.region` <- `awsRegion`.)


  **Notes**: Validated in `scripts/maintainer/e2e_batch4_json_as_cef.py`.'
