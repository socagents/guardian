version: 1.1.15
origin: bundle
author: phantom-bundle
uploaded_by: null
created_at: '2026-05-23T09:26:17Z'
updated_at: '2026-05-23T09:26:17Z'
logo:
  mime_type: image/svg+xml
  data: 
  source: phantom-bundle (v0.13.0 migration)
  license: MIT
  fidelity: branded
formats:
- SYSLOG
- CEF
- JSON
is_rawlog_only: false
fields:
- name: _log_type
  type: string
  description: Event type or category as the vendor classifies it. Free-form text; may contain whitespace
    and punctuation.
  example: audit
- name: additionalEventData
  type: json
  description: Per-service additional context. JSON object or array; structured payload — see dotted-path
    leaves below.
  example: '{"key":"value"}'
- name: awsRegion
  type: string_short
  description: Region the action took place in. Short opaque token, typically without whitespace; max
    ~64 chars.
  example: us-east-1
- name: errorCode
  type: string_short
  description: Error code when the request failed. Short opaque token, typically without whitespace; max
    ~64 chars.
  example: AccessDenied
- name: errorMessage
  type: string_long
  description: Human-readable error message. Free-form text; may span multiple lines or contain large
    payloads.
  example: Free-form vendor-emitted message describing the event.
- name: eventCategory
  type: string
  description: Vendor-emitted field 'EventCategory'. Free-form text; may contain whitespace and punctuation.
  example: audit
- name: eventID
  type: string_short
  description: Unique CloudTrail event id. Short opaque token, typically without whitespace; max ~64 chars.
  example: token
- name: eventName
  type: string_short
  description: API call name. Short opaque token, typically without whitespace; max ~64 chars.
  example: RunInstances
- name: eventSource
  type: string_short
  description: AWS service emitting the event. Short opaque token, typically without whitespace; max ~64
    chars.
  example: ec2.amazonaws.com
- name: eventTime
  type: datetime
  description: When the request was made (ISO-8601). ISO-8601 timestamp with timezone (e.g., 2026-05-26T14:23:01Z).
  example: '2026-05-26T14:23:01Z'
- name: eventType
  type: enum
  description: 'Top-level event type. One of: AwsApiCall, AwsServiceEvent, AwsConsoleAction, AwsCloudTrailInsight,
    AwsConsoleSignIn (case-sensitive).'
  example: AwsApiCall
  enum_values:
  - AwsApiCall
  - AwsServiceEvent
  - AwsConsoleAction
  - AwsCloudTrailInsight
  - AwsConsoleSignIn
- name: eventVersion
  type: string_short
  description: CloudTrail event schema version. Short opaque token, typically without whitespace; max
    ~64 chars.
  example: token
- name: recipientAccountId
  type: string_short
  description: Account that owns the resource the call touched. Short opaque token, typically without
    whitespace; max ~64 chars.
  example: token
- name: requestID
  type: string_short
  description: AWS request id (correlation). Short opaque token, typically without whitespace; max ~64
    chars.
  example: token
- name: requestParameters
  type: json
  description: Parameters of the API call (per service shape). JSON object or array; structured payload
    — see dotted-path leaves below.
  example: '{"key":"value"}'
- name: resources
  type: json
  is_array: true
  description: List of resources affected by the request. JSON object or array; structured payload — see
    dotted-path leaves below.
  example: '{"id":"res-abc123","type":"S3Object","displayName":"reports.csv"}'
- name: responseElements
  type: json
  description: Response elements of the API call. JSON object or array; structured payload — see dotted-path
    leaves below.
  example: '{"key":"value"}'
- name: sharedEventID
  type: string_short
  description: Shared event id (cross-account events). Short opaque token, typically without whitespace;
    max ~64 chars.
  example: token
- name: sourceIPAddress
  type: string
  description: IP address the request was made from (or AWS service name). Free-form text; may contain
    whitespace and punctuation.
  example: 192.0.2.45
- name: start
  type: string
  description: Vendor-emitted field 'Start'. Free-form text; may contain whitespace and punctuation.
  example: operator-visible value
- name: tlsDetails
  type: json
  description: '— see leaf entries for nested paths. JSON object with keys: cipherSuite, clientProvidedHostHeader,
    tlsVersion (each key defined as a dotted-path leaf below).'
  example: '{"key":"value"}'
- name: userAgent
  type: string_long
  description: User-Agent of the request. Free-form text; may span multiple lines or contain large payloads.
  example: Free-form vendor-emitted message describing the event.
- name: userIdentity
  type: json
  description: '— see leaf entries for nested paths. JSON object with keys: accountId, arn, onBehalfOf,
    principalId, sessionContext, type, userName, accessKeyId, invokedBy (each key defined as a dotted-path
    leaf below).'
  example: '{"key":"value"}'
- name: vpcEndpointAccountId
  type: string
  description: Vendor-emitted field 'VpcEndpointAccountId'. Free-form text; may contain whitespace and
    punctuation.
  example: tenant-acme-prod
- name: vpcEndpointId
  type: string_short
  description: VPC endpoint id (when called from a VPC endpoint). Short opaque token, typically without
    whitespace; max ~64 chars.
  example: token
- name: requestParameters.Host
  type: host
  description: Vendor-emitted field 'RequestParameters › Host'. Leaf of the 'requestParameters' composite.
    Hostname or fully-qualified domain name (RFC 1035 dotted labels); no protocol prefix.
  example: host.example.com
- name: resources[].ARN
  type: string
  description: Vendor-emitted field 'Resources[] › ARN'. Free-form text; may contain whitespace and punctuation.
  example: arn:aws:iam::123456789012:user/jdoe
- name: resources[].accountId
  type: string
  description: Vendor-emitted field 'Resources[] › accountId'. Free-form text; may contain whitespace
    and punctuation.
  example: acct-46fb3739
- name: resources[].type
  type: string_short
  description: Type/category classifier emitted by Amazon Web Services. Short opaque token, typically
    without whitespace; max ~64 chars.
  example: authentication
- name: tlsDetails.cipherSuite
  type: string_short
  description: Negotiated TLS cipher suite. Short opaque token, typically without whitespace; max ~64
    chars.
  example: token
- name: tlsDetails.clientProvidedHostHeader
  type: host
  description: Host header the client sent. Hostname or fully-qualified domain name (RFC 1035 dotted labels);
    no protocol prefix.
  example: host.example.com
- name: tlsDetails.tlsVersion
  type: string_short
  description: TLS version used for the request. Short opaque token, typically without whitespace; max
    ~64 chars.
  example: token
- name: userIdentity.accountId
  type: string_short
  description: AWS account the caller belongs to. Short opaque token, typically without whitespace; max
    ~64 chars.
  example: token
- name: userIdentity.arn
  type: string
  description: Caller ARN. Free-form text; may contain whitespace and punctuation.
  example: arn:aws:iam::123456789012:user/jdoe
- name: userIdentity.onBehalfOf.userId
  type: string
  description: Vendor-emitted field 'UserIdentity › onBehalfOf › userId'. Leaf of the 'userIdentity' composite.
    Free-form text; may contain whitespace and punctuation.
  example: usr-60baad76
- name: userIdentity.principalId
  type: string
  description: Unique caller principal id. Free-form text; may contain whitespace and punctuation.
  example: AIDAJDPLRKLG7UEXAMPLE
- name: userIdentity.sessionContext.sessionIssuer.userName
  type: user
  description: Role name the session was issued from. Account name as the vendor reports it — login name,
    UPN, or sAMAccountName; no domain prefix unless vendor emits one.
  example: jsmith
- name: userIdentity.type
  type: enum
  description: 'Caller identity type. One of: Root, IAMUser, AssumedRole, FederatedUser, AWSService, AWSAccount,
    WebIdentityUser, SAMLUser, Unknown (case-sensitive).'
  example: Root
  enum_values:
  - Root
  - IAMUser
  - AssumedRole
  - FederatedUser
  - AWSService
  - AWSAccount
  - WebIdentityUser
  - SAMLUser
  - Unknown
- name: userIdentity.userName
  type: user
  description: IAM user name (when type=IAMUser). Account name as the vendor reports it — login name,
    UPN, or sAMAccountName; no domain prefix unless vendor emits one.
  example: jsmith
- name: apiVersion
  type: string_short
  description: API version of the call. Short opaque token, typically without whitespace; max ~64 chars.
  example: token
- name: managementEvent
  type: boolean
  description: True for management-plane events; false for data-plane. Literal 'true' or 'false' (case-insensitive);
    not '1'/'0'.
  example: 'true'
- name: readOnly
  type: boolean
  description: True if the API call is a read-only operation. Literal 'true' or 'false' (case-insensitive);
    not '1'/'0'.
  example: 'true'
- name: userIdentity.accessKeyId
  type: string_short
  description: Access-key id used (when applicable). Short opaque token, typically without whitespace;
    max ~64 chars.
  example: token
- name: userIdentity.invokedBy
  type: string
  description: Service that invoked the call (when on behalf of). Free-form text; may contain whitespace
    and punctuation.
  example: AIDAJDPLRKLG7UEXAMPLE
- name: userIdentity.sessionContext.sessionIssuer.arn
  type: string
  description: Issuer ARN of an assumed-role session. Free-form text; may contain whitespace and punctuation.
  example: arn:aws:iam::123456789012:user/jdoe
use_cases:
- Cloud
validated: true
