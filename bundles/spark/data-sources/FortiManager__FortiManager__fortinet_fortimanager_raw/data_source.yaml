fields:
- name: _raw_log
  type: string
  description: Raw log line as the vendor emits it before any parsing or normalization.
    Free-form text; may contain whitespace and punctuation.
  example: '<14>2024-01-15T14:23:01+0000 fortinet: fortimanager=FortiManager action=allow
    user=jdoe'
- name: alert
  type: string
  description: Event log level. Free-form text; may contain whitespace and punctuation.
  example: sample_alert
- name: alert_severity
  type: string_short
  description: Alert severity. Short opaque token, typically without whitespace; max
    ~64 chars.
  example: token
- name: auth_privilege_level
  type: string
  description: Auth privilege level. Free-form text; may contain whitespace and punctuation.
  example: info
- name: event_description
  type: string
  description: Event description. Free-form text; may contain whitespace and punctuation.
  example: Event recorded by Fortinet.
- name: event_id
  type: string_short
  description: Event ID. Short opaque token, typically without whitespace; max ~64
    chars.
  example: token
- name: event_operation_sub_type
  type: string
  description: Event operation sub type. Free-form text; may contain whitespace and
    punctuation.
  example: authentication
- name: event_type
  type: string
  description: Event type. Free-form text; may contain whitespace and punctuation.
  example: authentication
- name: long_event_type
  type: string
  description: Event original event type. Free-form text; may contain whitespace and
    punctuation.
  example: authentication
- name: original_event_type
  type: string
  description: Original event type. Free-form text; may contain whitespace and punctuation.
  example: authentication
- name: session_context_id
  type: string_short
  description: Session context id. Short opaque token, typically without whitespace;
    max ~64 chars.
  example: token
- name: source_host_hostname
  type: host
  description: Source host hostname. Hostname or fully-qualified domain name (RFC
    1035 dotted labels); no protocol prefix.
  example: host01.example.com
- name: source_ipv4
  type: ipv4
  description: Source IPv4. Dotted-quad IPv4 literal (e.g., 192.0.2.45); no port suffix,
    no surrounding brackets or quotes.
  example: 192.0.2.45
- name: source_ipv6
  type: ipv6
  description: Source IPv6. Colon-separated hexadecimal IPv6 literal (RFC 4291); no
    zone suffix, no surrounding brackets.
  example: 2001:db8::1
- name: source_user_groups
  type: string
  description: Source user groups. Free-form text; may contain whitespace and punctuation.
  example: sample_groups
- name: source_user_username
  type: user
  description: Source user username. Account name as the vendor reports it — login
    name, UPN, or sAMAccountName depending on the source; no domain prefix unless
    the vendor emits one.
  example: jdoe
- name: target_resource_type
  type: string
  description: Destination resource type. Free-form text; may contain whitespace and
    punctuation.
  example: authentication
use_cases:
- Firewall
- Network
