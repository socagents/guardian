fields:
- name: _raw_log
  type: string
  description: Raw log line as the vendor emits it before any parsing or normalization.
    Free-form text; may contain whitespace and punctuation.
  example: '<14>2024-01-15T14:23:01+0000 mcafee: mcafeewebgateway=McAfeeWebGateway
    action=allow user=jdoe'
- name: check_hash
  type: hash_md5
  description: Destination file MD5. 32-character lowercase hex MD5 digest.
  example: 5d41402abc4b2a76b9719d911017c592
- name: check_server_ip_v4
  type: ipv4
  description: Destination IPv4. Dotted-quad IPv4 literal (e.g., 192.0.2.45); no port
    suffix, no surrounding brackets or quotes.
  example: 192.0.2.45
- name: check_server_ip_v6
  type: ipv6
  description: Destination IPv6. Colon-separated hexadecimal IPv6 literal (RFC 4291);
    no zone suffix, no surrounding brackets.
  example: 2001:db8::1
- name: check_src_ip_v4
  type: ipv4
  description: Source IPv4. Dotted-quad IPv4 literal (e.g., 192.0.2.45); no port suffix,
    no surrounding brackets or quotes.
  example: 192.0.2.45
- name: check_src_ip_v6
  type: ipv6
  description: Source IPv6. Colon-separated hexadecimal IPv6 literal (RFC 4291); no
    zone suffix, no surrounding brackets.
  example: 2001:db8::1
- name: order_categories
  type: string
  description: Alert subcategory. Free-form text; may contain whitespace and punctuation.
  example: sample_categories
- name: order_domain
  type: domain
  description: Network HTTP domain. Bare DNS domain name; no scheme, no path, no port.
  example: example.com
