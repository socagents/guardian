fields:
- name: act
  type: string_short
  description: CEF action — what Trend Micro did with the event (allow/block/quarantine/etc.).
    Short opaque token, typically without whitespace; max ~64 chars.
  example: token_value
- name: app
  type: string_short
  description: Application name emitted by Trend Micro. Short opaque token, typically
    without whitespace; max ~64 chars.
  example: token_value
- name: c6a2
  type: ipv6
  description: Vendor-emitted field 'C6a2'. Colon-separated hexadecimal IPv6 literal
    (RFC 4291); no zone suffix, no surrounding brackets.
  example: 2001:db8::1
- name: c6a3
  type: ipv6
  description: Vendor-emitted field 'C6a3'. Colon-separated hexadecimal IPv6 literal
    (RFC 4291); no zone suffix, no surrounding brackets.
  example: 2001:db8::1
- name: cat
  type: string
  description: Vendor-emitted field 'Cat'. Free-form text; may contain whitespace
    and punctuation.
  example: access_control
- name: cefName
  type: string_short
  description: CEF event name — short human-readable label for the event class. Short
    opaque token, typically without whitespace; max ~64 chars.
  example: token_value
- name: cn1
  type: integer
  description: Vendor-emitted field 'Cn1'. Signed decimal integer; bare digits, optional
    leading minus.
  example: '42'
- name: cs1
  type: string
  description: Vendor-emitted field 'Cs1'. Free-form text; may contain whitespace
    and punctuation.
  example: custom_value
- name: cs4
  type: string
  description: Vendor-emitted field 'Cs4'. Free-form text; may contain whitespace
    and punctuation.
  example: custom_value
- name: dhost
  type: host
  description: CEF destination host — hostname or FQDN of the target endpoint. Hostname
    or fully-qualified domain name (RFC 1035 dotted labels); no protocol prefix.
  example: host.example.com
- name: dntdom
  type: string
  description: Vendor-emitted field 'Dntdom'. Free-form text; may contain whitespace
    and punctuation.
  example: sample_dntdom
- name: dpt
  type: integer_port
  description: CEF destination port — TCP/UDP port on the target side. Unsigned integer
    0-65535 representing a TCP/UDP port; bare digits, no quotes.
  example: '42'
- name: dst
  type: ipv4
  description: CEF destination IP — IPv4/IPv6 address of the target endpoint. Dotted-quad
    IPv4 literal (e.g., 192.0.2.45); no port suffix, no surrounding brackets or quotes.
  example: 203.0.113.42
- name: duser
  type: user
  description: CEF destination user — username of the target/recipient. Account name
    as the vendor reports it — login name, UPN, or sAMAccountName; no domain prefix
    unless vendor emits one.
  example: jsmith
- name: dvchost
  type: string
  description: Vendor-emitted field 'Dvchost'. Free-form text; may contain whitespace
    and punctuation.
  example: sample_dvchost
- name: externalId
  type: string
  description: Vendor-emitted field 'ExternalId'. Free-form text; may contain whitespace
    and punctuation.
  example: ext-0266dd4d-afb
- name: proto
  type: string
  description: Network protocol name or numeric IANA assignment. Free-form text; may
    contain whitespace and punctuation.
  example: tcp
- name: request
  type: url
  description: HTTP request line or full request payload as captured by Trend Micro.
    Full URL with scheme (http/https/ftp); percent-encoded if non-ASCII.
  example: https://example.com/path
- name: requestMethod
  type: string_short
  description: HTTP request method (GET/POST/PUT/DELETE/etc.). Short opaque token,
    typically without whitespace; max ~64 chars.
  example: token_value
- name: spt
  type: integer_port
  description: CEF source port — TCP/UDP port on the source side. Unsigned integer
    0-65535 representing a TCP/UDP port; bare digits, no quotes.
  example: '42'
- name: src
  type: ipv4
  description: CEF source IP — IPv4/IPv6 address of the source endpoint. Dotted-quad
    IPv4 literal (e.g., 192.0.2.45); no port suffix, no surrounding brackets or quotes.
  example: 203.0.113.42
- name: suser
  type: user
  description: CEF source user — username of the actor initiating the event. Account
    name as the vendor reports it — login name, UPN, or sAMAccountName; no domain
    prefix unless vendor emits one.
  example: jsmith
use_cases:
- AV
- EDR
how_to_use: |
  ## Trend Micro TrendMicroTippingPoint → Cortex XSIAM (dataset `tippingpoint_unityone_raw`)
  
    **Routing** — the broker lowercases the CEF/syslog header `vendor`/`product`, replaces
    non-alphanumerics with `_`, and appends `_raw` to choose the dataset (target: `tippingpoint_unityone_raw`).
  
    **Required CEF header for XSIAM** — the header must normalize to `tippingpoint_unityone`. The marketplace pack's display name `Trend Micro` / `TrendMicroTippingPoint` normalizes to `trend_micro_trendmicrotippingpoint_raw`, a **different dataset** (vendor rename / legacy CEF identity), so use the vendor's actual CEF `deviceVendor`/`deviceProduct` that yields `tippingpoint_unityone` and confirm which dataset the events land in.
  
    **Ingestion shape**: **Flat / CEF-compatible.** The modeling rule reads flat top-level columns (no nested-JSON access). A CEF event routes in and the broker auto-extracts those columns, so this source maps from Phantom's existing CEF path once the dataset is XDM-bound.
  
    - **Modeling-rule gate**: none — the rule maps every routed row unconditionally.
  
    **XDM mapping**: ~22 fields mapped to the unified data model (`xdm.*`), including: `xdm.alert.name`, `xdm.event.id`, `xdm.event.type`, `xdm.network.application_protocol`, `xdm.network.http.method`, `xdm.network.http.url`.
  
    **Operator setup**: This data source's modeling rule reads CEF-shaped columns (rt, src, dst, spt, dpt, cs1-6, act, etc.). Phantom emits CEF over syslog (`CEF:0|Trend Micro|TrendMicroTippingPoint|...|<extensions>`) — the broker auto-extracts CEF k=v pairs into typed columns matching the CEF dictionary, and the broker routes to this dataset via the CEF header's vendor/product. Usually NO operator-side broker config is required beyond standard CEF ingestion.
  
    **Status**: Reverse-engineered 2026-06-04 from the parsing/modeling rules — routing, gate, and field
    inventory documented. **NOT yet XDM-validated on a live tenant** (no `validated` pill); validate by
    streaming a CEF batch and confirming a rich `xdm.*` count over a wide window.
  
    **Verify** (once the dataset is XDM-bound, wide ≥7d window):
  
        config timeframe = 30d | datamodel dataset = tippingpoint_unityone_raw | sort desc _time | fields xdm.* | limit 20
