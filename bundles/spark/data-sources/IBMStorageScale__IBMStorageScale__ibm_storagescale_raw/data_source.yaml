how_to_use: |
  ## IBM IBMStorageScale → Cortex XSIAM (dataset `ibm_storagescale_raw`)
  
    **Routing** — the broker lowercases the CEF/syslog header `vendor`/`product`, replaces
    non-alphanumerics with `_`, and appends `_raw` to choose the dataset (target: `ibm_storagescale_raw`).
  
    **Required CEF header for XSIAM** — the header must normalize to `ibm_storagescale`. The marketplace pack's display name `IBM` / `IBMStorageScale` normalizes to `ibm_ibmstoragescale_raw`, a **different dataset** (vendor rename / legacy CEF identity), so use the vendor's actual CEF `deviceVendor`/`deviceProduct` that yields `ibm_storagescale` and confirm which dataset the events land in.
  
    **Ingestion shape**: **Flat / CEF-compatible.** The modeling rule reads flat top-level columns (no nested-JSON access). A CEF event routes in and the broker auto-extracts those columns, so this source maps from Phantom's existing CEF path once the dataset is XDM-bound.
  
    - **Modeling-rule gate**: none — the rule maps every routed row unconditionally.
  
    **XDM mapping**: ~11 fields mapped to the unified data model (`xdm.*`), including: `xdm.auth.privilege_level`, `xdm.event.description`, `xdm.event.original_event_type`, `xdm.event.outcome`, `xdm.event.type`, `xdm.observer.type`.
  
    **Operator setup**: This data source has typed-column data that doesn't look like CEF (columns are camelCase API fields, JSON sub-objects, etc.). Most likely arrives via the XSIAM HTTP Collector with a source tag mapped to vendor=`IBM`, product=`IBMStorageScale`, or via a vendor-specific XDR connector pull. Phantom can POST JSON to the HTTP collector; the operator must configure the collector's source tag to land events in this dataset.
  
    **Status**: Reverse-engineered 2026-06-04 from the parsing/modeling rules — routing, gate, and field
    inventory documented. **NOT yet XDM-validated on a live tenant** (no `validated` pill); validate by
    streaming a CEF batch and confirming a rich `xdm.*` count over a wide window.
  
    **Verify** (once the dataset is XDM-bound, wide ≥7d window):
  
        config timeframe = 30d | datamodel dataset = ibm_storagescale_raw | sort desc _time | fields xdm.* | limit 20
