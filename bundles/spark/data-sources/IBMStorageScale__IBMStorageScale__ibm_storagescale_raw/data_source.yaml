description: The IBM Storage Scale pack provides high-performance collection of Command
  Line Interface (CLI) audit log records. Its concurrent fetching architecture is
  engineered for large-scale deployments, ensuring efficient data ingestion into Cortex
  XSIAM. It enables monitoring of critical configuration changes and user commands
  to enhance the security of the storage infrastructure.
