how_to_use: |
  ## CyberArk CyberArkEPM → Cortex XSIAM (dataset `cyberark_epm_raw`)
  
    **Routing** — the broker lowercases the CEF/syslog header `vendor`/`product`, replaces
    non-alphanumerics with `_`, and appends `_raw` to choose the dataset (target: `cyberark_epm_raw`).
  
    **Required CEF header for XSIAM** — the header must normalize to `cyberark_epm`. The marketplace pack's display name `CyberArk` / `CyberArkEPM` normalizes to `cyberark_cyberarkepm_raw`, a **different dataset** (vendor rename / legacy CEF identity), so use the vendor's actual CEF `deviceVendor`/`deviceProduct` that yields `cyberark_epm` and confirm which dataset the events land in.
  
    **Ingestion shape**: **Flat / CEF-compatible.** The modeling rule reads flat top-level columns (no nested-JSON access). A CEF event routes in and the broker auto-extracts those columns, so this source maps from Phantom's existing CEF path once the dataset is XDM-bound.
  
    - **Modeling-rule gate**: `source_log_type = "set admin audit data"` — seed that field with an accepted value or the rule drops the row (XDM stays 0).
  
    **XDM mapping**: ~35 fields mapped to the unified data model (`xdm.*`), including: `xdm.alert.original_threat_name`, `xdm.auth.privilege_level`, `xdm.event.description`, `xdm.event.id`, `xdm.event.operation_sub_type`, `xdm.event.original_event_type`.
  
    **Operator setup**: This data source's modeling rule reads CEF-shaped columns (rt, src, dst, spt, dpt, cs1-6, act, etc.). Phantom emits CEF over syslog (`CEF:0|CyberArk|CyberArkEPM|...|<extensions>`) — the broker auto-extracts CEF k=v pairs into typed columns matching the CEF dictionary, and the broker routes to this dataset via the CEF header's vendor/product. Usually NO operator-side broker config is required beyond standard CEF ingestion.
  
    **Status**: Reverse-engineered 2026-06-04 from the parsing/modeling rules — routing, gate, and field
    inventory documented. **NOT yet XDM-validated on a live tenant** (no `validated` pill); validate by
    streaming a CEF batch and confirming a rich `xdm.*` count over a wide window.
  
    **Verify** (once the dataset is XDM-bound, wide ≥7d window):
  
        config timeframe = 30d | datamodel dataset = cyberark_epm_raw | sort desc _time | fields xdm.* | limit 20
