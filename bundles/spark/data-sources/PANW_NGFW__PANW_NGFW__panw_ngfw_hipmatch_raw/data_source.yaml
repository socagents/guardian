schema_version: 1
id: panw_ngfw_hipmatch_raw
pack_name: PANW_NGFW
rule_name: PANW_NGFW
dataset_name: panw_ngfw_hipmatch_raw
vendor: Palo Alto Networks
product: NGFW HIP Match
description: Palo Alto Networks NGFW — Host Information Profile (HIP) match events. HIP profiles assert client posture (AV
  running, disk encrypted, etc.) and these events fire when a session's client posture matches a HIP profile.
categories:
- Network Security
- Endpoint Posture
- Compliance
version: 1.0.0
origin: bundle
author: phantom-maintainer (PANW NGFW hand-curated, 2026-05-27)
formats:
- CEF
- SYSLOG
is_rawlog_only: false
fields:
- name: config_version
  type: string
  description: HIP profile configuration version on the client. Maps to `xdm.source.application.version`.
  example: 1.5.2
- name: endpoint_device_name
  type: string
  description: Hostname of the endpoint with the HIP profile evaluated.
  example: bob-thinkpad.corp.example.com
- name: endpoint_os_type
  type: string
  description: 'Endpoint OS — space-separated; first token becomes the os_family discriminator (case-insensitive). Recognized:
    windows, macos/mac, ios/iOS, chromeos, linux, android. Other values pass through.'
  example: Windows 11 Pro
- name: endpoint_serial_number
  type: string
  description: Hardware serial number of the endpoint. Maps to `xdm.source.host.hardware_uuid`.
  example: MJ04ABCDEF12
- name: hip_match_name
  type: string
  description: Name of the matched HIP profile. Maps to `xdm.event.type`.
  example: Corp-AV-Encrypted-Disk
- name: host_id
  type: string
  description: Unique host identifier (preferred — used over source_device_mac if present). Maps to `xdm.source.host.device_id`.
  example: hip-host-abcdef123456
- name: log_source
  type: string
  description: Log source type. Maps to `xdm.observer.type`.
  example: panw-hip
- name: log_source_id
  type: string
  description: Unique log source instance identifier.
  example: 001801000003
- name: log_source_name
  type: string
  description: Friendly log source name. Maps to `xdm.observer.name`.
  example: pa-fw-hq-01
- name: sequence_no
  type: integer
  description: Monotonic event sequence number. Cast to string for `xdm.event.id`.
  example: '111222333'
- name: source_device_mac
  type: string
  description: MAC address — fallback when host_id is null. Routes through both device_id AND mac_addresses if it contains
    ':'.
  example: 00:50:56:aa:bb:03
- name: source_ip
  type: string
  description: Source IPv4 address. Maps to `xdm.source.ipv4` directly (no sentinel check in this MR).
  example: 10.5.5.50
- name: source_ip_v6
  type: string
  description: Source IPv6 address — populates `xdm.source.ipv6` only when contains ':'.
  example: 2001:db8:hip::5
- name: source_user
  type: string
  description: 'Source username (often empty for HIP events — HIP is endpoint-keyed). Note: MR doesn''t read this field; the
    user fields come from `source_user_info_name` below.'
  example: ''
- name: source_user_info_domain
  type: string
  description: User's AD domain (when User-ID mapping was made). Maps to both `xdm.source.user.domain` AND `xdm.source.identity.domain`.
  example: corp.example.com
- name: source_user_info_name
  type: string
  description: Username. Maps to BOTH `xdm.source.user.username` AND `xdm.source.identity.username`.
  example: bob
- name: sub_type
  type: string
  description: HIP event subtype. Maps to `xdm.target.application.name` (unusual mapping — HIP profile types are treated as
    'applications' for downstream querying).
  example: hip-match
validated: false
use_cases:
- Firewall traffic & threat analysis
- Network security monitoring
- Threat hunting
how_to_use: 'Palo Alto Networks NGFW HIP Match logs. Simulate with type=CEF to your XSIAM Broker (UDP syslog).


  Routing: the broker keys on the CEF header — vendor=`panw`, product=`ngfw_cef` (case-sensitive). With the Cortex "PAN-OS"
  content pack installed in your XSIAM tenant, events are split by the `log_type` extension (here `hipmatch`) into the `panw_ngfw_hipmatch_raw`
  dataset, where the PANW modeling rule maps xdm.* fields (source/target IPs + ports, application, rule, zones, bytes/packets,
  action → outcome). Without the PANW pack installed, events land in the catch-all `panw_ngfw_cef_raw` (raw-only).


  Not yet XDM-validated against a live tenant (validated: false) — installing the tenant''s PANW content pack and running
  a saturation check are the prerequisites to promote.'
