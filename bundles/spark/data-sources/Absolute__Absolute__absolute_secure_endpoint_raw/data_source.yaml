how_to_use: |
  ## absolute secure endpoint → Cortex XSIAM (dataset `absolute_secure_endpoint_raw`)
  
    **Routing** — the broker lowercases the CEF/syslog header `vendor`/`product`, replaces
    non-alphanumerics with `_`, and appends `_raw` to choose the dataset (target: `absolute_secure_endpoint_raw`).
  
    **Required CEF header for XSIAM**:
    - **vendor**: `absolute`
    - **product**: `secure_endpoint`
  
    These normalize → `absolute_secure_endpoint_raw`.
  
    **Ingestion shape**: **JSON-native.** The modeling rule reads nested JSON (e.g. `parsed_fields_NewValue -> IpAddress`). CEF/syslog routes + lands and the broker extracts top-level columns; the nested reads need the composite present, so Phantom's worker JSON-stringifies `type: json` composites onto the wire (keep the dotted-leaf fields).
  
    - **Modeling-rule gate**: none — the rule maps every routed row unconditionally.
  
    **XDM mapping**: ~27 fields mapped to the unified data model (`xdm.*`), including: `xdm.event.id`, `xdm.event.operation_sub_type`, `xdm.event.type`, `xdm.source.application.name`, `xdm.source.application.version`, `xdm.source.host.device_id`.
  
    **Operator setup**: This data source has typed-column data that doesn't look like CEF (columns are camelCase API fields, JSON sub-objects, etc.). Most likely arrives via the XSIAM HTTP Collector with a source tag mapped to vendor=`absolute`, product=`secure_endpoint`, or via a vendor-specific XDR connector pull. Phantom can POST JSON to the HTTP collector; the operator must configure the collector's source tag to land events in this dataset.
  
    **Status**: Reverse-engineered 2026-06-04 from the parsing/modeling rules — routing, gate, and field
    inventory documented. **NOT yet XDM-validated on a live tenant** (no `validated` pill); validate by
    streaming a CEF batch and confirming a rich `xdm.*` count over a wide window.
  
    **Verify** (once the dataset is XDM-bound, wide ≥7d window):
  
        config timeframe = 30d | datamodel dataset = absolute_secure_endpoint_raw | sort desc _time | fields xdm.* | limit 20
