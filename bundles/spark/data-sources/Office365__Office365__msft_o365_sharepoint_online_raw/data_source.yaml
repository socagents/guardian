vendor: Microsoft
product: Office365
description: The Office 365 SharePoint Online audit feed (`Workload=SharePoint`) captures file and folder
  operations — uploads, downloads, deletes, shares, permission changes, anonymous-link creation. Each
  event names the user, the affected document path, the operation, and any external-recipient context.
  Simulate SharePoint to validate detections for bulk data exfiltration, anonymous external sharing, or
  permission-elevation abuse.
how_to_use: '## Sending these logs to Cortex XSIAM


  Phantom emits this vendor''s wire format as CEF over UDP — point a data worker

  at your XSIAM broker''s syslog destination and these records flow straight in.

  The schema below describes the vendor''s fields independent of destination, so

  the same records also work for Splunk, Elastic, or any syslog receiver.


  The CEF header''s **vendor** + **product** drive XSIAM''s parsing-rule routing:

  the broker normalizes them to `<lowercased-vendor>_<lowercased-product>_raw`

  (non-alphanumerics -> `_`) and matches your installed parsing rule. The PR/MR

  rules read NAMED COLUMNS, so the transport is invisible to them — pack the

  vendor''s field names as CEF extension `key=value` pairs.


  **Required CEF header for XSIAM**:


  - **vendor**: `msft`

  - **product**: `o365_sharepoint_online`


  Broker derives → `msft_o365_sharepoint_online_raw`.


  Use `msft` / `o365_sharepoint_online` to broker-derive `msft_o365_sharepoint_online_raw`. Also set `Workload=SharePoint`,
  `EventSource=SharePoint` in the raw payload.


  **MR pattern**: Mixed. SharePoint-specific flat `SiteUrl`, `SourceFileName`, `SourceRelativeUrl`.


  **Composite (nested-JSON) fields**: Pack `ModifiedProperties` as JSON-string array of `{Name,OldValue,NewValue}`.


  **Sentinel values**: None.


  **PR filter quirks**: `Workload=SharePoint` discriminator. `EventSource=SharePoint`.


  **Saturation strategy**: Mixed MR — but SharePoint XDM mapping is sparse; ~7 XDM observed.


  **Single-event XDM ceiling**: ~7 XDM single-event.


  **Verify**:


  ```xql

  datamodel dataset = msft_o365_sharepoint_online_raw

  | filter xdm.event.id contains "<your-marker>"

  | fields xdm.*

  | limit 1

  ```'
