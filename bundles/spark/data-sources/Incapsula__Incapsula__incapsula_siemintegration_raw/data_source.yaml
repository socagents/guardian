how_to_use: |
  ## Imperva Incapsula → Cortex XSIAM (dataset `incapsula_siemintegration_raw`)
  
    **Routing** — the broker lowercases the CEF/syslog header `vendor`/`product`, replaces
    non-alphanumerics with `_`, and appends `_raw` to choose the dataset (target: `incapsula_siemintegration_raw`).
  
    **Required CEF header for XSIAM** — the header must normalize to `incapsula_siemintegration`. The marketplace pack's display name `Imperva` / `Incapsula` normalizes to `imperva_incapsula_raw`, a **different dataset** (vendor rename / legacy CEF identity), so use the vendor's actual CEF `deviceVendor`/`deviceProduct` that yields `incapsula_siemintegration` and confirm which dataset the events land in.
  
    **Ingestion shape**: **JSON-native.** The modeling rule reads nested JSON. CEF/syslog routes + lands and the broker extracts top-level columns; the nested reads need the composite present, so Phantom's worker JSON-stringifies `type: json` composites onto the wire (keep the dotted-leaf fields).
  
    - **Modeling-rule gate**: none — the rule maps every routed row unconditionally.
  
    **XDM mapping**: ~44 fields mapped to the unified data model (`xdm.*`), including: `xdm.alert.description`, `xdm.alert.original_alert_id`, `xdm.alert.original_threat_id`, `xdm.alert.original_threat_name`, `xdm.alert.severity`, `xdm.alert.subcategory`.
  
    **Operator setup**: This data source's modeling rule reads CEF-shaped columns (rt, src, dst, spt, dpt, cs1-6, act, etc.). Phantom emits CEF over syslog (`CEF:0|Imperva|Incapsula|...|<extensions>`) — the broker auto-extracts CEF k=v pairs into typed columns matching the CEF dictionary, and the broker routes to this dataset via the CEF header's vendor/product. Usually NO operator-side broker config is required beyond standard CEF ingestion.
  
    **Status**: Reverse-engineered 2026-06-04 from the parsing/modeling rules — routing, gate, and field
    inventory documented. **NOT yet XDM-validated on a live tenant** (no `validated` pill); validate by
    streaming a CEF batch and confirming a rich `xdm.*` count over a wide window.
  
    **Verify** (once the dataset is XDM-bound, wide ≥7d window):
  
        config timeframe = 30d | datamodel dataset = incapsula_siemintegration_raw | sort desc _time | fields xdm.* | limit 20
