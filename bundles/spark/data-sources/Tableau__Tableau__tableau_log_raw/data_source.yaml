fields:
- name: _raw_log
  type: string
  description: Raw log line as the vendor emits it before any parsing or normalization.
    Free-form text; may contain whitespace and punctuation.
  example: '<14>2024-01-15T14:23:01+0000 tableau: tableau=Tableau action=allow user=jdoe'
- name: RequestID
  type: string
  description: Event ID. Free-form text; may contain whitespace and punctuation.
  example: req-1193dec2-f4e
- name: fail
  type: string_short
  description: Event outcome. Short opaque token, typically without whitespace; max
    ~64 chars.
  example: token
- name: hostname
  type: host
  description: Source host hostname. Hostname or fully-qualified domain name (RFC
    1035 dotted labels); no protocol prefix.
  example: host01.example.com
- name: logLevel
  type: string
  description: Alert severity. Free-form text; may contain whitespace and punctuation.
  example: sample_loglevel
- name: message
  type: string
  description: Event description. Free-form text; may contain whitespace and punctuation.
  example: Operation completed successfully.
- name: messageID
  type: string
  description: Messageid. Free-form text; may contain whitespace and punctuation.
  example: msg-711f0d49-902
- name: requestPayload
  type: string
  description: Requestpayload. Free-form text; may contain whitespace and punctuation.
  example: sample_requestpayload
- name: requestStatus
  type: string_short
  description: Event outcome. Short opaque token, typically without whitespace; max
    ~64 chars.
  example: token
- name: requestStatusCode
  type: string
  description: Event operation. Free-form text; may contain whitespace and punctuation.
  example: sample_requeststatuscod
- name: requestType
  type: string
  description: Event operation sub type. Free-form text; may contain whitespace and
    punctuation.
  example: sample_requesttype
- name: serviceName
  type: string
  description: Destination resource name. Free-form text; may contain whitespace and
    punctuation.
  example: sshd
- name: sessionID
  type: string
  description: Session context id. Free-form text; may contain whitespace and punctuation.
  example: sess-358e5943-5fa
- name: tokenPayload1
  type: string
  description: Destination user OU. Free-form text; may contain whitespace and punctuation.
  example: sample_tokenpayload1
- name: tokenPayload2
  type: user
  description: Destination user username. Account name as the vendor reports it —
    login name, UPN, or sAMAccountName depending on the source; no domain prefix unless
    the vendor emits one.
  example: jdoe
use_cases:
- Analytics
how_to_use: |
  ## tableau log → Cortex XSIAM (dataset `tableau_log_raw`)
  
    **Routing** — the broker lowercases the CEF/syslog header `vendor`/`product`, replaces
    non-alphanumerics with `_`, and appends `_raw` to choose the dataset (target: `tableau_log_raw`).
  
    **Required CEF header for XSIAM**:
    - **vendor**: `tableau`
    - **product**: `log`
  
    These normalize → `tableau_log_raw`.
  
    **Ingestion shape**: **Flat / CEF-compatible.** The modeling rule reads flat top-level columns (no nested-JSON access). A CEF event routes in and the broker auto-extracts those columns, so this source maps from Phantom's existing CEF path once the dataset is XDM-bound.
  
    - **Modeling-rule gate**: none — the rule maps every routed row unconditionally.
  
    **XDM mapping**: ~11 fields mapped to the unified data model (`xdm.*`), including: `xdm.alert.severity`, `xdm.event.description`, `xdm.event.id`, `xdm.event.operation`, `xdm.event.operation_sub_type`, `xdm.event.outcome`.
  
    **Operator setup**: This data source uses `_raw_log`-based parsing. Cortex's parsing rule reads from `_raw_log` to populate `_json` (or directly to extract XDM fields), and the modeling rule does `regextract`/`json_extract_scalar` on `_raw_log`. For simulated logs sent from Phantom to land in this dataset, **the operator must add a Broker VM Syslog Applet pre-configured with the matching vendor + product + a dedicated source port**. Without that applet, logs are tagged `unknown/unknown` and routed to `unknown_unknown_raw` — the parsing rule never fires. 
  
  Setup: XSIAM → Settings → Configurations → Data Broker → Applets → Add Applet (Syslog) → Vendor = `tableau`, Product = `log`, Port = (operator picks an unused port, e.g. 1514, 1515, ...). Phantom must then send to that port — current default is 514, which is reserved for the ASA applet.
  
    **Status**: Reverse-engineered 2026-06-04 from the parsing/modeling rules — routing, gate, and field
    inventory documented. **NOT yet XDM-validated on a live tenant** (no `validated` pill); validate by
    streaming a CEF batch and confirming a rich `xdm.*` count over a wide window.
  
    **Verify** (once the dataset is XDM-bound, wide ≥7d window):
  
        config timeframe = 30d | datamodel dataset = tableau_log_raw | sort desc _time | fields xdm.* | limit 20
