fields:
- name: _raw_log
  type: string
  description: Raw log line as the vendor emits it before any parsing or normalization.
    Free-form text; may contain whitespace and punctuation.
  example: '<14>2024-01-15T14:23:01+0000 nasuni: nasunifileservices=NasuniFileServices
    action=allow user=jdoe'
- name: event_type
  type: string
  description: Event type or category as the vendor classifies it. Free-form text;
    may contain whitespace and punctuation.
  example: authentication
- name: is_dir
  type: string
  description: Vendor-emitted field 'Is dir'. Free-form text; may contain whitespace
    and punctuation.
  example: sample_dir
- name: newpath
  type: string
  description: Vendor-emitted field 'Newpath'. Free-form text; may contain whitespace
    and punctuation.
  example: sample_newpath
- name: parsed_fields
  type: json
  description: '— see leaf entries for nested paths. JSON object with keys: event_type,
    filesize, groupname, ipaddr, is_dir, name, newpath, path, pid, proto, resource,
    result, sid, tid, to, to_gid, to_uid, username, volume (each key defined as a
    dotted-path leaf below).'
  example: '{}'
- name: path
  type: file_path
  description: Filesystem path. Absolute filesystem path; vendor-native separator.
  example: /var/log/app.log
- name: result
  type: string_short
  description: Result string emitted by Nasuni. Short opaque token, typically without
    whitespace; max ~64 chars.
  example: success
- name: parsed_fields.event_type
  type: string
  description: Event type or category as the vendor classifies it. Leaf of the 'parsed_fields'
    composite. Free-form text; may contain whitespace and punctuation.
  example: authentication
- name: parsed_fields.filesize
  type: string
  description: Vendor-emitted field 'Parsed fields › filesize'. Leaf of the 'parsed_fields'
    composite. Free-form text; may contain whitespace and punctuation.
  example: sample_filesize
- name: parsed_fields.groupname
  type: string
  description: Vendor-emitted field 'Parsed fields › groupname'. Leaf of the 'parsed_fields'
    composite. Free-form text; may contain whitespace and punctuation.
  example: admins
- name: parsed_fields.ipaddr
  type: ipv4
  description: Vendor-emitted field 'Parsed fields › ipaddr'. Leaf of the 'parsed_fields'
    composite. Dotted-quad IPv4 literal (e.g., 192.0.2.45); no port suffix, no surrounding
    brackets or quotes.
  example: 203.0.113.42
- name: parsed_fields.is_dir
  type: string
  description: Vendor-emitted field 'Parsed fields › is dir'. Leaf of the 'parsed_fields'
    composite. Free-form text; may contain whitespace and punctuation.
  example: sample_dir
- name: parsed_fields.name
  type: string
  description: Human-readable name as displayed by Nasuni. Free-form text; may contain
    whitespace and punctuation.
  example: sample_name
- name: parsed_fields.newpath
  type: string
  description: Vendor-emitted field 'Parsed fields › newpath'. Leaf of the 'parsed_fields'
    composite. Free-form text; may contain whitespace and punctuation.
  example: sample_newpath
- name: parsed_fields.path
  type: file_path
  description: Filesystem path. Absolute filesystem path; vendor-native separator.
  example: /var/log/app.log
- name: parsed_fields.pid
  type: string
  description: Vendor-emitted field 'Parsed fields › pid'. Leaf of the 'parsed_fields'
    composite. Free-form text; may contain whitespace and punctuation.
  example: '4242'
- name: parsed_fields.proto
  type: string
  description: Vendor-emitted field 'Parsed fields › proto'. Leaf of the 'parsed_fields'
    composite. Free-form text; may contain whitespace and punctuation.
  example: tcp
- name: parsed_fields.resource
  type: string
  description: Vendor-emitted field 'Parsed fields › resource'. Leaf of the 'parsed_fields'
    composite. Free-form text; may contain whitespace and punctuation.
  example: sample_resource
- name: parsed_fields.result
  type: string_short
  description: Result string emitted by Nasuni. Short opaque token, typically without
    whitespace; max ~64 chars.
  example: success
- name: parsed_fields.sid
  type: string
  description: Vendor-emitted field 'Parsed fields › sid'. Leaf of the 'parsed_fields'
    composite. Free-form text; may contain whitespace and punctuation.
  example: sample_sid
- name: parsed_fields.tid
  type: string
  description: Vendor-emitted field 'Parsed fields › tid'. Leaf of the 'parsed_fields'
    composite. Free-form text; may contain whitespace and punctuation.
  example: '1024'
- name: parsed_fields.to
  type: file_path
  description: Vendor-emitted field 'Parsed fields › to'. Leaf of the 'parsed_fields'
    composite. Absolute filesystem path; vendor-native separator (forward slash on
