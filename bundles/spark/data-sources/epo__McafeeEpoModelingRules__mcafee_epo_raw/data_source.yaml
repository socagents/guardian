how_to_use: |
  ## McAfee ePO → Cortex XSIAM (dataset `mcafee_epo_raw`)
  
    **Routing** — the broker lowercases the CEF/syslog header `vendor`/`product`, replaces
    non-alphanumerics with `_`, and appends `_raw` to choose the dataset (target: `mcafee_epo_raw`).
  
    **Required CEF header for XSIAM**:
    - **vendor**: `McAfee`
    - **product**: `ePO`
  
    These normalize → `mcafee_epo_raw`.
  
    **Ingestion shape**: **Flat / CEF-compatible.** The modeling rule reads flat top-level columns (no nested-JSON access). A CEF event routes in and the broker auto-extracts those columns, so this source maps from Phantom's existing CEF path once the dataset is XDM-bound.
  
    - **Modeling-rule gate**: `AnalyzerName = "McAfee Endpoint Security" or AnalyzerName = "Data Loss Prevention"` — seed that field with an accepted value or the rule drops the row (XDM stays 0).
  
    **XDM mapping**: ~59 fields mapped to the **Endpoint** data model (`XDM.Endpoint.*`), including: `XDM.Endpoint.Actor.host.device_id`, `XDM.Endpoint.Actor.host.hostname`, `XDM.Endpoint.Observer.product`, `XDM.Endpoint.Target.agent.version`, `XDM.Endpoint.Target.host.ipv4_addresses`, `XDM.Endpoint.Target.host.ipv6_addresses`.
  
    **Operator setup**: This data source has typed-column data that doesn't look like CEF (columns are camelCase API fields, JSON sub-objects, etc.). Most likely arrives via the XSIAM HTTP Collector with a source tag mapped to vendor=`McAfee`, product=`ePO`, or via a vendor-specific XDR connector pull. Phantom can POST JSON to the HTTP collector; the operator must configure the collector's source tag to land events in this dataset.
  
    **Status**: Reverse-engineered 2026-06-04 from the parsing/modeling rules — routing, gate, and field
    inventory documented. **NOT yet XDM-validated on a live tenant** (no `validated` pill); validate by
    streaming a CEF batch and confirming a rich `XDM.Endpoint.*` count over a wide window.
  
    **Verify** (once the dataset is XDM-bound, wide ≥7d window):
  
        config timeframe = 30d | datamodel dataset = mcafee_epo_raw | sort desc _time | fields XDM.Endpoint.* | limit 20
