how_to_use: |
  ## TeamViewer TeamViewer → Cortex XSIAM (dataset `teamviewer_tensor_raw`)
  
    **Routing** — the broker lowercases the CEF/syslog header `vendor`/`product`, replaces
    non-alphanumerics with `_`, and appends `_raw` to choose the dataset (target: `teamviewer_tensor_raw`).
  
    **Required CEF header for XSIAM** — the header must normalize to `teamviewer_tensor`. The marketplace pack's display name `TeamViewer` / `TeamViewer` normalizes to `teamviewer_teamviewer_raw`, a **different dataset** (vendor rename / legacy CEF identity), so use the vendor's actual CEF `deviceVendor`/`deviceProduct` that yields `teamviewer_tensor` and confirm which dataset the events land in.
  
    **Ingestion shape**: **JSON-native.** The modeling rule reads nested JSON (e.g. `$.OldValue`). CEF/syslog routes + lands and the broker extracts top-level columns; the nested reads need the composite present, so Phantom's worker JSON-stringifies `type: json` composites onto the wire (keep the dotted-leaf fields).
  
    - **Modeling-rule gate**: `EventType in ("Policy", "User role", "User profile", "Company administration", "Group management")` — seed that field with an accepted value or the rule drops the row (XDM stays 0).
  
    **XDM mapping**: ~14 fields mapped to the unified data model (`xdm.*`), including: `xdm.event.description`, `xdm.event.operation_sub_type`, `xdm.event.type`, `xdm.network.session_id`, `xdm.source.user.identifier`, `xdm.source.user.username`.
  
    **Operator setup**: This data source has typed-column data that doesn't look like CEF (columns are camelCase API fields, JSON sub-objects, etc.). Most likely arrives via the XSIAM HTTP Collector with a source tag mapped to vendor=`TeamViewer`, product=`TeamViewer`, or via a vendor-specific XDR connector pull. Phantom can POST JSON to the HTTP collector; the operator must configure the collector's source tag to land events in this dataset.
  
    **Status**: Reverse-engineered 2026-06-04 from the parsing/modeling rules — routing, gate, and field
    inventory documented. **NOT yet XDM-validated on a live tenant** (no `validated` pill); validate by
    streaming a CEF batch and confirming a rich `xdm.*` count over a wide window.
  
    **Verify** (once the dataset is XDM-bound, wide ≥7d window):
  
        config timeframe = 30d | datamodel dataset = teamviewer_tensor_raw | sort desc _time | fields xdm.* | limit 20
