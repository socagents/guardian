is_rawlog_only: false
fields:
- name: authorAccountId
  type: string
  description: Vendor-emitted field 'AuthorAccountId'. Free-form text; may contain whitespace and punctuation.
  example: tenant-acme-prod
- name: authorKey
  type: string
  description: Vendor-emitted field 'AuthorKey'. Free-form text; may contain whitespace and punctuation.
  example: operator-visible value
- name: category
  type: string_short
  description: Atlassian's category classifier for the event. Short opaque token, typically without whitespace;
    max ~64 chars.
  example: access_control
- name: changedValues
  type: json
  description: '— see leaf entries for nested paths. JSON object with keys: changedTo (each key defined
    as a dotted-path leaf below).'
  example: '{"key":"value"}'
- name: created
  type: datetime
  description: Vendor-emitted field 'Created'. ISO-8601 timestamp with timezone (e.g., 2026-05-26T14:23:01Z).
  example: '2026-05-26T14:23:01Z'
- name: objectItem
  type: json
  description: '— see leaf entries for nested paths. JSON object with keys: id, name, typeName (each key
    defined as a dotted-path leaf below).'
  example: '{"key":"value"}'
- name: remoteAddress
  type: ipv4
  description: Vendor-emitted field 'RemoteAddress'. Dotted-quad IPv4 literal (e.g., 192.0.2.45); no port
    suffix, no surrounding brackets or quotes.
  example: 203.0.113.42
- name: summary
  type: string
  description: Vendor-emitted field 'Summary'. Free-form text; may contain whitespace and punctuation.
  example: Event recorded by Atlassian.
- name: changedValues.changedTo
  type: string
  description: Vendor-emitted field 'ChangedValues › changedTo'. Leaf of the 'changedValues' composite.
    Free-form text; may contain whitespace and punctuation.
  example: operator-visible value
- name: objectItem.id
  type: string_short
  description: Opaque identifier emitted by Atlassian. Short opaque token, typically without whitespace;
    max ~64 chars.
  example: atl-ea36e6a4
- name: objectItem.name
  type: string
  description: Human-readable name as displayed by Atlassian. Free-form text; may contain whitespace and
    punctuation.
  example: operator-visible value
- name: objectItem.typeName
  type: string
  description: Vendor-emitted field 'ObjectItem › typeName'. Leaf of the 'objectItem' composite. Free-form
    text; may contain whitespace and punctuation.
  example: AuditEvent
