schema_version: 1
id: Jira
pack_name: Jira
rule_name: JiraEventCollector
dataset_name: atlassian_jira_raw
vendor: Atlassian
product: Jira
description: Atlassian Jira logs every issue mutation, workflow transition, comment, and administrative
  action — useful both as a project-tracking audit trail and as an insider-threat signal. Each event carries
  the actor, the affected issue id, the workflow state transition, and any text content (which may contain
  sensitive data). Simulate Jira to validate detections for unauthorized issue creation, data exfiltration
  via attachments, or anomalous admin activity.
how_to_use: '## Sending these logs to Cortex XSIAM


  Phantom emits this vendor''s wire format as CEF over UDP — point a data worker

  at your XSIAM broker''s syslog destination and these records flow straight in.

  The schema below describes the vendor''s fields independent of destination, so

  the same records also work for Splunk, Elastic, or any syslog receiver.


  The CEF header''s **vendor** + **product** drive XSIAM''s parsing-rule routing:

  the broker normalizes them to `<lowercased-vendor>_<lowercased-product>_raw`

  (non-alphanumerics -> `_`) and matches your installed parsing rule. The PR/MR

  rules read NAMED COLUMNS, so the transport is invisible to them — pack the

  vendor''s field names as CEF extension `key=value` pairs.


  **Required CEF header for XSIAM**:


  - **vendor**: `Atlassian`

  - **product**: `Jira`


  Broker derives → `atlassian_jira_raw`.


  Jira''s audit stream is a single dataset — set `category=audit` so the parsing rule routes the event
  here (other categories fall through). The high-signal events are configuration, permission, and workflow
  changes, which carry a `changedValues[]` array of `{fieldName,changedFrom,changedTo}`; include 3+ entries
  so the modeling rule can build the change-chain instead of a bare single-field edit.


  **MR pattern**: Mixed. MR reads `objectItem.id`/`objectItem.parentId`, iterates `changedValues[]`.


  **Composite (nested-JSON) fields**: Pack `objectItem` as JSON-string object; `changedValues` as JSON-string
  array of `{fieldName,changedFrom,changedTo}`.


  **Sentinel values**: None.


  **PR filter quirks**: `category` must be `audit` for the audit dataset route. `created` must be RFC-3339.


  **Saturation strategy**: Single event covers ~8 XDM; field-change events benefit from including 3+ `changedValues`
  entries to populate `xdm.event.original_event_id` chain.


  **Single-event XDM ceiling**: ~8 XDM single-event.


  **Verify**:


  ```xql

  datamodel dataset = atlassian_jira_raw

  | filter xdm.event.id contains "<your-marker>"

  | fields xdm.*

  | limit 1

  ```'
