how_to_use: "## tanium threat response → Cortex XSIAM (dataset `tanium_threat_response_raw`)\n\n  **Routing** — the broker lowercases the CEF/syslog header `vendor`/`product`, replaces\n  non-alphanumerics with `_`, and appends `_raw` to choose the dataset (target: `tanium_threat_response_raw`).\n\n  **Required CEF header for XSIAM**:\n  - **vendor**: `tanium`\n  - **product**: `threat_response`\n\n  These normalize → `tanium_threat_response_raw`.\n\n  **Ingestion shape**: **JSON-native.** The modeling rule reads nested JSON (e.g. `$.Match Details.finding.system_info.platform`). CEF/syslog routes + lands and the broker extracts top-level columns; the nested reads need the composite present, so Phantom's worker JSON-stringifies `type: json` composites onto the wire (keep the dotted-leaf fields).\n\n  - **Modeling-rule gate**: none — the rule maps every routed row unconditionally.\n\n  **XDM mapping**: ~18 fields mapped to the unified data model (`xdm.*`), including: `xdm.alert.description`,\
  \ `xdm.alert.mitre_techniques`, `xdm.alert.name`, `xdm.alert.original_alert_id`, `xdm.alert.original_threat_id`, `xdm.alert.severity`.\n\n  **Operator setup**: This data source uses `_raw_log`-based parsing. Cortex's parsing rule reads from `_raw_log` to populate `_json` (or directly to extract XDM fields), and the modeling rule does `regextract`/`json_extract_scalar` on `_raw_log`. For simulated logs sent from Phantom to land in this dataset, **the operator must add a Broker VM Syslog Applet pre-configured with the matching vendor + product + a dedicated source port**. Without that applet, logs are tagged `unknown/unknown` and routed to `unknown_unknown_raw` — the parsing rule never fires. \n\nSetup: XSIAM → Settings → Configurations → Data Broker → Applets → Add Applet (Syslog) → Vendor = `tanium`, Product = `threat_response`, Port = (operator picks an unused port, e.g. 1514, 1515, ...). Phantom must then send to that port — current default is 514, which is reserved for the ASA applet.\n\
  \n  **Status**: Reverse-engineered 2026-06-04 from the parsing/modeling rules — routing, gate, and field\n  inventory documented. **NOT yet XDM-validated on a live tenant** (no `validated` pill); validate by\n  streaming a CEF batch and confirming a rich `xdm.*` count over a wide window.\n\n  **Verify** (once the dataset is XDM-bound, wide ≥7d window):\n\n      config timeframe = 30d | datamodel dataset = tanium_threat_response_raw | sort desc _time | fields xdm.* | limit 20\n"
