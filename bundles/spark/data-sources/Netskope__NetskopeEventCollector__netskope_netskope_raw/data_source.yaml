how_to_use: |
  ## Sending Netskope logs to Cortex XSIAM

  Required CEF header:

  - vendor: `Netskope`
  - product: `Netskope`

  Broker derives -> `netskope_netskope_raw`.

  Status (2026-06-03, #117): raw lands, XDM does NOT map on a stock tenant.
  Synthetic CEF events route in and the broker auto-extracts the columns
  correctly (e.g. source_log_event=application, the modeling-rule gate value),
  but `datamodel dataset = netskope_netskope_raw` returns ZERO modeled rows over
  a 365-day window — the modeling rule does not fire for the broker-auto-created
  dataset on this tenant.

  To onboard XDM: install the Netskope content pack in the XSIAM tenant so the
  dataset is created XDM-modeled (associated with its modeling rule), then
  re-verify. Until then this source is NOT in the validated set.

  MR pattern (for reference): gated on source_log_event in {page, application,
  alert, audit, network}; the application branch is richest. Seed
  observables_dict={"source_log_event": ["application"]} once onboarded.
