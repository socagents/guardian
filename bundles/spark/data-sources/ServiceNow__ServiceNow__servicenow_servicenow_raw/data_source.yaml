schema_version: 1
id: ServiceNow
pack_name: ServiceNow
rule_name: ServiceNow
dataset_name: servicenow_servicenow_raw
vendor: ServiceNow
product: ServiceNow
description: ServiceNow ITSM is a workflow + service-management platform that captures every incident,
  change request, problem, and CMDB mutation across an organization's IT processes. Each record carries
  the actor (caller / assignee), the affected CI (configuration item), the workflow state, approvals,
  and free-form work notes. Simulate ServiceNow to validate detections for unauthorized incident manipulation,
  ticket-based social engineering, or anomalous change approvals.
how_to_use: '## Sending these logs to Cortex XSIAM


  Phantom emits this vendor''s wire format as CEF over UDP — point a data worker

  at your XSIAM broker''s syslog destination and these records flow straight in.

  The schema below describes the vendor''s fields independent of destination, so

  the same records also work for Splunk, Elastic, or any syslog receiver.


  The CEF header''s **vendor** + **product** drive XSIAM''s parsing-rule routing:

  the broker normalizes them to `<lowercased-vendor>_<lowercased-product>_raw`

  (non-alphanumerics -> `_`) and matches your installed parsing rule. The PR/MR

  rules read NAMED COLUMNS, so the transport is invisible to them — pack the

  vendor''s field names as CEF extension `key=value` pairs.


  **Required CEF header for XSIAM**:


  - **vendor**: `ServiceNow`

  - **product**: `ServiceNow`


  Broker derives → `servicenow_servicenow_raw`.


  ServiceNow emits one audit `record` per incident, change-request, or CMDB mutation — the high-signal
  events are field edits and approvals carried in the nested `record.changes[]` array. The gotcha that
  silently drops events: `sys_created_on` must be ServiceNow''s native space-separated `YYYY-MM-DD HH:MM:SS`,
  not RFC-3339.


  **MR pattern**: Heavy-nested. MR consumes audit `record` objects with deeply-nested `changes[].fieldname`/`changes[].old`/`changes[].new`.


  **Composite (nested-JSON) fields**: Pack `record` as JSON-string object with `sys_id`, `sys_class_name`,
  `assigned_to`, `changes[]`. The MR''s array iteration over `changes[]` survives CEF-extension wrapping
  but only the first 3-4 array entries reliably populate XDM.


  **Sentinel values**: None.


  **PR filter quirks**: `sys_created_on` must be `YYYY-MM-DD HH:MM:SS` (NOT RFC-3339 — ServiceNow''s native
  format).


  **Saturation strategy**: Heavy-nested — ~5-8 XDM ceiling. Pack the most-important 3 audit changes only;
  later entries silently drop.


  **Single-event XDM ceiling**: ~5-8 XDM single-event (heavy-nested).


  **Verify**:


  ```xql

  datamodel dataset = servicenow_servicenow_raw

  | filter xdm.event.id contains "<your-marker>"

  | fields xdm.*

  | limit 1

  ```'
