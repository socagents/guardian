is_rawlog_only: false
fields:
- name: __time__
  type: integer
  description: Vendor-emitted field '  time  '. Signed decimal integer; bare digits, optional leading
    minus.
  example: '42'
- name: event_acsregion
  type: string
  description: Vendor-emitted field 'Event acsregion'. Free-form text; may contain whitespace and punctuation.
  example: operator-visible value
- name: event_eventid
  type: string
  description: Unique identifier for this event as assigned by the vendor. Free-form text; may contain
    whitespace and punctuation.
  example: evt-520d02e3
- name: event_eventname
  type: string
  description: Vendor-emitted field 'Event eventname'. Free-form text; may contain whitespace and punctuation.
  example: login
- name: event_eventtype
  type: string
  description: Modeling-rule GATE — must equal one of "ApiCall", "ConsoleOperation", "AliyunServiceEvent",
    "PasswordReset" for XDM to map. ActionTrail event type (ConsoleOperation/ApiCall/...). Free-form text;
    may contain whitespace and punctuation.
  example: ApiCall
- name: event_resourcename
  type: string
  description: Vendor-emitted field 'Event resourcename'. Free-form text; may contain whitespace and punctuation.
  example: operator-visible value
- name: event_resourcetype
  type: string
  description: Vendor-emitted field 'Event resourcetype'. Free-form text; may contain whitespace and punctuation.
  example: AuditEvent
- name: event_sourceipaddress
  type: ipv4
  description: Vendor-emitted field 'Event sourceipaddress'. Dotted-quad IPv4 literal (e.g., 192.0.2.45);
    no port suffix, no surrounding brackets or quotes.
  example: 203.0.113.42
- name: event_useridentity_principalid
  type: string
  description: Vendor-emitted field 'Event useridentity principalid'. Free-form text; may contain whitespace
    and punctuation.
  example: AIDAJDPLRKLG7UEXAMPLE
- name: event_useridentity_type
  type: string
  description: User identity type (root/RAM/service). Free-form text; may contain whitespace and punctuation.
  example: authentication
- name: event_useridentity_username
  type: user
  description: Account name (login name or UPN) of the user. Account name as the vendor reports it — login
    name, UPN, or sAMAccountName; no domain prefix unless vendor emits one.
  example: jsmith
use_cases:
- Cloud
validated: true
