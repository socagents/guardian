schema_version: 1
id: AlibabaActionTrail
pack_name: AlibabaActionTrail
rule_name: AlibabaModelingRules
dataset_name: alibaba_action_trail_raw
vendor: Alibaba
product: AlibabaActionTrail
description: Alibaba Cloud ActionTrail records management-plane API calls across an Alibaba Cloud account
  — the rough equivalent of AWS CloudTrail. Each row captures the API name, the caller's RAM identity,
  the source IP, the target resource id, the request and response shape, and the outcome. Simulate this
  to validate detections for unauthorized resource creation, privilege escalation in RAM policies, or
  large-scale data export from object storage.
how_to_use: '## Sending these logs to Cortex XSIAM


  Phantom emits this vendor''s wire format as CEF over UDP — point a data worker

  at your XSIAM broker''s syslog destination and these records flow straight in.

  The schema below describes the vendor''s fields independent of destination, so

  the same records also work for Splunk, Elastic, or any syslog receiver.


  The CEF header''s **vendor** + **product** drive XSIAM''s parsing-rule routing:

  the broker normalizes them to `<lowercased-vendor>_<lowercased-product>_raw`

  (non-alphanumerics -> `_`) and matches your installed parsing rule. The PR/MR

  rules read NAMED COLUMNS, so the transport is invisible to them — pack the

  vendor''s field names as CEF extension `key=value` pairs.


  **Required CEF header for XSIAM**:


  - **vendor**: `alibaba`

  - **product**: `action_trail`


  Broker derives → `alibaba_action_trail_raw`.


  Use the lowercased, underscore-separated form (`alibaba` / `action_trail`) rather than the marketing
  display name (`Alibaba ActionTrail`) — the broker normalizes non-alphanumerics to `_`, so display-name
  input would derive `alibaba_actiontrail_alibaba_actiontrail_raw` which doesn''t match the operator''s
  PR.


  **MR pattern**: Flat-field. MR reads top-level CEF extensions directly (`event_eventtype`, `event_principalid`,
  `event_apiVersion`, `event_eventsource`, etc.).


  **Composite (nested-JSON) fields**: Largely flat. `userIdentity` carries a JSON-string with `principalId`/`accessKeyId`
  but the MR mostly consumes flat fields.


  **Sentinel values**: None.


  **PR filter quirks**: Send timestamp as `eventTime=<RFC3339>` and `event_eventTime=<RFC3339>` — both
  fields are referenced in the PR''s filter regex.


  **Saturation strategy**: Single event fits comfortably under MTU. PoC validated 7 XDM in one event.


  **Single-event XDM ceiling**: ~7 XDM single-event (flat MR but only 7 distinct XDM mappings exist).


  **Verify**:


  ```xql

  datamodel dataset = alibaba_action_trail_raw

  | filter xdm.event.id contains "<your-marker>"

  | fields xdm.*

  | limit 1

  ```


  ### Make it map to XDM


  The active `alibaba_action_trail_raw` modeling rule (v1.3) only runs when `event_eventtype`
  is one of `"ApiCall"`, `"ConsoleOperation"`, `"AliyunServiceEvent"`, `"PasswordReset"`. When
  simulating, pass `observables_dict={"event_eventtype": "ApiCall"}` to `phantom_create_data_worker`
  so the gate matches. The rule then populates core XDM: `xdm.event.type` <- `event_eventtype`,
  `xdm.event.id` <- `event_eventid`, `xdm.event.operation` <- `event_eventname`, `xdm.source.ipv4`
  <- `event_sourceipaddress`, `xdm.source.user.username` <- `event_useridentity_username`,
  `xdm.source.user.identifier` <- `event_useridentity_principalid`, `xdm.target.cloud.region` <-
  `event_acsregion`, and `xdm.target.resource.name`/`xdm.target.resource.type` <- `event_resourcename`/`event_resourcetype`.


  **Notes**: PoC harness: `scripts/maintainer/e2e_json_as_cef_alibaba_proof.py`.'
