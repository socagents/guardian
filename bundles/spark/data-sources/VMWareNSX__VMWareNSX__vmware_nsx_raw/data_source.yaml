- name: log_level
  type: string
  description: Event log level. Free-form text; may contain whitespace and punctuation.
  example: info
- name: operation_status
  type: string_short
  description: Event outcome. Short opaque token, typically without whitespace; max
    ~64 chars.
  example: token
- name: pid
  type: string
  description: Source process PID. Free-form text; may contain whitespace and punctuation.
