  example: 192.0.2.45
- name: parsed_fields.USER
  type: user
  description: User account associated with the event. Account name as the vendor
    reports it — login name, UPN, or sAMAccountName; no domain prefix unless vendor
    emits one.
  example: jsmith
- name: parsed_fields.UserName
  type: user
  description: Account name (login name or UPN) of the user. Account name as the vendor
    reports it — login name, UPN, or sAMAccountName; no domain prefix unless vendor
    emits one.
  example: jsmith
- name: parsed_fields.audit
  type: string
  description: Vendor-emitted field 'Parsed fields › audit'. Leaf of the 'parsed_fields'
