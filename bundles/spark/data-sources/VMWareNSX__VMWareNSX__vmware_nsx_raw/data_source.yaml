- name: parsed_fields.type
  type: string_short
  description: Type/category classifier emitted by VMware. Short opaque token, typically
    without whitespace; max ~64 chars.
  example: authentication
- name: parsed_fields.username
  type: user
  description: Account name (login name or UPN) of the user. Account name as the vendor
    reports it — login name, UPN, or sAMAccountName; no domain prefix unless vendor
    emits one.
  example: jsmith
- name: COMMAND
  type: string
  description: Source process command line. Free-form text; may contain whitespace
    and punctuation.
  example: /usr/bin/curl https://example.com/
- name: Operation
  type: string
  description: Event operation sub type. Free-form text; may contain whitespace and
    punctuation.
  example: create
- name: PWD
  type: string
  description: Source process executable directory. Free-form text; may contain whitespace
    and punctuation.
  example: sample_pwd
- name: auditlogs
  type: string
  description: Event type. Free-form text; may contain whitespace and punctuation.
