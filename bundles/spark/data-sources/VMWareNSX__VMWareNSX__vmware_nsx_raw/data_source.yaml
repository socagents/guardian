    user=jdoe'
- name: parsed_fields
  type: json
  description: 'Source process executable directory. JSON object with keys: COMMAND,
    Operation, Operationstatus, PWD, Src, USER, UserName, audit, component, description,
    hostname, level, node, pid, type, username (each key defined as a dotted-path
    leaf below).'
  example: '{}'
- name: parsed_fields.COMMAND
  type: string
  description: Vendor-emitted field 'Parsed fields › COMMAND'. Leaf of the 'parsed_fields'
    composite. Free-form text; may contain whitespace and punctuation.
  example: /usr/bin/curl https://example.com/
- name: parsed_fields.Operation
  type: string
  description: Vendor-emitted field 'Parsed fields › Operation'. Leaf of the 'parsed_fields'
    composite. Free-form text; may contain whitespace and punctuation.
  example: create
- name: parsed_fields.Operationstatus
  type: string
  description: Vendor-emitted field 'Parsed fields › Operationstatus'. Leaf of the
    'parsed_fields' composite. Free-form text; may contain whitespace and punctuation.
  example: sample_operationstatus
- name: parsed_fields.PWD
  type: string
  description: Vendor-emitted field 'Parsed fields › PWD'. Leaf of the 'parsed_fields'
    composite. Free-form text; may contain whitespace and punctuation.
  example: sample_pwd
- name: parsed_fields.Src
  type: string
