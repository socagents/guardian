fields:
- name: act
  type: string_short
  description: CEF action — what Forcepoint did with the event (allow/block/quarantine/etc.).
    Short opaque token, typically without whitespace; max ~64 chars.
  example: token_value
- name: app
  type: string_short
  description: Application name emitted by Forcepoint. Short opaque token, typically
    without whitespace; max ~64 chars.
  example: token_value
- name: cefName
  type: string_short
  description: CEF event name — short human-readable label for the event class. Short
    opaque token, typically without whitespace; max ~64 chars.
  example: token_value
- name: cefSeverity
  type: integer
  description: CEF severity score (0-10) as classified by Forcepoint. Signed decimal
    integer; bare digits, optional leading minus.
  example: '42'
- name: cn1
  type: integer
  description: Vendor-emitted field 'Cn1'. Signed decimal integer; bare digits, optional
    leading minus.
  example: '42'
- name: cn2
  type: integer
  description: Vendor-emitted field 'Cn2'. Signed decimal integer; bare digits, optional
    leading minus.
  example: '42'
- name: cs1
  type: string
  description: Vendor-emitted field 'Cs1'. Free-form text; may contain whitespace
    and punctuation.
  example: custom_value
- name: cs2
  type: string
  description: Vendor-emitted field 'Cs2'. Free-form text; may contain whitespace
    and punctuation.
  example: custom_value
- name: cs3
  type: string
  description: Vendor-emitted field 'Cs3'. Free-form text; may contain whitespace
    and punctuation.
  example: custom_value
- name: dhost
  type: host
  description: CEF destination host — hostname or FQDN of the target endpoint. Hostname
    or fully-qualified domain name (RFC 1035 dotted labels); no protocol prefix.
  example: host.example.com
- name: dpt
  type: integer_port
  description: CEF destination port — TCP/UDP port on the target side. Unsigned integer
    0-65535 representing a TCP/UDP port; bare digits, no quotes.
  example: '42'
- name: dst
  type: ipv4
  description: CEF destination IP — IPv4/IPv6 address of the target endpoint. Dotted-quad
    IPv4 literal (e.g., 192.0.2.45); no port suffix, no surrounding brackets or quotes.
  example: 203.0.113.42
- name: dvc
  type: ipv4
  description: Vendor-emitted field 'Dvc'. Dotted-quad IPv4 literal (e.g., 192.0.2.45);
    no port suffix, no surrounding brackets or quotes.
  example: 203.0.113.42
- name: in
  type: integer
  description: Vendor-emitted field 'In'. Signed decimal integer; bare digits, optional
    leading minus.
  example: '42'
- name: logRecordSource
  type: string
  description: Vendor-emitted field 'LogRecordSource'. Free-form text; may contain
    whitespace and punctuation.
  example: sample_logrecordsource
- name: loginID
  type: string
  description: Vendor-emitted field 'LoginID'. Free-form text; may contain whitespace
    and punctuation.
  example: sample_loginid
- name: out
  type: integer
  description: Vendor-emitted field 'Out'. Signed decimal integer; bare digits, optional
    leading minus.
  example: '42'
- name: reason
  type: string
  description: Reason/explanation accompanying the action or outcome. Free-form text;
    may contain whitespace and punctuation.
  example: normal_operation
- name: request
  type: url
  description: HTTP request line or full request payload as captured by Forcepoint.
    Full URL with scheme (http/https/ftp); percent-encoded if non-ASCII.
  example: https://example.com/path
- name: requestClientApplication
  type: string
  description: Vendor-emitted field 'RequestClientApplication'. Free-form text; may
    contain whitespace and punctuation.
  example: sample_requestclientapp
- name: requestMethod
  type: string_short
  description: HTTP request method (GET/POST/PUT/DELETE/etc.). Short opaque token,
    typically without whitespace; max ~64 chars.
  example: token_value
- name: spt
  type: integer_port
  description: CEF source port — TCP/UDP port on the source side. Unsigned integer
    0-65535 representing a TCP/UDP port; bare digits, no quotes.
  example: '42'
- name: src
  type: ipv4
  description: CEF source IP — IPv4/IPv6 address of the source endpoint. Dotted-quad
    IPv4 literal (e.g., 192.0.2.45); no port suffix, no surrounding brackets or quotes.
  example: 203.0.113.42
- name: suser
  type: user
  description: CEF source user — username of the actor initiating the event. Account
    name as the vendor reports it — login name, UPN, or sAMAccountName; no domain
    prefix unless vendor emits one.
  example: jsmith
use_cases:
- DLP
- Proxy
how_to_use: |
  ## Forcepoint ForcepointSWG → Cortex XSIAM (dataset `forcepoint_security_raw`)
  
    **Routing** — the broker lowercases the CEF/syslog header `vendor`/`product`, replaces
    non-alphanumerics with `_`, and appends `_raw` to choose the dataset (target: `forcepoint_security_raw`).
  
    **Required CEF header for XSIAM** — the header must normalize to `forcepoint_security`. The marketplace pack's display name `Forcepoint` / `ForcepointSWG` normalizes to `forcepoint_forcepointswg_raw`, a **different dataset** (vendor rename / legacy CEF identity), so use the vendor's actual CEF `deviceVendor`/`deviceProduct` that yields `forcepoint_security` and confirm which dataset the events land in.
  
    **Ingestion shape**: **Flat / CEF-compatible.** The modeling rule reads flat top-level columns (no nested-JSON access). A CEF event routes in and the broker auto-extracts those columns, so this source maps from Phantom's existing CEF path once the dataset is XDM-bound.
  
    - **Modeling-rule gate**: none — the rule maps every routed row unconditionally.
  
    **XDM mapping**: ~24 fields mapped to the unified data model (`xdm.*`), including: `xdm.alert.severity`, `xdm.event.duration`, `xdm.event.operation_sub_type`, `xdm.event.outcome_reason`, `xdm.event.type`, `xdm.intermediate.ipv4`.
  
    **Operator setup**: This data source's modeling rule reads CEF-shaped columns (rt, src, dst, spt, dpt, cs1-6, act, etc.). Phantom emits CEF over syslog (`CEF:0|Forcepoint|ForcepointSWG|...|<extensions>`) — the broker auto-extracts CEF k=v pairs into typed columns matching the CEF dictionary, and the broker routes to this dataset via the CEF header's vendor/product. Usually NO operator-side broker config is required beyond standard CEF ingestion.
  
    **Status**: Reverse-engineered 2026-06-04 from the parsing/modeling rules — routing, gate, and field
    inventory documented. **NOT yet XDM-validated on a live tenant** (no `validated` pill); validate by
    streaming a CEF batch and confirming a rich `xdm.*` count over a wide window.
  
    **Verify** (once the dataset is XDM-bound, wide ≥7d window):
  
        config timeframe = 30d | datamodel dataset = forcepoint_security_raw | sort desc _time | fields xdm.* | limit 20
