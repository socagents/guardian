schema_version: 1
id: AMP
pack_name: AMP
rule_name: AMP
dataset_name: cisco_secure_endpoint_raw
vendor: Cisco
product: AMP
description: Cisco Secure Endpoint (formerly AMP for Endpoints) — cloud-managed endpoint
  detection and response. Surfaces malware detections, behavioral alerts, IoC matches,
  and threat-hunting incidents from the Cisco AMP cloud.
categories:
- Endpoint
version: 2.1.16
origin: bundle
author: phantom-bundle
uploaded_by: null
created_at: '2026-05-23T09:26:17Z'
updated_at: '2026-05-26T00:00:00Z'
logo:
  mime_type: image/svg+xml
  data: 
  source: phantom-bundle (v0.13.0 migration)
  license: MIT
  fidelity: branded
formats:
- SYSLOG
- CEF
- JSON
is_rawlog_only: false
fields:
- name: cloud_ioc
  type: json
  description: 'Cloud Indicator-of-Compromise match record. Carries description. JSON
    object with keys: description (each key defined as a dotted-path leaf below).'
  example: '{"description":"IoC matched: known C2 server domain in DNS resolution"}'
- name: command_line
  type: json
  description: 'Command-line metadata object for the process tied to the event. Carries
    arguments. JSON object with keys: arguments (each key defined as a dotted-path
    leaf below).'
  example: '{"arguments":"powershell.exe -NoProfile -ExecutionPolicy Bypass -EncodedCommand
    JABzAD0AJwBoAGUAbABsAG8AJwA="}'
- name: computer
  type: json
  description: 'Endpoint host metadata object. Carries hostname ( ), user ( ), external_ip,
    and network_addresses (array of {ip, mac} pairs feeding / ipv6_addresses / mac_addresses).
    JSON array; each element is an object with keys: external_ip, hostname, network_addresses,
    user (each key defined as a dotted-path leaf below).'
  example: '{"hostname":"WIN10-DESKTOP-01","user":"CORP\\jsmith","external_ip":"203.0.113.42","network_addresses":[{"ip":"10.0.1.50","mac":"00:1A:2B:3C:4D:5E"},{"ip":"192.168.1.100","mac":"00:1A:2B:3C:4D:5F"}]}'
- name: connector_guid
  type: string
  description: Unique identifier of the AMP connector (endpoint agent) that reported
    the event. Free-form text; may contain whitespace and punctuation.
  example: 7a8b9c0d-1e2f-3a4b-5c6d-7e8f9a0b1c2d
- name: detection
  type: string
  description: Human-readable alert name (e.g. malware family or detection-rule label).
    (falls back to threat_hunting.incident_title). Free-form text; may contain whitespace
    and punctuation.
  example: W32.GenericKD.MaliciousScript
- name: detection_id
  type: string
  description: Original threat identifier assigned by Cisco AMP. Used as; falls back
    to threat_hunting.incident_hunt_guid when null. Free-form text; may contain whitespace
    and punctuation.
  example: detect-9f8c-001a2b3c
- name: error
  type: json
  description: 'Error-context object surfaced when an action against the threat failed.
    Carries description. JSON object with keys: description (each key defined as a
    dotted-path leaf below).'
  example: '{"description":"Quarantine attempt failed: file in use by another process"}'
- name: event_type
  type: string
  description: Cisco AMP event-type label describing what happened. The modeling rule
    classifies by looking for the substring "fail" or "succ" (case-insensitive) in
    this value. Free-form text; may contain whitespace and punctuation.
  example: Threat Detected
- name: file
  type: json
  description: 'File-detection metadata object. Carries file_name, file_path, disposition
    (Malicious / Clean / Unknown), nested identity (md5, sha256) for hashes, and nested
    parent object (process_id, file_name, identity.{md5,sha256}) for the process that
    wrote the file. * and.*. JSON object with keys: disposition, file_name, file_path,
    identity, parent (each key defined as a dotted-path leaf below).'
  example: '{"file_name":"malware.exe","file_path":"C:\\Users\\jsmith\\Downloads\\malware.exe","disposition":"Malicious","identity":{"md5":"5d41402abc4b2a76b9719d911017c592","sha256":"e3b0c44298fc1c149afbf4c8996fb92427ae41e4649b934ca495991b7852b855"},"parent":{"process_id":4528,"file_name":"explorer.exe","identity":{"md5":"abc123def4567890abc123def4567890","sha256":"1234567890abcdef1234567890abcdef1234567890abcdef1234567890abcdef"}}}'
- name: id
  type: integer
  description: Numeric event identifier from the Cisco AMP cloud. (coerced to string
    in the modeling rule via to_string). Signed decimal integer; bare digits, optional
    leading minus.
  example: '553648130'
- name: network_info
  type: json
  description: 'Network-context object for network-flow events. Carries remote_ip,
    remote_port, nfm.protocol (network-flow-monitor protocol * constants), dirty_url,
    and a nested parent object identical in shape to file.parent (process_id, file_name,
    identity.md5, identity.sha256) — for the process that opened the connection. JSON
    object with keys: dirty_url, nfm, parent, remote_ip, remote_port (each key defined
    as a dotted-path leaf below).'
  example: '{"remote_ip":"198.51.100.7","remote_port":"443","nfm":{"protocol":"TCP"},"dirty_url":"https://malicious.example.com/payload.bin","parent":{"process_id":4528,"file_name":"chrome.exe","identity":{"md5":"def456abc789def456abc789def456ab","sha256":"abcdef1234567890abcdef1234567890abcdef1234567890abcdef1234567890"}}}'
- name: severity
  type: string
  description: Alert severity classification (Critical / High / Medium / Low / Informational).
    Free-form text; may contain whitespace and punctuation.
  example: High
- name: tactics
  type: json
  is_array: true
  description: Array of MITRE ATT&CK tactic labels associated with the detection.
    The modeling rule applies arraymap + trim to strip surrounding quotes. JSON object
    or array; structured payload — see dotted-path leaves below for full shape.
  example: '["Initial Access","Execution"]'
- name: techniques
  type: json
  is_array: true
  description: Array of MITRE ATT&CK technique IDs (with optional names) associated
    with the detection. arraymap + trim normalizes each element. JSON object or array;
    structured payload — see dotted-path leaves below for full shape.
  example: '["T1059.001","T1566.001"]'
- name: threat_hunting
  type: json
  description: 'Threat-hunting incident metadata object. Carries incident_hunt_guid
    (alt source for ), incident_title (alt source for ), and incident_summary. Populated
    when the event was sourced from a threat-hunting incident rather than a real-time
    detection. JSON object with keys: incident_hunt_guid, incident_summary, incident_title
    (each key defined as a dotted-path leaf below).'
  example: '{"incident_hunt_guid":"hunt-001a2b3c","incident_title":"Suspicious PowerShell
    activity on engineering hosts","incident_summary":"Multiple credential-dumping
    attempts observed across 4 endpoints over 2-hour window"}'
- name: vulnerabilities
  type: json
  is_array: true
  description: Array of vulnerability records (CVEs / CVSS / advisory references)
    the endpoint is exposed to. -defined; typically an object with cve, name, score,
    references. JSON object or array; structured payload — see dotted-path leaves
    below for full shape.
  example: '[{"cve":"CVE-2024-1234","name":"Remote Code Execution in OpenSSL","score":9.8,"references":["https://nvd.nist.gov/vuln/detail/CVE-2024-1234"]}]'
- name: cloud_ioc.description
  type: string_long
  description: Free-form human-readable description from Cisco. Free-form text; may
    span multiple lines or contain large payloads.
  example: Event recorded by Cisco.
- name: command_line.arguments
  type: string
  description: Vendor-emitted field 'Command line › arguments'. Leaf of the 'command_line'
    composite. Free-form text; may contain whitespace and punctuation.
  example: --config /etc/app.conf
- name: computer.external_ip
  type: string
  description: Vendor-emitted field 'Computer › external ip'. Leaf of the 'computer'
    composite. Free-form text; may contain whitespace and punctuation.
  example: 192.0.2.45
- name: computer.hostname
  type: host
  description: Hostname or FQDN as reported by Cisco. Hostname or fully-qualified
    domain name (RFC 1035 dotted labels); no protocol prefix.
  example: host.example.com
- name: computer.network_addresses
  type: json
  is_array: true
  description: — see leaf entries for per-element fields. JSON object or array; structured
    payload — see dotted-path leaves below for full shape.
  example: '{}'
- name: computer.network_addresses[].ip
  type: string
  description: Vendor-emitted field 'Computer › network addresses[] › ip'. Leaf of
    the 'computer' composite. Free-form text; may contain whitespace and punctuation.
  example: 192.0.2.45
- name: computer.network_addresses[].mac
  type: mac
  description: MAC address (colon-separated lowercase hex). MAC address in colon-separated
    lowercase hex (aa:bb:cc:dd:ee:ff).
  example: 00:1A:2B:3C:4D:5E
- name: computer.user
  type: user
  description: User account associated with the event. Account name as the vendor
    reports it — login name, UPN, or sAMAccountName; no domain prefix unless vendor
    emits one.
  example: jsmith
- name: error.description
  type: string_long
  description: Free-form human-readable description from Cisco. Free-form text; may
    span multiple lines or contain large payloads.
  example: Event recorded by Cisco.
- name: file.disposition
  type: string
  description: Vendor-emitted field 'File › disposition'. Leaf of the 'file' composite.
    Free-form text; may contain whitespace and punctuation.
  example: clean
- name: file.file_name
  type: file_path
  description: File or process name reported by the vendor. Leaf of the 'file' composite.
    Absolute filesystem path; vendor-native separator (forward slash on POSIX, backslash
    on Windows).
  example: /var/log/example.log
- name: file.file_path
  type: file_path
  description: Filesystem path reported by the vendor. Leaf of the 'file' composite.
    Absolute filesystem path; vendor-native separator (forward slash on POSIX, backslash
    on Windows).
  example: /var/log/example.log
- name: file.identity.md5
  type: hash_md5
  description: MD5 digest as reported by the vendor. Leaf of the 'file' composite.
    32-character lowercase hex MD5 digest.
  example: 5d41402abc4b2a76b9719d911017c592
- name: file.identity.sha256
  type: hash_sha256
  description: SHA-256 digest as reported by the vendor. Leaf of the 'file' composite.
    64-character lowercase hex SHA-256 digest.
  example: e3b0c44298fc1c149afbf4c8996fb92427ae41e4649b934ca495991b7852b855
- name: file.parent.file_name
  type: file_path
  description: File or process name reported by the vendor. Leaf of the 'file' composite.
    Absolute filesystem path; vendor-native separator (forward slash on POSIX, backslash
    on Windows).
  example: /var/log/example.log
- name: file.parent.identity.md5
  type: hash_md5
  description: MD5 digest as reported by the vendor. Leaf of the 'file' composite.
    32-character lowercase hex MD5 digest.
  example: 5d41402abc4b2a76b9719d911017c592
- name: file.parent.identity.sha256
  type: hash_sha256
  description: SHA-256 digest as reported by the vendor. Leaf of the 'file' composite.
    64-character lowercase hex SHA-256 digest.
  example: e3b0c44298fc1c149afbf4c8996fb92427ae41e4649b934ca495991b7852b855
- name: file.parent.process_id
  type: string_short
  description: Opaque identifier emitted by Cisco. Short opaque token, typically without
    whitespace; max ~64 chars.
  example: cis-d6c308ef
- name: network_info.dirty_url
  type: url
  description: Full URL with scheme — as Cisco captured it. Full URL with scheme (http/https/ftp);
    percent-encoded if non-ASCII.
  example: https://example.com/path
- name: network_info.nfm.protocol
  type: string
  description: Vendor-emitted field 'Network info › nfm › protocol'. Leaf of the 'network_info'
    composite. Free-form text; may contain whitespace and punctuation.
  example: tcp
- name: network_info.parent.file_name
  type: file_path
  description: File or process name reported by the vendor. Leaf of the 'network_info'
    composite. Absolute filesystem path; vendor-native separator (forward slash on
    POSIX, backslash on Windows).
  example: /var/log/example.log
- name: network_info.parent.identity.md5
  type: hash_md5
  description: MD5 digest as reported by the vendor. Leaf of the 'network_info' composite.
    32-character lowercase hex MD5 digest.
  example: 5d41402abc4b2a76b9719d911017c592
- name: network_info.parent.identity.sha256
  type: hash_sha256
  description: SHA-256 digest as reported by the vendor. Leaf of the 'network_info'
    composite. 64-character lowercase hex SHA-256 digest.
  example: e3b0c44298fc1c149afbf4c8996fb92427ae41e4649b934ca495991b7852b855
- name: network_info.parent.process_id
  type: string_short
  description: Opaque identifier emitted by Cisco. Short opaque token, typically without
    whitespace; max ~64 chars.
  example: cis-8e3ff9a9
- name: network_info.remote_ip
  type: string
  description: Vendor-emitted field 'Network info › remote ip'. Leaf of the 'network_info'
    composite. Free-form text; may contain whitespace and punctuation.
  example: 192.0.2.45
- name: network_info.remote_port
  type: integer_port
  description: TCP/UDP port. Unsigned integer 0-65535 representing a TCP/UDP port;
    bare digits, no quotes.
  example: '443'
- name: threat_hunting.incident_hunt_guid
  type: string_short
  description: Unique identifier — assigned by Cisco per event. Short opaque token,
    typically without whitespace; max ~64 chars.
  example: 59284943-dddb-5194-bdd0-83acefcb01b6
- name: threat_hunting.incident_summary
  type: string
  description: Vendor-emitted field 'Threat hunting › incident summary'. Leaf of the
    'threat_hunting' composite. Free-form text; may contain whitespace and punctuation.
  example: Event recorded by Cisco.
- name: threat_hunting.incident_title
  type: string
  description: Title/headline of the event or item. Free-form text; may contain whitespace
    and punctuation.
  example: Sample subject line
use_cases:
- Network
- Firewall
- EDR
how_to_use: |
  ## Cisco AMP → Cortex XSIAM (dataset `cisco_secure_endpoint_raw`)
  
    **Routing** — the broker lowercases the CEF/syslog header `vendor`/`product`, replaces
    non-alphanumerics with `_`, and appends `_raw` to choose the dataset (target: `cisco_secure_endpoint_raw`).
  
    **Required CEF header for XSIAM** — the header must normalize to `cisco_secure_endpoint`. The marketplace pack's display name `Cisco` / `AMP` normalizes to `cisco_amp_raw`, a **different dataset** (vendor rename / legacy CEF identity), so use the vendor's actual CEF `deviceVendor`/`deviceProduct` that yields `cisco_secure_endpoint` and confirm which dataset the events land in.
  
    **Ingestion shape**: **JSON-native.** The modeling rule reads nested JSON (e.g. `computer -> external_ip`). CEF/syslog routes + lands and the broker extracts top-level columns; the nested reads need the composite present, so Phantom's worker JSON-stringifies `type: json` composites onto the wire (keep the dotted-leaf fields).
  
    - **Modeling-rule gate**: none — the rule maps every routed row unconditionally.
  
    **XDM mapping**: ~38 fields mapped to the unified data model (`xdm.*`), including: `xdm.alert.description`, `xdm.alert.mitre_tactics`, `xdm.alert.mitre_techniques`, `xdm.alert.name`, `xdm.alert.original_threat_id`, `xdm.alert.original_threat_name`.
  
    **Operator setup**: This data source has typed-column data that doesn't look like CEF (columns are camelCase API fields, JSON sub-objects, etc.). Most likely arrives via the XSIAM HTTP Collector with a source tag mapped to vendor=`Cisco`, product=`AMP`, or via a vendor-specific XDR connector pull. Phantom can POST JSON to the HTTP collector; the operator must configure the collector's source tag to land events in this dataset.
  
    **Status**: Reverse-engineered 2026-06-04 from the parsing/modeling rules — routing, gate, and field
    inventory documented. **NOT yet XDM-validated on a live tenant** (no `validated` pill); validate by
    streaming a CEF batch and confirming a rich `xdm.*` count over a wide window.
  
    **Verify** (once the dataset is XDM-bound, wide ≥7d window):
  
        config timeframe = 30d | datamodel dataset = cisco_secure_endpoint_raw | sort desc _time | fields xdm.* | limit 20
