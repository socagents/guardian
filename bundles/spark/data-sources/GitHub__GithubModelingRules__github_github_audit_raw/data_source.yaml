how_to_use: |
  ## Sending GitHub audit logs to Cortex XSIAM

  Status (2026-06-03, #117): NOT mappable via synthetic CEF/syslog. GitHub audit
  is a JSON-native source ingested through an HTTP collector. The tenant INGEST
  rule for github_github_audit_raw parses a JSON created_at field and does NOT
  generically extract CEF extensions — so CEF-delivered events land with their
  fields packed in cefRawExtension and the modeling rule's `action` column is
  absent. `datamodel dataset = github_github_audit_raw` returns zero modeled rows
  over 365 days.

  Why CEF can't work here: the broker routes by CEF header, but the GitHub INGEST
  rule expects JSON columns (action, actor, org, repo, created_at as 13-digit
  epoch-ms). CEF leaves them unparsed; pure JSON over UDP has no routing header
  so the broker drops it.

  To onboard XDM: send GitHub audit events as JSON through an XSIAM HTTP Collector
  (with the dataset target + API key), not via the syslog broker — a separate
  ingestion path Phantom's synthetic-syslog worker does not implement today.
  Until then this source is NOT in the validated set.

  MR pattern (for reference): gated on action wildcards (account*, org*, repo*,
  ...); maps at most ~5 XDM fields (xdm.source.user.username,
  xdm.target.user.username, xdm.target.cloud.project, xdm.event.operation).
