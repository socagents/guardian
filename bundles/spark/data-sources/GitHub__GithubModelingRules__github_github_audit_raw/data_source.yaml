fields:
- name: action
  type: string_short
  description: Audit action (e.g. 'repo.create', 'team.add_member'). Short opaque
    token, typically without whitespace; max ~64 chars.
  example: token
- name: actor
  type: user
  description: User performing the action. Account name as the vendor reports it —
    login name, UPN, or sAMAccountName; no domain prefix unless vendor emits one.
  example: jsmith
- name: actor_location
  type: json
  description: '— see leaf entries for nested paths. JSON object with keys: country_code
    (each key defined as a dotted-path leaf below).'
  example: '{}'
- name: created_at
  type: datetime
  description: ISO-8601 timestamp marking when this state was recorded. ISO-8601 timestamp
    with timezone (e.g., 2026-05-26T14:23:01Z).
  example: '2026-05-26T14:23:01Z'
- name: org
  type: string
  description: Organization slug. Free-form text; may contain whitespace and punctuation.
  example: jsmith
- name: repo
  type: string
  description: Repository full name (owner/name). Free-form text; may contain whitespace
    and punctuation.
  example: sample_repo
- name: actor_location.country_code
  type: country_code
  description: Country resolved from actor IP. ISO 3166-1 alpha-2 uppercase country
    code.
  example: US
- name: '@timestamp'
  type: timestamp_ms
  description: Audit event timestamp. Unsigned epoch milliseconds since 1970-01-01
    UTC; bare digits.
  example: '1748263381000'
- name: _document_id
  type: string_short
  description: Unique document id. Short opaque token, typically without whitespace;
    max ~64 chars.
  example: token
- name: actor_id
  type: integer
  description: Numeric user id. Signed decimal integer; bare digits, optional leading
    minus.
  example: '42'
- name: actor_ip
  type: string
  description: Actor IP address. Free-form text; may contain whitespace and punctuation.
  example: 192.0.2.45
- name: business
  type: string
  description: GitHub Enterprise account slug. Free-form text; may contain whitespace
    and punctuation.
  example: sample_business
- name: business_id
  type: integer
  description: Enterprise account numeric id. Signed decimal integer; bare digits,
    optional leading minus.
  example: '42'
- name: hashed_token
  type: hash_sha256
  description: Token hash (for PAT/OAuth attribution). 64-character lowercase hex
    SHA-256 digest.
  example: 2cf24dba5fb0a30e26e83b2ac5b9e29e1b161e5c1fa7425e73043362938b9824
- name: operation_type
  type: enum
  description: 'Type of operation. One of: create, modify, remove, access, authentication,
    transfer (case-sensitive).'
  enum_values:
  - create
  - modify
  - remove
  - access
  - authentication
  - transfer
  example: create
- name: org_id
  type: integer
  description: Organization numeric id. Signed decimal integer; bare digits, optional
    leading minus.
  example: '42'
- name: permission
  type: string_short
  description: Permission level (admin/write/read). Short opaque token, typically
    without whitespace; max ~64 chars.
  example: token
- name: programmatic_access_type
  type: string_short
  description: How the API was accessed (PAT/OAuth/etc.). Short opaque token, typically
    without whitespace; max ~64 chars.
  example: token
- name: repo_id
  type: integer
  description: Repository numeric id. Signed decimal integer; bare digits, optional
    leading minus.
  example: '42'
- name: team
  type: string
  description: Team slug. Free-form text; may contain whitespace and punctuation.
  example: sample_team
- name: token_id
  type: integer
  description: Token numeric id. Signed decimal integer; bare digits, optional leading
    minus.
  example: '42'
- name: token_scopes
  type: string
  description: OAuth scopes. Free-form text; may contain whitespace and punctuation.
  example: sample_scopes
- name: user
  type: user
  description: Target user (for team/member events). Account name as the vendor reports
