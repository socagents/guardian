schema_version: 1
id: CyberArkPAS
pack_name: CyberArkPAS
rule_name: CyberArkISP
dataset_name: cyberark_isp_raw
vendor: CyberArk
product: CyberArkPAS
description: CyberArk Identity Security Platform (ISP) is a privileged-access management suite — it brokers
  all access to sensitive credentials, vaults, and privileged sessions. Each event records the privileged
  user, the safe / target system being accessed, the policy applied, session metadata, and any breakglass
  actions. Simulate CyberArk ISP to validate detections for privileged credential abuse, off-hours vault
  access, or session-recording bypass attempts.
how_to_use: '## Sending these logs to Cortex XSIAM


  Phantom emits this vendor''s wire format as CEF over UDP — point a data worker

  at your XSIAM broker''s syslog destination and these records flow straight in.

  The schema below describes the vendor''s fields independent of destination, so

  the same records also work for Splunk, Elastic, or any syslog receiver.


  The CEF header''s **vendor** + **product** drive XSIAM''s parsing-rule routing:

  the broker normalizes them to `<lowercased-vendor>_<lowercased-product>_raw`

  (non-alphanumerics -> `_`) and matches your installed parsing rule. The PR/MR

  rules read NAMED COLUMNS, so the transport is invisible to them — pack the

  vendor''s field names as CEF extension `key=value` pairs.


  **Required CEF header for XSIAM**:


  - **vendor**: `cyberark`

  - **product**: `isp`


  Broker derives → `cyberark_isp_raw`.


  Use the lowercased forms (`cyberark` / `isp`) — broker derives `cyberark_isp_raw`. The full product
  name `Identity Security Platform` would derive a different dataset.


  **MR pattern**: Mixed. Reads flat `event_type`, `username`, `action_taken`; also extracts `endpoint.deviceId`
  and `endpoint.hostname` via nested JSON.


  **Composite (nested-JSON) fields**: Pack `endpoint` and `target_user` as JSON-string objects. The MR
  pulls `endpoint.deviceId` and `target_user.directoryName`.


  **Sentinel values**: None.


  **PR filter quirks**: `timestamp` must be RFC-3339 with millisecond precision (`...000Z`).


  **Saturation strategy**: Mixed-MR — ~10 XDM single-event.


  **Single-event XDM ceiling**: ~10 XDM single-event (mixed MR).


  **Verify**:


  ```xql

  datamodel dataset = cyberark_isp_raw

  | filter xdm.event.id contains "<your-marker>"

  | fields xdm.*

  | limit 1

  ```'
