fields:
- name: _raw_log
  type: string
  description: Raw log line as the vendor emits it before any parsing or normalization.
    Free-form text; may contain whitespace and punctuation.
  example: '<14>2024-01-15T14:23:01+0000 microsoft: microsoftnps=MicrosoftNPS action=allow
    user=jdoe'
- name: Client_port
  type: integer_port
  description: Source port. Unsigned integer 0-65535 representing a TCP/UDP port;
    bare digits, no quotes.
  example: '443'
- name: Client_username
  type: user
  description: Source user username. Account name as the vendor reports it — login
    name, UPN, or sAMAccountName depending on the source; no domain prefix unless
    the vendor emits one.
  example: jdoe
- name: host_device_id
  type: host
  description: Destination host device ID. Hostname or fully-qualified domain name
    (RFC 1035 dotted labels); no protocol prefix.
  example: host01.example.com
- name: host_ipv4_addresses
  type: ipv4
  description: Source host IPv4 addresses. Dotted-quad IPv4 literal (e.g., 192.0.2.45);
    no port suffix, no surrounding brackets or quotes.
  example: 192.0.2.45
- name: hostname
  type: host
  description: Intermediate host hostname. Hostname or fully-qualified domain name
    (RFC 1035 dotted labels); no protocol prefix.
  example: host01.example.com
- name: original_event_type
  type: string
  description: Event type. Free-form text; may contain whitespace and punctuation.
  example: authentication
- name: reason
  type: string_short
  description: Event outcome reason. Short opaque token, typically without whitespace;
    max ~64 chars.
  example: token
use_cases:
- Cloud
