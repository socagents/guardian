schema_version: 1
id: ClearswiftDLP
pack_name: ClearswiftDLP
rule_name: ClearswiftDLP
dataset_name: clearswift_dlp_raw
vendor: Clearswift
product: ClearswiftDLP
description: The Clearswift Endpoint Data Loss Prevention (DLP) solution offers visibility,
  control, monitoring and policies that help a company protect its assets.
categories:
- Analytics & SIEM
version: 1.0.9
origin: bundle
author: phantom-bundle
uploaded_by: null
created_at: '2026-05-24T16:53:58Z'
updated_at: '2026-05-24T16:53:58Z'
logo:
  mime_type: image/png
  data: 
  source: wikipedia:File:Clearswift_-_A_HelpSystems_Logo.png
  license: Wikipedia / vendor trademark (Clearswift is a Fortra brand)
  fidelity: branded
formats:
- SYSLOG
- CEF
- JSON
is_rawlog_only: false
fields:
- name: _raw_log
  type: string
  description: Raw log line as the vendor emits it before any parsing or normalization.
    Free-form text; may contain whitespace and punctuation.
  example: '<14>2024-01-15T14:23:01+0000 clearswift: clearswiftdlp=ClearswiftDLP action=allow
    user=jdoe'
- name: NAVIGATE
  type: url
  description: Network HTTP URL. Full URL with scheme (http/https/ftp); percent-encoded
    if it contains non-ASCII characters.
  example: https://example.com/path?q=1
- name: ROLE
  type: string
  description: Destination resource before value. Free-form text; may contain whitespace
    and punctuation.
  example: Admin
- name: UPDATE
  type: datetime
  description: Destination resource before value. ISO-8601 timestamp with timezone
    (e.g., 2026-05-26T14:23:01Z).
  example: '2026-05-26T14:23:01Z'
- name: USER
  type: user
  description: Destination user username. Account name as the vendor reports it —
    login name, UPN, or sAMAccountName depending on the source; no domain prefix unless
    the vendor emits one.
  example: jdoe
- name: alert
  type: string
  description: Event log level. Free-form text; may contain whitespace and punctuation.
  example: sample_alert
- name: analyst
  type: string
  description: Auth privilege level. Free-form text; may contain whitespace and punctuation.
  example: sample_analyst
- name: description
  type: string
  description: Event description. Free-form text; may contain whitespace and punctuation.
  example: Event recorded by Clearswift.
- name: destination_port
  type: integer_port
  description: Destination port. Unsigned integer 0-65535 representing a TCP/UDP port;
    bare digits, no quotes.
  example: '443'
- name: domain
  type: domain
  description: Destination domain. Bare DNS domain name; no scheme, no path, no port.
  example: example.com
- name: event_subtype
  type: string
  description: Event operation sub type. Free-form text; may contain whitespace and
    punctuation.
  example: login
- name: event_type
  type: string
  description: Event description. Free-form text; may contain whitespace and punctuation.
  example: authentication
- name: find_type
  type: string
  description: Event type. Free-form text; may contain whitespace and punctuation.
  example: authentication
- name: log_level
  type: string
  description: Event log level. Free-form text; may contain whitespace and punctuation.
  example: info
- name: log_type
  type: string
  description: Event original event type. Free-form text; may contain whitespace and
    punctuation.
  example: authentication
- name: outcome_reason
  type: string_short
  description: Event outcome reason. Short opaque token, typically without whitespace;
    max ~64 chars.
  example: token
- name: url_category
  type: url
  description: Network HTTP URL category. Full URL with scheme (http/https/ftp); percent-encoded
    if it contains non-ASCII characters.
  example: https://example.com/path?q=1
- name: user_role
  type: string
  description: Auth privilege level. Free-form text; may contain whitespace and punctuation.
  example: Admin
use_cases:
- DLP
- Email
how_to_use: |
  ## clearswift dlp → Cortex XSIAM (dataset `clearswift_dlp_raw`)
  
    **Routing** — the broker lowercases the CEF/syslog header `vendor`/`product`, replaces
    non-alphanumerics with `_`, and appends `_raw` to choose the dataset (target: `clearswift_dlp_raw`).
  
    **Required CEF header for XSIAM**:
    - **vendor**: `clearswift`
    - **product**: `dlp`
  
    These normalize → `clearswift_dlp_raw`.
  
    **Ingestion shape**: **Flat / CEF-compatible.** The modeling rule reads flat top-level columns (no nested-JSON access). A CEF event routes in and the broker auto-extracts those columns, so this source maps from Phantom's existing CEF path once the dataset is XDM-bound.
  
    - **Modeling-rule gate**: `log_type = "msw"` — seed that field with an accepted value or the rule drops the row (XDM stays 0).
  
    **XDM mapping**: ~29 fields mapped to the unified data model (`xdm.*`), including: `xdm.alert.description`, `xdm.alert.original_alert_id`, `xdm.alert.subcategory`, `xdm.auth.privilege_level`, `xdm.email.recipients`, `xdm.email.sender`.
  
    **Operator setup**: This data source uses `_raw_log`-based parsing. Cortex's parsing rule reads from `_raw_log` to populate `_json` (or directly to extract XDM fields), and the modeling rule does `regextract`/`json_extract_scalar` on `_raw_log`. For simulated logs sent from Phantom to land in this dataset, **the operator must add a Broker VM Syslog Applet pre-configured with the matching vendor + product + a dedicated source port**. Without that applet, logs are tagged `unknown/unknown` and routed to `unknown_unknown_raw` — the parsing rule never fires. 
  
  Setup: XSIAM → Settings → Configurations → Data Broker → Applets → Add Applet (Syslog) → Vendor = `clearswift`, Product = `dlp`, Port = (operator picks an unused port, e.g. 1514, 1515, ...). Phantom must then send to that port — current default is 514, which is reserved for the ASA applet.
  
    **Status**: Reverse-engineered 2026-06-04 from the parsing/modeling rules — routing, gate, and field
    inventory documented. **NOT yet XDM-validated on a live tenant** (no `validated` pill); validate by
    streaming a CEF batch and confirming a rich `xdm.*` count over a wide window.
  
    **Verify** (once the dataset is XDM-bound, wide ≥7d window):
  
        config timeframe = 30d | datamodel dataset = clearswift_dlp_raw | sort desc _time | fields xdm.* | limit 20
