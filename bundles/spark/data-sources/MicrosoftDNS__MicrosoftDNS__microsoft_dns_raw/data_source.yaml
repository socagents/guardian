how_to_use: |
  ## microsoft windows → Cortex XSIAM (dataset `microsoft_dns_raw`)
  
    **Routing** — the broker lowercases the CEF/syslog header `vendor`/`product`, replaces
    non-alphanumerics with `_`, and appends `_raw` to choose the dataset (target: `microsoft_dns_raw`).
  
    **Not a simple CEF vendor/product route.** The parsing rule ingests under the broad identity `microsoft`/`windows` (which normalizes to `microsoft_windows_raw`, a parent dataset) and splits events into per-channel datasets — `microsoft_dns_raw` is one of them — by event channel/category downstream. A single CEF `deviceVendor`/`deviceProduct` header does NOT by itself land events in `microsoft_dns_raw`. Ingest the source via its native path (Windows agent / WEC, or Azure diagnostic settings) so the rule routes the specific channel to `microsoft_dns_raw`.
  
    **Ingestion shape**: **JSON-native.** The modeling rule reads nested JSON (e.g. `$.type`). CEF/syslog routes + lands and the broker extracts top-level columns; the nested reads need the composite present, so Phantom's worker JSON-stringifies `type: json` composites onto the wire (keep the dotted-leaf fields).
  
    - **Modeling-rule gate**: `provider_name != "Microsoft-Windows-DNSServer" OR provider_name != "Microsoft-Windows-DNS-Server-Service"` — seed that field with an accepted value or the rule drops the row (XDM stays 0).
  
    **XDM mapping**: ~30 fields mapped to the unified data model (`xdm.*`), including: `xdm.event.description`, `xdm.event.id`, `xdm.event.log_level`, `xdm.event.operation_sub_type`, `xdm.event.original_event_type`, `xdm.event.type`.
  
    **Operator setup**: This data source uses `_raw_log`-based parsing. Cortex's parsing rule reads from `_raw_log` to populate `_json` (or directly to extract XDM fields), and the modeling rule does `regextract`/`json_extract_scalar` on `_raw_log`. For simulated logs sent from Phantom to land in this dataset, **the operator must add a Broker VM Syslog Applet pre-configured with the matching vendor + product + a dedicated source port**. Without that applet, logs are tagged `unknown/unknown` and routed to `unknown_unknown_raw` — the parsing rule never fires. 
  
  Setup: XSIAM → Settings → Configurations → Data Broker → Applets → Add Applet (Syslog) → Vendor = `microsoft`, Product = `windows`, Port = (operator picks an unused port, e.g. 1514, 1515, ...). Phantom must then send to that port — current default is 514, which is reserved for the ASA applet.
  
    **Status**: Reverse-engineered 2026-06-04 from the parsing/modeling rules — routing, gate, and field
    inventory documented. **NOT yet XDM-validated on a live tenant** (no `validated` pill); validate by
    streaming a CEF batch and confirming a rich `xdm.*` count over a wide window.
  
    **Verify** (once the dataset is XDM-bound, wide ≥7d window):
  
        config timeframe = 30d | datamodel dataset = microsoft_dns_raw | sort desc _time | fields xdm.* | limit 20
