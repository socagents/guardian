fields:
- name: _raw_log
  type: string
  description: Raw log line as the vendor emits it before any parsing or normalization.
    Free-form text; may contain whitespace and punctuation.
  example: '<14>2024-01-15T14:23:01+0000 apache: apachewebserver=ApacheWebServer action=allow
    user=jdoe'
- name: Error
  type: string
  description: Event type. Free-form text; may contain whitespace and punctuation.
  example: sample_error
- name: Logs
  type: string
  description: Event type. Free-form text; may contain whitespace and punctuation.
  example: sample_logs
- name: Referrer
  type: string
  description: Network HTTP referrer. Free-form text; may contain whitespace and punctuation.
  example: https://example.com/
- name: Source_code_file_line
  type: string
  description: Destination resource ID. Free-form text; may contain whitespace and
    punctuation.
  example: sample_line
- name: User_agent
  type: string
  description: Source user agent. Free-form text; may contain whitespace and punctuation.
  example: Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36
- name: Username
  type: user
  description: Source user username. Account name as the vendor reports it — login
    name, UPN, or sAMAccountName depending on the source; no domain prefix unless
    the vendor emits one.
  example: jdoe
- name: bytes_size
  type: string
  description: Destination sent bytes. Free-form text; may contain whitespace and
    punctuation.
  example: '1024'
- name: core
  type: string
  description: Event log level. Free-form text; may contain whitespace and punctuation.
  example: sample_core
- name: dest_domain
  type: domain
  description: Destination domain. Bare DNS domain name; no scheme, no path, no port.
  example: example.com
- name: dest_file_name
  type: string
  description: Destination file filename. Free-form text; may contain whitespace and
    punctuation.
  example: sample_name
- name: dest_file_path
  type: string
  description: Destination file path. Free-form text; may contain whitespace and punctuation.
  example: /var/log/app.log
- name: dest_port
  type: integer_port
  description: Destination port. Unsigned integer 0-65535 representing a TCP/UDP port;
    bare digits, no quotes.
  example: '443'
- name: error_status_code
  type: string
  description: Source user identifier. Free-form text; may contain whitespace and
    punctuation.
  example: success
- name: event_description
  type: string
  description: Event description. Free-form text; may contain whitespace and punctuation.
  example: Event recorded by Apache.
- name: http_method
  type: string
  description: Network HTTP method. Free-form text; may contain whitespace and punctuation.
  example: GET
- name: http_response_code
  type: string
  description: Network HTTP response code. Free-form text; may contain whitespace
    and punctuation.
  example: '200'
- name: http_url
  type: url
  description: Network HTTP URL. Full URL with scheme (http/https/ftp); percent-encoded
    if it contains non-ASCII characters.
  example: https://example.com/path?q=1
- name: in
  type: string
  description: Event log level. Free-form text; may contain whitespace and punctuation.
  example: sample_in
- name: info
  type: string
  description: Event log level. Free-form text; may contain whitespace and punctuation.
  example: see message
- name: local_ipv4
  type: ipv4
  description: Destination IPv4. Dotted-quad IPv4 literal (e.g., 192.0.2.45); no port
    suffix, no surrounding brackets or quotes.
  example: 192.0.2.45
- name: message
  type: string
  description: Event description. Free-form text; may contain whitespace and punctuation.
  example: Operation completed successfully.
- name: message1
  type: string
  description: Message1. Free-form text; may contain whitespace and punctuation.
  example: sample_message1
- name: message2
  type: string
  description: Message2. Free-form text; may contain whitespace and punctuation.
  example: sample_message2
- name: observer_name
  type: string
  description: Observer name. Free-form text; may contain whitespace and punctuation.
  example: sample_name
- name: observer_name_temp2
  type: string
  description: Observer name temp2. Free-form text; may contain whitespace and punctuation.
  example: sample_temp2
- name: pid
  type: string
  description: Source process PID. Free-form text; may contain whitespace and punctuation.
  example: '4242'
- name: process_id
  type: string_short
  description: Source process PID. Short opaque token, typically without whitespace;
    max ~64 chars.
  example: token
- name: remote_ipv4
  type: ipv4
  description: Remote ipv4. Dotted-quad IPv4 literal (e.g., 192.0.2.45); no port suffix,
    no surrounding brackets or quotes.
  example: 192.0.2.45
- name: severity
  type: string_short
  description: Event log level. Short opaque token, typically without whitespace;
    max ~64 chars.
  example: token
- name: severity1
  type: string_short
  description: Severity1. Short opaque token, typically without whitespace; max ~64
    chars.
  example: token
- name: severity2
  type: string_short
  description: Severity2. Short opaque token, typically without whitespace; max ~64
    chars.
  example: token
- name: source_hostname
  type: host
  description: Source host hostname. Hostname or fully-qualified domain name (RFC
    1035 dotted labels); no protocol prefix.
  example: host01.example.com
- name: sourceipv4
  type: ipv4
  description: Source IPv4. Dotted-quad IPv4 literal (e.g., 192.0.2.45); no port suffix,
    no surrounding brackets or quotes.
  example: 192.0.2.45
- name: sourceipv6
  type: ipv6
  description: Source IPv6. Colon-separated hexadecimal IPv6 literal (RFC 4291); no
    zone suffix, no surrounding brackets.
  example: 2001:db8::1
- name: target_port
  type: integer_port
  description: Destination port. Unsigned integer 0-65535 representing a TCP/UDP port;
    bare digits, no quotes.
  example: '443'
- name: tid
  type: string
  description: Source process thread ID. Free-form text; may contain whitespace and
    punctuation.
  example: '1024'
- name: tls_protocol_version
  type: string
  description: Network TLS protocol version. Free-form text; may contain whitespace
    and punctuation.
  example: 1.0.0
- name: uri
  type: string
  description: Destination module path. Free-form text; may contain whitespace and
    punctuation.
  example: /api/v1/path?q=1
use_cases:
- WebServer
- AppServer
how_to_use: |
  ## apache httpd → Cortex XSIAM (dataset `apache_httpd_raw`)
  
    **Routing** — the broker lowercases the CEF/syslog header `vendor`/`product`, replaces
    non-alphanumerics with `_`, and appends `_raw` to choose the dataset (target: `apache_httpd_raw`).
  
    **Required CEF header for XSIAM**:
    - **vendor**: `apache`
    - **product**: `httpd`
  
    These normalize → `apache_httpd_raw`.
  
    **Ingestion shape**: **Flat / CEF-compatible.** The modeling rule reads flat top-level columns (no nested-JSON access). A CEF event routes in and the broker auto-extracts those columns, so this source maps from Phantom's existing CEF path once the dataset is XDM-bound.
  
    - **Modeling-rule gate**: `_raw_log contains "emerg" or  _raw_log contains "alert" or  _raw_log contains "error" or  _raw_log contains "warn" or  _raw_log contains "notice"` — seed that field with an accepted value or the rule drops the row (XDM stays 0).
  
    **XDM mapping**: ~40 fields mapped to the unified data model (`xdm.*`), including: `XDM.Audit.TriggeredBy.identity.uuid`, `XDM.Audit.TriggeredBy.ipv4`, `XDM.Audit.audited_resource.id`, `XDM.Audit.event_timestamp`, `XDM.Audit.identity.uuid`, `XDM.Audit.threat.description`.
  
    **Operator setup**: This data source uses `_raw_log`-based parsing. Cortex's parsing rule reads from `_raw_log` to populate `_json` (or directly to extract XDM fields), and the modeling rule does `regextract`/`json_extract_scalar` on `_raw_log`. For simulated logs sent from Phantom to land in this dataset, **the operator must add a Broker VM Syslog Applet pre-configured with the matching vendor + product + a dedicated source port**. Without that applet, logs are tagged `unknown/unknown` and routed to `unknown_unknown_raw` — the parsing rule never fires. 
  
  Setup: XSIAM → Settings → Configurations → Data Broker → Applets → Add Applet (Syslog) → Vendor = `apache`, Product = `httpd`, Port = (operator picks an unused port, e.g. 1514, 1515, ...). Phantom must then send to that port — current default is 514, which is reserved for the ASA applet.
  
    **Status**: Reverse-engineered 2026-06-04 from the parsing/modeling rules — routing, gate, and field
    inventory documented. **NOT yet XDM-validated on a live tenant** (no `validated` pill); validate by
    streaming a CEF batch and confirming a rich `xdm.*` count over a wide window.
  
    **Verify** (once the dataset is XDM-bound, wide ≥7d window):
  
        config timeframe = 30d | datamodel dataset = apache_httpd_raw | sort desc _time | fields xdm.* | limit 20
