fields:
- name: SourceAddress
  type: string
  description: Source address of the connection initiator. Free-form text; may contain
    whitespace and punctuation.
  example: 192.0.2.45
- name: _raw_log
  type: string
  description: Raw log line as the vendor emits it before any parsing or normalization.
    Free-form text; may contain whitespace and punctuation.
  example: '<14>2024-01-15T14:23:01+0000 portnox: portnox=Portnox action=allow user=jdoe'
- name: act
  type: string_short
  description: CEF action — what Portnox did with the event (allow/block/quarantine/etc.).
    Short opaque token, typically without whitespace; max ~64 chars.
  example: token_value
- name: alert_category
  type: string_short
  description: Portnox's category classifier for the event. Short opaque token, typically
    without whitespace; max ~64 chars.
  example: access_control
- name: cefDeviceEventClassId
  type: string_short
  description: CEF device-event class ID — vendor-specific event-type identifier.
    Short opaque token, typically without whitespace; max ~64 chars.
  example: token_value
- name: cefDeviceVersion
  type: string_short
  description: CEF device-version field — version of the Portnox product emitting
    this event. Short opaque token, typically without whitespace; max ~64 chars.
  example: token_value
- name: cefVersion
  type: string_short
  description: CEF specification version — typically `0` for CEF 1.x. Short opaque
    token, typically without whitespace; max ~64 chars.
  example: token_value
- name: cn1
  type: integer
  description: Vendor-emitted field 'Cn1'. Signed decimal integer; bare digits, optional
    leading minus.
  example: '42'
- name: cs2
  type: string
  description: Vendor-emitted field 'Cs2'. Free-form text; may contain whitespace
    and punctuation.
  example: custom_value
- name: cs3
  type: string
  description: Vendor-emitted field 'Cs3'. Free-form text; may contain whitespace
    and punctuation.
  example: custom_value
- name: description
  type: string_long
  description: Free-form human-readable description from Portnox. Free-form text;
    may span multiple lines or contain large payloads.
  example: Event recorded by Portnox.
- name: destinationDnsDomain
  type: string
  description: Vendor-emitted field 'DestinationDnsDomain'. Free-form text; may contain
    whitespace and punctuation.
  example: sample_destinationdnsdo
- name: destinationServiceName
  type: string
  description: Vendor-emitted field 'DestinationServiceName'. Free-form text; may
    contain whitespace and punctuation.
  example: sample_destinationservi
- name: device_ip
  type: string
  description: Vendor-emitted field 'Device ip'. Free-form text; may contain whitespace
    and punctuation.
  example: 192.0.2.45
- name: dhost
  type: host
  description: CEF destination host — hostname or FQDN of the target endpoint. Hostname
    or fully-qualified domain name (RFC 1035 dotted labels); no protocol prefix.
  example: host.example.com
- name: dmac
  type: string
  description: Destination host MAC addresses. Free-form text; may contain whitespace
    and punctuation.
  example: sample_dmac
- name: dpt
  type: integer_port
  description: CEF destination port — TCP/UDP port on the target side. Unsigned integer
    0-65535 representing a TCP/UDP port; bare digits, no quotes.
  example: '42'
- name: dst
  type: ipv4
  description: CEF destination IP — IPv4/IPv6 address of the target endpoint. Dotted-quad
    IPv4 literal (e.g., 192.0.2.45); no port suffix, no surrounding brackets or quotes.
  example: 203.0.113.42
- name: filePath
  type: file_path
  description: Filesystem path reported by the vendor. Absolute filesystem path; vendor-native
    separator (forward slash on POSIX, backslash on Windows).
  example: /var/log/example.log
- name: group
  type: string
  description: Vendor-emitted field 'Group'. Free-form text; may contain whitespace
    and punctuation.
  example: grp-31f0409b
- name: mac_address
  type: string
  description: Vendor-emitted field 'Mac address'. Free-form text; may contain whitespace
    and punctuation.
  example: 192.0.2.45
- name: msg
  type: string
  description: Human-readable event message. Free-form text; may contain whitespace
    and punctuation.
  example: Operation completed successfully.
- name: outcome
  type: string
  description: Event outcome reported by the vendor. Free-form text; may contain whitespace
    and punctuation.
  example: success
- name: policy
  type: string
  description: Vendor-emitted field 'Policy'. Free-form text; may contain whitespace
    and punctuation.
  example: Default-Policy
- name: shost
  type: host
  description: CEF source host — hostname or FQDN of the source endpoint. Hostname
    or fully-qualified domain name (RFC 1035 dotted labels); no protocol prefix.
  example: host.example.com
- name: sourceTranslatedPort
  type: integer
  description: Vendor-emitted field 'SourceTranslatedPort'. Signed decimal integer;
    bare digits, optional leading minus.
  example: '42'
use_cases:
