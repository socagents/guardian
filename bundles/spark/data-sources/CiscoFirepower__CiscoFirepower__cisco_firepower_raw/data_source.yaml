fields:
- name: act
  type: string_short
  description: CEF action — what Cisco did with the event (allow/block/quarantine/etc.).
    Short opaque token, typically without whitespace; max ~64 chars.
  example: token_value
- name: app
  type: string_short
  description: Application name emitted by Cisco. Short opaque token, typically without
    whitespace; max ~64 chars.
  example: token_value
- name: bytesIn
  type: integer
  description: Vendor-emitted field 'BytesIn'. Signed decimal integer; bare digits,
    optional leading minus.
  example: '42'
- name: bytesOut
  type: integer
  description: Vendor-emitted field 'BytesOut'. Signed decimal integer; bare digits,
    optional leading minus.
  example: '42'
- name: cefDeviceProduct
  type: string_short
  description: CEF device-product field — product name as registered by Cisco. Short
    opaque token, typically without whitespace; max ~64 chars.
  example: token_value
- name: cefDeviceVendor
  type: string_short
  description: CEF device-vendor field — vendor name. Short opaque token, typically
    without whitespace; max ~64 chars.
  example: token_value
- name: cefName
  type: string_short
  description: CEF event name — short human-readable label for the event class. Short
    opaque token, typically without whitespace; max ~64 chars.
  example: token_value
- name: cefSeverity
  type: integer
  description: CEF severity score (0-10) as classified by Cisco. Signed decimal integer;
    bare digits, optional leading minus.
  example: '42'
- name: cs2
  type: string
  description: Vendor-emitted field 'Cs2'. Free-form text; may contain whitespace
    and punctuation.
  example: custom_value
- name: cs3
  type: string
  description: Vendor-emitted field 'Cs3'. Free-form text; may contain whitespace
    and punctuation.
  example: custom_value
- name: cs4
  type: string
  description: Vendor-emitted field 'Cs4'. Free-form text; may contain whitespace
    and punctuation.
  example: custom_value
- name: cs5
  type: string
  description: Vendor-emitted field 'Cs5'. Free-form text; may contain whitespace
    and punctuation.
  example: custom_value
- name: deviceExternalId
  type: string
  description: Vendor-emitted field 'DeviceExternalId'. Free-form text; may contain
    whitespace and punctuation.
  example: sample_deviceexternalid
- name: deviceInboundInterface
  type: string
  description: Vendor-emitted field 'DeviceInboundInterface'. Free-form text; may
    contain whitespace and punctuation.
  example: sample_deviceinboundint
- name: deviceOutboundInterface
  type: string
  description: Vendor-emitted field 'DeviceOutboundInterface'. Free-form text; may
    contain whitespace and punctuation.
  example: sample_deviceoutboundin
- name: dpt
  type: integer_port
  description: CEF destination port — TCP/UDP port on the target side. Unsigned integer
    0-65535 representing a TCP/UDP port; bare digits, no quotes.
  example: '42'
- name: dst
  type: ipv4
  description: CEF destination IP — IPv4/IPv6 address of the target endpoint. Dotted-quad
    IPv4 literal (e.g., 192.0.2.45); no port suffix, no surrounding brackets or quotes.
  example: 203.0.113.42
- name: duser
  type: user
  description: CEF destination user — username of the target/recipient. Account name
    as the vendor reports it — login name, UPN, or sAMAccountName; no domain prefix
    unless vendor emits one.
  example: jsmith
- name: dvchost
  type: string
  description: Vendor-emitted field 'Dvchost'. Free-form text; may contain whitespace
    and punctuation.
  example: sample_dvchost
- name: dvcpid
  type: integer
  description: Vendor-emitted field 'Dvcpid'. Signed decimal integer; bare digits,
    optional leading minus.
  example: '42'
- name: externalId
  type: string
  description: Vendor-emitted field 'ExternalId'. Free-form text; may contain whitespace
    and punctuation.
  example: ext-7f7d5ade-605
- name: fileHash
  type: hash_md5
  description: Vendor-emitted field 'FileHash'. 32-character lowercase hex MD5 digest.
  example: 5d41402abc4b2a76b9719d911017c592
- name: fileType
  type: string
  description: Vendor-emitted field 'FileType'. Free-form text; may contain whitespace
    and punctuation.
  example: sample_filetype
- name: fname
  type: file_path
  description: Vendor-emitted field 'Fname'. Absolute filesystem path; vendor-native
    separator (forward slash on POSIX, backslash on Windows).
  example: /var/log/example.log
- name: outcome
  type: string
  description: Event outcome reported by the vendor. Free-form text; may contain whitespace
    and punctuation.
  example: success
- name: reason
  type: string
  description: Reason/explanation accompanying the action or outcome. Free-form text;
    may contain whitespace and punctuation.
  example: normal_operation
- name: request
  type: url
  description: HTTP request line or full request payload as captured by Cisco. Full
    URL with scheme (http/https/ftp); percent-encoded if non-ASCII.
  example: https://example.com/path
- name: requestClientApplication
  type: string
  description: Vendor-emitted field 'RequestClientApplication'. Free-form text; may
    contain whitespace and punctuation.
  example: sample_requestclientapp
- name: spt
  type: integer_port
  description: CEF source port — TCP/UDP port on the source side. Unsigned integer
    0-65535 representing a TCP/UDP port; bare digits, no quotes.
  example: '42'
- name: src
  type: ipv4
  description: CEF source IP — IPv4/IPv6 address of the source endpoint. Dotted-quad
    IPv4 literal (e.g., 192.0.2.45); no port suffix, no surrounding brackets or quotes.
  example: 203.0.113.42
- name: suser
  type: user
  description: CEF source user — username of the actor initiating the event. Account
    name as the vendor reports it — login name, UPN, or sAMAccountName; no domain
    prefix unless vendor emits one.
  example: jsmith
