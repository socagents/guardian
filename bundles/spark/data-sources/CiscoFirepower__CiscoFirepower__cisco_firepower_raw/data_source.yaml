how_to_use: |
  ## Sending Cisco Firepower logs to Cortex XSIAM

  Phantom emits Cisco Firepower's wire format as CEF over UDP — point a data
  worker at your XSIAM broker's syslog destination and these records flow in.
  The CEF header's vendor + product drive XSIAM parsing-rule routing.

  Required CEF header for XSIAM (case-sensitive — the tenant INGEST rule matches
  vendor="Cisco", product="Firepower"):

  - vendor: `Cisco`
  - product: `Firepower`   (NOT "CiscoFirepower" — that derives the wrong dataset)

  Broker derives -> `cisco_firepower_raw`.

  MR pattern: UNCONDITIONAL — the modeling rule has no gate field, so every
  routed event maps. No observables_dict seed required. Pack the full CEF column
  set as key=value extensions (src, dst, spt, dpt, act, app, cs2-cs5, suser,
  duser, bytesIn, bytesOut, requestClientApplication, deviceInboundInterface,
  deviceOutboundInterface, ...).

  Validated 2026-06-03 (#117): 39 XDM fields (xdm.observer.*, xdm.source.*,
  xdm.network.http.url, xdm.alert.*, xdm.event.outcome).

  Verify XDM — use a WIDE time window. Synthetic Firepower events can carry a
  _time several days in the past, so a default 24h window may show 0 rows even on
  success. Query with >=7 days:

      config timeframe = 30d | datamodel dataset = cisco_firepower_raw
        | sort desc _time | fields xdm.* | limit 20

  Count distinct non-null xdm.* keys (expect ~39).
