  example: '{}'
- name: proto
  type: string
  description: Network protocol (e.g. tcp/udp/icmp). Free-form text; may contain whitespace
    and punctuation.
  example: tcp
- name: shost
  type: host
  description: CEF source host — hostname or FQDN of the source endpoint. Hostname
    or fully-qualified domain name (RFC 1035 dotted labels); no protocol prefix.
  example: host.example.com
- name: src
  type: string
  description: CEF source IP — IPv4/IPv6 address of the source endpoint. Free-form
    text; may contain whitespace and punctuation.
  example: 192.0.2.45
- name: suser
  type: user
  description: CEF source user — username of the actor initiating the event. Account
    name as the vendor reports it — login name, UPN, or sAMAccountName; no domain
    prefix unless vendor emits one.
  example: jsmith
- name: parsed_cs1.App
  type: string_short
  description: Application name emitted by Akamai. Short opaque token, typically without
    whitespace; max ~64 chars.
  example: token_value
- name: parsed_cs1.Environment
  type: string
  description: Vendor-emitted field 'Parsed cs1 › Environment'. Leaf of the 'parsed_cs1'
    composite. Free-form text; may contain whitespace and punctuation.
  example: sample_environment
- name: parsed_cs1.Role
  type: string
  description: Vendor-emitted field 'Parsed cs1 › Role'. Leaf of the 'parsed_cs1'
    composite. Free-form text; may contain whitespace and punctuation.
  example: Admin
- name: parsed_cs1.ip
  type: string
  description: Vendor-emitted field 'Parsed cs1 › ip'. Leaf of the 'parsed_cs1' composite.
    Free-form text; may contain whitespace and punctuation.
  example: 192.0.2.45
- name: parsed_cs1.os_name
  type: string
  description: Human-readable name as displayed by Akamai. Free-form text; may contain
    whitespace and punctuation.
  example: sample_name
