fields:
- name: act
  type: string_short
  description: CEF action — what Akamai did with the event (allow/block/quarantine/etc.).
    Short opaque token, typically without whitespace; max ~64 chars.
  example: token_value
- name: cefDeviceEventClassId
  type: string_short
  description: CEF device-event class ID — vendor-specific event-type identifier.
    Short opaque token, typically without whitespace; max ~64 chars.
  example: token_value
- name: cefDeviceVersion
  type: string_short
  description: CEF device-version field — version of the Akamai product emitting this
    event. Short opaque token, typically without whitespace; max ~64 chars.
  example: token_value
- name: cefName
  type: string_short
  description: CEF event name — short human-readable label for the event class. Short
    opaque token, typically without whitespace; max ~64 chars.
  example: token_value
- name: cefSeverity
  type: integer
  description: CEF severity score (0-10) as classified by Akamai. Signed decimal integer;
    bare digits, optional leading minus.
  example: '42'
- name: cs1
  type: string
  description: Vendor-emitted field 'Cs1'. Free-form text; may contain whitespace
    and punctuation.
  example: custom_value
- name: cs11
  type: string
  description: Vendor-emitted field 'Cs11'. Free-form text; may contain whitespace
    and punctuation.
