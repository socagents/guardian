- name: cs15
  type: string
  description: Destination process executable path. Free-form text; may contain whitespace
    and punctuation.
  example: sample_cs15
- name: cs16
  type: string
  description: Vendor-emitted field 'Cs16'. Free-form text; may contain whitespace
