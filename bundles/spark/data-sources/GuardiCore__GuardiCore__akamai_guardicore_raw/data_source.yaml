how_to_use: |
  ## Akamai GuardiCore → Cortex XSIAM (dataset `akamai_guardicore_raw`)
  
    **Routing** — the broker lowercases the CEF/syslog header `vendor`/`product`, replaces
    non-alphanumerics with `_`, and appends `_raw` to choose the dataset (target: `akamai_guardicore_raw`).
  
    **Required CEF header for XSIAM**:
    - **vendor**: `Akamai`
    - **product**: `GuardiCore`
  
    These normalize → `akamai_guardicore_raw`.
  
    **Ingestion shape**: **JSON-native.** The modeling rule reads nested JSON (e.g. `parsed_cs1 -> os_name`). CEF/syslog routes + lands and the broker extracts top-level columns; the nested reads need the composite present, so Phantom's worker JSON-stringifies `type: json` composites onto the wire (keep the dotted-leaf fields).
  
    - **Modeling-rule gate**: `cefName ~= "Audit"` — seed that field with an accepted value or the rule drops the row (XDM stays 0).
  
    **XDM mapping**: ~42 fields mapped to the unified data model (`xdm.*`), including: `xdm.alert.severity`, `xdm.alert.source_url`, `xdm.event.description`, `xdm.event.id`, `xdm.event.is_completed`, `xdm.event.log_level`.
  
    **Operator setup**: This data source's modeling rule reads CEF-shaped columns (rt, src, dst, spt, dpt, cs1-6, act, etc.). Phantom emits CEF over syslog (`CEF:0|Akamai|GuardiCore|...|<extensions>`) — the broker auto-extracts CEF k=v pairs into typed columns matching the CEF dictionary, and the broker routes to this dataset via the CEF header's vendor/product. Usually NO operator-side broker config is required beyond standard CEF ingestion.
  
    **Status**: Reverse-engineered 2026-06-04 from the parsing/modeling rules — routing, gate, and field
    inventory documented. **NOT yet XDM-validated on a live tenant** (no `validated` pill); validate by
    streaming a CEF batch and confirming a rich `xdm.*` count over a wide window.
  
    **Verify** (once the dataset is XDM-bound, wide ≥7d window):
  
        config timeframe = 30d | datamodel dataset = akamai_guardicore_raw | sort desc _time | fields xdm.* | limit 20
