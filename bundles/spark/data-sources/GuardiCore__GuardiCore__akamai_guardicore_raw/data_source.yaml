- name: dhost
  type: host
  description: CEF destination host — hostname or FQDN of the target endpoint. Hostname
    or fully-qualified domain name (RFC 1035 dotted labels); no protocol prefix.
  example: host.example.com
- name: dpt
  type: integer_port
  description: CEF destination port — TCP/UDP port on the target side. Unsigned integer
    0-65535 representing a TCP/UDP port; bare digits, no quotes.
  example: '42'
- name: drpoc
  type: string
  description: Vendor-emitted field 'Drpoc'. Free-form text; may contain whitespace
    and punctuation.
  example: sample_drpoc
- name: dst
  type: string
  description: CEF destination IP — IPv4/IPv6 address of the target endpoint. Free-form
    text; may contain whitespace and punctuation.
  example: 198.51.100.7
- name: duser
  type: user
  description: CEF destination user — username of the target/recipient. Account name
    as the vendor reports it — login name, UPN, or sAMAccountName; no domain prefix
    unless vendor emits one.
  example: jsmith
- name: dvc
  type: string
  description: Vendor-emitted field 'Dvc'. Free-form text; may contain whitespace
    and punctuation.
  example: sample_dvc
- name: dvchost
  type: host
  description: Vendor-emitted field 'Dvchost'. Hostname or fully-qualified domain
    name (RFC 1035 dotted labels); no protocol prefix.
  example: host.example.com
- name: id
  type: string_short
  description: Opaque identifier emitted by Akamai. Short opaque token, typically
    without whitespace; max ~64 chars.
  example: aka-090f00ce
- name: msg
  type: string
  description: Human-readable event message. Free-form text; may contain whitespace
    and punctuation.
  example: Operation completed successfully.
- name: parsed_cs1
  type: json
  description: '— see leaf entries for nested paths. JSON object with keys: App, Environment,
