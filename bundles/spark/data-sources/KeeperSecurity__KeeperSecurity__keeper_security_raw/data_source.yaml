how_to_use: |
  ## Keeper Security KeeperSecurity → Cortex XSIAM (dataset `keeper_security_raw`)
  
    **Routing** — the broker lowercases the CEF/syslog header `vendor`/`product`, replaces
    non-alphanumerics with `_`, and appends `_raw` to choose the dataset (target: `keeper_security_raw`).
  
    **Required CEF header for XSIAM** — the header must normalize to `keeper_security`. The marketplace pack's display name `Keeper Security` / `KeeperSecurity` normalizes to `keeper_security_keepersecurity_raw`, a **different dataset** (vendor rename / legacy CEF identity), so use the vendor's actual CEF `deviceVendor`/`deviceProduct` that yields `keeper_security` and confirm which dataset the events land in.
  
    **Ingestion shape**: **Flat / CEF-compatible.** The modeling rule reads flat top-level columns (no nested-JSON access). A CEF event routes in and the broker auto-extracts those columns, so this source maps from Phantom's existing CEF path once the dataset is XDM-bound.
  
    - **Modeling-rule gate**: none — the rule maps every routed row unconditionally.
  
    **XDM mapping**: ~22 fields mapped to the unified data model (`xdm.*`), including: `xdm.event.id`, `xdm.event.outcome`, `xdm.event.outcome_reason`, `xdm.event.type`, `xdm.intermediate.user.username`, `xdm.network.application_protocol`.
  
    **Operator setup**: This data source has typed-column data that doesn't look like CEF (columns are camelCase API fields, JSON sub-objects, etc.). Most likely arrives via the XSIAM HTTP Collector with a source tag mapped to vendor=`Keeper Security`, product=`KeeperSecurity`, or via a vendor-specific XDR connector pull. Phantom can POST JSON to the HTTP collector; the operator must configure the collector's source tag to land events in this dataset.
  
    **Status**: Reverse-engineered 2026-06-04 from the parsing/modeling rules — routing, gate, and field
    inventory documented. **NOT yet XDM-validated on a live tenant** (no `validated` pill); validate by
    streaming a CEF batch and confirming a rich `xdm.*` count over a wide window.
  
    **Verify** (once the dataset is XDM-bound, wide ≥7d window):
  
        config timeframe = 30d | datamodel dataset = keeper_security_raw | sort desc _time | fields xdm.* | limit 20
