schema_version: 1
id: panw_ngfw_filedata_raw
pack_name: PANW_NGFW
rule_name: PANW_NGFW
dataset_name: panw_ngfw_filedata_raw
vendor: Palo Alto Networks
product: NGFW File Data
description: Palo Alto Networks NGFW — file inspection events (WildFire submissions, file blocking, content inspection).
categories:
- Network Security
- Firewall
- Malware Analysis
version: 1.0.0
origin: bundle
author: phantom-maintainer (PANW NGFW hand-curated, 2026-05-27)
formats:
- CEF
- SYSLOG
is_rawlog_only: false
fields:
- name: action
  type: string
  description: 'Action taken by the firewall on the session/packet. Common values: allow, deny, drop, reset-client, reset-server,
    reset-both, block-url, block-continue, continue, override.'
  example: allow
- name: app
  type: string
  description: 'Application identified by App-ID (PANW''s content classification engine). Examples: web-browsing, ssl, ssh,
    smtp, dns, ms-rdp, microsoft-teams.'
  example: web-browsing
- name: app_category
  type: string
  description: 'High-level application category (App-ID tier 1). Examples: general-internet, business-systems, networking,
    collaboration, media.'
  example: general-internet
- name: app_sub_category
  type: string
  description: 'App-ID tier 2 subcategory. Examples: internet-utility, file-sharing, encrypted-tunnel, ip-protocol.'
  example: internet-utility
- name: container_id
  type: string
  description: Container/sandbox identifier when the file was analyzed in WildFire. Maps to `xdm.source.process.container_id`.
  example: wf-container-abc123
- name: content_version
  type: string
  description: PANW content database version at time of inspection. Maps to `xdm.observer.content_version`.
  example: 8650-7926
- name: dest_device_category
  type: string
  description: 'Device category of the destination host (when PANW Device-ID identifies it). Examples: server, mobile, iot,
    router, switch.'
  example: server
- name: dest_device_host
  type: string
  description: Hostname of the destination host as resolved by PANW Device-ID. Used for `xdm.target.host.hostname` only if
    it doesn't contain ':' (which would suggest a MAC).
  example: dst-host.corp.example.com
- name: dest_device_mac
  type: string
  description: MAC address of the destination host (Device-ID). Six colon-separated hex octets.
  example: 00:50:56:aa:bb:02
- name: dest_device_model
  type: string
  description: 'Device model string from PANW Device-ID inventory. Examples: VMware ESXi, MacBookPro18,3, iPhone13,4.'
  example: Dell PowerEdge R740
- name: dest_device_os
  type: string
  description: Operating system of the destination host (Device-ID). Free-form, vendor-supplied.
  example: Ubuntu 22.04
- name: dest_device_osfamily
  type: string
  description: 'OS family of destination host. Drives `xdm.target.host.os_family` enum: Windows, MacOS/Mac, ios/iOS, Chromeos,
    Linux, Android.'
  example: Linux
- name: dest_device_vendor
  type: string
  description: 'Hardware vendor of the destination host (Device-ID). Examples: Dell, Apple, Cisco, HP.'
  example: Dell Inc.
- name: dest_ip
  type: string
  description: Destination IP address — IPv4 or IPv6. The MR detects IPv6 by the presence of ':' and routes to `xdm.target.ipv6`
    accordingly. Sentinel value `00000000000000000000ffff00000000` is treated as empty.
  example: 10.20.30.40
- name: dest_port
  type: integer
  description: Destination TCP/UDP port (1-65535). Cast to integer in the MR; non-numeric values become null.
  example: '443'
- name: dest_user
  type: string
  description: 'Destination user as identified by PANW User-ID (LDAP/AD/RADIUS lookup on dest_ip). Examples: corp\\jdoe, jdoe@example.com.'
  example: corp\\bob
- name: dest_uuid
  type: string
  description: UUID assigned to the destination host (Device-ID identity). Maps to `xdm.target.host.hardware_uuid`.
  example: dst-uuid-90abcdef
- name: file_name
  type: string
  description: Name of the inspected file. Extension is auto-extracted (last component after '.'). Maps to `xdm.target.file.filename`.
  example: invoice.pdf
- name: file_sha_256
  type: string
  description: SHA-256 hash of the file (64 hex chars). Maps to `xdm.target.file.sha256`.
  example: e3b0c44298fc1c149afbf4c8996fb92427ae41e4649b934ca495991b7852b855
- name: file_type
  type: string
  description: MIME-style file type as classified by PANW (e.g. PE32, PDF, MSI, ELF, MachO).
  example: PDF
- name: file_url
  type: string
  description: Original URL from which the file was retrieved (if applicable). Maps to `xdm.target.file.path`.
  example: https://example.com/downloads/invoice.pdf
- name: from_zone
  type: string
  description: 'Source security zone (the firewall zone the session originated from). Examples: trust, untrust, dmz, internal,
    guest.'
  example: trust
- name: inbound_if
  type: string
  description: 'Inbound interface name (the firewall interface that received the session). Examples: ethernet1/1, ae1.100,
    tunnel.5.'
  example: ethernet1/1
- name: is_nat
  type: string
  description: 'Whether source/dest NAT was applied to the session. Cast to boolean. Values: ''true'', ''false'', ''True'',
    ''False''.'
  example: 'false'
- name: is_proxy
  type: string
  description: Whether the firewall proxied the session (e.g. SSL decrypt, explicit proxy). Cast to boolean. When true, `xdm.intermediate.ipv4/ipv6/port`
    get populated from dest_ip/dest_port.
  example: 'false'
- name: log_source
  type: string
  description: Log source type identifier (PANW's Cortex Cloud Identity Engine value or similar). Maps to `xdm.observer.type`.
  example: panw-ngfw
- name: log_source_id
  type: string
  description: Unique identifier of the log source instance (serial number or UUID of the firewall emitting the log).
  example: 001801000001
- name: log_source_name
  type: string
  description: Friendly name of the log source (firewall hostname or assigned name).
  example: pa-fw-hq-01
- name: log_type
  type: string
  description: 'PANW log subsystem that produced this event. Drives `xdm.event.type`. Common values: traffic, threat, url,
    file, hipmatch, globalprotect, system, config.'
  example: traffic
- name: outbound_if
  type: string
  description: 'Outbound interface name (the firewall interface forwarding the session). Examples: ethernet1/2, ae2.200.'
  example: ethernet1/2
- name: protocol
  type: string
  description: IP protocol — lowercase string. The MR maps icmp/tcp/udp to XDM enums; other values pass through as-is.
  example: tcp
- name: rule_matched
  type: string
  description: Name of the security policy rule that matched this session. Maps to `xdm.network.rule`.
  example: Allow-Web-Browsing
- name: session_id
  type: string
  description: Unique session identifier (PANW's session number for this flow). Maps to `xdm.event.id` AND `xdm.session_context_id`
    in the standalone RULE.
  example: '1234567'
- name: source_device_category
  type: string
  description: 'Device category of the source host (Device-ID). Examples: workstation, mobile, iot, server.'
  example: workstation
- name: source_device_host
  type: string
  description: Hostname of the source host (Device-ID). Used for `xdm.source.host.hostname` only if it doesn't contain ':'
    (which would suggest a MAC).
  example: src-host.corp.example.com
- name: source_device_mac
  type: string
  description: MAC address of the source host (Device-ID).
  example: 00:50:56:aa:bb:01
- name: source_device_model
  type: string
  description: Device model of the source host (Device-ID).
  example: MacBookPro18,3
- name: source_device_os
  type: string
  description: OS of the source host (Device-ID).
  example: macOS 14.0
- name: source_device_osfamily
  type: string
  description: OS family of source host. Drives `xdm.source.host.os_family` enum.
  example: MacOS
- name: source_device_vendor
  type: string
  description: Hardware vendor of the source host (Device-ID).
  example: Apple Inc.
- name: source_ip
  type: string
  description: Source IP address — IPv4 or IPv6. IPv6 detected by ':'.
  example: 10.1.2.3
- name: source_port
  type: integer
  description: Source TCP/UDP port.
  example: '54321'
- name: source_user
  type: string
  description: Source user (PANW User-ID).
  example: corp\\alice
- name: source_uuid
  type: string
  description: UUID of the source host (Device-ID). Maps to `xdm.source.host.hardware_uuid`.
  example: src-uuid-12345678
- name: sub_type
  type: string
  description: 'Log subtype — discriminator within a log_type. For traffic: start, end, drop, deny. For threat: vulnerability,
    virus, spyware, wildfire-virus, file. For url: url. Maps to `xdm.event.operation_sub_type`.'
  example: end
- name: to_zone
  type: string
  description: Destination security zone.
  example: untrust
- name: url_category
  type: string
  description: PANW URL category for the source/destination URL (e.g. business-and-economy, malware, phishing). Maps to `xdm.network.http.url_category`.
  example: business-and-economy
- name: vendor_severity
  type: string
  description: 'PANW-assigned severity for the file finding. Values: informational, low, medium, high, critical. Maps to `xdm.alert.severity`.'
  example: high
validated: false
use_cases:
- Firewall traffic & threat analysis
- Network security monitoring
- Threat hunting
how_to_use: 'Palo Alto Networks NGFW File Data logs. Simulate with type=CEF to your XSIAM Broker (UDP syslog).


  Routing: the broker keys on the CEF header — vendor=`panw`, product=`ngfw_cef` (case-sensitive). With the Cortex "PAN-OS"
  content pack installed in your XSIAM tenant, events are split by the `log_type` extension (here `file`) into the `panw_ngfw_filedata_raw`
  dataset, where the PANW modeling rule maps xdm.* fields (source/target IPs + ports, application, rule, zones, bytes/packets,
  action → outcome). Without the PANW pack installed, events land in the catch-all `panw_ngfw_cef_raw` (raw-only).


  Not yet XDM-validated against a live tenant (validated: false) — installing the tenant''s PANW content pack and running
  a saturation check are the prerequisites to promote.'
