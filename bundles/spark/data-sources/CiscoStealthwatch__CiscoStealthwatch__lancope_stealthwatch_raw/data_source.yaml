- name: proto
  type: integer
  description: Network protocol (e.g. tcp/udp/icmp). Signed decimal integer; bare
    digits, optional leading minus.
  example: '42'
- name: sourceUser
  type: user
  description: Source/initiating user account name. Account name as the vendor reports
    it — login name, UPN, or sAMAccountName depending on the source; no domain prefix
    unless the vendor emits one.
  example: jsmith
- name: src
  type: string
  description: CEF source IP — IPv4/IPv6 address of the source endpoint. Free-form
    text; may contain whitespace and punctuation.
  example: 192.0.2.45
- name: targetHostname
  type: host
  description: Vendor-emitted field 'TargetHostname'. Hostname or fully-qualified
    domain name (RFC 1035 dotted labels); no protocol prefix.
  example: host.example.com
- name: targetUser
  type: user
  description: Destination/target user account name. Account name as the vendor reports
    it — login name, UPN, or sAMAccountName depending on the source; no domain prefix
    unless the vendor emits one.
  example: jsmith
