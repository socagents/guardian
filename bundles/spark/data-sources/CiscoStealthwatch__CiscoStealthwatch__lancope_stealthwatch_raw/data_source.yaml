- name: dstPort
  type: integer
  description: Destination TCP/UDP port. Signed decimal integer; bare digits, optional
    leading minus.
  example: '42'
- name: eventName
  type: string
  description: Vendor-emitted field 'EventName'. Free-form text; may contain whitespace
    and punctuation.
