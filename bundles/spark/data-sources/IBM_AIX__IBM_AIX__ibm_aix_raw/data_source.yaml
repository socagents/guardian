how_to_use: |
  ## IBM IBM AIX â†’ Cortex XSIAM (dataset `ibm_aix_raw`)
  
    **Routing** â€” the broker lowercases the CEF/syslog header `vendor`/`product`, replaces
    non-alphanumerics with `_`, and appends `_raw` to choose the dataset (target: `ibm_aix_raw`).
  
    **Required CEF header for XSIAM** â€” the header must normalize to `ibm_aix`. The marketplace pack's display name `IBM` / `IBM_AIX` normalizes to `ibm_ibm_aix_raw`, a **different dataset** (vendor rename / legacy CEF identity), so use the vendor's actual CEF `deviceVendor`/`deviceProduct` that yields `ibm_aix` and confirm which dataset the events land in.
  
    **Ingestion shape**: **Flat / CEF-compatible.** The modeling rule reads flat top-level columns (no nested-JSON access). A CEF event routes in and the broker auto-extracts those columns, so this source maps from Phantom's existing CEF path once the dataset is XDM-bound.
  
    - **Modeling-rule gate**: `_raw_log ~= "\d{2}:\d{2}:\d{2}\s+Message\s+forwarded\s+from\s+\S+\:\s+syslog:"` â€” seed that field with an accepted value or the rule drops the row (XDM stays 0).
  
    **XDM mapping**: ~20 fields mapped to the unified data model (`xdm.*`), including: `xdm.auth.privilege_level`, `xdm.event.description`, `xdm.event.log_level`, `xdm.event.operation`, `xdm.session_context_id`, `xdm.source.agent.identifier`.
  
    **Operator setup**: This data source uses `_raw_log`-based parsing. Cortex's parsing rule reads from `_raw_log` to populate `_json` (or directly to extract XDM fields), and the modeling rule does `regextract`/`json_extract_scalar` on `_raw_log`. For simulated logs sent from Phantom to land in this dataset, **the operator must add a Broker VM Syslog Applet pre-configured with the matching vendor + product + a dedicated source port**. Without that applet, logs are tagged `unknown/unknown` and routed to `unknown_unknown_raw` â€” the parsing rule never fires. 
  
  Setup: XSIAM â†’ Settings â†’ Configurations â†’ Data Broker â†’ Applets â†’ Add Applet (Syslog) â†’ Vendor = `IBM`, Product = `IBM_AIX`, Port = (operator picks an unused port, e.g. 1514, 1515, ...). Phantom must then send to that port â€” current default is 514, which is reserved for the ASA applet.
  
    **Status**: Reverse-engineered 2026-06-04 from the parsing/modeling rules â€” routing, gate, and field
    inventory documented. **NOT yet XDM-validated on a live tenant** (no `validated` pill); validate by
    streaming a CEF batch and confirming a rich `xdm.*` count over a wide window.
  
    **Verify** (once the dataset is XDM-bound, wide â‰Ą7d window):
  
        config timeframe = 30d | datamodel dataset = ibm_aix_raw | sort desc _time | fields xdm.* | limit 20
