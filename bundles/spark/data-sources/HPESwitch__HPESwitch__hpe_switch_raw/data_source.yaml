fields:
- name: _raw_log
  type: string
  description: Raw log line as the vendor emits it before any parsing or normalization.
    Free-form text; may contain whitespace and punctuation.
  example: '<14>2024-01-15T14:23:01+0000 hpe: hpeswitch=HPESwitch action=allow user=jdoe'
- name: access_mode
  type: string
  description: Auth method. Free-form text; may contain whitespace and punctuation.
  example: sample_mode
- name: client_mac_address
  type: mac
  description: Client mac address. MAC address in colon-separated lowercase hex (aa:bb:cc:dd:ee:ff).
  example: aa:bb:cc:dd:ee:ff
- name: client_mac_formatted
  type: mac
  description: Source host MAC addresses. MAC address in colon-separated lowercase
    hex (aa:bb:cc:dd:ee:ff).
  example: aa:bb:cc:dd:ee:ff
- name: cmd
  type: string
  description: Destination process command line. Free-form text; may contain whitespace
    and punctuation.
  example: /usr/bin/curl https://example.com/
- name: device_hostname
  type: host
  description: Observer name. Hostname or fully-qualified domain name (RFC 1035 dotted
    labels); no protocol prefix.
  example: host01.example.com
- name: device_ip
  type: ipv4
  description: Intermediate IPv4. Dotted-quad IPv4 literal (e.g., 192.0.2.45); no
    port suffix, no surrounding brackets or quotes.
  example: 192.0.2.45
- name: device_product_id
  type: string_short
  description: Source host device model. Short opaque token, typically without whitespace;
    max ~64 chars.
  example: token
- name: device_serial_number
  type: string
  description: Observer unique identifier. Free-form text; may contain whitespace
    and punctuation.
  example: '7'
- name: dhcp_server_ip
