dataset_name: msft_azure_flowlogs_raw
vendor: Microsoft
product: AzureFlowLogs
description: Azure NSG Flow Logs capture every IP flow that hits an Azure Network Security Group — 5-tuple,
  packet/byte counts, allow/deny decision, flow state (start/continuing/end). The shape mirrors AWS VPC
  Flow Logs. Simulate Azure Flow Logs to validate detections for east-west reconnaissance, unexpected
  egress, or NSG-bypass patterns in your Azure VNet topology.
how_to_use: '## Sending these logs to Cortex XSIAM


  Phantom emits this vendor''s wire format as CEF over UDP — point a data worker

  at your XSIAM broker''s syslog destination and these records flow straight in.

  The schema below describes the vendor''s fields independent of destination, so

  the same records also work for Splunk, Elastic, or any syslog receiver.


  The CEF header''s **vendor** + **product** drive XSIAM''s parsing-rule routing:

  the broker normalizes them to `<lowercased-vendor>_<lowercased-product>_raw`

  (non-alphanumerics -> `_`) and matches your installed parsing rule. The PR/MR

  rules read NAMED COLUMNS, so the transport is invisible to them — pack the

  vendor''s field names as CEF extension `key=value` pairs.


  **Required CEF header for XSIAM**:


  - **vendor**: `msft`

  - **product**: `azure_flowlogs`


  Broker derives → `msft_azure_flowlogs_raw`.


  Use `msft` / `azure_flowlogs` (NOT `Microsoft` / `Azure`) to broker-derive `msft_azure_flowlogs_raw`.
  Display-name path collapses to `microsoft_azure_raw` — a catch-all that doesn''t carry the flow-log
  MR.


  **MR pattern**: Flat-field. MR reads top-level `srcIp_s`, `destIp_s`, `srcPort_d`, `destPort_d`, `L7Protocol_s`,
  `FlowStatus_s` — all flat columns.


  **Composite (nested-JSON) fields**: None. Flat-field vendor. Just send 13+ flat CEF extensions matching
  the MR''s field names.


  **Sentinel values**: None.


  **PR filter quirks**: `TimeGenerated` RFC-3339. **To populate XDM**, seed `category` to a value the MR
  maps — `NetworkSecurityGroupFlowEvent` (validated → XDM 48) or `FlowLogFlowEvent`; the MR filters
  `category in (…)` and yields zero XDM rows for anything else.


  **Saturation strategy**: Flat-field — saturates readily (validated 48 XDM with the category seed above).
  Single event of ~1000 bytes reaches the ceiling.


  **Single-event XDM ceiling**: ~13 XDM single-event (flat-field MR — highest single-event yield).


  **Verify**:


  ```xql

  datamodel dataset = msft_azure_flowlogs_raw

  | filter xdm.event.id contains "<your-marker>"

  | fields xdm.*

  | limit 1

  ```


  ### Make it map to XDM


  The `msft_azure_flowlogs_raw` modeling rule only runs when `category =
  "NetworkSecurityGroupFlowEvent"` (or `"FlowLogFlowEvent"`). When simulating, pass
  `observables_dict={"category": "NetworkSecurityGroupFlowEvent"}` to `phantom_create_data_worker`
  so the gate matches. The rule then populates core XDM: `xdm.source.ipv4` <- `sourceAddress`,
  `xdm.target.ipv4` <- `destinationAddress`, `xdm.source.port` <- `sourcePort`, `xdm.target.port`
  <- `destinationPort`, `xdm.network.ip_protocol` <- `transportProtocol`, `xdm.network.rule`
  <- `nsgRuleName`, `xdm.event.operation_sub_type` <- `operationName`, and `xdm.target.resource.id`
  <- `resourceId`. Flow counters (`xdm.source.sent_bytes`/`sent_packets`, `xdm.target.sent_bytes`/`sent_packets`)
  map from `bytesStoD`/`packetsStoD`/`bytesDtoS`/`packetsDtoS`. (A third branch gates on `_raw_log.Type
  = "NTAIpDetails"` for NTA flow logs.)'
