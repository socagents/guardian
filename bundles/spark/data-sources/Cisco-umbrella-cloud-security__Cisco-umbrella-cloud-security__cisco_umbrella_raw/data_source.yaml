  description: Filesystem path reported by the vendor. Free-form text; may contain
    whitespace and punctuation.
  example: /var/log/app.log
- name: _raw_log
  type: string
  description: Raw log line as the vendor emits it before any parsing or normalization.
    Free-form text; may contain whitespace and punctuation.
  example: '<14>2024-01-15T14:23:01+0000 cisco: cisco-umbrella-cloud-security=Cisco-umbrella-cloud-security
    action=allow user=jdoe'
- name: action
  type: enum
  description: 'DNS action. One of: Allowed, Blocked (case-sensitive).'
  enum_values:
  - Allowed
  - Blocked
  example: Allowed
- name: applicationCategories
  type: string
  is_array: true
  description: Detected application categories. Free-form text; may contain whitespace
    and punctuation.
  example: sample_applicationcateg
- name: applicationProtocols
  type: string
  is_array: true
  description: Detected application protocols. Free-form text; may contain whitespace
    and punctuation.
  example: sample_applicationproto
- name: applications
  type: string
  is_array: true
  description: Detected applications. Free-form text; may contain whitespace and punctuation.
  example: sample_applications
- name: blockedApplications
  type: string
  is_array: true
  description: Blocked applications. Free-form text; may contain whitespace and punctuation.
  example: sample_blockedapplicati
- name: categories
  type: string
  is_array: true
  description: Umbrella categories matched. Free-form text; may contain whitespace
    and punctuation.
  example: sample_categories
- name: destinationListIds
  type: integer
  is_array: true
  description: Matched destination list ids. Signed decimal integer; bare digits,
    optional leading minus.
  example: '42'
- name: destinationListNames
  type: string
  is_array: true
  description: Matched destination list names. Free-form text; may contain whitespace
    and punctuation.
  example: sample_destinationlistn
- name: deviceId
  type: string_short
  description: Umbrella device id. Short opaque token, typically without whitespace;
    max ~64 chars.
  example: token
- name: deviceName
  type: host
  description: Device name. Hostname or fully-qualified domain name (RFC 1035 dotted
    labels); no protocol prefix.
  example: host01.example.com
- name: domain
  type: domain
  description: Domain queried. Bare DNS domain name; no scheme, no path, no port.
  example: example.com
- name: externalIp
  type: ipv4
  description: Egress public IP. Dotted-quad IPv4 literal (e.g., 192.0.2.45); no port
    suffix, no surrounding brackets or quotes.
  example: 192.0.2.45
- name: identities
  type: string
  is_array: true
  description: All identities resolved. Free-form text; may contain whitespace and
    punctuation.
  example: sample_identities
- name: internalIp
  type: ipv4
  description: Internal client IP. Dotted-quad IPv4 literal (e.g., 192.0.2.45); no
    port suffix, no surrounding brackets or quotes.
  example: 192.0.2.45
- name: policyCategories
  type: string
  is_array: true
  description: Categories that matched policy rules. Free-form text; may contain whitespace
    and punctuation.
  example: sample_policycategories
- name: policyIdentity
  type: string
  description: Identity that triggered the policy. Free-form text; may contain whitespace
    and punctuation.
  example: sample_policyidentity
- name: policyRuleLabel
  type: string
  description: Policy rule that matched. Free-form text; may contain whitespace and
    punctuation.
  example: sample_policyrulelabel
- name: querySize
  type: integer_byte_count
  description: Query size in bytes. Unsigned decimal byte count; bare digits, no unit
    suffix.
  example: '1024'
- name: queryType
  type: string_short
  description: DNS query type (A/AAAA/CNAME/MX/...). Short opaque token, typically
    without whitespace; max ~64 chars.
  example: token
- name: responseCode
  type: string_short
  description: DNS response code (NOERROR/NXDOMAIN). Short opaque token, typically
    without whitespace; max ~64 chars.
  example: token
- name: responseSize
  type: integer_byte_count
  description: Response size. Unsigned decimal byte count; bare digits, no unit suffix.
  example: '1024'
- name: threat
  type: string
  description: Threat name detected. Free-form text; may contain whitespace and punctuation.
  example: sample_threat
- name: threatType
  type: string_short
  description: Threat type. Short opaque token, typically without whitespace; max
    ~64 chars.
  example: token
- name: timestamp
  type: datetime
  description: DNS query time. ISO-8601 timestamp with timezone (e.g., 2026-05-26T14:23:01Z).
  example: '2026-05-26T14:23:01Z'
- name: userEmail
  type: email
  description: User email. RFC 5322 `local@domain`; one address only.
  example: user@example.com
- name: userName
  type: user
  description: User name (when known). Account name as the vendor reports it — login
    name, UPN, or sAMAccountName; no domain prefix unless vendor emits one.
  example: jdoe
