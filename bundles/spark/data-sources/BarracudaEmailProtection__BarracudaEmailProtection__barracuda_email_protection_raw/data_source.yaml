- name: _raw_log
  type: string_long
  description: Raw Barracuda Email Protection log line as the vendor emits it over
    syslog \u2014 bracket-tagged key/value blocks. Free-form text; downstream parsers
    regex-extract the structured fields below from it.
  example: '<14>2024-01-15T14:23:01+0000 barracuda-esg: action=DELIVERED hdr_from=alice@corp.example.com
    hdr_to=bob@target.example.com size=4096'
- name: dst_domain
  type: domain
  description: Recipient (destination) domain \u2014 vendor-emitted right-hand side
    of the recipient email address. Bare DNS domain name; no scheme, no path, no port.
  example: target.example.com
- name: hdr_from
  type: email
  description: From-header email address of the message \u2014 the apparent sender
    as it appears in the `From:` header (NOT necessarily the SMTP envelope `MAIL FROM`).
    RFC 5322 `local@domain`; one address per emission.
  example: alice@corp.example.com
- name: hdr_to
  type: email
  description: To-header email address of the message \u2014 primary recipient as
    it appears in the `To:` header. RFC 5322 `local@domain`; one address per emission
    (multi-recipient mail emits separate records).
  example: bob@target.example.com
- name: message_id
  type: string
  description: RFC 5322 `Message-ID` header value \u2014 globally-unique identifier
    for this email assigned by the originating MTA. Looks email-like (`<local@domain>`)
    but is opaque syntax, NOT an addressable email. Angle brackets preserved.
  example: <20240115T142301.abc123@mail.corp.example.com>
- name: payload
  type: json
  description: Full structured payload of the email-protection event as Barracuda
    serializes it \u2014 carries headers, action, classification, attachments. JSON
    object emitted as a single line. Downstream modeling rules extract leaves via
    `payload -> <key>`.
  example: '{"timestamp":"2024-01-15T14:23:01+0000","action":"DELIVERED","subject":"Q1
    report"}'
- name: recipients
  type: email
  description: Comma-separated list of all envelope recipients (RCPT TO) for this
    message. Each item is RFC 5322 `local@domain`; multiple addresses joined by `,
    ` (literal comma + space).
  example: bob@target.example.com, carol@target.example.com
- name: size
  type: integer_byte_count
  description: Total size of the email message in bytes (headers + body + attachments),
    as Barracuda measured it at intake. Unsigned decimal byte count; bare digits,
    no unit suffix.
  example: '4096'
- name: src_ip
  type: ipv4
  description: Source IPv4. Dotted-quad IPv4 literal (e.g., 192.0.2.45); no port suffix,
    no surrounding brackets or quotes.
  example: 192.0.2.45
- name: subject
  type: email
  description: Email subject. RFC 5322 'local@domain' address; one address only â€”
    use an array field for multiple addresses.
  example: user@example.com
