how_to_use: |
  ## Barracuda BarracudaEmailProtection â†’ Cortex XSIAM (dataset `barracuda_email_protection_raw`)
  
    **Routing** â€” the broker lowercases the CEF/syslog header `vendor`/`product`, replaces
    non-alphanumerics with `_`, and appends `_raw` to choose the dataset (target: `barracuda_email_protection_raw`).
  
    **Required CEF header for XSIAM** â€” the header must normalize to `barracuda_email_protection`. The marketplace pack's display name `Barracuda` / `BarracudaEmailProtection` normalizes to `barracuda_barracudaemailprotection_raw`, a **different dataset** (vendor rename / legacy CEF identity), so use the vendor's actual CEF `deviceVendor`/`deviceProduct` that yields `barracuda_email_protection` and confirm which dataset the events land in.
  
    **Ingestion shape**: **JSON-native.** The modeling rule reads nested JSON (e.g. `payload -> dst_domain`). CEF/syslog routes + lands and the broker extracts top-level columns; the nested reads need the composite present, so Phantom's worker JSON-stringifies `type: json` composites onto the wire (keep the dotted-leaf fields).
  
    - **Modeling-rule gate**: none â€” the rule maps every routed row unconditionally.
  
    **XDM mapping**: ~11 fields mapped to the unified data model (`xdm.*`), including: `xdm.email.delivery_timestamp`, `xdm.email.message_id`, `xdm.email.recipients`, `xdm.email.sender`, `xdm.email.subject`, `xdm.event.description`.
  
    **Operator setup**: This data source uses `_raw_log`-based parsing. Cortex's parsing rule reads from `_raw_log` to populate `_json` (or directly to extract XDM fields), and the modeling rule does `regextract`/`json_extract_scalar` on `_raw_log`. For simulated logs sent from Phantom to land in this dataset, **the operator must add a Broker VM Syslog Applet pre-configured with the matching vendor + product + a dedicated source port**. Without that applet, logs are tagged `unknown/unknown` and routed to `unknown_unknown_raw` â€” the parsing rule never fires. 
  
  Setup: XSIAM â†’ Settings â†’ Configurations â†’ Data Broker â†’ Applets â†’ Add Applet (Syslog) â†’ Vendor = `Barracuda`, Product = `BarracudaEmailProtection`, Port = (operator picks an unused port, e.g. 1514, 1515, ...). Phantom must then send to that port â€” current default is 514, which is reserved for the ASA applet.
  
    **Status**: Reverse-engineered 2026-06-04 from the parsing/modeling rules â€” routing, gate, and field
    inventory documented. **NOT yet XDM-validated on a live tenant** (no `validated` pill); validate by
    streaming a CEF batch and confirming a rich `xdm.*` count over a wide window.
  
    **Verify** (once the dataset is XDM-bound, wide â‰Ą7d window):
  
        config timeframe = 30d | datamodel dataset = barracuda_email_protection_raw | sort desc _time | fields xdm.* | limit 20
