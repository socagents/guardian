fields:
- name: _raw_log
  type: string
  description: Raw log line as the vendor emits it before any parsing or normalization.
    Free-form text; may contain whitespace and punctuation.
  example: '<14>2024-01-15T14:23:01+0000 nginx: nginxwebserver=NGINXWebServer action=allow
    user=jdoe'
- name: Host
  type: host
  description: Host. Hostname or fully-qualified domain name (RFC 1035 dotted labels);
    no protocol prefix.
  example: host01.example.com
- name: Referrer
  type: string
  description: Referrer. Free-form text; may contain whitespace and punctuation.
  example: https://example.com/
- name: Request
  type: string
  description: Request. Free-form text; may contain whitespace and punctuation.
  example: sample_request
- name: Server
  type: string
  description: Server. Free-form text; may contain whitespace and punctuation.
  example: sample_server
- name: Source_Ip
  type: ipv4
  description: Source Ip. Dotted-quad IPv4 literal (e.g., 192.0.2.45); no port suffix,
    no surrounding brackets or quotes.
  example: 192.0.2.45
- name: Tid
  type: string
  description: Tid. Free-form text; may contain whitespace and punctuation.
  example: '1024'
- name: User_agent
  type: string
  description: User agent. Free-form text; may contain whitespace and punctuation.
  example: Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36
- name: Username
  type: user
  description: Source user username. Account name as the vendor reports it — login
    name, UPN, or sAMAccountName depending on the source; no domain prefix unless
    the vendor emits one.
  example: jdoe
- name: bytes_size
  type: string
  description: Destination sent bytes. Free-form text; may contain whitespace and
    punctuation.
  example: '1024'
- name: cid
  type: string
  description: Cid. Free-form text; may contain whitespace and punctuation.
  example: sample_cid
- name: client_address
  type: ipv4
  description: Source IPv4. Dotted-quad IPv4 literal (e.g., 192.0.2.45); no port suffix,
    no surrounding brackets or quotes.
  example: 192.0.2.45
- name: client_address_ipv4
  type: ipv4
  description: Client address ipv4. Dotted-quad IPv4 literal (e.g., 192.0.2.45); no
    port suffix, no surrounding brackets or quotes.
  example: 192.0.2.45
- name: client_address_ipv6
  type: ipv6
  description: Client address ipv6. Colon-separated hexadecimal IPv6 literal (RFC
    4291); no zone suffix, no surrounding brackets.
  example: 2001:db8::1
- name: destination_port
  type: integer_port
  description: Destination resource value. Unsigned integer 0-65535 representing a
    TCP/UDP port; bare digits, no quotes.
  example: '443'
- name: error_message
  type: string
  description: Alert description. Free-form text; may contain whitespace and punctuation.
  example: Operation completed successfully.
- name: httpmethod
  type: string
  description: Network HTTP method. Free-form text; may contain whitespace and punctuation.
  example: sample_httpmethod
- name: log_level
  type: string
  description: Alert severity. Free-form text; may contain whitespace and punctuation.
  example: info
- name: referrer
  type: string
  description: Event description. Free-form text; may contain whitespace and punctuation.
  example: https://example.com/
- name: requested_line
  type: url
  description: Network HTTP URL. Full URL with scheme (http/https/ftp); percent-encoded
    if it contains non-ASCII characters.
  example: https://example.com/path?q=1
- name: server
  type: user
  description: Destination user username. Account name as the vendor reports it —
    login name, UPN, or sAMAccountName depending on the source; no domain prefix unless
    the vendor emits one.
  example: jdoe
- name: source_ip
  type: ipv4
  description: Source IPv4. Dotted-quad IPv4 literal (e.g., 192.0.2.45); no port suffix,
    no surrounding brackets or quotes.
  example: 192.0.2.45
- name: sourceipv4
  type: ipv4
  description: Sourceipv4. Dotted-quad IPv4 literal (e.g., 192.0.2.45); no port suffix,
    no surrounding brackets or quotes.
  example: 192.0.2.45
- name: sourceipv6
  type: ipv6
  description: Sourceipv6. Colon-separated hexadecimal IPv6 literal (RFC 4291); no
    zone suffix, no surrounding brackets.
  example: 2001:db8::1
- name: statuscode
  type: string
  description: Network HTTP response code. Free-form text; may contain whitespace
    and punctuation.
  example: sample_statuscode
- name: tid
  type: string
  description: Destination user identifier. Free-form text; may contain whitespace
    and punctuation.
  example: '1024'
- name: uri
  type: string
  description: Source user identifier. Free-form text; may contain whitespace and
    punctuation.
  example: /api/v1/path?q=1
use_cases:
- WebServer
how_to_use: |
  ## nginx nginx → Cortex XSIAM (dataset `nginx_nginx_raw`)
  
    **Routing** — the broker lowercases the CEF/syslog header `vendor`/`product`, replaces
    non-alphanumerics with `_`, and appends `_raw` to choose the dataset (target: `nginx_nginx_raw`).
  
    **Required CEF header for XSIAM**:
    - **vendor**: `nginx`
    - **product**: `nginx`
  
    These normalize → `nginx_nginx_raw`.
  
    **Ingestion shape**: **Flat / CEF-compatible.** The modeling rule reads flat top-level columns (no nested-JSON access). A CEF event routes in and the broker auto-extracts those columns, so this source maps from Phantom's existing CEF path once the dataset is XDM-bound.
  
    - **Modeling-rule gate**: `_raw_log contains "GET" or _raw_log contains "HEAD" or _raw_log contains "POST" or _raw_log contains "DELETE" or _raw_log contains "CONNECT" or _raw_log contain` — seed that field with an accepted value or the rule drops the row (XDM stays 0).
  
    **XDM mapping**: ~30 fields mapped to the unified data model (`xdm.*`), including: `XDM.Audit.TriggeredBy.identity.uuid`, `XDM.Audit.TriggeredBy.ipv4`, `XDM.Audit.audited_resource.value`, `XDM.Audit.event_timestamp`, `XDM.Audit.identity.name`, `XDM.Audit.identity.uuid`.
  
    **Operator setup**: This data source uses `_raw_log`-based parsing. Cortex's parsing rule reads from `_raw_log` to populate `_json` (or directly to extract XDM fields), and the modeling rule does `regextract`/`json_extract_scalar` on `_raw_log`. For simulated logs sent from Phantom to land in this dataset, **the operator must add a Broker VM Syslog Applet pre-configured with the matching vendor + product + a dedicated source port**. Without that applet, logs are tagged `unknown/unknown` and routed to `unknown_unknown_raw` — the parsing rule never fires. 
  
  Setup: XSIAM → Settings → Configurations → Data Broker → Applets → Add Applet (Syslog) → Vendor = `nginx`, Product = `nginx`, Port = (operator picks an unused port, e.g. 1514, 1515, ...). Phantom must then send to that port — current default is 514, which is reserved for the ASA applet.
  
    **Status**: Reverse-engineered 2026-06-04 from the parsing/modeling rules — routing, gate, and field
    inventory documented. **NOT yet XDM-validated on a live tenant** (no `validated` pill); validate by
    streaming a CEF batch and confirming a rich `xdm.*` count over a wide window.
  
    **Verify** (once the dataset is XDM-bound, wide ≥7d window):
  
        config timeframe = 30d | datamodel dataset = nginx_nginx_raw | sort desc _time | fields xdm.* | limit 20
