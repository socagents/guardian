how_to_use: |
  ## Sending Cisco Duo logs to Cortex XSIAM

  Phantom emits Duo's admin-API events as CEF over UDP to your XSIAM broker.

  Required CEF header for XSIAM:

  - vendor: `duo`
  - product: `duo`

  Broker derives -> `duo_duo_raw`.

  MR pattern: GATED on `eventtype`. The modeling rule fires only when eventtype
  is in {administrator, authentication, telephony}; the authentication branch is
  richest. Seed it: observables_dict={"eventtype": ["authentication"]} (the
  bundled eventtype example is already authentication). Pack the full field set
  as CEF extensions.

  Validated 2026-06-03 (#117): 54 XDM fields.

  Verify XDM (use a WIDE >=7d window — synthetic _time may be in the past):

      config timeframe = 30d | datamodel dataset = duo_duo_raw
        | sort desc _time | fields xdm.* | limit 60

  Count distinct non-null xdm.* keys (expect ~54).
validated: true
