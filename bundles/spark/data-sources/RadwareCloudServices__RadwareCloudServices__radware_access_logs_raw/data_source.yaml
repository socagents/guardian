how_to_use: |
  ## radware access logs → Cortex XSIAM (dataset `radware_access_logs_raw`)
  
    **Routing** — the broker lowercases the CEF/syslog header `vendor`/`product`, replaces
    non-alphanumerics with `_`, and appends `_raw` to choose the dataset (target: `radware_access_logs_raw`).
  
    **Required CEF header for XSIAM**:
    - **vendor**: `radware`
    - **product**: `access_logs`
  
    These normalize → `radware_access_logs_raw`.
  
    **Ingestion shape**: **JSON-native.** The modeling rule reads nested JSON (e.g. `$.source_ip`). CEF/syslog routes + lands and the broker extracts top-level columns; the nested reads need the composite present, so Phantom's worker JSON-stringifies `type: json` composites onto the wire (keep the dotted-leaf fields).
  
    - **Modeling-rule gate**: `_raw_log contains "AppWallAttackSysLogMessage"` — seed that field with an accepted value or the rule drops the row (XDM stays 0).
  
    **XDM mapping**: ~60 fields mapped to the unified data model (`xdm.*`), including: `xdm.alert.category`, `xdm.alert.description`, `xdm.alert.name`, `xdm.alert.original_alert_id`, `xdm.alert.severity`, `xdm.alert.subcategory`.
  
    **Operator setup**: This data source uses `_raw_log`-based parsing. Cortex's parsing rule reads from `_raw_log` to populate `_json` (or directly to extract XDM fields), and the modeling rule does `regextract`/`json_extract_scalar` on `_raw_log`. For simulated logs sent from Phantom to land in this dataset, **the operator must add a Broker VM Syslog Applet pre-configured with the matching vendor + product + a dedicated source port**. Without that applet, logs are tagged `unknown/unknown` and routed to `unknown_unknown_raw` — the parsing rule never fires. 
  
  Setup: XSIAM → Settings → Configurations → Data Broker → Applets → Add Applet (Syslog) → Vendor = `radware`, Product = `access_logs`, Port = (operator picks an unused port, e.g. 1514, 1515, ...). Phantom must then send to that port — current default is 514, which is reserved for the ASA applet.
  
    **Status**: Reverse-engineered 2026-06-04 from the parsing/modeling rules — routing, gate, and field
    inventory documented. **NOT yet XDM-validated on a live tenant** (no `validated` pill); validate by
    streaming a CEF batch and confirming a rich `xdm.*` count over a wide window.
  
    **Verify** (once the dataset is XDM-bound, wide ≥7d window):
  
        config timeframe = 30d | datamodel dataset = radware_access_logs_raw | sort desc _time | fields xdm.* | limit 20
