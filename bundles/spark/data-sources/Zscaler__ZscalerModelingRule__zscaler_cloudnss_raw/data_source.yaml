- name: _raw_log
  type: json
  description: — see leaf entries for nested paths. JSON object with 98 keys; full key list defined as
    dotted-path leaves below.
  example: '{}'
- name: dest_ipv4
  type: ipv4
  description: Destination address of the connection target. Dotted-quad IPv4 literal (e.g., 192.0.2.45);
    no port suffix, no surrounding brackets or quotes.
  example: 203.0.113.42
- name: dest_ipv6
  type: ipv6
  description: Destination address of the connection target. Colon-separated hexadecimal IPv6 literal
    (RFC 4291); no zone suffix, no surrounding brackets.
  example: 2001:db8::1
- name: os
  type: string
  description: Vendor-emitted field 'Os'. Free-form text; may contain whitespace and punctuation.
  example: Linux
- name: proto
  type: string
  description: Network protocol name or numeric IANA assignment. Free-form text; may contain whitespace
    and punctuation.
  example: tcp
- name: sourcetype
  type: string
  description: Modeling-rule GATE — the NSS feed type the parsing rule extracts from _raw_log. Must equal
    one of zscalernss-web | zscalernss-dns | zscalernss-fw | zscalernss-audit for the modeling rule to
    fire and populate xdm.* (seed it via observables_dict on the bare leaf name `sourcetype`).
  example: zscalernss-web
- name: src_ipv4
  type: ipv4
  description: Source address of the connection initiator. Dotted-quad IPv4 literal (e.g., 192.0.2.45);
    no port suffix, no surrounding brackets or quotes.
  example: 203.0.113.42
- name: src_ipv6
  type: ipv6
  description: Source address of the connection initiator. Colon-separated hexadecimal IPv6 literal (RFC
    4291); no zone suffix, no surrounding brackets.
  example: 2001:db8::1
- name: url_category
