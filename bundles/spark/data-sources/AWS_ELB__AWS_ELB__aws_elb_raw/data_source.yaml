schema_version: 1
id: AWS_ELB
pack_name: AWS_ELB
rule_name: AWS_ELB
dataset_name: aws_elb_raw
vendor: Amazon Web Services
product: AWS_ELB
description: Elastic Load Balancing (ELB) automatically distributes incoming application
  traffic across multiple targets and virtual appliances in one or more Availability
  Zones (AZs).
categories:
- Analytics & SIEM
- Cloud Services
version: 1.0.4
origin: bundle
author: phantom-bundle
uploaded_by: null
created_at: '2026-05-24T16:53:58Z'
updated_at: '2026-05-24T16:53:58Z'
logo:
  mime_type: image/svg+xml
  data: 
  source: simpleicons:amazonaws
  license: CC0-1.0
  fidelity: monochrome-brand
formats:
- SYSLOG
- CEF
- JSON
is_rawlog_only: false
fields:
- name: _raw_log
  type: string
  description: Raw log line as the vendor emits it before any parsing or normalization.
    Free-form text; may contain whitespace and punctuation.
  example: '<14>2024-01-15T14:23:01+0000 amazon: aws_elb=AWS_ELB action=allow user=jdoe'
- name: client_ipv4
  type: ipv4
  description: Source IPv4. Dotted-quad IPv4 literal (e.g., 192.0.2.45); no port suffix,
    no surrounding brackets or quotes.
  example: 192.0.2.45
- name: client_ipv6
  type: ipv6
  description: Source IPv6. Colon-separated hexadecimal IPv6 literal (RFC 4291); no
    zone suffix, no surrounding brackets.
  example: 2001:db8::1
- name: client_port
  type: integer_port
  description: Source port. Unsigned integer 0-65535 representing a TCP/UDP port;
    bare digits, no quotes.
  example: '443'
- name: field_list
  type: string
  description: Network application protocol. Free-form text; may contain whitespace
    and punctuation.
  example: sample_list
- name: field_separator
  type: string
  description: Field separator. Free-form text; may contain whitespace and punctuation.
  example: sample_separator
- name: partial_duration_time
  type: datetime
  description: Event duration. ISO-8601 timestamp with timezone (e.g., 2026-05-26T14:23:01Z).
  example: '2026-05-26T14:23:01Z'
- name: req_method
  type: string
  description: Network HTTP method. Free-form text; may contain whitespace and punctuation.
  example: GET
- name: req_method_version
  type: string
  description: Network application protocol category. Free-form text; may contain
    whitespace and punctuation.
  example: 1.0.0
- name: req_port
  type: integer_port
  description: Intermediate port. Unsigned integer 0-65535 representing a TCP/UDP
    port; bare digits, no quotes.
  example: '443'
- name: req_process_time
  type: datetime
  description: Req process time. ISO-8601 timestamp with timezone (e.g., 2026-05-26T14:23:01Z).
  example: '2026-05-26T14:23:01Z'
- name: req_uri
  type: string
  description: Req uri. Free-form text; may contain whitespace and punctuation.
  example: /api/v1/path?q=1
- name: req_url
  type: url
  description: Network HTTP URL. Full URL with scheme (http/https/ftp); percent-encoded
    if it contains non-ASCII characters.
  example: https://example.com/path?q=1
- name: resource_zone
  type: string
  description: Resource zone. Free-form text; may contain whitespace and punctuation.
  example: us-east-1a
- name: response_process_time
  type: datetime
  description: Response process time. ISO-8601 timestamp with timezone (e.g., 2026-05-26T14:23:01Z).
  example: '2026-05-26T14:23:01Z'
- name: target_ipv4
  type: ipv4
  description: Destination IPv4. Dotted-quad IPv4 literal (e.g., 192.0.2.45); no port
    suffix, no surrounding brackets or quotes.
  example: 192.0.2.45
- name: target_ipv6
  type: ipv6
  description: Destination IPv6. Colon-separated hexadecimal IPv6 literal (RFC 4291);
    no zone suffix, no surrounding brackets.
  example: 2001:db8::1
- name: target_port
  type: integer_port
  description: Destination port. Unsigned integer 0-65535 representing a TCP/UDP port;
    bare digits, no quotes.
  example: '443'
- name: target_process_time
  type: datetime
  description: Target process time. ISO-8601 timestamp with timezone (e.g., 2026-05-26T14:23:01Z).
  example: '2026-05-26T14:23:01Z'
use_cases:
- Cloud
- SaaS
how_to_use: |
  ## AWS ELB → Cortex XSIAM (dataset `aws_elb_raw`)

  Routing — broker-derived from the CEF/syslog header (lowercased):
  - vendor: `AWS`
  - product: `ELB`
  Broker derives -> `aws_elb_raw`.

  Ingestion shape: **flat / CEF-compatible.** This modeling rule reads flat
  top-level columns (no nested-JSON access) and maps to the unified XDM (`xdm.*`). A
  synthetic flat-CEF event routes in and the broker extracts those columns,
  so this source CAN map from Phantom's existing CEF path — the only missing
  piece is the dataset binding.
  (Reverse-engineered 2026-06-03 #118; routing/landing verified Phantom-side.
  NOT XDM-validated on a stock tenant — see prerequisite(s) below.)

  Maps to ~35 fields including: xdm.alert.name, xdm.alert.severity, xdm.event.description, xdm.event.duration, xdm.event.outcome, xdm.event.outcome_reason.
  Modeling rule: unconditional (no gate field).

  To populate XDM, **one** tenant-side prerequisite (then the existing flat-CEF
  stream suffices — same class as the Netskope marketplace-MR finding):
  1. Onboard the AWS content pack so `aws_elb_raw` is XDM-enabled — the
     marketplace modeling rule binds to the dataset. Broker-auto-created
     datasets stay raw-only and the rule never applies (datamodel returns 0).
     Once bound, re-run the CEF simulate + verify over a wide window.

  Verify (once prerequisite(s) met, wide >=7d window):
      config timeframe = 30d | datamodel dataset = aws_elb_raw | sort desc _time | fields xdm.* | limit 20
