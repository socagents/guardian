- name: ipAddress
  type: string
  description: IPv4/IPv6 address — vendor-emitted, no version split. Free-form text;
    may contain whitespace and punctuation.
  example: 192.0.2.45
- name: requestTime
  type: datetime
  description: Vendor-emitted field 'RequestTime'. ISO-8601 timestamp with timezone
    (e.g., 2026-05-26T14:23:01Z).
  example: '2026-05-26T14:23:01Z'
- name: sessionId
  type: string_short
  description: Unique identifier — assigned by Workday per event. Short opaque token,
    typically without whitespace; max ~64 chars.
  example: sess-435bb02e-c1a
- name: systemAccount
  type: user
  description: Vendor-emitted field 'SystemAccount'. Account name as the vendor reports
    it — login name, UPN, or sAMAccountName depending on the source; no domain prefix
    unless the vendor emits one.
  example: jsmith
- name: target
  type: json
  description: '— see leaf entries for nested paths. JSON object with keys: descriptor,
    href, id (each key defined as a dotted-path leaf below).'
  example: '{}'
- name: taskDisplayName
  type: string
  description: Vendor-emitted field 'TaskDisplayName'. Free-form text; may contain
    whitespace and punctuation.
  example: John Doe
- name: taskId
  type: string
  description: Vendor-emitted field 'TaskId'. Free-form text; may contain whitespace
    and punctuation.
  example: sample_taskid
- name: userAgent
  type: string_long
  description: Client User-Agent header value as received by Workday. Free-form text;
    may span multiple lines or contain large payloads.
  example: Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36
- name: target.descriptor
  type: string
  description: Vendor-emitted field 'Target › descriptor'. Leaf of the 'target' composite.
    Free-form text; may contain whitespace and punctuation.
  example: sample_descriptor
- name: target.href
  type: url
  description: Vendor-emitted field 'Target › href'. Leaf of the 'target' composite.
    Full URL with scheme (http/https/ftp); percent-encoded if it contains non-ASCII
    characters.
  example: https://example.com/path
- name: target.id
  type: string_short
  description: Opaque identifier emitted by Workday. Short opaque token, typically
    without whitespace; max ~64 chars.
  example: wor-51d08821
