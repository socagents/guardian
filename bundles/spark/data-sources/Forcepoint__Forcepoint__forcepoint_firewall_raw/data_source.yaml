fields:
- name: act
  type: string_short
  description: CEF action — what Forcepoint did with the event (allow/block/quarantine/etc.).
    Short opaque token, typically without whitespace; max ~64 chars.
  example: token_value
- name: app
  type: string_short
  description: Application name emitted by Forcepoint. Short opaque token, typically
    without whitespace; max ~64 chars.
  example: token_value
- name: cefDeviceEventClassId
  type: string_short
  description: CEF device-event class ID — vendor-specific event-type identifier.
    Short opaque token, typically without whitespace; max ~64 chars.
  example: token_value
- name: cefDeviceVersion
  type: string_short
  description: CEF device-version field — version of the Forcepoint product emitting
    this event. Short opaque token, typically without whitespace; max ~64 chars.
  example: token_value
- name: cefName
  type: string_short
  description: CEF event name — short human-readable label for the event class. Short
    opaque token, typically without whitespace; max ~64 chars.
  example: token_value
- name: cefSeverity
  type: integer
  description: CEF severity score (0-10) as classified by Forcepoint. Signed decimal
    integer; bare digits, optional leading minus.
  example: '42'
- name: cefVersion
  type: string_short
  description: CEF specification version — typically `0` for CEF 1.x. Short opaque
    token, typically without whitespace; max ~64 chars.
  example: token_value
- name: destinationServiceName
  type: string
  description: Vendor-emitted field 'DestinationServiceName'. Free-form text; may
    contain whitespace and punctuation.
  example: sample_destinationservi
- name: deviceExternalId
  type: string
  description: Vendor-emitted field 'DeviceExternalId'. Free-form text; may contain
    whitespace and punctuation.
  example: sample_deviceexternalid
- name: deviceFacility
  type: string
  description: Vendor-emitted field 'DeviceFacility'. Free-form text; may contain
    whitespace and punctuation.
  example: sample_devicefacility
- name: dpt
  type: integer_port
  description: CEF destination port — TCP/UDP port on the target side. Unsigned integer
    0-65535 representing a TCP/UDP port; bare digits, no quotes.
  example: '42'
- name: dst
  type: string
  description: CEF destination IP — IPv4/IPv6 address of the target endpoint. Free-form
    text; may contain whitespace and punctuation.
  example: 198.51.100.7
- name: dvc
  type: string
  description: Vendor-emitted field 'Dvc'. Free-form text; may contain whitespace
    and punctuation.
  example: sample_dvc
- name: dvchost
  type: string
  description: Vendor-emitted field 'Dvchost'. Free-form text; may contain whitespace
    and punctuation.
  example: sample_dvchost
- name: in
  type: integer
  description: Vendor-emitted field 'In'. Signed decimal integer; bare digits, optional
    leading minus.
  example: '42'
- name: out
  type: integer
  description: Vendor-emitted field 'Out'. Signed decimal integer; bare digits, optional
    leading minus.
  example: '42'
- name: proto
  type: string
  description: Network protocol name or numeric IANA assignment. Free-form text; may
    contain whitespace and punctuation.
  example: tcp
- name: request
  type: url
  description: HTTP request line or full request payload as captured by Forcepoint.
    Full URL with scheme (http/https/ftp); percent-encoded if non-ASCII.
  example: https://example.com/path
- name: requestURL
  type: url
  description: Vendor-emitted field 'RequestURL'. Full URL with scheme (http/https/ftp);
    percent-encoded if it contains non-ASCII characters.
  example: https://example.com/path
- name: spt
  type: integer_port
  description: CEF source port — TCP/UDP port on the source side. Unsigned integer
    0-65535 representing a TCP/UDP port; bare digits, no quotes.
  example: '42'
- name: src
  type: string
  description: CEF source IP — IPv4/IPv6 address of the source endpoint. Free-form
    text; may contain whitespace and punctuation.
  example: 192.0.2.45
- name: suser
  type: user
  description: CEF source user — username of the actor initiating the event. Account
    name as the vendor reports it — login name, UPN, or sAMAccountName; no domain
    prefix unless vendor emits one.
  example: jsmith
use_cases:
