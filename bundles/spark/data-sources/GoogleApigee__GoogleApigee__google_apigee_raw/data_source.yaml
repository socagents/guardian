how_to_use: |
  ## Google Apigee → Cortex XSIAM (dataset `google_apigee_raw`)

  **Validated 2026-06-03 (#118)** — maps **10 xdm fields** end-to-end
  via CEF-over-syslog on a tenant with the **Google Apigee** content pack installed
  (the pack binds the modeling rule + parsing rule to the dataset).

  Required CEF header — the broker derives the dataset from it (lowercased):
  - vendor: `Google`
  - product: `Apigee`
  Broker derives -> `google_apigee_raw`.
  Modeling rule: unconditional (no gate field).

  JSON-native MR: it reads nested JSON via `json_extract_scalar(...)`/`->`. The
  worker emits composite schema fields as JSON strings on the CEF wire, which the
  rule parses — so CEF-over-syslog populates these fields (no HTTP collector).

  Verify (wide >=7d window):
      config timeframe = 30d | datamodel dataset = google_apigee_raw | sort desc _time | fields xdm.* | limit 20
