- name: request
  type: string
  description: HTTP request line or full request payload as captured by Google. Free-form
    text; may contain whitespace and punctuation.
  example: sample_request
- name: requestUri
  type: url
  description: Vendor-emitted field 'RequestUri'. Full URL with scheme (http/https/ftp);
    percent-encoded if it contains non-ASCII characters.
  example: https://example.com/path
- name: responseCode
  type: string
  description: Vendor-emitted field 'ResponseCode'. Free-form text; may contain whitespace
    and punctuation.
  example: sample_responsecode
- name: user
  type: string
  description: User account associated with the event. Free-form text; may contain
    whitespace and punctuation.
  example: jdoe
