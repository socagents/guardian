fields:
- name: SOURCE_LOG_TYPE
  type: string
  description: Event type or category as the vendor classifies it. Free-form text;
    may contain whitespace and punctuation.
  example: authentication
- name: operation
  type: string
  description: Vendor-emitted field 'Operation'. Free-form text; may contain whitespace
    and punctuation.
