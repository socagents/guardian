how_to_use: |
  ## Cloudflare CloudflareZeroTrust → Cortex XSIAM (dataset `cloudflare_zerotrust_raw`)
  
    **Routing** — the broker lowercases the CEF/syslog header `vendor`/`product`, replaces
    non-alphanumerics with `_`, and appends `_raw` to choose the dataset (target: `cloudflare_zerotrust_raw`).
  
    **Required CEF header for XSIAM** — the header must normalize to `cloudflare_zerotrust`. The marketplace pack's display name `Cloudflare` / `CloudflareZeroTrust` normalizes to `cloudflare_cloudflarezerotrust_raw`, a **different dataset** (vendor rename / legacy CEF identity), so use the vendor's actual CEF `deviceVendor`/`deviceProduct` that yields `cloudflare_zerotrust` and confirm which dataset the events land in.
  
    **Ingestion shape**: **JSON-native.** The modeling rule reads nested JSON (e.g. `action -> type`). CEF/syslog routes + lands and the broker extracts top-level columns; the nested reads need the composite present, so Phantom's worker JSON-stringifies `type: json` composites onto the wire (keep the dotted-leaf fields).
  
    - **Modeling-rule gate**: `SOURCE_LOG_TYPE in ("Account Audit Logs", "User Audit Logs")` — seed that field with an accepted value or the rule drops the row (XDM stays 0).
  
    **XDM mapping**: ~22 fields mapped to the unified data model (`xdm.*`), including: `xdm.auth.auth_method`, `xdm.auth.privilege_level`, `xdm.event.description`, `xdm.event.id`, `xdm.event.operation`, `xdm.event.original_event_type`.
  
    **Operator setup**: This data source has typed-column data that doesn't look like CEF (columns are camelCase API fields, JSON sub-objects, etc.). Most likely arrives via the XSIAM HTTP Collector with a source tag mapped to vendor=`Cloudflare`, product=`CloudflareZeroTrust`, or via a vendor-specific XDR connector pull. Phantom can POST JSON to the HTTP collector; the operator must configure the collector's source tag to land events in this dataset.
  
    **Status**: Reverse-engineered 2026-06-04 from the parsing/modeling rules — routing, gate, and field
    inventory documented. **NOT yet XDM-validated on a live tenant** (no `validated` pill); validate by
    streaming a CEF batch and confirming a rich `xdm.*` count over a wide window.
  
    **Verify** (once the dataset is XDM-bound, wide ≥7d window):
  
        config timeframe = 30d | datamodel dataset = cloudflare_zerotrust_raw | sort desc _time | fields xdm.* | limit 20
