origin: bundle
author: phantom-bundle
uploaded_by: null
created_at: '2026-05-23T09:26:17Z'
updated_at: '2026-05-23T09:26:17Z'
logo:
  mime_type: image/svg+xml
  data: 
  source: phantom-bundle (v0.13.0 migration)
  license: MIT
  fidelity: branded
formats:
- SYSLOG
- CEF
- JSON
is_rawlog_only: false
fields:
- name: actor
  type: json
  description: '— see leaf entries for nested paths. JSON object with keys: alternateId, displayName,
    id, type (each key defined as a dotted-path leaf below).'
  example: '{"id":"00u1ab2c3d","type":"User","alternateId":"alice@example.com"}'
- name: authenticationContext
  type: json
  description: '— see leaf entries for nested paths. JSON object with keys: authenticationProvider, credentialProvider,
    credentialType, externalSessionId, issuer (each key defined as a dotted-path leaf below).'
  example: '{"key":"value"}'
- name: client
  type: json
  description: '— see leaf entries for nested paths. JSON object with keys: device, geographicalContext,
    id, ipAddress, userAgent, zone (each key defined as a dotted-path leaf below).'
  example: '{"id":"web","userAgent":{"rawUserAgent":"Mozilla/5.0"},"ipAddress":"203.0.113.42"}'
- name: debugContext
  type: json
  description: '— see leaf entries for nested paths. JSON object with keys: debugData (each key defined
    as a dotted-path leaf below).'
  example: '{"key":"value"}'
- name: displayMessage
  type: string_long
  description: Human-readable event message. Free-form text; may span multiple lines or contain large
    payloads.
  example: Free-form vendor-emitted message describing the event.
- name: eventType
  type: string_short
  description: Event type slug (user.session.start, user.account.lock, etc.). Short opaque token, typically
    without whitespace; max ~64 chars.
  example: user.session.start
- name: legacyEventType
  type: string_short
  description: Legacy event type name (pre-v2 system log). Short opaque token, typically without whitespace;
    max ~64 chars.
  example: token
- name: outcome
  type: json
  description: '— see leaf entries for nested paths. JSON object with keys: reason, result (each key defined
    as a dotted-path leaf below).'
  example: '{"key":"value"}'
- name: published
  type: datetime
  description: When the event was emitted by the Okta system. ISO-8601 timestamp with timezone (e.g.,
    2026-05-26T14:23:01Z).
  example: '2026-05-26T14:23:01Z'
- name: request
  type: json
  description: '— see leaf entries for nested paths. JSON array; each element is an object with keys:
    ipChain (each key defined as a dotted-path leaf below).'
  example: '{"key":"value"}'
- name: securityContext
  type: json
  description: '— see leaf entries for nested paths. JSON object with keys: asNumber, asOrg, domain, isProxy,
    isp (each key defined as a dotted-path leaf below).'
  example: '{"key":"value"}'
- name: severity
  type: enum
  description: 'Event severity. One of: DEBUG, INFO, WARN, ERROR (case-sensitive).'
  example: DEBUG
  enum_values:
  - DEBUG
  - INFO
  - WARN
  - ERROR
- name: target
  type: json
  description: Array of target entities (user, app, group, etc.). JSON object or array; structured payload
    — see dotted-path leaves below.
  example: '{"id":"res-abc123","type":"S3Object","displayName":"reports.csv"}'
  is_array: true
- name: transaction
  type: json
  description: '— see leaf entries for nested paths. JSON object with keys: detail, id, type (each key
    defined as a dotted-path leaf below).'
  example: '{"key":"value"}'
- name: uuid
  type: string_short
  description: Unique event identifier. Short opaque token, typically without whitespace; max ~64 chars.
  example: f23a4b56-...
- name: actor.alternateId
  type: email
  description: Actor alternate identifier (typically email). RFC 5322 `local@domain`; one address only.
  example: user@example.com
- name: actor.displayName
  type: string
  description: Actor display name. Free-form text; may contain whitespace and punctuation.
  example: John Doe
- name: actor.id
  type: string_short
  description: Actor (user/app/system) that performed the action. Short opaque token, typically without
    whitespace; max ~64 chars.
  example: token
- name: actor.type
  type: enum
  description: 'Actor type. One of: User, AppUser, SystemPrincipal, Client (case-sensitive).'
  example: User
  enum_values:
  - User
  - AppUser
  - SystemPrincipal
  - Client
- name: authenticationContext.authenticationProvider.credentialProvider
  type: string
  description: Vendor-emitted field 'AuthenticationContext › authenticationProvider › credentialProvider'.
    Leaf of the 'authenticationContext' composite. Free-form text; may contain whitespace and punctuation.
  example: 00u1ab2c3d4e5f6
- name: authenticationContext.authenticationProvider.credentialType
  type: string
  description: Vendor-emitted field 'AuthenticationContext › authenticationProvider › credentialType'.
    Leaf of the 'authenticationContext' composite. Free-form text; may contain whitespace and punctuation.
  example: AuditEvent
- name: authenticationContext.authenticationProvider.externalSessionId
  type: string
  description: Vendor-emitted field 'AuthenticationContext › authenticationProvider › externalSessionId'.
    Leaf of the 'authenticationContext' composite. Free-form text; may contain whitespace and punctuation.
  example: sess-0e7c3ce6-354
- name: client.device
  type: string
  description: Vendor-emitted field 'Client › device'. Leaf of the 'client' composite. Free-form text;
    may contain whitespace and punctuation.
  example: host-prod-01
- name: client.geographicalContext.city
  type: string_short
  description: Resolved city of source IP. Short opaque token, typically without whitespace; max ~64 chars.
  example: token
- name: client.geographicalContext.country
  type: country_code
  description: Resolved country of source IP. ISO 3166-1 alpha-2 uppercase country code.
  example: US
- name: client.geographicalContext.geolocation.lat
  type: string
  description: Vendor-emitted field 'Client › geographicalContext › geolocation › lat'. Leaf of the 'client'
    composite. Free-form text; may contain whitespace and punctuation.
  example: '37.7749'
- name: client.geographicalContext.geolocation.lon
  type: string
  description: Vendor-emitted field 'Client › geographicalContext › geolocation › lon'. Leaf of the 'client'
    composite. Free-form text; may contain whitespace and punctuation.
  example: '-122.4194'
- name: client.geographicalContext.state
  type: string
  description: Vendor-emitted field 'Client › geographicalContext › state'. Leaf of the 'client' composite.
    Free-form text; may contain whitespace and punctuation.
  example: CA
- name: client.id
  type: string_short
  description: Opaque identifier emitted by Okta. Short opaque token, typically without whitespace; max
    ~64 chars.
  example: okt-a95ae98d
- name: client.ipAddress
  type: ipv4
  description: Source IP of the request. Dotted-quad IPv4 literal (e.g., 192.0.2.45); no port suffix,
    no surrounding brackets or quotes.
  example: 203.0.113.42
- name: client.userAgent.browser
  type: string_short
  description: Client browser family. Short opaque token, typically without whitespace; max ~64 chars.
  example: token
- name: client.userAgent.os
  type: string_short
  description: Client OS family. Short opaque token, typically without whitespace; max ~64 chars.
  example: Mac OS X
- name: client.userAgent.rawUserAgent
  type: string_long
  description: Raw User-Agent header. Free-form text; may span multiple lines or contain large payloads.
  example: Free-form vendor-emitted message describing the event.
- name: client.zone
  type: string
  description: Vendor-emitted field 'Client › zone'. Leaf of the 'client' composite. Free-form text; may
    contain whitespace and punctuation.
  example: us-east-1a
- name: debugContext.debugData.deviceFingerprint
  type: string
  description: Vendor-emitted field 'DebugContext › debugData › deviceFingerprint'. Leaf of the 'debugContext'
    composite. Free-form text; may contain whitespace and punctuation.
  example: host-prod-01
- name: debugContext.debugData.factor
  type: string
  description: Vendor-emitted field 'DebugContext › debugData › factor'. Leaf of the 'debugContext' composite.
    Free-form text; may contain whitespace and punctuation.
  example: operator-visible value
- name: debugContext.debugData.origin
  type: string
  description: Vendor-emitted field 'DebugContext › debugData › origin'. Leaf of the 'debugContext' composite.
    Free-form text; may contain whitespace and punctuation.
  example: operator-visible value
- name: debugContext.debugData.proxyType
  type: string
  description: Vendor-emitted field 'DebugContext › debugData › proxyType'. Leaf of the 'debugContext'
    composite. Free-form text; may contain whitespace and punctuation.
  example: AuditEvent
- name: debugContext.debugData.threatDetections
  type: string
  description: Vendor-emitted field 'DebugContext › debugData › threatDetections'. Leaf of the 'debugContext'
    composite. Free-form text; may contain whitespace and punctuation.
  example: operator-visible value
- name: debugContext.debugData.url
  type: url
  description: Full URL of the request. Full URL with scheme (http/https/ftp); percent-encoded if it contains
    non-ASCII characters.
  example: https://example.com/path
- name: outcome.reason
  type: string_long
  description: Reason for the outcome (free text). Free-form text; may span multiple lines or contain
    large payloads.
  example: Free-form vendor-emitted message describing the event.
- name: outcome.result
  type: enum
  description: 'Event outcome. One of: SUCCESS, FAILURE, SKIPPED, ALLOW, DENY, CHALLENGE, UNKNOWN (case-sensitive).'
  example: SUCCESS
  enum_values:
  - SUCCESS
  - FAILURE
  - SKIPPED
  - ALLOW
  - DENY
  - CHALLENGE
  - UNKNOWN
- name: request.ipChain
  type: json
  is_array: true
  description: Chain of IPs the request traversed (proxies). JSON object or array; structured payload
    — see dotted-path leaves below.
  example: '{"key":"value"}'
- name: request.ipChain[].ip
  type: string
  description: Vendor-emitted field 'Request › ipChain[] › ip'. Leaf of the 'request' composite. Free-form
    text; may contain whitespace and punctuation.
  example: 192.0.2.45
- name: securityContext.asNumber
  type: integer
  description: Autonomous System number of the source IP. Signed decimal integer; bare digits, optional
    leading minus.
  example: '42'
- name: securityContext.asOrg
  type: string
  description: AS organization name. Free-form text; may contain whitespace and punctuation.
  example: tenant-acme-prod
- name: securityContext.domain
  type: domain
  description: DNS domain reported by Okta — bare domain, no scheme/path/port. Bare DNS domain name; no
    scheme, no path, no port.
  example: example.com
- name: securityContext.isProxy
  type: boolean
  description: True if source IP is a known proxy. Literal 'true' or 'false' (case-insensitive); not '1'/'0'.
  example: 'true'
- name: securityContext.isp
  type: string
  description: ISP of the source IP. Free-form text; may contain whitespace and punctuation.
  example: operator-visible value
- name: transaction.detail.requestApiTokenId
  type: string
  description: Vendor-emitted field 'Transaction › detail › requestApiTokenId'. Leaf of the 'transaction'
    composite. Free-form text; may contain whitespace and punctuation.
  example: create
- name: transaction.id
  type: string_short
  description: Okta transaction id for correlation. Short opaque token, typically without whitespace;
    max ~64 chars.
  example: token
- name: transaction.type
  type: string_short
  description: Transaction type (WEB, APP, etc.). Short opaque token, typically without whitespace; max
    ~64 chars.
  example: token
- name: authenticationContext.authenticationProvider
  type: string_short
  description: Authentication provider used. Short opaque token, typically without whitespace; max ~64
    chars.
  example: token
- name: authenticationContext.credentialProvider
  type: string_short
  description: Credential provider (e.g. OKTA_CREDENTIAL_PROVIDER). Short opaque token, typically without
    whitespace; max ~64 chars.
  example: token
- name: authenticationContext.credentialType
  type: string_short
  description: Credential type (OTP, PASSWORD, SAML_ASSERTION, etc.). Short opaque token, typically without
    whitespace; max ~64 chars.
  example: token
- name: authenticationContext.externalSessionId
  type: string_short
  description: External session id (Okta sso session). Short opaque token, typically without whitespace;
    max ~64 chars.
  example: token
- name: authenticationContext.issuer.id
  type: string_short
  description: Issuer id (Okta org). Short opaque token, typically without whitespace; max ~64 chars.
  example: token
- name: debugContext.debugData.requestUri
  type: url
  description: Request URI of the event. Full URL with scheme (http/https/ftp); percent-encoded if it
    contains non-ASCII characters.
  example: https://example.com/path?q=1
- name: version
  type: string_short
  description: Event schema version. Short opaque token, typically without whitespace; max ~64 chars.
  example: '0'
use_cases:
- Identity
- MFA
validated: true
