schema_version: 1
id: Okta
pack_name: Okta
rule_name: OktaModelingRules
dataset_name: okta_okta_raw
vendor: Okta
product: Okta
description: 'Okta is an identity and access-management platform — single sign-on, MFA, lifecycle management
  — that emits an audit stream covering user logins, MFA challenges, group changes, application assignments,
  and administrative actions. The Okta primary stream (`okta_okta_raw`) carries the full system-log envelope:
  every actor, target, transaction id, geolocation, and outcome of every authentication or admin event.
  Simulate this to validate detections that look for impossible travel, password-spray patterns, privileged-role
  assignments, or MFA fatigue.'
how_to_use: '## Sending these logs to Cortex XSIAM


  Phantom emits this vendor''s wire format as CEF over UDP — point a data worker

  at your XSIAM broker''s syslog destination and these records flow straight in.

  The schema below describes the vendor''s fields independent of destination, so

  the same records also work for Splunk, Elastic, or any syslog receiver.


  The CEF header''s **vendor** + **product** drive XSIAM''s parsing-rule routing:

  the broker normalizes them to `<lowercased-vendor>_<lowercased-product>_raw`

  (non-alphanumerics -> `_`) and matches your installed parsing rule. The PR/MR

  rules read NAMED COLUMNS, so the transport is invisible to them — pack the

  vendor''s field names as CEF extension `key=value` pairs.


  **Required CEF header for XSIAM**:


  - **vendor**: `Okta`

  - **product**: `Okta`


  Broker derives → `okta_okta_raw`.


  Both `okta_okta_raw` and `okta_sso_raw` share the same broker route — XSIAM''s operator-installed PR
  splits them inside the tenant by reading the `eventType` raw field. For events to land here (`okta_okta_raw`),
  set `eventType` to any non-SSO Okta event (e.g. `user.account.update_password`, `policy.evaluate_sign_on`).


  **MR pattern**: Nested-JSON. The MR uses `json_extract_scalar(actor, "$.alternateId")` style lookups
  against composite fields (`actor`, `client`, `outcome`, `target`, `securityContext`, `debugContext`,
  `authenticationContext`).


  **Composite (nested-JSON) fields**: Pack each composite as a single CEF extension whose value is the
  JSON-string of the inner object. Example: `actor={"id":"00uA","type":"User","alternateId":"a@example.com"}`.
  L15 confirms this survives CEF-extension wrapping; the MR''s `json_extract_scalar` parses at query time.


  **Sentinel values**: None.


  **PR filter quirks**: `uuid` must be present + unique; `published` must be RFC-3339 (`2026-05-28T05:00:00Z`).


  **Saturation strategy**: Keep single event under 1500 bytes to avoid UDP MTU truncation (L18). For >10
  XDM fields, split into 2 events sharing `uuid` marker: event-1 carries `actor + outcome + client`, event-2
  carries `target + securityContext + debugContext`. Lean Okta saturation at 1224 bytes still ceilings
  at 10 XDM (L20) — splitting is required.


  **Single-event XDM ceiling**: ~10 XDM (genuine nested-JSON ceiling, not MTU-related per L20).


  **Verify**:


  ```xql

  datamodel dataset = okta_okta_raw

  | filter xdm.event.id contains "<your-marker>"

  | fields xdm.*

  | limit 1

  ```


  **Notes**: Validated end-to-end via `scripts/maintainer/e2e_batch12_okta_lean_sat.py`.'
