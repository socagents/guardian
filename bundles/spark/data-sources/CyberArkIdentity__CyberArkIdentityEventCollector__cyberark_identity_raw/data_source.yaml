how_to_use: |
  ## cyberark identity → Cortex XSIAM (dataset `cyberark_identity_raw`)
  
    **Routing** — the broker lowercases the CEF/syslog header `vendor`/`product`, replaces
    non-alphanumerics with `_`, and appends `_raw` to choose the dataset (target: `cyberark_identity_raw`).
  
    **Required CEF header for XSIAM**:
    - **vendor**: `cyberark`
    - **product**: `identity`
  
    These normalize → `cyberark_identity_raw`.
  
    **Ingestion shape**: **Flat / CEF-compatible.** The modeling rule reads flat top-level columns (no nested-JSON access). A CEF event routes in and the broker auto-extracts those columns, so this source maps from Phantom's existing CEF path once the dataset is XDM-bound.
  
    - **Modeling-rule gate**: `EventType in ("Cloud.Core.OAuthToken.Create", "Cloud.Core.Logout", "Cloud.Core.MfaSummary", "Cloud.Core.StartImpersonate","Cloud.Core.Login", "Cloud.Core.LoginF` — seed that field with an accepted value or the rule drops the row (XDM stays 0).
  
    **XDM mapping**: ~20 fields mapped to the unified data model (`xdm.*`), including: `xdm.auth.auth_method`, `xdm.event.description`, `xdm.event.outcome`, `xdm.event.outcome_reason`, `xdm.event.type`, `xdm.session_context_id`.
  
    **Operator setup**: This data source has typed-column data that doesn't look like CEF (columns are camelCase API fields, JSON sub-objects, etc.). Most likely arrives via the XSIAM HTTP Collector with a source tag mapped to vendor=`cyberark`, product=`identity`, or via a vendor-specific XDR connector pull. Phantom can POST JSON to the HTTP collector; the operator must configure the collector's source tag to land events in this dataset.
  
    **Status**: Reverse-engineered 2026-06-04 from the parsing/modeling rules — routing, gate, and field
    inventory documented. **NOT yet XDM-validated on a live tenant** (no `validated` pill); validate by
    streaming a CEF batch and confirming a rich `xdm.*` count over a wide window.
  
    **Verify** (once the dataset is XDM-bound, wide ≥7d window):
  
        config timeframe = 30d | datamodel dataset = cyberark_identity_raw | sort desc _time | fields xdm.* | limit 20
