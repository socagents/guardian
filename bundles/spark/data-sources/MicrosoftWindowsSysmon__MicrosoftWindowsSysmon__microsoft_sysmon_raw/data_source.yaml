how_to_use: |
  ## microsoft windows → Cortex XSIAM (dataset `microsoft_sysmon_raw`)
  
    **Routing** — the broker lowercases the CEF/syslog header `vendor`/`product`, replaces
    non-alphanumerics with `_`, and appends `_raw` to choose the dataset (target: `microsoft_sysmon_raw`).
  
    **Not a simple CEF vendor/product route.** The parsing rule ingests under the broad identity `microsoft`/`windows` (which normalizes to `microsoft_windows_raw`, a parent dataset) and splits events into per-channel datasets — `microsoft_sysmon_raw` is one of them — by event channel/category downstream. A single CEF `deviceVendor`/`deviceProduct` header does NOT by itself land events in `microsoft_sysmon_raw`. Ingest the source via its native path (Windows agent / WEC, or Azure diagnostic settings) so the rule routes the specific channel to `microsoft_sysmon_raw`.
  
    **Ingestion shape**: **JSON-native.** The modeling rule reads nested JSON (e.g. `user -> type`). CEF/syslog routes + lands and the broker extracts top-level columns; the nested reads need the composite present, so Phantom's worker JSON-stringifies `type: json` composites onto the wire (keep the dotted-leaf fields).
  
    - **Modeling-rule gate**: none — the rule maps every routed row unconditionally.
  
    **XDM mapping**: ~58 fields mapped to the unified data model (`xdm.*`), including: `xdm.alert.description`, `xdm.alert.subcategory`, `xdm.event.description`, `xdm.event.id`, `xdm.event.log_level`, `xdm.event.operation`.
  
    **Operator setup**: This data source has typed-column data that doesn't look like CEF (columns are camelCase API fields, JSON sub-objects, etc.). Most likely arrives via the XSIAM HTTP Collector with a source tag mapped to vendor=`microsoft`, product=`windows`, or via a vendor-specific XDR connector pull. Phantom can POST JSON to the HTTP collector; the operator must configure the collector's source tag to land events in this dataset.
  
    **Status**: Reverse-engineered 2026-06-04 from the parsing/modeling rules — routing, gate, and field
    inventory documented. **NOT yet XDM-validated on a live tenant** (no `validated` pill); validate by
    streaming a CEF batch and confirming a rich `xdm.*` count over a wide window.
  
    **Verify** (once the dataset is XDM-bound, wide ≥7d window):
  
        config timeframe = 30d | datamodel dataset = microsoft_sysmon_raw | sort desc _time | fields xdm.* | limit 20
