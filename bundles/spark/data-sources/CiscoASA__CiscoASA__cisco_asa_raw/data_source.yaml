fields:
- name: _json
  type: json
  description: '— see leaf entries for nested paths. JSON object with keys: device,
    generalCiscoLog, logType, severity (each key defined as a dotted-path leaf below).'
  example: '{}'
- name: _raw_log
  type: string
  description: Raw log line as the vendor emits it before any parsing or normalization.
    Free-form text; may contain whitespace and punctuation.
  example: '<14>2024-01-15T14:23:01+0000 cisco: ciscoasa=CiscoASA action=allow user=jdoe'
- name: _json.device
  type: string
  description: Vendor-emitted field ' json › device'. Leaf of the '_json' composite.
    Free-form text; may contain whitespace and punctuation.
  example: sample_device
- name: _json.generalCiscoLog.action
  type: string_short
  description: Action taken by Cisco's enforcement engine (allow/block/quarantine/etc.).
    Short opaque token, typically without whitespace; max ~64 chars.
  example: allow
- name: _json.generalCiscoLog.application
  type: string_short
  description: Application name emitted by Cisco. Short opaque token, typically without
    whitespace; max ~64 chars.
  example: token_value
- name: _json.generalCiscoLog.application_protocol
  type: string
  description: Vendor-emitted field ' json › generalCiscoLog › application protocol'.
    Leaf of the '_json' composite. Free-form text; may contain whitespace and punctuation.
  example: tcp
- name: _json.generalCiscoLog.command
  type: string
  description: Vendor-emitted field ' json › generalCiscoLog › command'. Leaf of the
    '_json' composite. Free-form text; may contain whitespace and punctuation.
  example: /usr/bin/curl https://example.com/
- name: _json.generalCiscoLog.destination_hostname
  type: host
  description: Destination hostname or FQDN. Hostname or fully-qualified domain name
    (RFC 1035 dotted labels); no protocol prefix.
  example: host.example.com
- name: _json.generalCiscoLog.directory
  type: string
  description: Vendor-emitted field ' json › generalCiscoLog › directory'. Leaf of
    the '_json' composite. Free-form text; may contain whitespace and punctuation.
  example: sample_directory
- name: _json.generalCiscoLog.domain
  type: domain
  description: DNS domain reported by Cisco — bare domain, no scheme/path/port. Bare
    DNS domain name; no scheme, no path, no port.
  example: example.com
- name: _json.generalCiscoLog.dst_fwuser
  type: user
  description: Vendor-emitted field ' json › generalCiscoLog › dst fwuser'. Leaf of
    the '_json' composite. Account name as the vendor reports it — login name, UPN,
    or sAMAccountName depending on the source; no domain prefix unless the vendor
    emits one.
  example: jsmith
- name: _json.generalCiscoLog.dst_interface
  type: string
  description: Vendor-emitted field ' json › generalCiscoLog › dst interface'. Leaf
    of the '_json' composite. Free-form text; may contain whitespace and punctuation.
  example: eth0
- name: _json.generalCiscoLog.dst_ip
  type: string
  description: Destination IPv4/IPv6 address of the target. Free-form text; may contain
    whitespace and punctuation.
  example: 192.0.2.45
- name: _json.generalCiscoLog.dst_mac_address
  type: mac
  description: Vendor-emitted field ' json › generalCiscoLog › dst mac address'. Leaf
    of the '_json' composite. MAC address in colon-separated lowercase hex (aa:bb:cc:dd:ee:ff).
  example: 00:1A:2B:3C:4D:5E
- name: _json.generalCiscoLog.dst_port
  type: integer_port
  description: TCP/UDP destination port. Unsigned integer 0-65535 representing a TCP/UDP
