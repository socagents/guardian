how_to_use: |
  ## SailPoint SailPointIdentityNow → Cortex XSIAM (dataset `sailpoint_identitynow_raw`)
  
    **Routing** — the broker lowercases the CEF/syslog header `vendor`/`product`, replaces
    non-alphanumerics with `_`, and appends `_raw` to choose the dataset (target: `sailpoint_identitynow_raw`).
  
    **Required CEF header for XSIAM** — the header must normalize to `sailpoint_identitynow`. The marketplace pack's display name `SailPoint` / `SailPointIdentityNow` normalizes to `sailpoint_sailpointidentitynow_raw`, a **different dataset** (vendor rename / legacy CEF identity), so use the vendor's actual CEF `deviceVendor`/`deviceProduct` that yields `sailpoint_identitynow` and confirm which dataset the events land in.
  
    **Ingestion shape**: **JSON-native.** The modeling rule reads nested JSON (e.g. `actor -> name`). CEF/syslog routes + lands and the broker extracts top-level columns; the nested reads need the composite present, so Phantom's worker JSON-stringifies `type: json` composites onto the wire (keep the dotted-leaf fields).
  
    - **Modeling-rule gate**: none — the rule maps every routed row unconditionally.
  
    **XDM mapping**: ~19 fields mapped to the unified data model (`xdm.*`), including: `xdm.alert.name`, `xdm.event.description`, `xdm.event.id`, `xdm.event.is_completed`, `xdm.event.operation_sub_type`, `xdm.event.original_event_type`.
  
    **Operator setup**: This data source has typed-column data that doesn't look like CEF (columns are camelCase API fields, JSON sub-objects, etc.). Most likely arrives via the XSIAM HTTP Collector with a source tag mapped to vendor=`SailPoint`, product=`SailPointIdentityNow`, or via a vendor-specific XDR connector pull. Phantom can POST JSON to the HTTP collector; the operator must configure the collector's source tag to land events in this dataset.
  
    **Status**: Reverse-engineered 2026-06-04 from the parsing/modeling rules — routing, gate, and field
    inventory documented. **NOT yet XDM-validated on a live tenant** (no `validated` pill); validate by
    streaming a CEF batch and confirming a rich `xdm.*` count over a wide window.
  
    **Verify** (once the dataset is XDM-bound, wide ≥7d window):
  
        config timeframe = 30d | datamodel dataset = sailpoint_identitynow_raw | sort desc _time | fields xdm.* | limit 20
