  example: '<14>2024-01-15T14:23:01+0000 cisco: ciscocatalyst=CiscoCatalyst action=allow
    user=jdoe'
- name: parsed_fields
  type: json
  description: '— see leaf entries for nested paths. JSON object with keys: description,
    device_ip, event_id, facility, mnemonic, sequence_number, severity (each key defined
    as a dotted-path leaf below).'
  example: '{}'
- name: parsed_fields.description
  type: string_long
  description: Free-form human-readable description from Cisco. Free-form text; may
    span multiple lines or contain large payloads.
  example: Event recorded by Cisco.
- name: parsed_fields.device_ip
  type: ipv4
  description: Vendor-emitted field 'Parsed fields › device ip'. Leaf of the 'parsed_fields'
    composite. Dotted-quad IPv4 literal (e.g., 192.0.2.45); no port suffix, no surrounding
    brackets or quotes.
  example: 203.0.113.42
- name: parsed_fields.event_id
  type: string
  description: Unique identifier for this event as assigned by the vendor. Leaf of
