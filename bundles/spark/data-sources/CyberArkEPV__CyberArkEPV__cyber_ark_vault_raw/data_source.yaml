how_to_use: |
  ## cyber-ark vault → Cortex XSIAM (dataset `cyber_ark_vault_raw`)
  
    **Routing** — the broker lowercases the CEF/syslog header `vendor`/`product`, replaces
    non-alphanumerics with `_`, and appends `_raw` to choose the dataset (target: `cyber_ark_vault_raw`).
  
    **Required CEF header for XSIAM**:
    - **vendor**: `cyber-ark`
    - **product**: `vault`
  
    These normalize → `cyber_ark_vault_raw`.
  
    **Ingestion shape**: **Flat / CEF-compatible.** The modeling rule reads flat top-level columns (no nested-JSON access). A CEF event routes in and the broker auto-extracts those columns, so this source maps from Phantom's existing CEF path once the dataset is XDM-bound.
  
    - **Modeling-rule gate**: none — the rule maps every routed row unconditionally.
  
    **XDM mapping**: ~29 fields mapped to the unified data model (`xdm.*`), including: `xdm.alert.name`, `xdm.alert.original_alert_id`, `xdm.alert.severity`, `xdm.database.name`, `xdm.event.description`, `xdm.event.id`.
  
    **Operator setup**: This data source's modeling rule reads CEF-shaped columns (rt, src, dst, spt, dpt, cs1-6, act, etc.). Phantom emits CEF over syslog (`CEF:0|cyber-ark|vault|...|<extensions>`) — the broker auto-extracts CEF k=v pairs into typed columns matching the CEF dictionary, and the broker routes to this dataset via the CEF header's vendor/product. Usually NO operator-side broker config is required beyond standard CEF ingestion.
  
    **Status**: Reverse-engineered 2026-06-04 from the parsing/modeling rules — routing, gate, and field
    inventory documented. **NOT yet XDM-validated on a live tenant** (no `validated` pill); validate by
    streaming a CEF batch and confirming a rich `xdm.*` count over a wide window.
  
    **Verify** (once the dataset is XDM-bound, wide ≥7d window):
  
        config timeframe = 30d | datamodel dataset = cyber_ark_vault_raw | sort desc _time | fields xdm.* | limit 20
