schema_version: 1
id: ApacheTomcat
pack_name: ApacheTomcat
rule_name: ApacheTomcatModelingRules
dataset_name: apache_tomcat_raw
vendor: Apache
product: ApacheTomcat
description: Modeling Rules for the Apache Tomcat logs collector
categories:
- Analytics & SIEM
version: 1.0.10
origin: bundle
author: phantom-bundle
uploaded_by: null
created_at: '2026-05-24T16:53:58Z'
updated_at: '2026-05-24T16:53:58Z'
logo:
  mime_type: image/svg+xml
  data: 
  source: simpleicons:apachetomcat
  license: CC0-1.0
  fidelity: monochrome-brand
formats:
- SYSLOG
- CEF
- JSON
is_rawlog_only: false
fields:
- name: _raw_log
  type: string
  description: Raw log line as the vendor emits it before any parsing or normalization.
    Free-form text; may contain whitespace and punctuation.
  example: '<14>2024-01-15T14:23:01+0000 apache: apachetomcat=ApacheTomcat action=allow
    user=jdoe'
- name: Request_time
  type: datetime
  description: Request time. ISO-8601 timestamp with timezone (e.g., 2026-05-26T14:23:01Z).
  example: '2026-05-26T14:23:01Z'
- name: User_agent
  type: string
  description: User agent. Free-form text; may contain whitespace and punctuation.
  example: Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36
- name: Username
  type: user
  description: Username. Account name as the vendor reports it — login name, UPN,
    or sAMAccountName depending on the source; no domain prefix unless the vendor
    emits one.
  example: jdoe
- name: bytes_size
  type: string
  description: Destination sent bytes. Free-form text; may contain whitespace and
    punctuation.
  example: '1024'
- name: method
  type: string
  description: Network HTTP method. Free-form text; may contain whitespace and punctuation.
  example: GET
- name: response_code
  type: string
  description: Network HTTP response code. Free-form text; may contain whitespace
    and punctuation.
  example: '200'
- name: sourceipv4
  type: ipv4
  description: Source IPv4. Dotted-quad IPv4 literal (e.g., 192.0.2.45); no port suffix,
    no surrounding brackets or quotes.
  example: 192.0.2.45
- name: sourceipv6
  type: ipv6
  description: Source IPv6. Colon-separated hexadecimal IPv6 literal (RFC 4291); no
    zone suffix, no surrounding brackets.
  example: 2001:db8::1
- name: url
  type: url
  description: Network HTTP URL. Full URL with scheme (http/https/ftp); percent-encoded
    if it contains non-ASCII characters.
  example: https://example.com/path?q=1
- name: username
  type: user
  description: Source user username. Account name as the vendor reports it — login
    name, UPN, or sAMAccountName depending on the source; no domain prefix unless
    the vendor emits one.
  example: jdoe
use_cases:
- WebServer
- AppServer
how_to_use: |
  ## apache tomcat → Cortex XSIAM (dataset `apache_tomcat_raw`)
  
    **Routing** — the broker lowercases the CEF/syslog header `vendor`/`product`, replaces
    non-alphanumerics with `_`, and appends `_raw` to choose the dataset (target: `apache_tomcat_raw`).
  
    **Required CEF header for XSIAM**:
    - **vendor**: `apache`
    - **product**: `tomcat`
  
    These normalize → `apache_tomcat_raw`.
  
    **Ingestion shape**: **Flat / CEF-compatible.** The modeling rule reads flat top-level columns (no nested-JSON access). A CEF event routes in and the broker auto-extracts those columns, so this source maps from Phantom's existing CEF path once the dataset is XDM-bound.
  
    - **Modeling-rule gate**: `_raw_log contains "GET" or _raw_log contains "HEAD" or _raw_log contains "POST" or _raw_log contains "DELETE" or _raw_log contains "CONNECT" or _raw_log contain` — seed that field with an accepted value or the rule drops the row (XDM stays 0).
  
    **XDM mapping**: ~15 fields mapped to the unified data model (`xdm.*`), including: `XDM.Network.Destination.bytes`, `XDM.Network.Source.ipv4`, `XDM.Network.Source.user.username`, `XDM.Network.event_timestamp`, `XDM.Network.http.referrer`, `XDM.Network.http.response_code`.
  
    **Operator setup**: This data source uses `_raw_log`-based parsing. Cortex's parsing rule reads from `_raw_log` to populate `_json` (or directly to extract XDM fields), and the modeling rule does `regextract`/`json_extract_scalar` on `_raw_log`. For simulated logs sent from Phantom to land in this dataset, **the operator must add a Broker VM Syslog Applet pre-configured with the matching vendor + product + a dedicated source port**. Without that applet, logs are tagged `unknown/unknown` and routed to `unknown_unknown_raw` — the parsing rule never fires. 
  
  Setup: XSIAM → Settings → Configurations → Data Broker → Applets → Add Applet (Syslog) → Vendor = `apache`, Product = `tomcat`, Port = (operator picks an unused port, e.g. 1514, 1515, ...). Phantom must then send to that port — current default is 514, which is reserved for the ASA applet.
  
    **Status**: Reverse-engineered 2026-06-04 from the parsing/modeling rules — routing, gate, and field
    inventory documented. **NOT yet XDM-validated on a live tenant** (no `validated` pill); validate by
    streaming a CEF batch and confirming a rich `xdm.*` count over a wide window.
  
    **Verify** (once the dataset is XDM-bound, wide ≥7d window):
  
        config timeframe = 30d | datamodel dataset = apache_tomcat_raw | sort desc _time | fields xdm.* | limit 20
