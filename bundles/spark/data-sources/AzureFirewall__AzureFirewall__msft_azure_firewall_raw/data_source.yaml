how_to_use: |
  ## msft Azure Firewall → Cortex XSIAM (dataset `msft_azure_firewall_raw`)

  **Validated 2026-06-03 (#118)** — maps **20 xdm fields** end-to-end
  via CEF-over-syslog on a tenant with the **Azure Firewall** content pack installed
  (the pack binds the modeling rule + parsing rule to the dataset).

  Required CEF header — the broker derives the dataset from it (lowercased):
  - vendor: `msft`
  - product: `Azure_Firewall`
  Broker derives -> `msft_azure_firewall_raw`.
  Modeling-rule gate: seed `category in ("AZFWApplicationRule", "AZFWNetworkRule", "AZFWDnsQuery", ...)` (the AZFWApplicationRule branch is verified).

  JSON-native MR: it reads nested JSON via `json_extract_scalar(...)`/`->`. The
  worker emits composite schema fields as JSON strings on the CEF wire, which the
  rule parses — so CEF-over-syslog populates these fields (no HTTP collector).

  Verify (wide >=7d window):
      config timeframe = 30d | datamodel dataset = msft_azure_firewall_raw | sort desc _time | fields xdm.* | limit 20
