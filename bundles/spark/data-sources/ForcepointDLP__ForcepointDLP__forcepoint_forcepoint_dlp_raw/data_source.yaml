fields:
- name: _collector_source
  type: string
  description: Vendor-emitted field ' collector source'. Free-form text; may contain
    whitespace and punctuation.
  example: 192.0.2.45
- name: act
  type: string_short
  description: CEF action — what Forcepoint did with the event (allow/block/quarantine/etc.).
    Short opaque token, typically without whitespace; max ~64 chars.
  example: token_value
- name: action
  type: string
  description: Action taken by the vendor's enforcement engine. Free-form text; may
    contain whitespace and punctuation.
  example: allow
- name: analyzedBy
  type: string
  description: Vendor-emitted field 'AnalyzedBy'. Free-form text; may contain whitespace
    and punctuation.
  example: sample_analyzedby
- name: analyzed_by
  type: string
  description: Vendor-emitted field 'Analyzed by'. Free-form text; may contain whitespace
    and punctuation.
  example: sample_by
- name: cat
  type: string
  description: Vendor-emitted field 'Cat'. Free-form text; may contain whitespace
    and punctuation.
  example: access_control
- name: channel
  type: string
  description: Vendor-emitted field 'Channel'. Free-form text; may contain whitespace
    and punctuation.
  example: sample_channel
- name: destination
  type: string
  description: Vendor-emitted field 'Destination'. Free-form text; may contain whitespace
    and punctuation.
  example: 198.51.100.7
- name: details
  type: string_long
  description: Additional details payload emitted by Forcepoint. Free-form text; may
    span multiple lines or contain large payloads.
  example: Detailed event payload emitted by Forcepoint for this record.
- name: detected_by
  type: string
  description: Vendor-emitted field 'Detected by'. Free-form text; may contain whitespace
    and punctuation.
  example: sample_by
- name: duser
  type: user
  description: CEF destination user — username of the target/recipient. Account name
    as the vendor reports it — login name, UPN, or sAMAccountName; no domain prefix
    unless vendor emits one.
  example: jdoe
- name: endpoint_type
  type: string_short
  description: Type/category classifier emitted by Forcepoint. Short opaque token,
    typically without whitespace; max ~64 chars.
  example: authentication
- name: event_id
  type: string
  description: Unique identifier for this event as assigned by the vendor. Free-form
    text; may contain whitespace and punctuation.
  example: for-5fd34719
- name: eventid
  type: string
  description: Unique identifier for this event as assigned by the vendor. Free-form
    text; may contain whitespace and punctuation.
  example: evt-543f809b
- name: file_name
  type: string
  description: File or process name reported by the vendor. Free-form text; may contain
    whitespace and punctuation.
  example: sample_name
- name: fname
  type: file_path
  description: Vendor-emitted field 'Fname'. Absolute filesystem path; vendor-native
    separator (forward slash on POSIX, backslash on Windows).
  example: /var/log/example.log
- name: id
  type: string_short
  description: Opaque identifier emitted by Forcepoint. Short opaque token, typically
    without whitespace; max ~64 chars.
  example: for-fc20ab8b
- name: msg
  type: string
  description: Human-readable event message. Free-form text; may contain whitespace
    and punctuation.
  example: Operation completed successfully.
- name: policies
  type: string
  description: Vendor-emitted field 'Policies'. Free-form text; may contain whitespace
    and punctuation.
  example: sample_policies
- name: productVersion
  type: string
  description: Vendor-emitted field 'ProductVersion'. Free-form text; may contain
    whitespace and punctuation.
  example: sample_productversion
- name: severity
  type: string
  description: Event severity as classified by the vendor. Free-form text; may contain
    whitespace and punctuation.
  example: INFO
- name: severityType
  type: string
  description: Vendor-emitted field 'SeverityType'. Free-form text; may contain whitespace
    and punctuation.
  example: sample_severitytype
- name: source
  type: json
  description: '— see leaf entries for nested paths. JSON object with keys: business_unit,
    department, email_address, host_name, ip_address, login_name, nt_domain (each
    key defined as a dotted-path leaf below).'
  example: '{}'
- name: sourceHost
  type: host
  description: Source hostname or FQDN reported by the vendor. Hostname or fully-qualified
    domain name (RFC 1035 dotted labels); no protocol prefix.
  example: host.example.com
- name: sourceIp
  type: string
  description: Source address of the connection initiator. Free-form text; may contain
    whitespace and punctuation.
  example: 192.0.2.45
- name: sourceServiceName
  type: string
  description: Network application protocol category. Free-form text; may contain
    whitespace and punctuation.
  example: sample_sourceservicenam
- name: status
  type: string
  description: Status code returned by the vendor. Free-form text; may contain whitespace
    and punctuation.
  example: success
- name: suser
  type: user
  description: CEF source user — username of the actor initiating the event. Account
    name as the vendor reports it — login name, UPN, or sAMAccountName; no domain
    prefix unless vendor emits one.
  example: jsmith
- name: tag
  type: string
  description: Vendor-emitted field 'Tag'. Free-form text; may contain whitespace
    and punctuation.
  example: auto-tagged
- name: timeStamp
  type: datetime
  description: Timestamp emitted by Forcepoint. ISO-8601 timestamp with timezone (e.g.,
    2026-05-26T14:23:01Z).
  example: '2026-05-26T14:23:01Z'
- name: transaction_size
  type: integer_byte_count
  description: Size in bytes of the payload/object. Unsigned decimal byte count; bare
    digits, no unit suffix.
  example: '42'
- name: source.business_unit
  type: string
  description: Vendor-emitted field 'Source › business unit'. Leaf of the 'source'
    composite. Free-form text; may contain whitespace and punctuation.
  example: sample_unit
- name: source.department
  type: string
  description: Vendor-emitted field 'Source › department'. Leaf of the 'source' composite.
    Free-form text; may contain whitespace and punctuation.
  example: sample_department
- name: source.email_address
  type: email
  description: Vendor-emitted field 'Source › email address'. Leaf of the 'source'
    composite. RFC 5322 'local@domain' address; one address only — use an array field
    for multiple addresses.
  example: user@example.com
- name: source.host_name
  type: host
  description: Source hostname or FQDN reported by the vendor. Leaf of the 'source'
    composite. Hostname or fully-qualified domain name (RFC 1035 dotted labels); no
    protocol prefix.
  example: host.example.com
- name: source.ip_address
  type: string
  description: Source address of the connection initiator. Leaf of the 'source' composite.
    Free-form text; may contain whitespace and punctuation.
  example: 192.0.2.45
- name: source.login_name
  type: string
  description: Human-readable name as displayed by Forcepoint. Free-form text; may
    contain whitespace and punctuation.
  example: sample_name
- name: source.nt_domain
  type: domain
  description: DNS domain reported by Forcepoint — bare domain, no scheme/path/port.
    Bare DNS domain name; no scheme, no path, no port.
  example: example.com
use_cases:
- DLP
- Proxy
how_to_use: |
  ## Forcepoint Forcepoint DLP → Cortex XSIAM (dataset `forcepoint_forcepoint_dlp_raw`)
  
    **Routing** — the broker lowercases the CEF/syslog header `vendor`/`product`, replaces
    non-alphanumerics with `_`, and appends `_raw` to choose the dataset (target: `forcepoint_forcepoint_dlp_raw`).
  
    **Required CEF header for XSIAM**:
    - **vendor**: `Forcepoint`
    - **product**: `Forcepoint DLP`
  
    These normalize → `forcepoint_forcepoint_dlp_raw`.
  
    **Ingestion shape**: **JSON-native.** The modeling rule reads nested JSON (e.g. `$.business_unit`). CEF/syslog routes + lands and the broker extracts top-level columns; the nested reads need the composite present, so Phantom's worker JSON-stringifies `type: json` composites onto the wire (keep the dotted-leaf fields).
  
    - **Modeling-rule gate**: `_collector_source != "API"` — seed that field with an accepted value or the rule drops the row (XDM stays 0).
  
    **XDM mapping**: ~40 fields mapped to the unified data model (`xdm.*`), including: `xdm.alert.original_alert_id`, `xdm.alert.severity`, `xdm.email.attachment.file_type`, `xdm.email.attachment.filename`, `xdm.email.recipients`, `xdm.email.sender`.
  
    **Operator setup**: This data source's modeling rule reads CEF-shaped columns (rt, src, dst, spt, dpt, cs1-6, act, etc.). Phantom emits CEF over syslog (`CEF:0|Forcepoint|Forcepoint DLP|...|<extensions>`) — the broker auto-extracts CEF k=v pairs into typed columns matching the CEF dictionary, and the broker routes to this dataset via the CEF header's vendor/product. Usually NO operator-side broker config is required beyond standard CEF ingestion.
  
    **Status**: Reverse-engineered 2026-06-04 from the parsing/modeling rules — routing, gate, and field
    inventory documented. **NOT yet XDM-validated on a live tenant** (no `validated` pill); validate by
    streaming a CEF batch and confirming a rich `xdm.*` count over a wide window.
  
    **Verify** (once the dataset is XDM-bound, wide ≥7d window):
  
        config timeframe = 30d | datamodel dataset = forcepoint_forcepoint_dlp_raw | sort desc _time | fields xdm.* | limit 20
