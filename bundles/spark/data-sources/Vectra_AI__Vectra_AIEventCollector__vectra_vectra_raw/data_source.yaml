fields:
- name: category
  type: enum
  description: 'Detection category. One of: RECONNAISSANCE, LATERAL_MOVEMENT, COMMAND_AND_CONTROL,
    EXFILTRATION, BOTNET_ACTIVITY, INFO (case-sensitive).'
  example: RECONNAISSANCE
  enum_values:
  - RECONNAISSANCE
  - LATERAL_MOVEMENT
  - COMMAND_AND_CONTROL
  - EXFILTRATION
  - BOTNET_ACTIVITY
  - INFO
- name: description
  type: string_long
  description: Free-form human-readable description from Vectra AI. Free-form text;
    may span multiple lines or contain large payloads.
  example: Event recorded by Vectra AI.
- name: detection_type
  type: string
  description: Detection type name. Free-form text; may contain whitespace and punctuation.
  example: authentication
- name: dvchost
  type: host
  description: Vendor-emitted field 'Dvchost'. Hostname or fully-qualified domain
    name (RFC 1035 dotted labels); no protocol prefix.
  example: host.example.com
- name: headend_addr
  type: ipv4
  description: Vendor-emitted field 'Headend addr'. Dotted-quad IPv4 literal (e.g.,
    192.0.2.45); no port suffix, no surrounding brackets or quotes.
  example: 203.0.113.42
- name: id
  type: string_short
  description: Detection id. Short opaque token, typically without whitespace; max
    ~64 chars.
  example: token
- name: message
  type: string
  description: Human-readable event message. Free-form text; may contain whitespace
    and punctuation.
  example: Operation completed successfully.
- name: result
  type: string_short
  description: Result string emitted by Vectra AI. Short opaque token, typically without
    whitespace; max ~64 chars.
  example: success
- name: role
  type: string
  description: Vendor-emitted field 'Role'. Free-form text; may contain whitespace
    and punctuation.
  example: Admin
- name: source_ip
  type: ipv4
  description: Source address of the connection initiator. Dotted-quad IPv4 literal
    (e.g., 192.0.2.45); no port suffix, no surrounding brackets or quotes.
  example: 203.0.113.42
- name: src_host
  type: json
  description: Source host (if resolved). JSON object or array; structured payload
    — see dotted-path leaves below.
  example: '{}'
- name: src_ip
  type: ipv4
  description: Source IP. Dotted-quad IPv4 literal (e.g., 192.0.2.45); no port suffix,
    no surrounding brackets or quotes.
  example: 203.0.113.42
- name: state
  type: enum
  description: 'Detection state. One of: active, inactive, ignored, ignored_for_all,
    fixed (case-sensitive).'
  example: active
  enum_values:
  - active
  - inactive
  - ignored
  - ignored_for_all
  - fixed
- name: summary
  type: json
  description: Detection summary blob. JSON object or array; structured payload —
    see dotted-path leaves below.
  example: Event recorded by Vectra AI.
- name: tags
  type: string
  description: Tags applied. Free-form text; may contain whitespace and punctuation.
  example: sample_tags
- name: threat
  type: integer
  description: Threat score 0-100. Signed decimal integer; bare digits, optional leading
    minus.
  example: '42'
- name: user
  type: user
  description: User account associated with the event. Account name as the vendor
    reports it — login name, UPN, or sAMAccountName depending on the source; no domain
    prefix unless the vendor emits one.
  example: jsmith
- name: version
  type: string_short
  description: Version string of the emitting component. Short opaque token, typically
    without whitespace; max ~64 chars.
  example: 1.0.0
- name: src_host.id
  type: string
  description: Source hostname or FQDN reported by the vendor. Leaf of the 'src_host'
    composite. Free-form text; may contain whitespace and punctuation.
  example: vec-d7e24c1a
- name: src_host.name
  type: host
  description: Source hostname or FQDN reported by the vendor. Leaf of the 'src_host'
    composite. Hostname or fully-qualified domain name (RFC 1035 dotted labels); no
    protocol prefix.
  example: host.example.com
- name: summary.description
  type: string_long
  description: Free-form human-readable description from Vectra AI. Free-form text;
    may span multiple lines or contain large payloads.
  example: Event recorded by Vectra AI.
- name: certainty
  type: integer
  description: Certainty score 0-100. Signed decimal integer; bare digits, optional
    leading minus.
  example: '42'
- name: filtered_by_ai
  type: boolean
  description: Filtered by AI triage. Literal 'true' or 'false' (case-insensitive);
    not '1'/'0'.
  example: 'true'
- name: filtered_by_rule
  type: boolean
  description: Filtered by a rule. Literal 'true' or 'false' (case-insensitive); not
    '1'/'0'.
  example: 'true'
- name: filtered_by_user
  type: boolean
  description: Filtered by an operator rule. Literal 'true' or 'false' (case-insensitive);
    not '1'/'0'.
  example: 'true'
- name: first_timestamp
  type: datetime
  description: First seen. ISO-8601 timestamp with timezone (e.g., 2026-05-26T14:23:01Z).
  example: '2026-05-26T14:23:01Z'
- name: grouped_details
  type: json
  is_array: true
  description: Grouped detection details. JSON object or array; structured payload
    — see dotted-path leaves below.
  example: '{}'
- name: is_marked_custom
  type: boolean
  description: Custom-marked. Literal 'true' or 'false' (case-insensitive); not '1'/'0'.
  example: 'true'
- name: is_targeting_key_asset
  type: boolean
  description: Targeting key asset (alias). Literal 'true' or 'false' (case-insensitive);
    not '1'/'0'.
  example: 'true'
- name: last_timestamp
  type: datetime
  description: Last seen. ISO-8601 timestamp with timezone (e.g., 2026-05-26T14:23:01Z).
  example: '2026-05-26T14:23:01Z'
- name: mitre_id
  type: string
  is_array: true
  description: MITRE ATT&CK technique ids. Free-form text; may contain whitespace
