  example: jdoe
- name: src_account.type
  type: string_short
  description: Account type. Short opaque token, typically without whitespace; max
    ~64 chars.
  example: token
- name: src_account_uid
  type: string_short
  description: Source account UID. Short opaque token, typically without whitespace;
    max ~64 chars.
  example: token
- name: targets_key_asset
  type: boolean
  description: Whether targets a key asset. Literal 'true' or 'false' (case-insensitive);
    not '1'/'0'.
  example: 'true'
- name: url
  type: url
  description: Vectra UI URL. Full URL with scheme (http/https/ftp); percent-encoded
    if it contains non-ASCII characters.
  example: https://example.com/path?q=1
use_cases:
- XDR
how_to_use: |
  ## Vectra AI Vectra AI → Cortex XSIAM (dataset `vectra_vectra_raw`)
  
    **Routing** — the broker lowercases the CEF/syslog header `vendor`/`product`, replaces
    non-alphanumerics with `_`, and appends `_raw` to choose the dataset (target: `vectra_vectra_raw`).
  
    **Required CEF header for XSIAM** — the header must normalize to `vectra_vectra`. The marketplace pack's display name `Vectra AI` / `Vectra_AI` normalizes to `vectra_ai_vectra_ai_raw`, a **different dataset** (vendor rename / legacy CEF identity), so use the vendor's actual CEF `deviceVendor`/`deviceProduct` that yields `vectra_vectra` and confirm which dataset the events land in.
  
    **Ingestion shape**: **JSON-native.** The modeling rule reads nested JSON (e.g. `$.name`). CEF/syslog routes + lands and the broker extracts top-level columns; the nested reads need the composite present, so Phantom's worker JSON-stringifies `type: json` composites onto the wire (keep the dotted-leaf fields).
  
    - **Modeling-rule gate**: `id != null |` — seed that field with an accepted value or the rule drops the row (XDM stays 0).
  
    **XDM mapping**: ~18 fields mapped to the unified data model (`xdm.*`), including: `xdm.alert.category`, `xdm.alert.mitre_tactics`, `xdm.alert.mitre_techniques`, `xdm.alert.original_alert_id`, `xdm.alert.original_threat_name`, `xdm.alert.severity`.
  
    **Operator setup**: This data source has typed-column data that doesn't look like CEF (columns are camelCase API fields, JSON sub-objects, etc.). Most likely arrives via the XSIAM HTTP Collector with a source tag mapped to vendor=`Vectra AI`, product=`Vectra_AI`, or via a vendor-specific XDR connector pull. Phantom can POST JSON to the HTTP collector; the operator must configure the collector's source tag to land events in this dataset.
  
    **Status**: Reverse-engineered 2026-06-04 from the parsing/modeling rules — routing, gate, and field
    inventory documented. **NOT yet XDM-validated on a live tenant** (no `validated` pill); validate by
    streaming a CEF batch and confirming a rich `xdm.*` count over a wide window.
  
    **Verify** (once the dataset is XDM-bound, wide ≥7d window):
  
        config timeframe = 30d | datamodel dataset = vectra_vectra_raw | sort desc _time | fields xdm.* | limit 20
