- name: mitre_name
  type: string
  is_array: true
  description: MITRE technique names. Free-form text; may contain whitespace and punctuation.
  example: sample_name
- name: name
  type: string
  description: Detection display name. Free-form text; may contain whitespace and
    punctuation.
  example: sample_name
- name: src_account.name
  type: user
  description: Source account name. Account name as the vendor reports it — login
