is_rawlog_only: false
fields:
- name: GUID
  type: string_short
  description: Unique identifier — assigned by Proofpoint per event. Short opaque token, typically without
    whitespace; max ~64 chars.
  example: f52c3ad3-f377-5a95-89ff-fb3e212935e7
- name: ccAddresses
  type: email
  description: 'Cc: addresses. RFC 5322 `local@domain`; one address only.'
  example: user@example.com
  is_array: true
- name: clickIP
  type: string
  description: Vendor-emitted field 'ClickIP'. Free-form text; may contain whitespace and punctuation.
  example: 192.168.1.42
- name: clickTime
  type: string
  description: Vendor-emitted field 'ClickTime'. Free-form text; may contain whitespace and punctuation.
  example: operator-visible value
- name: fromAddress
  type: email
  description: 'From: addresses. RFC 5322 `local@domain`; one address only.'
  example: user@example.com
  is_array: true
- name: messageID
  type: string
  description: RFC 5322 Message-ID. Free-form text; may contain whitespace and punctuation.
  example: msg-f41a90aa-953
- name: messageParts
  type: string
  description: Vendor-emitted field 'MessageParts'. Free-form text; may contain whitespace and punctuation.
  example: operator-visible value
- name: messageTime
  type: datetime
  description: Message receive time. ISO-8601 timestamp with timezone (e.g., 2026-05-26T14:23:01Z).
  example: '2026-05-26T14:23:01Z'
- name: recipient
  type: string
  description: Vendor-emitted field 'Recipient'. Free-form text; may contain whitespace and punctuation.
  example: 192.168.1.42
- name: sender
  type: email
  description: Vendor-emitted field 'Sender'. RFC 5322 'local@domain' address; one address only — use
    an array field for multiple addresses.
  example: user@example.com
- name: senderIP
  type: ipv4
  description: Sending mail server IP. Dotted-quad IPv4 literal (e.g., 192.0.2.45); no port suffix, no
    surrounding brackets or quotes.
  example: 192.0.2.45
- name: subject
  type: string_long
  description: Message subject. Free-form text; may span multiple lines or contain large payloads.
  example: Free-form vendor-emitted message describing the event.
- name: threatsInfoMap
  type: json
  description: Per-threat detail records (url/file). JSON object or array; structured payload — see dotted-path
    leaves below.
  example: '{"key":"value"}'
  is_array: true
- name: classification
  type: enum
  description: 'Threat classification. One of: malware, phish, spam, impostor, unknown (case-sensitive).'
  enum_values:
  - malware
  - phish
  - spam
  - impostor
  - unknown
  example: malware
- name: completelyRewritten
  type: boolean
  description: Were all URLs rewritten by URL Defense. Literal 'true' or 'false' (case-insensitive); not
    '1'/'0'.
  example: 'true'
- name: guid
  type: string_short
  description: TAP record GUID. Short opaque token, typically without whitespace; max ~64 chars.
  example: token
- name: headerFrom
  type: email
  description: Header From address. RFC 5322 `local@domain`; one address only.
  example: user@example.com
- name: headerReplyTo
  type: email
  description: Header Reply-To. RFC 5322 `local@domain`; one address only.
  example: user@example.com
- name: id
  type: string_short
  description: Message id. Short opaque token, typically without whitespace; max ~64 chars.
  example: token
- name: impostorScore
  type: integer
  description: Impostor score 0-100. Signed decimal integer; bare digits, optional leading minus.
  example: '42'
- name: malwareScore
  type: integer
  description: Malware score 0-100. Signed decimal integer; bare digits, optional leading minus.
  example: '42'
- name: messagePartsCount
  type: integer
  description: Number of parts in the message. Signed decimal integer; bare digits, optional leading minus.
  example: '42'
- name: messageSize
  type: integer_byte_count
  description: Message size in bytes. Unsigned decimal byte count; bare digits, no unit suffix.
  example: '1024'
- name: modulesRun
  type: string
  is_array: true
  description: Detection modules that ran. Free-form text; may contain whitespace and punctuation.
  example: operator-visible value
- name: phishScore
  type: integer
  description: Phish score 0-100. Signed decimal integer; bare digits, optional leading minus.
  example: '42'
- name: policyRoutes
  type: string
  is_array: true
  description: Mail-flow policy routes matched. Free-form text; may contain whitespace and punctuation.
  example: policy-default-deny
- name: quarantineFolder
  type: string_short
  description: Quarantine folder (if quarantined). Short opaque token, typically without whitespace; max
    ~64 chars.
  example: token
- name: quarantineRule
  type: string
  description: Quarantine rule name. Free-form text; may contain whitespace and punctuation.
  example: rule-block-known-bad-ips
- name: spamScore
  type: integer
  description: Spam score 0-100. Signed decimal integer; bare digits, optional leading minus.
  example: '42'
- name: toAddresses
  type: email
  is_array: true
  description: 'To: addresses. RFC 5322 `local@domain`; one address only.'
  example: user@example.com
use_cases:
- Email
