schema_version: 1
id: ProofpointTAP
pack_name: ProofpointTAP
rule_name: ProofpointTAPModelingRules
dataset_name: proofpoint_tap_raw
vendor: Proofpoint
product: ProofpointTAP
description: Proofpoint Targeted Attack Protection (TAP) is a sandbox-and-URL-rewriting layer atop Proofpoint
  email security — it detonates attachments, follows URLs, and reports verdicts. Each event records the
  message context, the URL or attachment evaluated, the verdict (clean / threat / suspicious), and the
  threat family. Simulate TAP to validate detections that pivot from URL-click events to downstream endpoint
  / network telemetry — the click-through correlation chain.
how_to_use: '## Sending these logs to Cortex XSIAM


  Phantom emits this vendor''s wire format as CEF over UDP — point a data worker

  at your XSIAM broker''s syslog destination and these records flow straight in.

  The schema below describes the vendor''s fields independent of destination, so

  the same records also work for Splunk, Elastic, or any syslog receiver.


  The CEF header''s **vendor** + **product** drive XSIAM''s parsing-rule routing:

  the broker normalizes them to `<lowercased-vendor>_<lowercased-product>_raw`

  (non-alphanumerics -> `_`) and matches your installed parsing rule. The PR/MR

  rules read NAMED COLUMNS, so the transport is invisible to them — pack the

  vendor''s field names as CEF extension `key=value` pairs.


  **Required CEF header for XSIAM**:


  - **vendor**: `Proofpoint`

  - **product**: `TAP`


  Broker derives → `proofpoint_tap_raw`.


  Proofpoint TAP (Targeted Attack Protection) reports message-level threat verdicts and URL-click events
  — most of the signal is in flat fields (`threatType`, `threatStatus`, `classification`, `clickIP`),
  with `messageParts[]` carrying per-attachment detail. Every event needs a unique `GUID` and an RFC-3339
  `threatTime`; without the `GUID` the parsing rule drops the event. (Distinct pack from `proofpoint_email_security_raw`
  — different rule, different dataset.)


  **MR pattern**: Mixed. Reads flat `threatType`, `threatStatus`, `classification`, `clickIP`, `completelyRewritten`,
  `recipient` plus nested `messageParts[].md5`.


  **Composite (nested-JSON) fields**: Pack `messageParts` as JSON-string array. Most TAP fields are flat.


  **Sentinel values**: None.


  **PR filter quirks**: `GUID` must be present; `threatTime` RFC-3339.


  **Saturation strategy**: Mixed MR — ~10 XDM.


  **Single-event XDM ceiling**: ~10 XDM single-event.


  **Verify**:


  ```xql

  datamodel dataset = proofpoint_tap_raw

  | filter xdm.event.id contains "<your-marker>"

  | fields xdm.*

  | limit 1

  ```'
