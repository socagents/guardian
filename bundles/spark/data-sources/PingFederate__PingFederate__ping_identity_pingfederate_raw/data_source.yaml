description: Ping Identity PingFederate is an enterprise federation server providing single sign-on (SSO), federated identity, and API access security across SAML, OIDC, OAuth 2.0, and WS-Federation. Its security audit log records every authentication, SSO/SLO, and token-grant event with the subject, client IP, target application, connection, protocol, and IdP/SP role.
