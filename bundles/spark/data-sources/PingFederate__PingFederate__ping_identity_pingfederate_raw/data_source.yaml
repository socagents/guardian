how_to_use: "## Ping Identity PingFederate → Cortex XSIAM (dataset `ping_identity_pingfederate_raw`)\n\n  **Routing — native CEF collector (INGEST, no content-pack modeling rule).** There is **no\n  demisto/content PingFederate ModelingRules/ParsingRules pack**. PingFederate is onboarded as a\n  Broker VM syslog/CEF data source: configure PingFederate's security audit log to write CEF\n  (`log4j2.xml` `SecurityAuditToFile`/syslog appender with the CEF pattern layout) and forward it\n  over syslog (UDP/TCP/filestream) to the Cortex Broker VM. The broker's built-in CEF parser\n  auto-extracts the CEF `k=v` extensions into typed columns and routes by the CEF header\n  `deviceVendor`/`deviceProduct`: it lowercases each, replaces non-alphanumerics with `_`, and\n  appends `_raw`. PingFederate's header is `CEF:0|Ping Identity|PingFederate|<ver>|...`, so events\n  land in **`ping_identity_pingfederate_raw`** (vendor `ping_identity` + product `pingfederate`).\n  The hint's `pingfederate_raw` is the un-prefixed guess — the broker prepends the normalized\n  vendor, so the real dataset carries the `ping_identity_` prefix. Confirm the landed dataset name\n  in the tenant after the first batch.\n\n  **Gate / discriminator** — none. The native CEF parser maps every routed row; there is no\n  modeling-rule WHERE filter to satisfy.\n\n  **Field names are CEF wire keys, not human labels.** PingFederate's default CEF audit pattern is:\n  `CEF:0|Ping Identity|PingFederate|%X{pfversion}|%X{event}|%X{event}|0|rt=%d{MMM dd yyyy HH:mm:ss.SSS}\n  duid=%X{subject} src=%X{ip} msg=%X{status} cs1Label=Target Application URL cs1=%X{app}\n  cs2Label=Connection ID cs2=%X{connectionid} cs3Label=Protocol cs3=%X{protocol} dvchost=%X{host}\n  cs4Label=Role cs4=%X{role} externalId=%X{trackingid} cs5Label=SP Local User ID cs5=%X{localuserid}\n  cs6Label=Attributes cs6=%X{attributes}`. So: `duid`=subject (user), `src`=client IP, `msg`=SSO\n  status, `cs1`=Target Application URL, `cs2`=Connection ID, `cs3`=Protocol, `cs4`=Role (IdP/SP),\n  `cs5`=SP Local User ID, `cs6`=Attributes, `externalId`=tracking ID, `dvchost`=host, `rt`=event\n  time. The schema fields below are those wire keys (plus the CEF header fields and the\n  `csNLabel` companions) so they match what the broker actually extracts. Example event:\n  `CEF:0|Ping Identity|PingFederate|6.4|AUTHN_SESSION_DELETED|AUTHN_SESSION_DELETED|0|rt=May 18 2012 11:41:48.452 duid=joe src=192.168.6.130 msg=failure cs1Label=Target Application URL cs1=http://app.example cs2Label=Connection ID cs2=sp:cloud:saml2 cs3Label=Protocol cs3=SAML20 dvchost=idp01 cs4Label=Role cs4=IdP externalId=tid:ae14b5ce8 cs5Label=SP Local User ID cs5=idlocal cs6Label=Attributes cs6={SAML_SUBJECT=joe}`\n\n  **Status / validation** — `validated: false`. Field names are grounded in PingFederate's\n  documented default CEF audit pattern and a real CEF audit sample (cross-checked against the\n  Elastic PingFederate integration), but **XDM saturation has NOT been proven on a live Cortex\n  tenant**. Because this is a native collector with no shipped modeling rule, `xdm.*` normalization\n  depends on the tenant having a Ping/PingFederate Auth content pack or a custom modeling rule that\n  binds `ping_identity_pingfederate_raw` to `XDM.Auth.*`. Prerequisite to validate: install the\n  relevant Ping Identity / PingFederate Cortex content pack (or author a modeling rule mapping the\n  CEF columns to `XDM.Auth.*`), stream a CEF batch, and confirm a rich `xdm.*` count over a wide\n  (≥7d) window before promoting to `validated`.\n\n  **Verify** (wide ≥7d window, once a modeling rule binds the dataset):\n\n      config timeframe = 30d | datamodel dataset = ping_identity_pingfederate_raw | sort desc _time | fields xdm.* | limit 20\n"
fields:
- name: _raw_log
  type: string
  description: Raw CEF audit line as PingFederate emits it before any parsing or normalization. Free-form text; includes the full CEF header and extension key=value pairs.
  example: CEF:0|Ping Identity|PingFederate|6.4|AUTHN_ATTEMPT|AUTHN_ATTEMPT|0|rt=May 18 2012 11:41:48.452 duid=joe src=192.168.6.130 msg=success cs1=http://app.example cs2=sp:cloud:saml2 cs3=SAML20 cs4=IdP
- name: cefVersion
  type: string_short
  description: CEF format version from the header (the integer after `CEF:`). Always 0 for PingFederate's CEF audit appender.
  example: '0'
- name: deviceVendor
  type: string_short
  description: CEF header device vendor. The broker lowercases and normalizes this to form the dataset vendor segment. PingFederate emits the literal `Ping Identity`.
  example: Ping Identity
- name: deviceProduct
  type: string_short
  description: CEF header device product. Combined with the vendor to choose the dataset (`ping_identity_pingfederate_raw`). PingFederate emits the literal `PingFederate`.
  example: PingFederate
- name: deviceVersion
  type: string_short
  description: CEF header device version — the PingFederate server version emitting the event (CEF pattern `%X{pfversion}`).
  example: '6.4'
- name: cefDeviceEventClassId
  type: string_short
  description: CEF Signature ID (DeviceEventClassID) — PingFederate's audit event code identifying the event type (CEF pattern `%X{event}`). Short opaque token without whitespace.
  example: AUTHN_ATTEMPT
- name: cefName
  type: string_short
  description: CEF Name — human-readable event class label. PingFederate sets this to the same audit event code as the signature ID (CEF pattern `%X{event}`).
  example: AUTHN_ATTEMPT
- name: cefSeverity
  type: integer
  description: CEF severity (0-10). PingFederate's CEF audit pattern emits a fixed 0. Bare digits.
  example: '0'
- name: rt
  type: datetime
  description: CEF `rt` (deviceReceiptTime) — the audit event timestamp (CEF pattern `rt=%d{MMM dd yyyy HH:mm:ss.SSS}`), in the CEF `MMM dd yyyy HH:mm:ss.SSS` format.
  example: May 18 2012 11:41:48.452
- name: duid
  type: user
  description: CEF `duid` (destinationUserId) — the authenticating subject / username for the SSO or token event (CEF pattern `%X{subject}`). Primary identity for XDM.Auth actor mapping.
  example: jdoe
- name: src
  type: ipv4
  description: CEF `src` (sourceAddress) — the client source IP address that initiated the authentication or SSO request (CEF pattern `%X{ip}`).
  example: 192.168.6.130
- name: msg
  type: enum
  description: CEF `msg` (message) — the SSO/authentication request outcome (CEF pattern `%X{status}`). Drives XDM auth outcome.
  example: success
  enum_values:
  - success
  - failure
- name: cs1
  type: url
  description: CEF `cs1` (deviceCustomString1) — the target application URL the SSO is destined for (CEF pattern `%X{app}`). Labeled by cs1Label `Target Application URL`.
  example: http://app.example/landing
- name: cs1Label
  type: string_short
  description: CEF label for cs1. PingFederate sets this to the literal `Target Application URL`.
  example: Target Application URL
- name: cs2
  type: string
  description: CEF `cs2` (deviceCustomString2) — the federation connection/partner ID involved in the SSO (CEF pattern `%X{connectionid}`). Labeled by cs2Label `Connection ID`.
  example: sp:cloud:saml2
- name: cs2Label
  type: string_short
  description: CEF label for cs2. PingFederate sets this to the literal `Connection ID`.
  example: Connection ID
- name: cs3
  type: string_short
  description: CEF `cs3` (deviceCustomString3) — the federation protocol used (CEF pattern `%X{protocol}`), e.g. SAML20, OIDC, WSFED. Labeled by cs3Label `Protocol`.
  example: SAML20
  enum_values:
  - SAML20
  - SAML11
  - OIDC
  - WSFED
  - WSTRUST
- name: cs3Label
  type: string_short
  description: CEF label for cs3. PingFederate sets this to the literal `Protocol`.
  example: Protocol
- name: cs4
  type: enum
  description: CEF `cs4` (deviceCustomString4) — PingFederate's federation role for this event (CEF pattern `%X{role}`) — identity provider or service provider. Labeled by cs4Label `Role`.
  example: IdP
  enum_values:
  - IdP
  - SP
- name: cs4Label
  type: string_short
  description: CEF label for cs4. PingFederate sets this to the literal `Role`.
  example: Role
- name: cs5
  type: user
  description: CEF `cs5` (deviceCustomString5) — the SP-side local user ID the federated identity resolves to (CEF pattern `%X{localuserid}`). Labeled by cs5Label `SP Local User ID`.
  example: idlocal
- name: cs5Label
  type: string_short
  description: CEF label for cs5. PingFederate sets this to the literal `SP Local User ID`.
  example: SP Local User ID
- name: cs6
  type: string_long
  description: CEF `cs6` (deviceCustomString6) — the list of all attributes released in the SSO assertion (CEF pattern `%X{attributes}`), as a brace-delimited key=value list. Labeled by cs6Label.
  example: '{SAML_SUBJECT=joe, ognl=tom}'
- name: cs6Label
  type: string_short
  description: CEF label for cs6. PingFederate sets this to the literal `Attributes`.
  example: Attributes
- name: externalId
  type: string_short
  description: CEF `externalId` — the PingFederate tracking ID, a unique per-session identifier used to correlate all audit records of one SSO/login flow (CEF pattern `%X{trackingid}`).
  example: tid:ae14b5ce8
- name: dvchost
  type: host
  description: CEF `dvchost` (deviceHostName) — the PingFederate engine host that processed the event (CEF pattern `%X{host}`).
  example: idp01.example.com
- name: deviceReceiptTime
  type: datetime
  description: CEF deviceReceiptTime — long-name synonym path the broker may populate from the `rt` extension; the event timestamp normalized to the parser's time zone.
  example: '2012-05-19T00:41:48.452+13:00'
