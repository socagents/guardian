- name: Description
  type: string
  description: Description. Free-form text; may contain whitespace and punctuation.
  example: Event recorded by Thinkst.
- name: FakeCreds
  type: string
  description: Fakecreds. Free-form text; may contain whitespace and punctuation.
  example: sample_fakecreds
- name: Message
  type: string
  description: Message. Free-form text; may contain whitespace and punctuation.
  example: Operation completed successfully.
- name: ReverseDNS
  type: string
  description: Reversedns. Free-form text; may contain whitespace and punctuation.
