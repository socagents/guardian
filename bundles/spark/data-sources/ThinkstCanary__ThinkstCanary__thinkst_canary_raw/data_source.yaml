  example: '2026-05-26T14:23:01Z'
use_cases:
- Honeypot
how_to_use: |
  ## Thinkst ThinkstCanary → Cortex XSIAM (dataset `thinkst_canary_raw`)
  
    **Routing** — the broker lowercases the CEF/syslog header `vendor`/`product`, replaces
    non-alphanumerics with `_`, and appends `_raw` to choose the dataset (target: `thinkst_canary_raw`).
  
    **Required CEF header for XSIAM** — the header must normalize to `thinkst_canary`. The marketplace pack's display name `Thinkst` / `ThinkstCanary` normalizes to `thinkst_thinkstcanary_raw`, a **different dataset** (vendor rename / legacy CEF identity), so use the vendor's actual CEF `deviceVendor`/`deviceProduct` that yields `thinkst_canary` and confirm which dataset the events land in.
  
    **Ingestion shape**: **Flat / CEF-compatible.** The modeling rule reads flat top-level columns (no nested-JSON access). A CEF event routes in and the broker auto-extracts those columns, so this source maps from Phantom's existing CEF path once the dataset is XDM-bound.
  
    - **Modeling-rule gate**: `_raw_log contains "incident" or _raw_log contains "alert"` — seed that field with an accepted value or the rule drops the row (XDM stays 0).
  
    **XDM mapping**: ~11 fields mapped to the **Endpoint** data model (`XDM.Endpoint.*`), including: `XDM.Endpoint.Actor.host.device_id`, `XDM.Endpoint.Target.host.ipv4_addresses`, `XDM.Endpoint.event_timestamp`, `XDM.Endpoint.original_event_description`, `XDM.Endpoint.original_event_id`, `XDM.Endpoint.reason`.
  
    **Operator setup**: This data source uses `_raw_log`-based parsing. Cortex's parsing rule reads from `_raw_log` to populate `_json` (or directly to extract XDM fields), and the modeling rule does `regextract`/`json_extract_scalar` on `_raw_log`. For simulated logs sent from Phantom to land in this dataset, **the operator must add a Broker VM Syslog Applet pre-configured with the matching vendor + product + a dedicated source port**. Without that applet, logs are tagged `unknown/unknown` and routed to `unknown_unknown_raw` — the parsing rule never fires. 
  
  Setup: XSIAM → Settings → Configurations → Data Broker → Applets → Add Applet (Syslog) → Vendor = `Thinkst`, Product = `ThinkstCanary`, Port = (operator picks an unused port, e.g. 1514, 1515, ...). Phantom must then send to that port — current default is 514, which is reserved for the ASA applet.
  
    **Status**: Reverse-engineered 2026-06-04 from the parsing/modeling rules — routing, gate, and field
    inventory documented. **NOT yet XDM-validated on a live tenant** (no `validated` pill); validate by
    streaming a CEF batch and confirming a rich `XDM.Endpoint.*` count over a wide window.
  
    **Verify** (once the dataset is XDM-bound, wide ≥7d window):
  
        config timeframe = 30d | datamodel dataset = thinkst_canary_raw | sort desc _time | fields XDM.Endpoint.* | limit 20
