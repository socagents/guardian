- name: CanaryID
  type: string
  description: Canaryid. Free-form text; may contain whitespace and punctuation.
  example: sample_canaryid
- name: CanaryIP
  type: ipv4
  description: Canaryip. Dotted-quad IPv4 literal (e.g., 192.0.2.45); no port suffix,
