- name: CanaryLocation
  type: string
  description: Canarylocation. Free-form text; may contain whitespace and punctuation.
  example: sample_canarylocation
- name: CanaryPort
  type: integer_port
  description: Canaryport. Unsigned integer 0-65535 representing a TCP/UDP port; bare
