- name: customer
  type: string
  description: Customer. Free-form text; may contain whitespace and punctuation.
  example: sample_customer
- name: eventid
  type: string
  description: Eventid. Free-form text; may contain whitespace and punctuation.
  example: evt-bcdb318d
- name: id
  type: string_short
  description: Id. Short opaque token, typically without whitespace; max ~64 chars.
