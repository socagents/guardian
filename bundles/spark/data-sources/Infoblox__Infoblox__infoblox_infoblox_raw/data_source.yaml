schema_version: 1
id: Infoblox
pack_name: Infoblox
rule_name: Infoblox
dataset_name: infoblox_infoblox_raw
vendor: Infoblox
product: Infoblox
description: Infoblox NIOS is a comprehensive solution that consolidates DNS, DHCP,
  and IP address management into a single platform. It is designed to simplify network
  management by automating these critical functions and providing a centralized console
  for managing them.
categories:
- Network Security
version: 2.0.5
origin: bundle
author: phantom-bundle
uploaded_by: null
created_at: '2026-05-23T09:26:17Z'
updated_at: '2026-05-23T09:26:17Z'
logo:
  mime_type: image/svg+xml
  data: 
  source: phantom-bundle (v0.13.0 migration)
  license: MIT
  fidelity: branded
formats:
- SYSLOG
- CEF
- JSON
is_rawlog_only: false
fields:
- name: _raw_log
  type: string
  description: Raw log line as the vendor emits it before any parsing or normalization.
    Free-form text; may contain whitespace and punctuation.
  example: '<14>2024-01-15T14:23:01+0000 infoblox: infoblox=Infoblox action=allow
    user=jdoe'
- name: act
  type: string_short
  description: CEF action — what Infoblox did with the event (allow/block/quarantine/etc.).
    Short opaque token, typically without whitespace; max ~64 chars.
  example: token_value
- name: cat
  type: string
  description: Vendor-emitted field 'Cat'. Free-form text; may contain whitespace
    and punctuation.
  example: access_control
- name: cefDeviceEventClassId
  type: string_short
  description: CEF device-event class ID — vendor-specific event-type identifier.
    Short opaque token, typically without whitespace; max ~64 chars.
  example: token_value
- name: cefName
  type: string_short
  description: CEF event name — short human-readable label for the event class. Short
    opaque token, typically without whitespace; max ~64 chars.
  example: token_value
- name: dpt
  type: integer_port
  description: CEF destination port — TCP/UDP port on the target side. Unsigned integer
    0-65535 representing a TCP/UDP port; bare digits, no quotes.
  example: '42'
- name: dst
  type: string
  description: CEF destination IP — IPv4/IPv6 address of the target endpoint. Free-form
    text; may contain whitespace and punctuation.
  example: 198.51.100.7
- name: fqdn
  type: host
  description: Fully-qualified domain name (dotted labels per RFC 1035). Hostname
    or fully-qualified domain name (RFC 1035 dotted labels); no protocol prefix.
  example: host01.example.com
- name: msg
  type: string
  description: Human-readable event message. Free-form text; may contain whitespace
    and punctuation.
  example: Operation completed successfully.
- name: spt
  type: integer_port
  description: CEF source port — TCP/UDP port on the source side. Unsigned integer
    0-65535 representing a TCP/UDP port; bare digits, no quotes.
  example: '42'
- name: src
  type: string
  description: CEF source IP — IPv4/IPv6 address of the source endpoint. Free-form
    text; may contain whitespace and punctuation.
  example: 192.0.2.45
use_cases:
- DNS
how_to_use: |
  ## infoblox infoblox → Cortex XSIAM (dataset `infoblox_infoblox_raw`)
  
    **Routing** — the broker lowercases the CEF/syslog header `vendor`/`product`, replaces
    non-alphanumerics with `_`, and appends `_raw` to choose the dataset (target: `infoblox_infoblox_raw`).
  
    **Required CEF header for XSIAM**:
    - **vendor**: `infoblox`
    - **product**: `infoblox`
  
    These normalize → `infoblox_infoblox_raw`.
  
    **Ingestion shape**: **Flat / CEF-compatible.** The modeling rule reads flat top-level columns (no nested-JSON access). A CEF event routes in and the broker auto-extracts those columns, so this source maps from Phantom's existing CEF path once the dataset is XDM-bound.
  
    - **Modeling-rule gate**: `_raw_log ~= "client" and _raw_log ~="infoblox-responses" and _raw_log ~="named"` — seed that field with an accepted value or the rule drops the row (XDM stays 0).
  
    **XDM mapping**: ~77 fields mapped to the unified data model (`xdm.*`), including: `XDM.Auth.Client.ipv4`, `XDM.Auth.Client.user.groups`, `XDM.Auth.Client.user.username`, `XDM.Auth.Server.process.name`, `XDM.Auth.application_protocol`, `XDM.Auth.auth_method`.
  
    **Operator setup**: This data source uses `_raw_log`-based parsing. Cortex's parsing rule reads from `_raw_log` to populate `_json` (or directly to extract XDM fields), and the modeling rule does `regextract`/`json_extract_scalar` on `_raw_log`. For simulated logs sent from Phantom to land in this dataset, **the operator must add a Broker VM Syslog Applet pre-configured with the matching vendor + product + a dedicated source port**. Without that applet, logs are tagged `unknown/unknown` and routed to `unknown_unknown_raw` — the parsing rule never fires. 
  
  Setup: XSIAM → Settings → Configurations → Data Broker → Applets → Add Applet (Syslog) → Vendor = `infoblox`, Product = `infoblox`, Port = (operator picks an unused port, e.g. 1514, 1515, ...). Phantom must then send to that port — current default is 514, which is reserved for the ASA applet.
  
    **Status**: Reverse-engineered 2026-06-04 from the parsing/modeling rules — routing, gate, and field
    inventory documented. **NOT yet XDM-validated on a live tenant** (no `validated` pill); validate by
    streaming a CEF batch and confirming a rich `xdm.*` count over a wide window.
  
    **Verify** (once the dataset is XDM-bound, wide ≥7d window):
  
        config timeframe = 30d | datamodel dataset = infoblox_infoblox_raw | sort desc _time | fields xdm.* | limit 20
