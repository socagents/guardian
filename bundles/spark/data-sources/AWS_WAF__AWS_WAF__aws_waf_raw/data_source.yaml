schema_version: 1
id: AWS_WAF
pack_name: AWS_WAF
rule_name: AWS_WAF
dataset_name: aws_waf_raw
vendor: Amazon Web Services
product: AWS_WAF
description: AWS WAF (Web Application Firewall) logs every HTTP/HTTPS request evaluated by a Web ACL —
  including the matching rule, the action taken (`ALLOW`/`BLOCK`/`COUNT`), the request's headers, the
  URI, the source IP, the country code, and any rate-limit context. Simulate AWS WAF to validate detections
  for application-layer attacks like SQL injection, XSS attempts, credential stuffing, or scraping bots.
how_to_use: '## Sending these logs to Cortex XSIAM


  Phantom emits this vendor''s wire format as CEF over UDP — point a data worker

  at your XSIAM broker''s syslog destination and these records flow straight in.

  The schema below describes the vendor''s fields independent of destination, so

  the same records also work for Splunk, Elastic, or any syslog receiver.


  The CEF header''s **vendor** + **product** drive XSIAM''s parsing-rule routing:

  the broker normalizes them to `<lowercased-vendor>_<lowercased-product>_raw`

  (non-alphanumerics -> `_`) and matches your installed parsing rule. The PR/MR

  rules read NAMED COLUMNS, so the transport is invisible to them — pack the

  vendor''s field names as CEF extension `key=value` pairs.


  **Required CEF header for XSIAM**:


  - **vendor**: `aws`

  - **product**: `waf`


  Broker derives → `aws_waf_raw`.


  Use `aws` / `waf` to broker-derive `aws_waf_raw`. The display-name path `Amazon Web Services` / `AWS_WAF`
  derives a different dataset name.


  **MR pattern**: Heavy-nested. MR consumes `httpRequest.headers[].name`/`headers[].value` array indexing
  plus nested `terminatingRuleMatchDetails[].matchedData[]`.


  **Composite (nested-JSON) fields**: `httpRequest` carries deeply-nested JSON with `clientIp`, `country`,
  `httpMethod`, `uri`, `requestId`, and `headers[]` array. Pack as a JSON-string. L15 confirms array indexing
  survives CEF-extension wrapping when the MR uses `json_extract_scalar` with JSONPath array indices.


  **Sentinel values**: None.


  **PR filter quirks**: `timestamp` must be epoch-ms (13 digits). `action` must be one of `ALLOW`/`BLOCK`/`COUNT`/`CAPTCHA`/`CHALLENGE`/`EXCLUDED_AS_COUNT`
  (case-sensitive).


  **Saturation strategy**: Heavy-nested ceiling ~5-8 XDM per L19. Splitting events helps minimally because
  the same nested objects feed multiple XDM fields.


  **Single-event XDM ceiling**: ~5-8 XDM single-event (heavy-nested MR).


  **Verify**:


  ```xql

  datamodel dataset = aws_waf_raw

  | filter xdm.event.id contains "<your-marker>"

  | fields xdm.*

  | limit 1

  ```'
