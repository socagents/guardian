logo:
  mime_type: image/svg+xml
  data: 
  source: phantom-bundle (v0.13.0 migration)
  license: MIT
  fidelity: branded
formats:
- SYSLOG
- CEF
- JSON
is_rawlog_only: false
fields:
- name: action
  type: enum
  description: 'Terminating rule action. One of: ALLOW, BLOCK, COUNT, CAPTCHA, CHALLENGE, EXCLUDED_AS_COUNT
    (case-sensitive).'
  example: ALLOW
  enum_values:
  - ALLOW
  - BLOCK
  - COUNT
  - CAPTCHA
  - CHALLENGE
  - EXCLUDED_AS_COUNT
- name: httpRequest
  type: string
  description: Vendor-emitted field 'HttpRequest'. Free-form text; may contain whitespace and punctuation.
  example: operator-visible value
- name: httpsourceid
  type: string
  description: Vendor-emitted field 'Httpsourceid'. Free-form text; may contain whitespace and punctuation.
  example: 00u1ab2c3d4e5f6
- name: httpsourcename
  type: string
  description: Vendor-emitted field 'Httpsourcename'. Free-form text; may contain whitespace and punctuation.
  example: operator-visible value
- name: parameters
  type: json
  description: '— see leaf entries for nested paths. JSON object with keys: Host, Referer, User-Agent
    (each key defined as a dotted-path leaf below).'
  example: '{"key":"value"}'
- name: terminatingruleid
  type: string
  description: Vendor-emitted field 'Terminatingruleid'. Free-form text; may contain whitespace and punctuation.
  example: rule-block-known-bad-ips
- name: timestamp
  type: timestamp_ms
  description: Request time (ms epoch). Unsigned epoch milliseconds since 1970-01-01 UTC; bare digits.
  example: '1748263381000'
- name: parameters.Host
  type: host
  description: Vendor-emitted field 'Parameters › Host'. Leaf of the 'parameters' composite. Hostname
    or fully-qualified domain name (RFC 1035 dotted labels); no protocol prefix.
  example: host.example.com
- name: parameters.Referer
  type: url
  description: HTTP Referer header value. Full URL with scheme (http/https/ftp); percent-encoded if non-ASCII.
  example: https://example.com/path?q=1
- name: parameters.User-Agent
  type: string
  description: Vendor-emitted field 'Parameters › User-Agent'. Leaf of the 'parameters' composite. Free-form
    text; may contain whitespace and punctuation.
  example: Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36
- name: captchaResponse.failureReason
  type: string
  description: CAPTCHA failure reason. Free-form text; may contain whitespace and punctuation.
  example: operator-visible value
- name: captchaResponse.responseCode
  type: integer
  description: CAPTCHA response code. Signed decimal integer; bare digits, optional leading minus.
  example: '42'
- name: captchaResponse.solveTimestamp
  type: timestamp_ms
  description: When CAPTCHA was solved. Unsigned epoch milliseconds since 1970-01-01 UTC; bare digits.
  example: '1748263381000'
- name: formatVersion
  type: integer
  description: Log format version. Signed decimal integer; bare digits, optional leading minus.
  example: '42'
- name: httpRequest.args
  type: string_long
  description: Query string. Free-form text; may span multiple lines or contain large payloads.
  example: Free-form vendor-emitted message describing the event.
- name: httpRequest.clientIp
  type: ipv4
  description: Client IP. Dotted-quad IPv4 literal (e.g., 192.0.2.45); no port suffix, no surrounding
    brackets or quotes.
  example: 192.0.2.45
- name: httpRequest.country
  type: country_code
  description: Resolved country. ISO 3166-1 alpha-2 uppercase country code.
  example: US
- name: httpRequest.headers
  type: json
  is_array: true
  description: Request headers. JSON object or array; structured payload — see dotted-path leaves below.
  example: '{"clientIp":"203.0.113.42","uri":"/login","httpMethod":"POST","headers":[{"name":"User-Agent","value":"Mozilla/5.0"}]}'
- name: httpRequest.httpMethod
  type: string_short
  description: HTTP method. Short opaque token, typically without whitespace; max ~64 chars.
  example: token
- name: httpRequest.httpVersion
  type: string_short
  description: HTTP version. Short opaque token, typically without whitespace; max ~64 chars.
  example: token
- name: httpRequest.requestId
  type: string_short
  description: Request id. Short opaque token, typically without whitespace; max ~64 chars.
  example: token
- name: httpRequest.uri
  type: string
  description: Request URI. Free-form text; may contain whitespace and punctuation.
  example: /api/v1/path?q=1
- name: httpSourceId
  type: string
  description: Source id (CF distribution id, ALB ARN, etc.). Free-form text; may contain whitespace and
    punctuation.
  example: 00u1ab2c3d4e5f6
- name: httpSourceName
  type: string_short
  description: Source of the request (CF=CloudFront, ALB, APIGW, etc.). Short opaque token, typically
    without whitespace; max ~64 chars.
  example: token
- name: ja3Fingerprint
  type: hash_md5
  description: JA3 TLS fingerprint. 32-character lowercase hex MD5 digest.
  example: 5d41402abc4b2a76b9719d911017c592
- name: ja4Fingerprint
  type: string
  description: JA4 TLS fingerprint. Free-form text; may contain whitespace and punctuation.
  example: operator-visible value
- name: labels
  type: json
  is_array: true
  description: Labels assigned by rules. JSON object or array; structured payload — see dotted-path leaves
    below.
  example: '{"key":"value"}'
- name: nonTerminatingMatchingRules
  type: json
  is_array: true
  description: Non-terminating matched rules (COUNT mode). JSON object or array; structured payload —
    see dotted-path leaves below.
  example: '{"key":"value"}'
- name: rateBasedRuleList
  type: json
  is_array: true
  description: Rate-based rules evaluated. JSON object or array; structured payload — see dotted-path
    leaves below.
  example: '{"key":"value"}'
- name: requestHeadersInserted
  type: json
  is_array: true
  description: Headers inserted by WAF rules. JSON object or array; structured payload — see dotted-path
    leaves below.
  example: '{"key":"value"}'
- name: responseCodeSent
  type: integer
  description: HTTP response code sent. Signed decimal integer; bare digits, optional leading minus.
  example: '42'
- name: ruleGroupList
  type: json
  is_array: true
  description: Rule groups evaluated. JSON object or array; structured payload — see dotted-path leaves
    below.
  example: '{"key":"value"}'
- name: terminatingRuleId
  type: string
  description: ID of the terminating rule. Free-form text; may contain whitespace and punctuation.
  example: rule-block-known-bad-ips
- name: terminatingRuleMatchDetails
  type: json
  is_array: true
  description: Match details for the terminating rule. JSON object or array; structured payload — see
    dotted-path leaves below.
  example: '{"key":"value"}'
- name: terminatingRuleType
  type: enum
  description: 'Terminating rule type. One of: REGULAR, RATE_BASED, GROUP, MANAGED_RULE_GROUP (case-sensitive).'
  enum_values:
  - REGULAR
  - RATE_BASED
  - GROUP
  - MANAGED_RULE_GROUP
  example: REGULAR
- name: webaclId
  type: string
  description: ARN of the matched Web ACL. Free-form text; may contain whitespace and punctuation.
  example: acl-31860ea2
use_cases:
- Cloud
