schema_version: 1
id: qualys
pack_name: qualys
rule_name: QualysModelingRules
dataset_name: qualys_qualys_raw
vendor: Qualys
product: qualys
description: Qualys Vulnerability Management scans hosts and reports detected vulnerabilities — each finding
  includes the host id (asset ID, IP, FQDN), the QID (Qualys vulnerability id), CVSS score, CVE refs,
  scan timestamp, and remediation guidance. Simulate Qualys events to validate detections that correlate
  active exploits with known vulnerable assets, prioritize patching workflows, or feed risk-scoring pipelines.
how_to_use: '## Sending these logs to Cortex XSIAM


  Phantom emits this vendor''s wire format as CEF over UDP — point a data worker

  at your XSIAM broker''s syslog destination and these records flow straight in.

  The schema below describes the vendor''s fields independent of destination, so

  the same records also work for Splunk, Elastic, or any syslog receiver.


  The CEF header''s **vendor** + **product** drive XSIAM''s parsing-rule routing:

  the broker normalizes them to `<lowercased-vendor>_<lowercased-product>_raw`

  (non-alphanumerics -> `_`) and matches your installed parsing rule. The PR/MR

  rules read NAMED COLUMNS, so the transport is invisible to them — pack the

  vendor''s field names as CEF extension `key=value` pairs.


  **Required CEF header for XSIAM**:


  - **vendor**: `Qualys`

  - **product**: `Qualys`


  Broker derives → `qualys_qualys_raw`.


  Qualys emits one record per scanned asset — flat fields (`ID`, `IP`, `OS`) identify the host while the
  vulnerability detail lives in the nested `VULN_INFO_LIST.VULN_INFO[]` array the modeling rule iterates.
  Note the non-standard time field: the parsing rule keys on `LAST_VULN_SCAN_DATETIME` (`YYYY-MM-DDTHH:MM:SSZ`),
  not a generic `timestamp`/`rt`.


  **MR pattern**: Mixed. Reads flat asset fields (`ID`, `IP`, `OS`, `LAST_VULN_SCAN_DATETIME`) and nested
  `VULN_INFO_LIST.VULN_INFO[].QID`.


  **Composite (nested-JSON) fields**: Pack `VULN_INFO_LIST` as JSON-string object with nested `VULN_INFO`
  array. The MR iterates this array via `json_extract_scalar`.


  **Sentinel values**: None.


  **PR filter quirks**: Qualys uses `LAST_VULN_SCAN_DATETIME` for the time field — must be `YYYY-MM-DDTHH:MM:SSZ`.


  **Saturation strategy**: Mixed MR — ~9 XDM. Single event ~1200 bytes.


  **Single-event XDM ceiling**: ~9 XDM single-event.


  **Verify**:


  ```xql

  datamodel dataset = qualys_qualys_raw

  | filter xdm.event.id contains "<your-marker>"

  | fields xdm.*

  | limit 1

  ```


  ### Make it map to XDM


  The `qualys_qualys_raw` modeling rule only runs when `event_type = "activity_log"`.
  When simulating, pass `observables_dict={"event_type": "activity_log"}` to `phantom_create_data_worker`
  so the gate matches. The rule then populates core XDM: `xdm.event.type` <- `event_type`,
  `xdm.observer.action` <- `Action`, `xdm.observer.type` <- `modules` (parsed out of `Details`),
  `xdm.event.description` <- `Details`, `xdm.auth.privilege_level` <- `User_Role`, `xdm.source.user.username`
  <- `User_Name`, and `xdm.source.ipv4` <- `User_IP` (when it matches an IPv4 pattern). Most
  of the deeper XDM (report size/duration, target IPs, titles) is regex-extracted from the
  free-text `Details` field. (Note: the `qualys_assets_raw` MODEL in the same rule gates on
  `event_type = "host_list_detection"` — a different dataset.)'
