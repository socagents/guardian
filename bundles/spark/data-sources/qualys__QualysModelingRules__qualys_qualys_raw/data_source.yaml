updated_at: '2026-05-23T09:26:17Z'
logo:
  mime_type: image/svg+xml
  data: 
  source: phantom-bundle (v0.13.0 migration)
  license: MIT
  fidelity: branded
formats:
- SYSLOG
- CEF
- JSON
is_rawlog_only: false
fields:
- name: Action
  type: string
  description: Action taken by the vendor's enforcement engine. Free-form text; may contain whitespace
    and punctuation.
  example: allow
- name: Details
  type: string_long
  description: Additional details payload emitted by Qualys. Free-form text; may span multiple lines or
    contain large payloads.
  example: Detailed event payload emitted by Qualys for this record.
- name: Module
  type: string
  description: Vendor-emitted field 'Module'. Free-form text; may contain whitespace and punctuation.
  example: audit
- name: User_IP
  type: string
  description: Vendor-emitted field 'User IP'. Free-form text; may contain whitespace and punctuation.
  example: 192.0.2.45
- name: User_Name
  type: user
  description: Human-readable name as displayed by Qualys. Account name as the vendor reports it — login
    name, UPN, or sAMAccountName; no domain prefix unless vendor emits one.
  example: jsmith
- name: User_Role
  type: string
  description: Vendor-emitted field 'User Role'. Free-form text; may contain whitespace and punctuation.
  example: Admin
- name: event_type
  type: string
  description: Modeling-rule GATE — must equal "activity_log" for XDM to map. Event type or category as
    the vendor classifies it. Free-form text; may contain whitespace and punctuation.
  example: activity_log
use_cases:
- Vuln
validated: true
