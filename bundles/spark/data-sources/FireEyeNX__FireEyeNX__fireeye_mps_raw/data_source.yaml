schema_version: 1
id: FireEyeNX
pack_name: FireEyeNX
rule_name: FireEyeNX
dataset_name: fireeye_mps_raw
vendor: FireEye
product: FireEyeNX
description: FireEye Network Security is an effective cyber threat protection solution
  that helps organizations minimize the risk of costly breaches by accurately detecting
  and immediately stopping advanced, targeted, and other evasive attacks hiding in
  Internet traffic.
categories:
- Network Security
version: 1.1.45
origin: bundle
author: phantom-bundle
uploaded_by: null
created_at: '2026-05-23T09:26:17Z'
updated_at: '2026-05-23T09:26:17Z'
logo:
  mime_type: image/svg+xml
  data: 
  source: phantom-bundle (v0.13.0 migration)
  license: MIT
  fidelity: branded
formats:
- SYSLOG
- CEF
- JSON
is_rawlog_only: false
fields:
- name: act
  type: string
  description: Action taken (allow/deny/block/...). Free-form text; may contain whitespace
    and punctuation.
  example: sample_act
- name: cs1
  type: string
  description: Device custom string 1 (see cs1Label). Free-form text; may contain
    whitespace and punctuation.
  example: custom_value
- name: dmac
  type: mac
  description: CEF destination MAC address. MAC address in colon-separated lowercase
    hex (aa:bb:cc:dd:ee:ff).
  example: aa:bb:cc:dd:ee:ff
- name: dproc
  type: string
  description: Vendor-emitted field 'Dproc'. Free-form text; may contain whitespace
    and punctuation.
  example: sample_dproc
- name: dpt
  type: integer_port
  description: CEF destination port — TCP/UDP port on the target side. Unsigned integer
    0-65535 representing a TCP/UDP port; bare digits, no quotes.
  example: '443'
- name: dst
  type: ipv4
  description: CEF destination IP — IPv4/IPv6 address of the target endpoint. Dotted-quad
    IPv4 literal (e.g., 192.0.2.45); no port suffix, no surrounding brackets or quotes.
  example: 203.0.113.42
- name: dvchost
  type: host
  description: Vendor-emitted field 'Dvchost'. Hostname or fully-qualified domain
    name (RFC 1035 dotted labels); no protocol prefix.
  example: host.example.com
- name: fileHash
  type: hash_md5
  description: Vendor-emitted field 'FileHash'. 32-character lowercase hex MD5 digest.
  example: 5d41402abc4b2a76b9719d911017c592
- name: filePath
  type: string
  description: Filesystem path reported by the vendor. Free-form text; may contain
    whitespace and punctuation.
  example: /var/log/app.log
- name: fileType
  type: string
  description: Vendor-emitted field 'FileType'. Free-form text; may contain whitespace
    and punctuation.
  example: sample_filetype
- name: fname
  type: file_path
  description: Vendor-emitted field 'Fname'. Absolute filesystem path; vendor-native
    separator (forward slash on POSIX, backslash on Windows).
  example: /var/log/example.log
- name: proto
  type: string
  description: Network protocol (e.g. tcp/udp/icmp). Free-form text; may contain whitespace
    and punctuation.
  example: tcp
- name: request
  type: url
  description: HTTP request line or full request payload as captured by FireEye. Full
    URL with scheme (http/https/ftp); percent-encoded if non-ASCII.
  example: https://example.com/path
- name: requestMethod
  type: string
  description: HTTP request method (GET/POST/...). Free-form text; may contain whitespace
    and punctuation.
  example: sample_requestmethod
- name: rt
  type: integer
  description: Vendor-emitted field 'Rt'. Signed decimal integer; bare digits, optional
    leading minus.
  example: '42'
- name: smac
  type: mac
  description: CEF source MAC address. MAC address in colon-separated lowercase hex
    (aa:bb:cc:dd:ee:ff).
  example: aa:bb:cc:dd:ee:ff
- name: spt
  type: integer_port
  description: CEF source port — TCP/UDP port on the source side. Unsigned integer
    0-65535 representing a TCP/UDP port; bare digits, no quotes.
  example: '443'
- name: src
  type: ipv4
  description: CEF source IP — IPv4/IPv6 address of the source endpoint. Dotted-quad
    IPv4 literal (e.g., 192.0.2.45); no port suffix, no surrounding brackets or quotes.
  example: 203.0.113.42
use_cases:
- EDR
- Email
how_to_use: |
  ## fireeye mps → Cortex XSIAM (dataset `fireeye_mps_raw`)
  
    **Routing** — the broker lowercases the CEF/syslog header `vendor`/`product`, replaces
    non-alphanumerics with `_`, and appends `_raw` to choose the dataset (target: `fireeye_mps_raw`).
  
    **Required CEF header for XSIAM**:
    - **vendor**: `fireeye`
    - **product**: `mps`
  
    These normalize → `fireeye_mps_raw`.
  
    **Ingestion shape**: **Flat / CEF-compatible.** The modeling rule reads flat top-level columns (no nested-JSON access). A CEF event routes in and the broker auto-extracts those columns, so this source maps from Phantom's existing CEF path once the dataset is XDM-bound.
  
    - **Modeling-rule gate**: none — the rule maps every routed row unconditionally.
  
    **XDM mapping**: ~17 fields mapped to the unified data model (`xdm.*`), including: `xdm.alert.original_threat_name`, `xdm.event.operation_sub_type`, `xdm.network.http.method`, `xdm.network.http.url`, `xdm.network.ip_protocol`, `xdm.source.host.mac_addresses`.
  
    **Operator setup**: This data source's modeling rule reads CEF-shaped columns (rt, src, dst, spt, dpt, cs1-6, act, etc.). Phantom emits CEF over syslog (`CEF:0|fireeye|mps|...|<extensions>`) — the broker auto-extracts CEF k=v pairs into typed columns matching the CEF dictionary, and the broker routes to this dataset via the CEF header's vendor/product. Usually NO operator-side broker config is required beyond standard CEF ingestion.
  
    **Status**: Reverse-engineered 2026-06-04 from the parsing/modeling rules — routing, gate, and field
    inventory documented. **NOT yet XDM-validated on a live tenant** (no `validated` pill); validate by
    streaming a CEF batch and confirming a rich `xdm.*` count over a wide window.
  
    **Verify** (once the dataset is XDM-bound, wide ≥7d window):
  
        config timeframe = 30d | datamodel dataset = fireeye_mps_raw | sort desc _time | fields xdm.* | limit 20
