how_to_use: |
  ## Admin By Request AdminByRequest → Cortex XSIAM (dataset `admin_by_request_raw`)
  
    **Routing** — the broker lowercases the CEF/syslog header `vendor`/`product`, replaces
    non-alphanumerics with `_`, and appends `_raw` to choose the dataset (target: `admin_by_request_raw`).
  
    **Required CEF header for XSIAM** — the header must normalize to `admin_by_request`. The marketplace pack's display name `Admin By Request` / `AdminByRequest` normalizes to `admin_by_request_adminbyrequest_raw`, a **different dataset** (vendor rename / legacy CEF identity), so use the vendor's actual CEF `deviceVendor`/`deviceProduct` that yields `admin_by_request` and confirm which dataset the events land in.
  
    **Ingestion shape**: **JSON-native.** The modeling rule reads nested JSON (e.g. `application -> name`). CEF/syslog routes + lands and the broker extracts top-level columns; the nested reads need the composite present, so Phantom's worker JSON-stringifies `type: json` composites onto the wire (keep the dotted-leaf fields).
  
    - **Modeling-rule gate**: `source_log_type = "auditlog"` — seed that field with an accepted value or the rule drops the row (XDM stays 0).
  
    **XDM mapping**: ~12 fields mapped to the unified data model (`xdm.*`), including: `xdm.event.description`, `xdm.event.log_level`, `xdm.event.operation`, `xdm.event.outcome_reason`, `xdm.event.type`, `xdm.source.user.upn`.
  
    **Operator setup**: This data source has typed-column data that doesn't look like CEF (columns are camelCase API fields, JSON sub-objects, etc.). Most likely arrives via the XSIAM HTTP Collector with a source tag mapped to vendor=`Admin By Request`, product=`AdminByRequest`, or via a vendor-specific XDR connector pull. Phantom can POST JSON to the HTTP collector; the operator must configure the collector's source tag to land events in this dataset.
  
    **Status**: Reverse-engineered 2026-06-04 from the parsing/modeling rules — routing, gate, and field
    inventory documented. **NOT yet XDM-validated on a live tenant** (no `validated` pill); validate by
    streaming a CEF batch and confirming a rich `xdm.*` count over a wide window.
  
    **Verify** (once the dataset is XDM-bound, wide ≥7d window):
  
        config timeframe = 30d | datamodel dataset = admin_by_request_raw | sort desc _time | fields xdm.* | limit 20
