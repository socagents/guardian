fields:
- name: _raw_log
  type: string
  description: Raw log line as the vendor emits it before any parsing or normalization.
    Free-form text; may contain whitespace and punctuation.
  example: '<14>2024-01-15T14:23:01+0000 linux: auditd=Auditd action=allow user=jdoe'
- name: acct
  type: user
  description: Source user username. Account name as the vendor reports it — login
    name, UPN, or sAMAccountName depending on the source; no domain prefix unless
    the vendor emits one.
  example: jdoe
- name: addr
  type: ipv4
  description: Source IPv4. Dotted-quad IPv4 literal (e.g., 192.0.2.45); no port suffix,
    no surrounding brackets or quotes.
  example: 192.0.2.45
- name: comm
  type: string
  description: Source process command line. Free-form text; may contain whitespace
    and punctuation.
  example: sample_comm
- name: eventid
  type: string
  description: Event ID. Free-form text; may contain whitespace and punctuation.
  example: evt-7ded97d7
- name: exe
  type: string
  description: Source process executable path. Free-form text; may contain whitespace
    and punctuation.
  example: sample_exe
- name: failed
  type: string_short
  description: Event outcome. Short opaque token, typically without whitespace; max
    ~64 chars.
  example: token
- name: hostname
  type: host
  description: Source host hostname. Hostname or fully-qualified domain name (RFC
    1035 dotted labels); no protocol prefix.
  example: host01.example.com
- name: key
  type: string
  description: Key. Free-form text; may contain whitespace and punctuation.
  example: sample_key
- name: op
  type: string
  description: Event operation. Free-form text; may contain whitespace and punctuation.
  example: create
- name: outcome_result
  type: string_short
  description: Event outcome. Short opaque token, typically without whitespace; max
    ~64 chars.
  example: token
- name: pid
  type: string
  description: Source process PID. Free-form text; may contain whitespace and punctuation.
  example: '4242'
- name: res
  type: string
  description: Res. Free-form text; may contain whitespace and punctuation.
  example: sample_res
- name: ses
  type: string
  description: Session context id. Free-form text; may contain whitespace and punctuation.
  example: sample_ses
- name: success
  type: string
  description: Success. Free-form text; may contain whitespace and punctuation.
  example: sample_success
- name: type
  type: string
  description: Event type. Free-form text; may contain whitespace and punctuation.
  example: authentication
- name: uid
  type: string
  description: Source user identifier. Free-form text; may contain whitespace and
    punctuation.
  example: sample_uid
use_cases:
- OS
how_to_use: |
  ## unix auditd → Cortex XSIAM (dataset `unix_auditd_raw`)
  
    **Routing** — the broker lowercases the CEF/syslog header `vendor`/`product`, replaces
    non-alphanumerics with `_`, and appends `_raw` to choose the dataset (target: `unix_auditd_raw`).
  
    **Required CEF header for XSIAM**:
    - **vendor**: `unix`
    - **product**: `auditd`
  
    These normalize → `unix_auditd_raw`.
  
    **Ingestion shape**: **Flat / CEF-compatible.** The modeling rule reads flat top-level columns (no nested-JSON access). A CEF event routes in and the broker auto-extracts those columns, so this source maps from Phantom's existing CEF path once the dataset is XDM-bound.
  
    - **Modeling-rule gate**: none — the rule maps every routed row unconditionally.
  
    **XDM mapping**: ~12 fields mapped to the unified data model (`xdm.*`), including: `xdm.event.id`, `xdm.event.operation`, `xdm.event.outcome`, `xdm.event.type`, `xdm.session_context_id`, `xdm.source.host.hostname`.
  
    **Operator setup**: This data source uses `_raw_log`-based parsing. Cortex's parsing rule reads from `_raw_log` to populate `_json` (or directly to extract XDM fields), and the modeling rule does `regextract`/`json_extract_scalar` on `_raw_log`. For simulated logs sent from Phantom to land in this dataset, **the operator must add a Broker VM Syslog Applet pre-configured with the matching vendor + product + a dedicated source port**. Without that applet, logs are tagged `unknown/unknown` and routed to `unknown_unknown_raw` — the parsing rule never fires. 
  
  Setup: XSIAM → Settings → Configurations → Data Broker → Applets → Add Applet (Syslog) → Vendor = `unix`, Product = `auditd`, Port = (operator picks an unused port, e.g. 1514, 1515, ...). Phantom must then send to that port — current default is 514, which is reserved for the ASA applet.
  
    **Status**: Reverse-engineered 2026-06-04 from the parsing/modeling rules — routing, gate, and field
    inventory documented. **NOT yet XDM-validated on a live tenant** (no `validated` pill); validate by
    streaming a CEF batch and confirming a rich `xdm.*` count over a wide window.
  
    **Verify** (once the dataset is XDM-bound, wide ≥7d window):
  
        config timeframe = 30d | datamodel dataset = unix_auditd_raw | sort desc _time | fields xdm.* | limit 20
