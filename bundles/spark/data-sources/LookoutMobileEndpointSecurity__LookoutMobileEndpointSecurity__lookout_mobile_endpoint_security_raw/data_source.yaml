how_to_use: |
  ## Lookout LookoutMobileEndpointSecurity → Cortex XSIAM (dataset `lookout_mobile_endpoint_security_raw`)
  
    **Routing** — the broker lowercases the CEF/syslog header `vendor`/`product`, replaces
    non-alphanumerics with `_`, and appends `_raw` to choose the dataset (target: `lookout_mobile_endpoint_security_raw`).
  
    **Required CEF header for XSIAM** — the header must normalize to `lookout_mobile_endpoint_security`. The marketplace pack's display name `Lookout` / `LookoutMobileEndpointSecurity` normalizes to `lookout_lookoutmobileendpointsecurity_raw`, a **different dataset** (vendor rename / legacy CEF identity), so use the vendor's actual CEF `deviceVendor`/`deviceProduct` that yields `lookout_mobile_endpoint_security` and confirm which dataset the events land in.
  
    **Ingestion shape**: **JSON-native.** The modeling rule reads nested JSON (e.g. `device -> platform`). CEF/syslog routes + lands and the broker extracts top-level columns; the nested reads need the composite present, so Phantom's worker JSON-stringifies `type: json` composites onto the wire (keep the dotted-leaf fields).
  
    - **Modeling-rule gate**: `type = "DEVICE"` — seed that field with an accepted value or the rule drops the row (XDM stays 0).
  
    **XDM mapping**: ~38 fields mapped to the unified data model (`xdm.*`), including: `xdm.alert.category`, `xdm.alert.original_threat_id`, `xdm.alert.risks`, `xdm.alert.severity`, `xdm.alert.status`, `xdm.alert.subcategory`.
  
    **Operator setup**: This data source has typed-column data that doesn't look like CEF (columns are camelCase API fields, JSON sub-objects, etc.). Most likely arrives via the XSIAM HTTP Collector with a source tag mapped to vendor=`Lookout`, product=`LookoutMobileEndpointSecurity`, or via a vendor-specific XDR connector pull. Phantom can POST JSON to the HTTP collector; the operator must configure the collector's source tag to land events in this dataset.
  
    **Status**: Reverse-engineered 2026-06-04 from the parsing/modeling rules — routing, gate, and field
    inventory documented. **NOT yet XDM-validated on a live tenant** (no `validated` pill); validate by
    streaming a CEF batch and confirming a rich `xdm.*` count over a wide window.
  
    **Verify** (once the dataset is XDM-bound, wide ≥7d window):
  
        config timeframe = 30d | datamodel dataset = lookout_mobile_endpoint_security_raw | sort desc _time | fields xdm.* | limit 20
