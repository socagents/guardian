how_to_use: |
  ## vmware vcenter → Cortex XSIAM (dataset `vmware_vcenter_raw`)
  
    **Routing** — the broker lowercases the CEF/syslog header `vendor`/`product`, replaces
    non-alphanumerics with `_`, and appends `_raw` to choose the dataset (target: `vmware_vcenter_raw`).
  
    **Required CEF header for XSIAM**:
    - **vendor**: `vmware`
    - **product**: `vcenter`
  
    These normalize → `vmware_vcenter_raw`.
  
    **Ingestion shape**: **JSON-native.** The modeling rule reads nested JSON (e.g. `json_payload -> status`). CEF/syslog routes + lands and the broker extracts top-level columns; the nested reads need the composite present, so Phantom's worker JSON-stringifies `type: json` composites onto the wire (keep the dotted-leaf fields).
  
    - **Modeling-rule gate**: `_raw_log contains "| vlsi |" or _raw_log contains "| vim" or _raw_log contains "jointool" or _raw_log contains "heard-" or _raw_log contains "Stats"  or _raw_lo` — seed that field with an accepted value or the rule drops the row (XDM stays 0).
  
    **XDM mapping**: ~103 fields mapped to the unified data model (`xdm.*`), including: `XDM.Audit.TriggeredBy.identity.uuid`, `XDM.Audit.audited_resource.id`, `XDM.Audit.event_timestamp`, `XDM.Audit.identity.name`, `XDM.Audit.identity.sub_type`, `XDM.Audit.original_event_description`.
  
    **Operator setup**: This data source uses `_raw_log`-based parsing. Cortex's parsing rule reads from `_raw_log` to populate `_json` (or directly to extract XDM fields), and the modeling rule does `regextract`/`json_extract_scalar` on `_raw_log`. For simulated logs sent from Phantom to land in this dataset, **the operator must add a Broker VM Syslog Applet pre-configured with the matching vendor + product + a dedicated source port**. Without that applet, logs are tagged `unknown/unknown` and routed to `unknown_unknown_raw` — the parsing rule never fires. 
  
  Setup: XSIAM → Settings → Configurations → Data Broker → Applets → Add Applet (Syslog) → Vendor = `vmware`, Product = `vcenter`, Port = (operator picks an unused port, e.g. 1514, 1515, ...). Phantom must then send to that port — current default is 514, which is reserved for the ASA applet.
  
    **Status**: Reverse-engineered 2026-06-04 from the parsing/modeling rules — routing, gate, and field
    inventory documented. **NOT yet XDM-validated on a live tenant** (no `validated` pill); validate by
    streaming a CEF batch and confirming a rich `xdm.*` count over a wide window.
  
    **Verify** (once the dataset is XDM-bound, wide ≥7d window):
  
        config timeframe = 30d | datamodel dataset = vmware_vcenter_raw | sort desc _time | fields xdm.* | limit 20
