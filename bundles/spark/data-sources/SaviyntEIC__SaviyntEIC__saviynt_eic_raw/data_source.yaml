how_to_use: |
  ## Saviynt SaviyntEIC ‚Üí Cortex XSIAM (dataset `saviynt_eic_raw`)
  
    **Routing** ‚Äî the broker lowercases the CEF/syslog header `vendor`/`product`, replaces
    non-alphanumerics with `_`, and appends `_raw` to choose the dataset (target: `saviynt_eic_raw`).
  
    **Required CEF header for XSIAM** ‚Äî the header must normalize to `saviynt_eic`. The marketplace pack's display name `Saviynt` / `SaviyntEIC` normalizes to `saviynt_saviynteic_raw`, a **different dataset** (vendor rename / legacy CEF identity), so use the vendor's actual CEF `deviceVendor`/`deviceProduct` that yields `saviynt_eic` and confirm which dataset the events land in.
  
    **Ingestion shape**: **JSON-native.** The modeling rule reads nested JSON (e.g. `Message -> message`). CEF/syslog routes + lands and the broker extracts top-level columns; the nested reads need the composite present, so Phantom's worker JSON-stringifies `type: json` composites onto the wire (keep the dotted-leaf fields).
  
    - **Modeling-rule gate**: none ‚Äî the rule maps every routed row unconditionally.
  
    **XDM mapping**: ~10 fields mapped to the unified data model (`xdm.*`), including: `xdm.event.description`, `xdm.event.id`, `xdm.event.operation_sub_type`, `xdm.event.type`, `xdm.source.ipv4`, `xdm.source.ipv6`.
  
    **Operator setup**: This data source has typed-column data that doesn't look like CEF (columns are camelCase API fields, JSON sub-objects, etc.). Most likely arrives via the XSIAM HTTP Collector with a source tag mapped to vendor=`Saviynt`, product=`SaviyntEIC`, or via a vendor-specific XDR connector pull. Phantom can POST JSON to the HTTP collector; the operator must configure the collector's source tag to land events in this dataset.
  
    **Status**: Reverse-engineered 2026-06-04 from the parsing/modeling rules ‚Äî routing, gate, and field
    inventory documented. **NOT yet XDM-validated on a live tenant** (no `validated` pill); validate by
    streaming a CEF batch and confirming a rich `xdm.*` count over a wide window.
  
    **Verify** (once the dataset is XDM-bound, wide ‚â•7d window):
  
        config timeframe = 30d | datamodel dataset = saviynt_eic_raw | sort desc _time | fields xdm.* | limit 20
