how_to_use: |
  ## msft exchange → Cortex XSIAM (dataset `msft_exchange_raw`)
  
    **Routing** — the broker lowercases the CEF/syslog header `vendor`/`product`, replaces
    non-alphanumerics with `_`, and appends `_raw` to choose the dataset (target: `msft_exchange_raw`).
  
    **Required CEF header for XSIAM**:
    - **vendor**: `msft`
    - **product**: `exchange`
  
    These normalize → `msft_exchange_raw`.
  
    **Ingestion shape**: **Flat / CEF-compatible.** The modeling rule reads flat top-level columns (no nested-JSON access). A CEF event routes in and the broker auto-extracts those columns, so this source maps from Phantom's existing CEF path once the dataset is XDM-bound.
  
    - **Modeling-rule gate**: none — the rule maps every routed row unconditionally.
  
    **XDM mapping**: ~31 fields mapped to the unified data model (`xdm.*`), including: `XDM.Email.Client.host.hostname`, `XDM.Email.Client.host.ipv4_addresses`, `XDM.Email.Observer.content_version`, `XDM.Email.Observer.unique_identifier`, `XDM.Email.Server.host.hostname`, `XDM.Email.Server.host.ipv4_addresses`.
  
    **Operator setup**: This data source has typed-column data that doesn't look like CEF (columns are camelCase API fields, JSON sub-objects, etc.). Most likely arrives via the XSIAM HTTP Collector with a source tag mapped to vendor=`msft`, product=`exchange`, or via a vendor-specific XDR connector pull. Phantom can POST JSON to the HTTP collector; the operator must configure the collector's source tag to land events in this dataset.
  
    **Status**: Reverse-engineered 2026-06-04 from the parsing/modeling rules — routing, gate, and field
    inventory documented. **NOT yet XDM-validated on a live tenant** (no `validated` pill); validate by
    streaming a CEF batch and confirming a rich `xdm.*` count over a wide window.
  
    **Verify** (once the dataset is XDM-bound, wide ≥7d window):
  
        config timeframe = 30d | datamodel dataset = msft_exchange_raw | sort desc _time | fields xdm.* | limit 20
