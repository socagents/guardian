how_to_use: |
  ## Recorded Future RecordedFuture â†’ Cortex XSIAM (dataset `recorded_future_intelligence_cloud_raw`)
  
    **Routing** â€” the broker lowercases the CEF/syslog header `vendor`/`product`, replaces
    non-alphanumerics with `_`, and appends `_raw` to choose the dataset (target: `recorded_future_intelligence_cloud_raw`).
  
    **Required CEF header for XSIAM** â€” the header must normalize to `recorded_future_intelligence_cloud`. The marketplace pack's display name `Recorded Future` / `RecordedFuture` normalizes to `recorded_future_recordedfuture_raw`, a **different dataset** (vendor rename / legacy CEF identity), so use the vendor's actual CEF `deviceVendor`/`deviceProduct` that yields `recorded_future_intelligence_cloud` and confirm which dataset the events land in.
  
    **Ingestion shape**: **JSON-native.** The modeling rule reads nested JSON (e.g. `rule -> name`). CEF/syslog routes + lands and the broker extracts top-level columns; the nested reads need the composite present, so Phantom's worker JSON-stringifies `type: json` composites onto the wire (keep the dotted-leaf fields).
  
    - **Modeling-rule gate**: none â€” the rule maps every routed row unconditionally.
  
    **XDM mapping**: ~8 fields mapped to the unified data model (`xdm.*`), including: `xdm.alert.description`, `xdm.alert.name`, `xdm.alert.original_alert_id`, `xdm.alert.risks`, `xdm.alert.subcategory`, `xdm.event.description`.
  
    **Operator setup**: This data source has typed-column data that doesn't look like CEF (columns are camelCase API fields, JSON sub-objects, etc.). Most likely arrives via the XSIAM HTTP Collector with a source tag mapped to vendor=`Recorded Future`, product=`RecordedFuture`, or via a vendor-specific XDR connector pull. Phantom can POST JSON to the HTTP collector; the operator must configure the collector's source tag to land events in this dataset.
  
    **Status**: Reverse-engineered 2026-06-04 from the parsing/modeling rules â€” routing, gate, and field
    inventory documented. **NOT yet XDM-validated on a live tenant** (no `validated` pill); validate by
    streaming a CEF batch and confirming a rich `xdm.*` count over a wide window.
  
    **Verify** (once the dataset is XDM-bound, wide â‰Ą7d window):
  
        config timeframe = 30d | datamodel dataset = recorded_future_intelligence_cloud_raw | sort desc _time | fields xdm.* | limit 20
