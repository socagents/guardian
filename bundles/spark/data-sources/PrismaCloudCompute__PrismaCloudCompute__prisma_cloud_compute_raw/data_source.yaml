validated: true
how_to_use: "## Prisma Cloud Compute -> Cortex XSIAM (dataset `prisma_cloud_compute_raw`)\n\n**Validated\
  \ 2026-06-04** — maps **29 xdm fields** end-to-end via CEF-over-syslog\n(distinct non-null across 20\
  \ rows) with the PrismaCloudCompute content pack installed.\n\nRouting — from the INGEST/parsing rule\
  \ (no guessing):\n- vendor: `prisma`\n- product: `cloud_compute`\n`[INGEST: vendor=\"prisma\", product=\"\
  cloud_compute\", target_dataset=\"prisma_cloud_compute_raw\", no_hit=keep]`.\nUnconditional modeling\
  \ rule (no gate). Send a `time` field (`%h %d %Y %H:%M:%S`) so _time parses.\n\nMostly flat fields (user,\
  \ fqdn, host, rule, type, region, message, category, accountID,\ncontainer, command, osRelease, collections,\
  \ provider, osDistro, image, ...) plus a `labels`\nJSON composite. NOTE: a few labels paths use bracket-notation\
  \ literal-dot keys\n($['baseimage.name'], $['org.opencontainers.image.*']) the dotted-leaf convention\
  \ can't\nexpress — those specific fallbacks stay unmapped, but `image` covers the same XDM target.\n\
  \nVerify (wide >=7d window, count distinct across >=20 rows):\n    config timeframe = 30d | datamodel\
  \ dataset = prisma_cloud_compute_raw | sort desc _time | fields xdm.* | limit 20\n"
