- name: provider
  type: string
  description: Vendor-emitted field 'Provider'. Free-form text; may contain whitespace and punctuation.
  example: aws
- name: region
  type: string_short
  description: Cloud region or geographic region label. Short opaque token, typically without whitespace;
    max ~64 chars.
  example: us-east-1
- name: rest
  type: string
  description: Vendor-emitted field 'Rest'. Free-form text; may contain whitespace and punctuation.
  example: sample_rest
- name: rule
  type: string
  description: Vendor-emitted field 'Rule'. Free-form text; may contain whitespace and punctuation.
  example: Allow-Internal
- name: runtime
  type: string
  description: Container runtime (docker/containerd/cri-o). Free-form text; may contain whitespace and
    punctuation.
  example: sample_runtime
- name: startupProcess
  type: string
  description: Vendor-emitted field 'StartupProcess'. Free-form text; may contain whitespace and punctuation.
