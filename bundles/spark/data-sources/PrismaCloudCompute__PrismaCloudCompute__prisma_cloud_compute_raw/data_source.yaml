- name: dropped
  type: string
  description: Vendor-emitted field 'Dropped'. Free-form text; may contain whitespace and punctuation.
  example: sample_dropped
- name: forensics
  type: string
  description: Vendor-emitted field 'Forensics'. Free-form text; may contain whitespace and punctuation.
  example: sample_forensics
- name: fqdn
  type: host
  description: Fully-qualified domain name (dotted labels per RFC 1035). Hostname or fully-qualified domain
