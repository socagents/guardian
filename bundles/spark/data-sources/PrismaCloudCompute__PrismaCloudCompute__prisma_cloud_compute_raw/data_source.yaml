- name: time
  type: datetime
  description: Time-of-day emitted by Palo Alto Networks. ISO-8601 timestamp with timezone (e.g., 2026-05-26T14:23:01Z).
  example: '2026-05-26T14:23:01Z'
- name: type
  type: string_short
  description: Type/category classifier emitted by Palo Alto Networks. Short opaque token, typically without
    whitespace; max ~64 chars.
  example: authentication
- name: user
  type: user
  description: User account associated with the event. Account name as the vendor reports it — login name,
    UPN, or sAMAccountName depending on the source; no domain prefix unless the vendor emits one.
  example: jsmith
- name: vulnerabilities
  type: string
  description: Vendor-emitted field 'Vulnerabilities'. Free-form text; may contain whitespace and punctuation.
  example: sample_vulnerabilities
- name: labels.Name
  type: string
  description: Human-readable name as displayed by Palo Alto Networks. Free-form text; may contain whitespace
    and punctuation.
  example: sample_name
- name: labels.app
  type: string_short
  description: Application name emitted by Palo Alto Networks. Short opaque token, typically without whitespace;
    max ~64 chars.
  example: token_value
- name: labels.maintainer
  type: string
  description: Vendor-emitted field 'Labels › maintainer'. Leaf of the 'labels' composite. Free-form text;
    may contain whitespace and punctuation.
  example: sample_maintainer
- name: labels.name
  type: string
  description: Human-readable name as displayed by Palo Alto Networks. Free-form text; may contain whitespace
    and punctuation.
  example: sample_name
- name: labels.osDistro
  type: string
  description: Vendor-emitted field 'Labels › osDistro'. Leaf of the 'labels' composite. Free-form text;
    may contain whitespace and punctuation.
  example: sample_osdistro
- name: labels.osVersion
  type: string
  description: Vendor-emitted field 'Labels › osVersion'. Leaf of the 'labels' composite. Free-form text;
    may contain whitespace and punctuation.
  example: 5.15.0-101-generic
use_cases:
