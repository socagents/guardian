how_to_use: |
  ## Zero Networks ZeroNetworksSegment → Cortex XSIAM (dataset `zeronetworks_segment_raw`)
  
    **Routing** — the broker lowercases the CEF/syslog header `vendor`/`product`, replaces
    non-alphanumerics with `_`, and appends `_raw` to choose the dataset (target: `zeronetworks_segment_raw`).
  
    **Required CEF header for XSIAM** — the header must normalize to `zeronetworks_segment`. The marketplace pack's display name `Zero Networks` / `ZeroNetworksSegment` normalizes to `zero_networks_zeronetworkssegment_raw`, a **different dataset** (vendor rename / legacy CEF identity), so use the vendor's actual CEF `deviceVendor`/`deviceProduct` that yields `zeronetworks_segment` and confirm which dataset the events land in.
  
    **Ingestion shape**: **JSON-native.** The modeling rule reads nested JSON (e.g. `$.id`). CEF/syslog routes + lands and the broker extracts top-level columns; the nested reads need the composite present, so Phantom's worker JSON-stringifies `type: json` composites onto the wire (keep the dotted-leaf fields).
  
    - **Modeling-rule gate**: `source_log_type = "audit"` — seed that field with an accepted value or the rule drops the row (XDM stays 0).
  
    **XDM mapping**: ~35 fields mapped to the unified data model (`xdm.*`), including: `xdm.auth.privilege_level`, `xdm.event.operation_sub_type`, `xdm.event.original_event_type`, `xdm.event.outcome_reason`, `xdm.event.type`, `xdm.network.ip_protocol`.
  
    **Operator setup**: This data source's modeling rule reads CEF-shaped columns (rt, src, dst, spt, dpt, cs1-6, act, etc.). Phantom emits CEF over syslog (`CEF:0|Zero Networks|ZeroNetworksSegment|...|<extensions>`) — the broker auto-extracts CEF k=v pairs into typed columns matching the CEF dictionary, and the broker routes to this dataset via the CEF header's vendor/product. Usually NO operator-side broker config is required beyond standard CEF ingestion.
  
    **Status**: Reverse-engineered 2026-06-04 from the parsing/modeling rules — routing, gate, and field
    inventory documented. **NOT yet XDM-validated on a live tenant** (no `validated` pill); validate by
    streaming a CEF batch and confirming a rich `xdm.*` count over a wide window.
  
    **Verify** (once the dataset is XDM-bound, wide ≥7d window):
  
        config timeframe = 30d | datamodel dataset = zeronetworks_segment_raw | sort desc _time | fields xdm.* | limit 20
