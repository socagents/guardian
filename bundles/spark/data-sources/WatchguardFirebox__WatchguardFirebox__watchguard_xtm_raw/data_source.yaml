how_to_use: |
  ## WatchGuard WatchguardFirebox → Cortex XSIAM (dataset `watchguard_xtm_raw`)
  
    **Routing** — the broker lowercases the CEF/syslog header `vendor`/`product`, replaces
    non-alphanumerics with `_`, and appends `_raw` to choose the dataset (target: `watchguard_xtm_raw`).
  
    **Required CEF header for XSIAM** — the header must normalize to `watchguard_xtm`. The marketplace pack's display name `WatchGuard` / `WatchguardFirebox` normalizes to `watchguard_watchguardfirebox_raw`, a **different dataset** (vendor rename / legacy CEF identity), so use the vendor's actual CEF `deviceVendor`/`deviceProduct` that yields `watchguard_xtm` and confirm which dataset the events land in.
  
    **Ingestion shape**: **Flat / CEF-compatible.** The modeling rule reads flat top-level columns (no nested-JSON access). A CEF event routes in and the broker auto-extracts those columns, so this source maps from Phantom's existing CEF path once the dataset is XDM-bound.
  
    - **Modeling-rule gate**: none — the rule maps every routed row unconditionally.
  
    **XDM mapping**: ~21 fields mapped to the unified data model (`xdm.*`), including: `xdm.event.duration`, `xdm.event.id`, `xdm.event.operation_sub_type`, `xdm.event.outcome`, `xdm.network.application_protocol`, `xdm.network.http.method`.
  
    **Operator setup**: This data source's modeling rule reads CEF-shaped columns (rt, src, dst, spt, dpt, cs1-6, act, etc.). Phantom emits CEF over syslog (`CEF:0|WatchGuard|WatchguardFirebox|...|<extensions>`) — the broker auto-extracts CEF k=v pairs into typed columns matching the CEF dictionary, and the broker routes to this dataset via the CEF header's vendor/product. Usually NO operator-side broker config is required beyond standard CEF ingestion.
  
    **Status**: Reverse-engineered 2026-06-04 from the parsing/modeling rules — routing, gate, and field
    inventory documented. **NOT yet XDM-validated on a live tenant** (no `validated` pill); validate by
    streaming a CEF batch and confirming a rich `xdm.*` count over a wide window.
  
    **Verify** (once the dataset is XDM-bound, wide ≥7d window):
  
        config timeframe = 30d | datamodel dataset = watchguard_xtm_raw | sort desc _time | fields xdm.* | limit 20
