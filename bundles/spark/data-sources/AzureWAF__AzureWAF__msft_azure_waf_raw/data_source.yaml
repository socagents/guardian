schema_version: 1
id: AzureWAF
pack_name: AzureWAF
rule_name: AzureWAF
dataset_name: msft_azure_waf_raw
vendor: Microsoft
product: AzureWAF
description: Azure Web Application Firewall (WAF) — deployed in front of Application Gateway or Azure
  Front Door — logs every HTTP request evaluated against OWASP and custom rule sets. Each row carries
  the rule id, action taken, request URI, client IP, country, and the matched-string detail. Simulate
  Azure WAF to validate detections for application-layer attacks, custom-rule tuning, and bot-management
  policy enforcement.
how_to_use: '## Sending these logs to Cortex XSIAM


  Phantom emits this vendor''s wire format as CEF over UDP — point a data worker

  at your XSIAM broker''s syslog destination and these records flow straight in.

  The schema below describes the vendor''s fields independent of destination, so

  the same records also work for Splunk, Elastic, or any syslog receiver.


  The CEF header''s **vendor** + **product** drive XSIAM''s parsing-rule routing:

  the broker normalizes them to `<lowercased-vendor>_<lowercased-product>_raw`

  (non-alphanumerics -> `_`) and matches your installed parsing rule. The PR/MR

  rules read NAMED COLUMNS, so the transport is invisible to them — pack the

  vendor''s field names as CEF extension `key=value` pairs.


  **Required CEF header for XSIAM**:


  - **vendor**: `msft`

  - **product**: `azure_waf`


  Broker derives → `msft_azure_waf_raw`.


  Use `msft` / `azure_waf` to broker-derive `msft_azure_waf_raw`. Display-name path `Microsoft` / `Azure
  WAF` derives `microsoft_azure_waf_raw` — a different dataset.


  **MR pattern**: Flat-field. MR reads flat `clientIp_s`, `httpStatusCode_s`, `requestUri_s`, `hostname_s`,
  `action_s`, `ruleId_s` — all _s/_d/_g typed CEF extensions.


  **Composite (nested-JSON) fields**: None. Flat-field. Send all WAF columns as flat CEF extensions matching
  the MR''s exact field name (note the `_s`/`_d`/`_g` type suffixes from Azure''s table column convention).


  **Sentinel values**: None.


  **PR filter quirks**: `TimeGenerated` RFC-3339. **To populate XDM**, seed `Category` to a value the MR
  maps — `FrontDoorAccessLog` or `FrontDoorWebApplicationFirewallLog`; the MR filters `Category in (…)`
  and yields zero XDM rows for anything else.


  **Saturation strategy**: Flat-field — single event of 1166 bytes reached 13 XDM per L20 measurement.
  This is the easiest vendor to saturate (with the `Category` seed above).


  **Single-event XDM ceiling**: ~13 XDM single-event (flat-field, highest single-event yield).


  **Verify**:


  ```xql

  datamodel dataset = msft_azure_waf_raw

  | filter xdm.event.id contains "<your-marker>"

  | fields xdm.*

  | limit 1

  ```'
