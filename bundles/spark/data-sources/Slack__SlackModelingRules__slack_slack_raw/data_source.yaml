how_to_use: |
  ## slack slack → Cortex XSIAM (dataset `slack_slack_raw`)
  
    **Routing** — the broker lowercases the CEF/syslog header `vendor`/`product`, replaces
    non-alphanumerics with `_`, and appends `_raw` to choose the dataset (target: `slack_slack_raw`).
  
    **Required CEF header for XSIAM**:
    - **vendor**: `slack`
    - **product**: `slack`
  
    These normalize → `slack_slack_raw`.
  
    **Ingestion shape**: **JSON-native.** The modeling rule reads nested JSON (e.g. `$.type`). CEF/syslog routes + lands and the broker extracts top-level columns; the nested reads need the composite present, so Phantom's worker JSON-stringifies `type: json` composites onto the wire (keep the dotted-leaf fields).
  
    - **Modeling-rule gate**: `action not in ("user_login","user_logout")` — seed that field with an accepted value or the rule drops the row (XDM stays 0).
  
    **XDM mapping**: ~83 fields mapped to the unified data model (`xdm.*`), including: `XDM.Audit.TriggeredBy.agent.version`, `XDM.Audit.TriggeredBy.identity.name`, `XDM.Audit.TriggeredBy.identity.type`, `XDM.Audit.TriggeredBy.identity.uuid`, `XDM.Audit.TriggeredBy.ipv4`, `XDM.Audit.audited_resource.id`.
  
    **Operator setup**: This data source has typed-column data that doesn't look like CEF (columns are camelCase API fields, JSON sub-objects, etc.). Most likely arrives via the XSIAM HTTP Collector with a source tag mapped to vendor=`slack`, product=`slack`, or via a vendor-specific XDR connector pull. Phantom can POST JSON to the HTTP collector; the operator must configure the collector's source tag to land events in this dataset.
  
    **Status**: Reverse-engineered 2026-06-04 from the parsing/modeling rules — routing, gate, and field
    inventory documented. **NOT yet XDM-validated on a live tenant** (no `validated` pill); validate by
    streaming a CEF batch and confirming a rich `xdm.*` count over a wide window.
  
    **Verify** (once the dataset is XDM-bound, wide ≥7d window):
  
        config timeframe = 30d | datamodel dataset = slack_slack_raw | sort desc _time | fields xdm.* | limit 20
