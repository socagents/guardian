# ─────────────────────────────────────────────────────────────────────
# REPO-ROOT (DEV) docker-compose.yml
#
# This is the development compose file. It builds images from
# source via `docker compose build` and references them as
# `image: <svc>:local`. Used by:
#
#   - Local developer workflows when running the stack on a workstation
#     for hot-reload and debugging (edit code → docker compose up -d
#     --build to recreate)
#
# **Not** used by CI or by phantom-vm. The build-<svc>.yml workflows
# build per-service images directly via `docker build` (no compose),
# push them to GHCR as `:dev`, and the operator-driven install on
# phantom-vm uses the digest-pinned installer/docker-compose.yml
# (NOT this file).
#
# This file uses TAG-BASED image references (e.g. `image: xlog:local`).
# That's intentional — the dev/CI flow doesn't have a release manifest,
# and the `:local` tag is what `docker compose build` produces from the
# Dockerfile.
#
# v0.3.0+ — the CUSTOMER-facing compose lives at
# `installer/docker-compose.yml` and uses DIGEST-BASED image references
# (e.g. `image: ghcr.io/.../xlog@${DIGEST_PHANTOM_XLOG}`). Customer
# installations get that file (bundled in phantom-installer + the kit
# tarball), populate `.env` with digests from the release manifest, and
# the resulting compose pinning is content-aware so unchanged services
# don't recreate on upgrade.
#
# DO NOT try to unify the two files. The dev compose needs `:local` to
# work without a manifest file; the customer compose needs digests so
# customer upgrades are content-aware. The split mirrors the dev/CI vs.
# customer distribution boundary. See:
#
#   - CLAUDE.md "Image digest pinning contract (v0.3.0+ — MANDATORY)"
#   - mcp/agent/app/help/architecture#image-pinning (canonical spec)
#   - installer/MIGRATION-FROM-V02X.md (customer migration guide)
# ─────────────────────────────────────────────────────────────────────

services:

  # v1.2 stage 3F — xlog is the standalone log-generation service that
  # exposes a GraphQL API for synthetic-log workers, scenario execution,
  # observable catalogs, and ATT&CK coverage. The agent's xlog connector
  # (in bundles/spark/connectors/xlog/) sends GraphQL queries here.
  # Was previously named `phantom` from a pre-rebrand era; the agent
  # product is `phantom-agent`, this is the underlying log-gen service.
  xlog:
    container_name: xlog
    image: xlog:local
    build:
      context: ./xlog
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8999:8000"
    environment:
      # Bearer token enforced by xlog/app/auth.py. Match the value
      # against the agent's setup-form `xlogApiToken` field. CI
      # populates this from ${{ secrets.XLOG_API_KEY }}; self-hosted
      # operators set it in their own .env. When unset, xlog runs in
      # permissive mode (logs a warning at boot).
      - XLOG_API_KEY
      - WEBHOOK_KEY
      - WEBHOOK_ENDPOINT
      - WORKERS_NUMBER
      - LOGGING_DIR
      - LOGGING_STORAGE_SIZE
      - LOGGING_TRUNCATE_LIMIT
      - XSIAM_MANDATORY_PARSED_FIELDS
      - XSIAM_OPTIONAL_PARSED_FIELDS
      - XLOG_DB_PATH=/data/xlog.db
    volumes:
      - xlog_scenarios:/scenarios
      - xlog_data:/data
      # TLS material — read-only mount of the shared phantom_tls
      # volume. The agent (rw mount of the same volume) writes
      # cert.pem + key.pem here when the operator picks a TLS mode
      # via the setup form, OR auto-generates on first boot when
      # there's no setup.json yet. xlog's main.py reads from
      # /tls/{cert,key}.pem at startup if present, falls back to
      # plain HTTP if the files don't exist.
      - phantom_tls:/tls:ro
    healthcheck:
      # TLS-aware healthcheck — try HTTPS first, fall back to plain
      # HTTP. Self-signed certs get _create_unverified_context.
      # Each python invocation is one-liner; `||` chains them at the
      # shell level so we don't need multi-line python in YAML.
      test: ["CMD-SHELL", "python -c \"import urllib.request,ssl;urllib.request.urlopen('https://localhost:8000/health',timeout=5,context=ssl._create_unverified_context())\" 2>/dev/null || python -c \"import urllib.request;urllib.request.urlopen('http://localhost:8000/health',timeout=5)\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  # phantom-mcp is intentionally NOT a separate compose service.
  # Per the spark-agents v1.2 bundle design, the embedded MCP is
  # part of the agent's trust boundary and lives inside the
  # phantom-agent container. See `phantom-agent` below — its
  # Dockerfile spawns the MCP as a subprocess on localhost:8080
  # alongside Next.js on :3000.

  caldera:
    container_name: caldera
    image: caldera:local
    build:
      context: ./third_party/caldera
      dockerfile: Dockerfile
      args:
        TZ: "UTC"
        VARIANT: ${CALDERA_VARIANT:-full}
    restart: unless-stopped
    # Host-side port mappings are env-var configurable so operators
    # can sidestep conflicts with other services on the same host.
    # Defaults match installer/docker-compose.yml (single set of
    # defaults across both files; HTTPS shifted to 8444 to dodge the
    # most common collision). Override via .env in either deployment.
    ports:
      - "${PHANTOM_CALDERA_HTTP_PORT:-8888}:8888"
      - "${PHANTOM_CALDERA_HTTPS_PORT:-8444}:8443"
      - "${PHANTOM_CALDERA_CONTACT1_PORT:-7010}:7010"
      - "${PHANTOM_CALDERA_CONTACT2_PORT:-7011}:7011/udp"
      - "${PHANTOM_CALDERA_CONTACT3_PORT:-7012}:7012"
      - "${PHANTOM_CALDERA_DNS_PORT:-8853}:8853"
      - "${PHANTOM_CALDERA_SSH1_PORT:-8022}:8022"
      - "${PHANTOM_CALDERA_SSH2_PORT:-2222}:2222"
    environment:
      CALDERA_RED_USER: ${CALDERA_RED_USER:-red}
      CALDERA_RED_PASSWORD: ${CALDERA_RED_PASSWORD:-phantom-setup-required}
      CALDERA_API_KEY: ${CALDERA_API_KEY:-}
    volumes:
      - caldera_data:/usr/src/app/data
      - caldera_conf:/usr/src/app/conf
      # Read-only mount of the shared phantom_tls volume — caldera's
      # entrypoint reads /tls/{cert,key}.pem at startup if present,
      # writes them into conf/server.{crt,key} and configures TLS in
      # local.yml. Falls back to plain HTTP if the files don't exist.
      - phantom_tls:/tls:ro
      # v0.1.16: operator-typed creds from /api/setup land here.
      # Caldera's entrypoint reads /operator-creds/caldera.yaml first,
      # falls back to env vars when absent.
      - phantom_operator_creds:/operator-creds:ro
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8888/', timeout=5)\""]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s
    entrypoint: ["/bin/sh", "-ec"]
    command:
      - |
        python3 - <<'PY'
        import os
        import pathlib
        import yaml

        default_path = pathlib.Path("/usr/src/app/conf/default.yml")
        local_path = pathlib.Path("/usr/src/app/conf/local.yml")
        source_path = local_path if local_path.exists() else default_path
        cfg = yaml.safe_load(source_path.read_text()) or {}

        # v0.1.16: prefer operator-typed creds from the shared
        # /operator-creds/caldera.yaml file (written by the agent's
        # /api/setup endpoint) over env defaults.
        red_user = os.environ["CALDERA_RED_USER"]
        red_password = os.environ["CALDERA_RED_PASSWORD"]
        api_key = os.environ.get("CALDERA_API_KEY") or ""

        operator_creds_path = pathlib.Path("/operator-creds/caldera.yaml")
        if operator_creds_path.exists():
            try:
                oc = yaml.safe_load(operator_creds_path.read_text()) or {}
                if isinstance(oc, dict):
                    if oc.get("red_user"):
                        red_user = oc["red_user"]
                    if oc.get("red_password"):
                        red_password = oc["red_password"]
                    if oc.get("api_key"):
                        api_key = oc["api_key"]
                    print("[caldera-init] applied operator creds from /operator-creds/caldera.yaml")
            except Exception as exc:
                print(f"[caldera-init] WARNING: could not parse operator-creds file: {exc}")

        cfg.setdefault("users", {})
        cfg["users"]["red"] = {red_user: red_password}

        if api_key:
            cfg["api_key_red"] = api_key
            cfg.setdefault("encryption_key", api_key)

        local_path.parent.mkdir(parents=True, exist_ok=True)
        local_path.write_text(yaml.safe_dump(cfg, default_flow_style=False, sort_keys=False))
        PY
        exec python3 server.py --log DEBUG

  # v0.1.27 — Optional headless-browser sidecar for the `web` connector.
  #
  # chromedp/headless-shell is a minimal Chromium build (~150MB) that
  # exposes Chrome DevTools Protocol on a TCP port. The phantom-agent's
  # `web` connector connects via Playwright Python's
  # `connect_over_cdp("http://phantom-browser:9222")`, drives the
  # browser, and never has to bundle Chromium binaries itself — saves
  # ~250MB on the agent image and isolates browser crashes from the
  # agent process.
  #
  # PROFILE-GATED: this service does NOT start with `docker compose up`.
  # The operator brings it up explicitly when they want web access:
  #
  #   docker compose --profile browser up -d phantom-browser
  #
  # Then create a `web` connector instance via the /connectors UI in
  # the agent (the connector_loader is instance-gated — tools don't
  # advertise until at least one instance exists). Take it down again
  # with: `docker compose --profile browser stop phantom-browser`.
  #
  # Internal-network only: no host port published. Reachable from the
  # phantom-agent container as `phantom-browser:9222`. If the operator
  # wants to debug, attach to the compose network:
  #   `docker run --rm --network phantom_default -p 9222:9222 ...`
  # Phantom-built image (NOT pulled from upstream directly), based on
  # chromedp/headless-shell:latest with Phantom-specific Chromium flags
  # and a CDP healthcheck baked in. See ./phantom-browser/Dockerfile.
  # Tagged `phantom-browser:local` for the build pipeline; the GHCR
  # release publishes it as `ghcr.io/kite-production/phantom-browser:<version>`
  # alongside the agent image.
  phantom-browser:
    container_name: phantom_browser
    image: phantom-browser:local
    build:
      context: ./phantom-browser
      dockerfile: Dockerfile
    restart: unless-stopped
    profiles: ["browser"]
    # No `command:` override — the Dockerfile's CMD already carries
    # all the right Chromium flags. Override here only if testing a
    # one-off flag without rebuilding.
    expose:
      - "9222"
    # No healthcheck. The chromedp/headless-shell image is too slim
    # to include any common probe utility (wget, curl, sh, python,
    # nc are all absent), so any HEALTHCHECK CMD just errors with
    # "executable file not found" and the container reports
    # `unhealthy` despite CDP working. The agent connector verifies
    # liveness on first navigate() call instead — a friendlier check
    # because the error is operator-actionable ("Is the
    # phantom-browser container up? Bring it up with: docker compose
    # --profile browser up -d phantom-browser").


  phantom-agent:
    image: phantom-agent:local
    build:
      # Build context is the REPO ROOT so the Dockerfile can COPY
      # both `mcp/agent/` (Next.js) and `bundles/spark/mcp/` (the
      # embedded MCP source). See mcp/agent/Dockerfile for the
      # multi-stage layout.
      context: .
      dockerfile: mcp/agent/Dockerfile
    container_name: phantom_agent
    restart: unless-stopped
    # Credential boundary: this block carries ONLY compose-internal
    # hostnames + runtime mount paths. Everything operator-supplied
    # (UI creds, model API keys, XSIAM tenant config, Caldera red
    # creds) flows in via the SETUP PAGE — written to
    # /app/runtime/setup.json (the bind-mount below) and read at
    # request time.
    #
    # MCP_TOKEN is bundle-internal — generated by the entrypoint on
    # first boot if not provided. CI passes a value through .env for
    # smoke-test reproducibility; local dev can leave it unset.
    environment:
      # Compose-internal hostnames:
      # v0.6.24 — XLOG_URL flipped to https://. xlog serves HTTPS
      # unconditionally since v0.4.0 (TLS via shared /tls volume).
      # See installer/docker-compose.yml for the full comment.
      - XLOG_URL=https://xlog:8000
      - CALDERA_URL=http://caldera:8888
      # MCP_URL points at the in-container MCP (same trust boundary).
      - MCP_URL=http://localhost:8080/api/v1/stream/mcp
      # Pinned image version (from .env), surfaced to the UI via
      # /api/agent/version for the sidebar chip + About modal.
      - PHANTOM_VERSION
      # Bundle-internal MCP coordination token (auto-generated by
      # the entrypoint when unset).
      - MCP_TOKEN
      # AES-256-GCM key for SecretStore encryption-at-rest. Pin in
      # .env (`openssl rand -base64 32`). v0.3.7+ REQUIRED — the
      # SecretStore refuses to construct without it. See
      # docs/split-deploy.md "Encryption-at-rest" for the operator
      # lifecycle (loss = unrecoverable).
      - PHANTOM_SECRET_KEK
      # Operator-acknowledged escape hatch — set to "1" to allow the
      # SecretStore to fall back to plaintext-on-disk mode when KEK
      # is unset. v0.3.7+: pre-v0.3.7 silently fell back to plaintext;
      # that fallback is gone and this variable is now the only
      # sanctioned path to plaintext mode. Customer installs via
      # phantom-installer never need it (installer always generates a
      # KEK); only manual / test deployments that knowingly skip
      # encryption should set it.
      - PHANTOM_SECRET_KEK_ALLOW_PLAINTEXT
      # v0.5.5+ admin bootstrap password. Consumed only by the
      # entrypoint seed step on first boot of a fresh SecretStore.
      # Pre-v0.5.5 this was a hardcoded literal in the agent image;
      # v0.5.5 moves it to .env so no credential is baked anywhere
      # in any image. Forced first-login change at /profile makes
      # it irrelevant after the first login.
      - PHANTOM_DEFAULT_ADMIN_PASSWORD
      # Notification channel:* webhook URLs. One env var per
      # manifest-declared channel; channels with no URL set skip
      # silently (notification still persists). Today's manifest
      # declares channel:soc and channel:purple-team.
      - PHANTOM_NOTIFICATION_CHANNEL_SOC
      - PHANTOM_NOTIFICATION_CHANNEL_PURPLE_TEAM
      # v0.6.36 — operator-tunable chat-route turn cap. v0.6.32
      # added the read site in chat/route.ts ("Operators can tune
      # via PHANTOM_CHAT_MAX_TURNS") but forgot the compose plumbing.
      # Default of 30 (clamped to [5,200]) lives in route.ts.
      - PHANTOM_CHAT_MAX_TURNS
      # Connector seed values consumed by the embedded MCP's
      # auto-migration loop (src/usecase/connector_loader.py:
      # _AUTO_MIGRATION). Each var maps to a Settings.<attr>
      # via validation_alias in config/config.py, which is what
      # the loader reads to materialize default instances on
      # first boot. Without these, the loader either skips the
      # connector entirely (no env values → no instance) or
      # creates an instance with empty secrets (URL only),
      # which is what was breaking caldera's 401.
      #
      #   Caldera (operator-facing red-team driver):
      - CALDERA_API_KEY
      - CALDERA_RED_USER
      - CALDERA_RED_PASSWORD
      #   XSIAM (Cortex PAPI for issues / cases / XQL):
      - CORTEX_MCP_PAPI_URL
      - CORTEX_MCP_PAPI_AUTH_HEADER
      - CORTEX_MCP_PAPI_AUTH_ID
      - PLAYGROUND_ID
      - WEBHOOK_ENDPOINT
      - WEBHOOK_KEY
      #   xlog (kept env-var-driven for the legacy fallback even
      #   though xlog itself owns the canonical tech-stack now):
      - XLOG_API_TOKEN
      - TECHNOLOGY_STACK
      # Runtime mount paths consumed by both the agent and the MCP:
      - PHANTOM_AGENT_SETUP_PATH=/app/runtime/setup.json
      - PHANTOM_AGENT_ENV_EXPORT_PATH=/app/runtime/.env.generated
      - BUNDLE_ROOT=/app/bundle
      - DATA_ROOT=/app/data
      # Force re-seed of /app/skills from /app/mcp/skills-default on
      # boot. Bare-name forwarding so `FORCE_SKILLS_SYNC=1 docker
      # compose up -d --force-recreate phantom-agent` flows the value
      # through to entrypoint.sh's skill-bootstrap block. Without
      # this, the entry in the compose process env is never visible
      # to the container, and the documented re-seed path is a no-op.
      # See entrypoint.sh §1 for the consume side. Note: re-seed is
      # MERGE not REPLACE — copies image defaults into the volume but
      # does not remove files NOT in the image.
      - FORCE_SKILLS_SYNC
      # MCP transport defaults (overridable via .env).
      - MCP_TRANSPORT=${MCP_TRANSPORT:-streamable-http}
      - MCP_HOST=${MCP_HOST:-0.0.0.0}
      - MCP_PORT=${MCP_PORT:-8080}
      - MCP_PATH=${MCP_PATH:-/api/v1/stream/mcp}
      # v1.2 stage 3E — Spark-platform supersession. Optional.
      - SPARK_PLATFORM_GATEWAY
    volumes:
      # Operator setup mount (Phase 5 SecretStore + setup.json land here).
      - ./.phantom-agent:/app/runtime
      # Phase 2B — bundle source mounted read-only so the embedded
      # MCP can import connectors.<id>.src.*, read manifest.yaml, etc.
      - ./bundles/spark:/app/bundle:ro
      # MCP runtime state (audit log, instance store, KB, etc.).
      - phantom_mcp_data:/app/data
      # Skills volume (seeded from /app/mcp/skills-default at first run).
      - phantom_mcp_skills:/app/skills
      # Shared TLS volume — agent has WRITE access (writes auto-gen or
      # operator-supplied cert here on boot/setup-save); xlog and
      # caldera mount the same volume read-only and read cert.pem +
      # key.pem at startup. Single source of truth for TLS material
      # across the stack; replaces the old SSL_CERT_PEM compose-env
      # passthrough.
      - phantom_tls:/tls
      # v0.1.16: operator-typed creds from /api/setup land here.
      # Currently caldera reads /operator-creds/caldera.yaml; future
      # services (xlog token rotation, etc.) can subscribe similarly.
      - phantom_operator_creds:/operator-creds
    ports:
      - "3000:3000"   # Next.js UI
      - "8080:8080"   # Embedded MCP admin + JSON-RPC transport
    depends_on:
      xlog:
        condition: service_healthy
      caldera:
        condition: service_started
    # Healthcheck verifies BOTH processes — agent UI on :3000 + the
    # embedded MCP on :8080. Either one being down marks the
    # container unhealthy and triggers compose's restart policy.
    healthcheck:
      # Probe HTTPS first (TLS mode) then fall back to HTTP (plain
       # mode). The cost in plain mode is one extra TCP attempt against
       # a non-listening port — fast-fail, then HTTP succeeds. -k skips
       # cert verification for self-signed.
      test: ["CMD-SHELL", "(curl -ksf https://localhost:3000/api/auth/status || curl -sf http://localhost:3000/api/auth/status) && (curl -ksf https://localhost:8080/ping/ || curl -sf http://localhost:8080/ping/) || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s


volumes:
  xlog_scenarios:          # v1.2 stage 3F — was `phantom` (xlog scenarios)
  xlog_data:               # v1.2 stage 3F — was `phantom_data`
  # phantom_mcp_* volumes are now mounted into phantom-agent (the
  # embedded MCP runs there). Names kept for data continuity across
  # the embed-MCP refactor — the volumes themselves don't move.
  phantom_mcp_skills:
  # Shared TLS volume — read by xlog + caldera, written by agent.
  # See per-service volumes: blocks above for mount points.
  phantom_tls:
  phantom_mcp_data:        # instance store, secrets, audit, kb, jobs, sessions, memory
  caldera_data:
  caldera_conf:
  # v0.1.16: operator-credentials hand-off between /api/setup and
  # services that need them outside the connector instance store.
  # Today: caldera (red user/password/api_key for local.yml).
  phantom_operator_creds:
