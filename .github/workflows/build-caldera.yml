name: Build caldera

# v0.4.x+ — per-service build workflow.
#
# CI/CD step 1 of 3 for caldera (path-filter scope:
# third_party/caldera/**). See docs/CICD.md § Per-service path-filter
# contract — caldera is the highest-stakes consumer of the
# "no source change = no rebuild = no container recreate"
# invariant, because its in-memory state (live implants, ongoing
# operations) is lost on every recreate.
#
# Fires only when caldera source changes. Particularly important
# because caldera holds in-memory state about deployed implants +
# ongoing operations that's lost on container recreate. Per-push
# rebuilds (the pre-v0.4.x pattern) would have disconnected those
# every time the agent changed. This workflow split + the existing
# selective-rebuild in release.yml together preserve caldera state
# across releases that don't touch caldera source.
#
# If a future change tempts you to add a workflow_dispatch trigger
# that "just rebuilds caldera for safety," DON'T. Every unnecessary
# rebuild is a guaranteed operator-facing regression (lost implants).
# Source change is the ONLY trigger that should produce a new
# caldera digest.
#
# Security note: this workflow only consumes built-in GitHub contexts
# that are NOT operator-controllable. See build-xlog.yml header.

on:
  push:
    branches: [main]
    paths:
      # v0.5.12 — paths intentionally narrow: ONLY the caldera
      # submodule. Self-path + composite-action triggers removed
      # because workflow-file edits re-running `docker build --pull`
      # produced new caldera image digests despite no source change,
      # forcing operator-visible state loss (live implants, ongoing
      # operations) on the next install. Caldera is the highest-
      # stakes consumer of the "no source change = no rebuild"
      # invariant — see docs/CICD.md § Per-service path-filter contract.
      #
      # Trade-off: workflow-file edits (comment header, security
      # fix) WON'T auto-rebuild caldera. Use `gh workflow run
      # build-caldera.yml` if you need to exercise a workflow
      # change before the next submodule pin moves.
      - 'third_party/caldera/**'
      # v0.5.57+ — our custom abilities + adversary YAMLs are overlaid
      # into the caldera build context at build time. They cannot live
      # inside the submodule (untracked-in-submodule trap), so they're
      # tracked in our repo at bundles/spark/caldera-content/. Changes
      # there must rebuild the caldera image so Caldera's data_svc
      # auto-loads them on container start.
      - 'bundles/spark/caldera-content/**'
  pull_request:
    branches: [main]
    paths:
      - 'third_party/caldera/**'
      - 'bundles/spark/caldera-content/**'
  workflow_dispatch:

concurrency:
  group: build-caldera-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  packages: write

jobs:
  build:
    name: Build phantom-caldera image
    runs-on: [self-hosted, Linux, X64, phantom]
    steps:
      - name: Reset workspace ownership (pre-checkout)
        # See build-agent.yml header for full rationale.
        run: |
          sudo chown -R "$(id -u):$(id -g)" "$GITHUB_WORKSPACE" || true

      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Fix bind-mount perms
        run: |
          sudo chown -R "$(id -u):$(id -g)" "$GITHUB_WORKSPACE" || true

      # v0.5.57+ — overlay our custom abilities + adversary YAMLs into
      # the caldera build context BEFORE the docker build runs. The
      # Dockerfile uses `ADD . .` to copy the entire build context into
      # /usr/src/app/, so files dropped into third_party/caldera/data/
      # land at /usr/src/app/data/{abilities,adversaries} which Caldera's
      # data_svc.py auto-scans on container start (see data_svc.py
      # lines 30-31). This achieves "factory state" — every fresh
      # install of phantom-caldera ships the phantom-phishing-kill-chain
      # adversary preloaded, no manual import needed.
      #
      # Why an overlay rather than committing files into third_party/caldera/?
      # That directory is a git submodule pointing at upstream
      # mitre/caldera.git. Files added there become untracked-in-submodule
      # and don't survive `git clone` or CI checkout. Keeping the source
      # in our own repo at bundles/spark/caldera-content/ (tracked
      # normally) + overlaying at build time is the clean architecture.
      # v0.5.65 (issue #44) — Phantom content lives at plugins/phantom/data/
      # not data/. The customer compose mounts a named volume
      # `caldera_data:/usr/src/app/data` that shadows ANY image-baked
      # content in data/. Plugin directories (plugins/<name>/) are NOT
      # volume-mounted, so the plugin pattern is what actually persists
      # across container recreates + fresh installs.
      #
      # This rewrites v0.5.57's overlay (was data/abilities + data/
      # adversaries) and v0.5.64's lookalikes (was data/abilities/
      # 14-lab-safe-lookalikes) to all target plugins/phantom/data/.
      # Operators with existing caldera_conf volumes need to add
      # `- phantom` to /usr/src/app/conf/local.yml manually until a
      # follow-up entrypoint hook automates that (v0.5.67+).
      - name: Overlay Phantom plugin content into caldera build context
        run: |
          set -euo pipefail
          SRC="bundles/spark/caldera-content"
          DST="third_party/caldera/plugins/phantom"
          mkdir -p "$DST/data/abilities" "$DST/data/adversaries"
          echo "Overlaying $SRC -> $DST (plugin layout)"
          # Plugin shell — hook.py + VERSION.txt + __init__.py register
          # the plugin with Caldera's loader. Pure content, no code.
          cp -v "$SRC/plugin/__init__.py" "$DST/__init__.py"
          cp -v "$SRC/plugin/hook.py" "$DST/hook.py"
          cp -v "$SRC/plugin/VERSION.txt" "$DST/VERSION.txt"
          # Content — every subdir under abilities/ and every adversary YAML.
          cp -rv "$SRC/abilities/." "$DST/data/abilities/"
          cp -rv "$SRC/adversaries/." "$DST/data/adversaries/"
          # Operator-facing README discoverable in the plugin dir.
          cp -v "$SRC/README.md" "$DST/PHANTOM-KILL-CHAIN-README.md"
          echo "---"
          echo "Phantom plugin abilities in build context:"
          find "$DST/data/abilities" -name "*.yml" | sort
          echo "---"
          echo "Phantom plugin adversaries in build context:"
          find "$DST/data/adversaries" -name "*.yml" | sort

      # v0.5.65 (issue #44) — Add phantom to conf/default.yml's plugins
      # list. default.yml is part of the image build context (not volume-
      # mounted); local.yml IS volume-mounted by the customer compose
      # (caldera_conf:/usr/src/app/conf), so existing installs with
      # populated caldera_conf volumes will need a one-time operator
      # action to also add phantom to their local.yml. Fresh installs
      # (volume empty at first boot) inherit default.yml + auto-enable.
      - name: Enable phantom plugin in caldera default.yml
        run: |
          set -euo pipefail
          CONF="third_party/caldera/conf/default.yml"
          if [ ! -f "$CONF" ]; then
            echo "WARN: $CONF not found — caldera image won't auto-enable phantom plugin"
            exit 0
          fi
          if grep -qE "^- phantom$" "$CONF"; then
            echo "phantom already in default.yml plugins list — no change"
          else
            python3 -c "
          import pathlib
          p = pathlib.Path('$CONF')
          lines = p.read_text().splitlines(keepends=True)
          out = []
          inserted = False
          for ln in lines:
              out.append(ln)
              # Insert after 'manx' (alphabetical-ish between manx and response)
              if not inserted and ln.strip() == '- manx':
                  out.append('- phantom\n')
                  inserted = True
          p.write_text(''.join(out))
          print('Inserted - phantom into default.yml plugins list')
          "
          fi
          echo "---"
          echo "plugins block in $CONF (after edit):"
          grep -A 15 "^plugins:" "$CONF"

      # v0.5.63 (issue #41) — Bake the CTID Adversary Emulation Plans
      # library into the phantom-caldera image's emu plugin. The upstream
      # mitre/emu plugin ships only the plugin shell (no data/abilities or
      # data/adversaries); CTID maintains the actual content at a separate
      # repo (center-for-threat-informed-defense/adversary_emulation_library)
      # that Caldera's emu plugin reads at runtime.
      #
      # Each plan is at <adv>/Resources/caldera/ (newer structure) or
      # <adv>/Emulation_Plan/CALDERA/ (older). Walk both layouts; copy
      # all ability/adversary YAMLs into the emu plugin's data/ tree.
      #
      # Shallow clone keeps the disk footprint reasonable (~50 MB).
      # On clone failure (CTID repo unreachable), the build continues —
      # the emu plugin gracefully reports empty content rather than
      # blocking the entire phantom-caldera image build.
      - name: Overlay CTID Adversary Emulation Plans into emu plugin
        run: |
          set -euo pipefail
          EMU_DATA="third_party/caldera/plugins/emu/data"
          mkdir -p "$EMU_DATA/abilities" "$EMU_DATA/adversaries"
          echo "Cloning CTID adversary_emulation_library (shallow)..."
          if ! git clone --depth 1 --quiet \
              https://github.com/center-for-threat-informed-defense/adversary_emulation_library.git \
              /tmp/ctid-library 2>&1; then
            echo "WARN: CTID library clone failed — emu plugin will ship empty."
            echo "Build continues; phantom-caldera image still includes stockpile + atomic + phantom content."
            exit 0
          fi
          # Walk both layouts. Newer CTID plans live at
          # <adv>/Resources/caldera/abilities/*.yml + adversary.yml.
          # Older plans live at <adv>/Emulation_Plan/CALDERA/.
          # Stage both into EMU_DATA so emu's data_svc finds them.
          shopt -s nullglob
          adv_count=0
          ab_count=0
          for plan_root in /tmp/ctid-library/*/; do
            adv_name=$(basename "$plan_root")
            # Skip non-adversary directories at the repo root
            [[ "$adv_name" == "_archived" || "$adv_name" == "Plan_Master" || "$adv_name" =~ ^\. ]] && continue
            # Try modern layout first
            for caldera_dir in "$plan_root"Resources/caldera "$plan_root"Emulation_Plan/CALDERA; do
              [ -d "$caldera_dir" ] || continue
              # Copy abilities (could be in abilities/ subdir or root)
              if [ -d "$caldera_dir/abilities" ]; then
                cp -r "$caldera_dir/abilities" "$EMU_DATA/abilities/$adv_name" 2>/dev/null || true
                ab_count=$((ab_count + $(find "$caldera_dir/abilities" -name "*.yml" 2>/dev/null | wc -l)))
              fi
              # Copy adversary YAMLs (could be in adversaries/ or root)
              if [ -d "$caldera_dir/adversaries" ]; then
                mkdir -p "$EMU_DATA/adversaries/$adv_name"
                cp -r "$caldera_dir/adversaries/." "$EMU_DATA/adversaries/$adv_name/" 2>/dev/null || true
                adv_count=$((adv_count + $(find "$caldera_dir/adversaries" -name "*.yml" 2>/dev/null | wc -l)))
              fi
              # Root-level adversary.yml / abilities.yml — some older plans
              for f in "$caldera_dir"/*.yml; do
                [ -f "$f" ] || continue
                base=$(basename "$f")
                if [[ "$base" == *adversar* ]]; then
                  mkdir -p "$EMU_DATA/adversaries/$adv_name"
                  cp "$f" "$EMU_DATA/adversaries/$adv_name/$base"
                  adv_count=$((adv_count + 1))
                elif [[ "$base" == *abilit* ]]; then
                  mkdir -p "$EMU_DATA/abilities/$adv_name"
                  cp "$f" "$EMU_DATA/abilities/$adv_name/$base"
                  ab_count=$((ab_count + 1))
                fi
              done
              break  # found a caldera dir; don't double-copy
            done
          done
          rm -rf /tmp/ctid-library
          echo "---"
          echo "CTID emu plugin populated: $adv_count adversary YAMLs + $ab_count ability YAMLs"
          echo "Adversary directories:"
          ls "$EMU_DATA/adversaries/" | sort | head -20

      # v0.5.63 (issue #41) — Enable the emu plugin in Caldera's
      # default.yml. v0.5.65 (issue #44) corrected: target default.yml
      # (in the image build context), not local.yml (which is volume-
      # mounted at runtime via caldera_conf:/usr/src/app/conf and
      # therefore not present in the build context).
      - name: Enable emu plugin in caldera default.yml
        run: |
          set -euo pipefail
          CONF="third_party/caldera/conf/default.yml"
          if [ ! -f "$CONF" ]; then
            echo "WARN: $CONF not found; skipping emu enable."
            exit 0
          fi
          if grep -qE "^- emu$" "$CONF"; then
            echo "emu already in default.yml plugins list — no change"
          else
            python3 -c "
          import pathlib
          p = pathlib.Path('$CONF')
          lines = p.read_text().splitlines(keepends=True)
          out = []
          inserted = False
          for ln in lines:
              out.append(ln)
              if not inserted and ln.strip() == '- debrief':
                  out.append('- emu\n')
                  inserted = True
          p.write_text(''.join(out))
          print('Inserted - emu into default.yml plugins list')
          "
          fi
          echo "---"
          echo "plugins block in $CONF (after edit):"
          grep -A 15 "^plugins:" "$CONF"

      - uses: ./.github/actions/build-and-push-dev-image
        with:
          service-name: phantom-caldera
          build-context: third_party/caldera
          # CALDERA_VARIANT is honored by the Dockerfile to switch
          # between full + animated profiles. Mirrors release.yml.
          build-args: |
            VARIANT=${{ secrets.CALDERA_VARIANT || 'full' }}
          owner: ${{ github.repository_owner }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          github-actor: ${{ github.actor }}
