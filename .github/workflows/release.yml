        # round-trip workflows. build-connectors.yml has built this
        # image since v0.5.61, but release.yml was never updated to
        # include it in the digest-pinning manifest. v0.6.20 closes
        # the plumbing gap retroactively. Same shape as cortex-content
        # and cortex-docs; depends on the same phantom-connector-
        # runtime base.
        env:
          V: ${{ steps.ver.outputs.version }}
          MM: ${{ steps.ver.outputs.minor }}
          CHANGED: ${{ steps.changed.outputs.connector_cortex_xdr }}
          PREV_V: ${{ steps.changed.outputs.prev_version }}
        run: |
          IMG="$REGISTRY/$OWNER/phantom-connector-cortex-xdr"
          if [ "$CHANGED" = "1" ]; then
            echo "::notice::phantom-connector-cortex-xdr rebuilding (source or runtime base changed)"
            docker build \
              --build-arg PHANTOM_RUNTIME_VERSION="$V" \
              -f bundles/spark/connectors/cortex-xdr/Dockerfile \
              -t "$IMG:$V" \
              -t "$IMG:$MM" \
              -t "$IMG:latest" \
