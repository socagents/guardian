          else
            # First release with cortex-xdr in the manifest may not
            # have a $PREV_V tag for this image (pre-v0.6.20 customer
            # releases didn't push cortex-xdr at vX.Y.Z tags — only
            # build-connectors.yml's :dev / :<sha> tags exist). If the
            # PREV pull fails, build from source instead so we have a
            # tagged version under this release. The next release can
            # retag normally.
            echo "::notice::phantom-connector-cortex-xdr source unchanged — retagging $PREV_V → $V/$MM/latest (or building if PREV pull fails)"
            if docker pull "$IMG:$PREV_V"; then
              docker tag  "$IMG:$PREV_V" "$IMG:$V"
              docker tag  "$IMG:$PREV_V" "$IMG:$MM"
              docker tag  "$IMG:$PREV_V" "$IMG:latest"
            else
              echo "::warning::phantom-connector-cortex-xdr has no $PREV_V tag (first release with cortex-xdr in the manifest). Building from source instead so this release has a tagged image to pin."
              docker build \
                --build-arg PHANTOM_RUNTIME_VERSION="$V" \
                -f bundles/spark/connectors/cortex-xdr/Dockerfile \
