            "$IMG:$V" "$IMG:$MM" "$IMG:latest"

      # ──────────────────────────────────────────────────────────────
      # v0.3.0 — Image digest manifest.
      #
      # After all images have been built/retagged AND pushed (RepoDigests
      # is only populated post-push), capture the digest each image was
      # published under and write a manifest file. The manifest:
      #   - Attaches to the GitHub Release as `release-manifest-vX.Y.Z.env`
      #     so customers (and the phantom-updater service) can fetch it
      #     out-of-band when needed.
      #   - Embeds into the phantom-installer binary at build time so the
      #     installer is fully self-contained and reproducible offline.
      #   - Bundles into the customer install kit tarball.
      #
      # Customer impact: the customer compose at installer/docker-compose.yml
      # references each image as `@${DIGEST_<SVC>}` (digest pinning), so
      # the .env file the installer writes must contain matching DIGEST_*
      # values for each managed service. The manifest below is what the
      # installer reads and writes verbatim into .env.
      #
      # Why digest pinning matters: containers are recreated by docker
      # compose iff the SERVICE SPEC changes. With tag refs, every release
      # changes the image-string spec even when image bytes are identical
      # (retag from the previous version's digest). With digest refs, the
      # spec hash tracks image content — so caldera and xlog retain
      # in-memory state across upgrades that don't touch their source.
      # ──────────────────────────────────────────────────────────────
      - name: Capture image digests + write release manifest
        env:
          V: ${{ steps.ver.outputs.version }}
        run: |
          set -euo pipefail
          mkdir -p dist/installer
          MANIFEST="dist/installer/release-manifest-v${V}.env"

          # All images managed by the installer + updater. Order matches
          # the cleanup step at the end of this file and the customer
          # compose service order, both for diff-readability.
          IMAGES=(
            phantom-agent
            phantom-xlog
            phantom-caldera
            phantom-updater
            phantom-browser
            phantom-connector-runtime
            phantom-connector-xlog
            phantom-connector-xsiam
            phantom-connector-caldera
            phantom-connector-web
            phantom-connector-cortex-docs
            phantom-connector-cortex-content
            phantom-connector-cortex-xdr
          )

          {
            echo "# Phantom v${V} — image digest manifest"
            echo "# Generated $(date -u +%FT%TZ) by release.yml run ${{ github.run_id }}"
            echo "# from commit ${{ github.sha }}."
            echo "#"
            echo "# This file is read by the phantom-installer at install/upgrade"
            echo "# time and written verbatim into /opt/phantom/.env. The customer"
            echo "# docker-compose.yml references each image as @\${DIGEST_<SVC>},"
            echo "# so missing or stale DIGEST_* values cause compose-up to fail"
            echo "# loudly with an invalid-digest error rather than silently"
            echo "# pulling a wrong image."
            echo "#"
            echo "# Re-running the installer with a different version's manifest"
            echo "# is the supported upgrade path: the installer strips any"
            echo "# existing DIGEST_* lines from .env before appending the new"
            echo "# ones, so transitions are clean."
            echo ""
            echo "PHANTOM_VERSION=${V}"

            for img in "${IMAGES[@]}"; do
              IMG_REF="$REGISTRY/$OWNER/$img:$V"
              # RepoDigests is populated AFTER push; we pushed all images
              # above. Format: "<registry>/<package>@sha256:<hash>".
              FULL=$(docker inspect "$IMG_REF" --format '{{ index .RepoDigests 0 }}' 2>/dev/null || echo "")
              if [ -z "$FULL" ]; then
                echo "::error::Could not resolve digest for $IMG_REF — image not pushed?" >&2
                exit 1
              fi
              # Strip the "registry/package@" prefix; we only want the
              # digest because the package path is already in the compose
              # file. Result: "sha256:abc..."
              DIGEST="${FULL##*@}"
              # Convert the package name to an env-var name.
              # phantom-agent → DIGEST_PHANTOM_AGENT
              # phantom-connector-xsiam → DIGEST_PHANTOM_CONNECTOR_XSIAM
              VAR_NAME="DIGEST_$(echo "$img" | tr 'a-z-' 'A-Z_')"
              echo "${VAR_NAME}=${DIGEST}"
            done
          } > "$MANIFEST"

          echo "─── Manifest contents ───"
          cat "$MANIFEST"
          echo "─── End manifest ───"

          # Compute checksum so customers / the updater can verify the
          # manifest matches what the release advertises.
          ( cd dist/installer && sha256sum "release-manifest-v${V}.env" \
              > "release-manifest-v${V}.env.sha256" )

      - name: Build single-file phantom-installer
        # Combines installer/phantom-installer.template.sh +
        # installer/docker-compose.yml + the digest manifest above into
        # a single executable file that customers download, chmod +x,
        # and run. Single source of truth: the compose YAML lives in
        # installer/docker-compose.yml and gets injected into the script
        # at build time. See installer/build-phantom-installer.sh.
        #
        # v0.3.0+: build-phantom-installer.sh also reads the digest
        # manifest and substitutes it into the __INSTALLER_DIGEST_MANIFEST__
        # placeholder so the installer ships fully self-contained — no
        # runtime fetch from GitHub Releases at install time.
        env:
          V: ${{ steps.ver.outputs.version }}
        run: |
          mkdir -p dist/installer
          MANIFEST_PATH="$(pwd)/dist/installer/release-manifest-v${V}.env"
          VERSION="$V" \
            MANIFEST_PATH="$MANIFEST_PATH" \
            OUTPUT_DIR="$(pwd)/dist/installer" \
            ./installer/build-phantom-installer.sh
          ls -lh dist/installer/phantom-installer*

      - name: Pack customer install kit
        # Builds a self-contained tarball customers extract on their
        # host. Bundles the digest-pinned compose, the .env.example,
        # the install.sh kit-mode entrypoint, the recovery tool, AND
        # the digest manifest itself + the migration guide.
        #
        # v0.3.0+: the compose uses digest references (image: ...@${DIGEST_<SVC>}),
        # so the install.sh script in this tarball MUST source the
        # bundled release-manifest-v${V}.env into .env before running
        # docker compose up. See installer/install.sh for the kit-mode
        # implementation; the single-file phantom-installer (above) has
        # the manifest embedded in the binary itself.
        env:
          V: ${{ steps.ver.outputs.version }}
        run: |
          set -euo pipefail
          STAGE="$(mktemp -d)"
          KIT="$STAGE/phantom-installer-$V"
          mkdir -p "$KIT"

          # Copy the digest-pinned customer compose verbatim. v0.2.x's
          # VERSION_DEFAULT substitution is no longer needed because
          # image refs no longer carry a version-tag default — each
          # image ref is `@${DIGEST_<SVC>:-sha256:invalid_digest_run_installer_first}`,
          # so a missing DIGEST_* variable produces an explicit error
          # rather than a silent fall-through.
          cp installer/docker-compose.yml "$KIT/docker-compose.yml"
          cp installer/.env.example       "$KIT/.env.example"
          cp installer/install.sh         "$KIT/install.sh"
          chmod +x "$KIT/install.sh"

          # v0.3.0+: ship the manifest + migration guide alongside the
          # compose. install.sh sources the manifest into .env on first
          # run and on every upgrade-to-this-version invocation.
          cp "dist/installer/release-manifest-v${V}.env" "$KIT/release-manifest.env"
          if [ -f installer/MIGRATION-FROM-V02X.md ]; then
            cp installer/MIGRATION-FROM-V02X.md "$KIT/MIGRATION-FROM-V02X.md"
          fi

          # v0.5.3+ — host-side recovery utilities. Two scripts ship in
          # the kit alongside the installer:
          #   • phantom-factory-reset            (wipes phantom_* volumes
          #                                       + re-runs install.sh)
          #   • phantom-reset-admin-password     (host wrapper around the
          #                                       in-container CLI)
          # Both end up at /opt/phantom/ when the operator extracts the
          # kit + runs install.sh. The single-file phantom-installer
          # path embeds them via heredoc instead — see installer/
          # build-phantom-installer.sh markers.
          cp installer/phantom-factory-reset.sh           "$KIT/phantom-factory-reset"
          cp installer/phantom-reset-admin-password.sh    "$KIT/phantom-reset-admin-password"
          chmod +x "$KIT/phantom-factory-reset" "$KIT/phantom-reset-admin-password"

          # Sanity-check: the digest-pinned compose must be valid YAML
          # AND resolve all image refs (digests included) without
          # env-var interpolation failures. Source the manifest into a
          # temp .env to satisfy the ${DIGEST_*} substitutions.
          ( cd "$KIT" \
              && cp .env.example .env.tmp \
              && cat release-manifest.env >> .env.tmp \
              && docker compose --env-file .env.tmp config --quiet \
              && rm .env.tmp )

          tar -C "$STAGE" -czf "phantom-installer-$V.tar.gz" "phantom-installer-$V"
          ls -lh "phantom-installer-$V.tar.gz"
          # Move into a known location for the upload-artifact step.
          mkdir -p dist/installer
          mv "phantom-installer-$V.tar.gz" dist/installer/
          # Compute SHA-256 so customers can verify the tarball matches
          # what your release notes claim (defense against MITM during
          # the email handoff).
          sha256sum "dist/installer/phantom-installer-$V.tar.gz" \
            > "dist/installer/phantom-installer-$V.tar.gz.sha256"
          cat "dist/installer/phantom-installer-$V.tar.gz.sha256"

      - name: Upload installer artifact
        # Backup copy on GitHub Actions storage in case something goes
        # wrong with the GitHub Release attachment step below. Pure
        # insurance — NOT load-bearing for distribution. The primary
        # channel customers consume from is the GitHub Release.
        #
        # continue-on-error so a transient artifact-storage-quota
        # exhaustion (which we've hit before — repo accumulates
        # build-job artifacts faster than retention prunes them)
        # doesn't fail the whole release run and block the actual
        # GitHub Release creation from running.
        #
        # retention-days: 7 (down from 30) — the artifact's only role
        # is short-window recovery if Release creation fails; no need
        # to keep it past a week.
        uses: actions/upload-artifact@v4
        continue-on-error: true
        with:
          name: phantom-installer-${{ steps.ver.outputs.version }}
          path: dist/installer/phantom-installer-${{ steps.ver.outputs.version }}.tar.gz*
          if-no-files-found: error
          retention-days: 7

      - name: Create GitHub Release
        # Only on tag push (not workflow_dispatch). Manual dispatch is
        # for re-running a release after a transient failure; we don't
        # want it creating duplicate Release objects.
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          V: ${{ steps.ver.outputs.version }}
        run: |
          # `gh release create` errors if the release already exists.
          # We prefer that over silently overwriting; if a re-run is
          # genuinely needed, delete the release first.
          #
          # Notes are passed via --notes-file (rather than inline) so
          # heredoc-style multiline content doesn't have to thread
          # through shell quoting.
          NOTES="$(mktemp)"
          {
            echo "Phantom $V — see CHANGELOG.md for details."
            echo ""
            echo "## Customer install (recommended — single file)"
            echo ""
            echo "    # On a fresh Linux VM:"
            echo "    gh release download v$V --repo kite-production/phantom --pattern phantom-installer"
            echo "    chmod +x phantom-installer"
            echo "    sudo ./phantom-installer"
            echo ""
            echo "Auto-installs Docker if missing, prompts for the GHCR token, generates"
            echo "all runtime secrets, and brings the stack up at http://<vm-ip>:3000."
            echo ""
            echo "## Customer install (alternative — multi-file kit)"
            echo "Download phantom-installer-$V.tar.gz, extract, edit .env, run ./install.sh."
            echo ""
            echo "## Images"
            echo "All images are private — pulling requires a registry token (provisioned per customer)."
            echo ""
            echo "v0.3.0+ pins images by content digest, not by tag. The release manifest"
            echo "([release-manifest-v$V.env](release-manifest-v$V.env)) maps each image to"
            echo "its sha256 digest; the phantom-installer reads that manifest and writes"
            echo "the digests into customer .env so docker compose recreates a service iff"
            echo "its image content actually changed."
            echo ""
            echo "Tag form (also published, for ad-hoc inspection):"
            echo "- ghcr.io/$OWNER/phantom-agent:$V"
            echo "- ghcr.io/$OWNER/phantom-xlog:$V"
            echo "- ghcr.io/$OWNER/phantom-caldera:$V"
            echo "- ghcr.io/$OWNER/phantom-updater:$V"
            echo "- ghcr.io/$OWNER/phantom-browser:$V (v0.1.27+, profile-gated)"
            echo "- ghcr.io/$OWNER/phantom-connector-runtime:$V (v0.1.30+, base for per-connector containers; not directly run)"
            echo "- ghcr.io/$OWNER/phantom-connector-xlog:$V (v0.1.30+, dormant unless an instance has runtime: container)"
            echo "- ghcr.io/$OWNER/phantom-connector-xsiam:$V (v0.1.30+, dormant)"
            echo "- ghcr.io/$OWNER/phantom-connector-caldera:$V (v0.1.30+, dormant)"
            echo "- ghcr.io/$OWNER/phantom-connector-web:$V (v0.1.30+, dormant)"
            echo "- ghcr.io/$OWNER/phantom-connector-cortex-docs:$V (v0.3.1+, module-style today; image exists for v0.2 container-mode future)"
          } > "$NOTES"

          # v0.4.0 — reset-ui-password.sh standalone asset retired. The
          # script was deleted from the repo when the forgot-password
          # path moved to the image-baked /app/cli/reset-admin.mjs. No
          # external download is needed: the new CLI is always present
          # in every phantom-agent image, invoked via
          # `docker exec -it phantom_agent node /app/cli/reset-admin.mjs`.
          # See journey ops-cli-reset-admin-password + architecture
          # page #authentication for the contract.

          # v0.3.0 — attach the digest manifest + checksum as standalone
          # release assets. The phantom-installer binary already has the
          # manifest embedded for offline installs, but exposing the
          # manifest as a release asset means:
          #   - phantom-updater can fetch it at update time without
          #     needing to download a whole installer binary
          #   - operators can audit which digests v0.3.X published
          #     without extracting them from the installer
          #   - external automation (e.g. customer's own deployment
          #     pipeline) can pin to specific digests programmatically
          gh release create "v$V" \
            --title "Phantom v$V" \
            --notes-file "$NOTES" \
            "dist/installer/phantom-installer" \
            "dist/installer/phantom-installer.sha256" \
            "dist/installer/phantom-installer-$V.tar.gz" \
            "dist/installer/phantom-installer-$V.tar.gz.sha256" \
            "dist/installer/release-manifest-v$V.env" \
            "dist/installer/release-manifest-v$V.env.sha256"

      - name: Clean up dev-latest prerelease
        # v0.5.9 — the dev cycle uses build-dev-installer.yml to
        # publish a `dev-latest` prerelease whose only purpose is to
        # grant operator PATs pull access to `:dev` image versions on
        # GHCR (per-version access semantics — package versions
        # inherit visibility from the GitHub Release they're
        # associated with). Once a real customer vX.Y.Z release
        # publishes, dev-latest becomes both stale (tracks pre-tag
        # commits) and confusing (appears alongside the real release
        # in the Releases UI). Delete it.
        #
        # No-op if dev-latest doesn't exist: either no dev build
        # ran between the last release and this one, or a prior
        # release-cleanup already removed it. The `|| true` makes
        # this idempotent so a missing prerelease doesn't fail the
        # release run after the actual release has been published.
        #
        # Gated on success() rather than `event_name == 'push'`
        # because workflow_dispatch reruns (used for transient-
        # failure recovery) still want to leave dev-latest cleaned
        # up if it exists.
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view dev-latest --repo "${{ github.repository }}" >/dev/null 2>&1; then
            gh release delete dev-latest \
              --yes \
              --cleanup-tag \
              --repo "${{ github.repository }}" \
              && echo "::notice::dev-latest prerelease deleted (superseded by v${{ steps.ver.outputs.version }})"
          else
            echo "::notice::dev-latest not present — nothing to clean up"
          fi

      - name: Clean up local images
        # Free runner disk: the per-version tags we just pushed are
        # also held by the daemon's overlay store. Keep `:latest` for
        # cache reuse on the next release; drop the version-specific
        # tags. Mirrors build.yml's cleanup pattern.
        if: always()
        env:
          V: ${{ steps.ver.outputs.version }}
          MM: ${{ steps.ver.outputs.minor }}
        run: |
          for img in phantom-agent phantom-xlog phantom-caldera phantom-updater phantom-browser \
                     phantom-connector-runtime \
                     phantom-connector-xlog phantom-connector-xsiam \
                     phantom-connector-caldera phantom-connector-web \
                     phantom-connector-cortex-docs; do
            docker image rm -f \
              "$REGISTRY/$OWNER/$img:$V" \
              "$REGISTRY/$OWNER/$img:$MM" 2>/dev/null || true
          done
          docker image prune -f
