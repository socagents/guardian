name: Build xlog

# v0.4.x+ — per-service build workflow.
#
# CI/CD step 1 of 3 for xlog:
#   1. THIS workflow rebuilds phantom-xlog:dev when xlog/** changes
#   2. build-dev-installer.yml fans in (workflow_run) and republishes
#      dev-latest with this run's :dev digest pinned
#   3. release.yml builds the customer release on v*.*.* tag push
# See docs/CICD.md § Per-service path-filter contract for the
# "no source change = no rebuild = no container recreate" invariant.
#
# Fires only when xlog source changes (or this workflow itself, or
# its shared composite action). Builds the phantom-xlog image,
# pushes to GHCR as :dev, captures the digest. The downstream
# build-dev-installer workflow listens for our `workflow_run`
# completion and reads the fresh :dev digest from GHCR.
#
# DO NOT add unconditional triggers, schedule: cron, or remove the
# paths: filter — those changes nuke the property that lets xlog
# state survive pushes that don't touch xlog source.
#
# Security note: this workflow only consumes built-in GitHub contexts
# that are NOT operator-controllable (repository_owner, github.actor,
# secrets.GITHUB_TOKEN, github.ref). It never reads PR/issue/commit-
# message fields, so the standard workflow-injection class doesn't
# apply here. See:
# https://github.blog/security/vulnerability-research/how-to-catch-github-actions-workflow-injections-before-attackers-do/

on:
  push:
    branches: [main]
    paths:
      # v0.5.12 — paths intentionally narrow: ONLY xlog/** source.
      # Pre-v0.5.12 we also listed `.github/workflows/build-xlog.yml`
      # and `.github/actions/build-and-push-dev-image/**` here, which
      # meant editing this workflow's comment header (or the shared
      # composite action) re-triggered the build. With
      # `docker build --pull` fetching fresh base layers each time,
      # those non-source edits produced new image digests and forced
      # unnecessary container recreates. The fix is to scope the
      # trigger to source-only.
      #
      # Trade-off: legitimate edits to this workflow (security fixes,
      # composite action improvements) WON'T auto-rebuild xlog —
      # they'll piggyback on the next xlog/** source change. If you
      # need to exercise a workflow-file change before any xlog
      # source moves, use `gh workflow run build-xlog.yml` (the
      # workflow_dispatch path still works).
      #
      # See docs/CICD.md § Per-service path-filter contract for the
      # invariant this enforces.
      - 'xlog/**'
  pull_request:
    branches: [main]
    paths:
      - 'xlog/**'
  workflow_dispatch:

concurrency:
  group: build-xlog-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  packages: write

jobs:
  build:
    name: Build phantom-xlog image
    runs-on: [self-hosted, Linux, X64, phantom]
    steps:
      - name: Reset workspace ownership (pre-checkout)
        # See build-agent.yml header for full rationale. tl;dr:
        # containerized jobs that mount $PWD without -u leave root-
        # owned files behind, and actions/checkout@v4's clean step
        # fails on them. Pre-checkout chown is the brute-force fix.
        run: |
          sudo chown -R "$(id -u):$(id -g)" "$GITHUB_WORKSPACE" || true

      - uses: actions/checkout@v4

      - name: Fix bind-mount perms
        run: |
          sudo chown -R "$(id -u):$(id -g)" "$GITHUB_WORKSPACE" || true

      - uses: ./.github/actions/build-and-push-dev-image
        with:
          service-name: phantom-xlog
          build-context: xlog
          owner: ${{ github.repository_owner }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          github-actor: ${{ github.actor }}
